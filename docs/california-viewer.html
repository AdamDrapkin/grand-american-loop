ill</div>\n          <div class=\"fc-loc\">720 Main St, Napa, CA · Day 3 Evening · Birthday Dinner 🎂</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">4.2★ TripAdvisor · ⚠️ Reserve immediately: (707) 699-2452</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Chilean Sea Bass, Seafood Cioppino, Crab Enchiladas, Linguine with Clams, Lobster Bisque. End with the Mocha Cake. Reviewers rave about the halibut and the waterfront setting.</div>\n          <div class=\"fc-hours\">Sat 11:30 AM–9:00 PM · $$ – $$$ · Right on the Napa River · 18% gratuity auto-added for 6+ · Corkage $25</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=38.297359,-122.283712\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">Swan Oyster Depot</div>\n          <div class=\"fc-loc\">1517 Polk St, San Francisco, CA · Optional Day 2 Morning</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Cash only · No reservations · Line forms before 8 AM</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Uni cracked fresh at the marble counter, Dungeness crab legs, half-shell oysters, chowder. Counter service only. One of the most authentic SF seafood experiences.</div>\n          <div class=\"fc-hours\">Mon–Sat 8:00 AM–2:30 PM · Closed Sunday · Best window: Jul 3, arrive 8 AM, done by 9 AM, then Uber to Pier 33 for Alcatraz · Cash only — ATM on corner</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.790971,-122.420965\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n    </div>\n\n    <!-- MOM'S WISHLIST -->\n    <div class=\"section-title\">Mom's San Francisco Restaurant Wishlist</div>\n    <div class=\"food-grid\">\n      <div class=\"fc\">\n        <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#1A3D2B,#3A6B4A);\">\n          <div class=\"fc-name\">Sotto Mare</div>\n          <div class=\"fc-loc\">552 Green St, North Beach · Cioppino Specialist</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">4.6★ Google · $30–50/person · Parties of 3+ take reservations</div>\n          <div class=\"fc-order\"><strong>Order:</strong> The Best Damn Crab Cioppino — whole Dungeness crab, clams, shrimp in rich Italian tomato broth. Min. 2 people for the full pot. Also: fresh oysters, clam linguine.</div>\n          <div class=\"fc-hours\">Daily 11:30 AM–9 PM (Fri–Sat until 10 PM) · No rez for 1–2 guests — arrive early, wait 45–60 min · North Beach institution</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.799798,-122.408342\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#5C3A1E,#B7730A);\">\n          <div class=\"fc-name\">Arsicault Bakery</div>\n          <div class=\"fc-loc\">397 Arguello Blvd, SF (original) · French Bakery</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Best croissants in the United States (Bon Appétit) · Line 10–30 min</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Plain croissant (shatters perfectly), almond croissant, kouign amann, morning bun, ham &amp; cheese croissant. Pre-order online to skip the wait.</div>\n          <div class=\"fc-hours\">Mon–Fri 8 AM–3 PM · Sat–Sun 8 AM–3:30 PM · Also: 87 McAllister (Civic Center), 1070 Bridgeview Way (Chase Center)</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.783443,-122.459228\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">Flour + Water</div>\n          <div class=\"fc-loc\">2401 Harrison St, Mission District · Michelin-Selected</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Michelin selection · James Beard recognition · Handmade pasta changes daily</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Whatever the pasta tasting menu offers — it changes daily. Half-portions available to try multiple pastas. Neapolitan-style pizza and seasonal antipasti also excellent.</div>\n          <div class=\"fc-hours\">Daily 5:00 PM–9:30 PM · Reserve on Resy · $30+ per person · info@flourandwater.com</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.758937,-122.412283\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#2D3748,#4A5568);\">\n          <div class=\"fc-name\">Akiko's Restaurant</div>\n          <div class=\"fc-loc\">430 Folsom St, SoMa · First Omakase Restaurant in SF</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Omakase only · Fish sourced from Toyosu Fish Market, Tokyo</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Nigiri-Centric Omakase $170/person (14 courses) or Full Omakase $270/person (18 courses). Chef Shinsuke Hayashi at the open chef's stage. Book via Tock — fills weeks ahead.</div>\n          <div class=\"fc-hours\">Mon 5:30–8:30 PM · Tue–Fri lunch + dinner · Sat 5:30–8:30 PM · Closed Sun · No à la carte · (415) 397-3218</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.787873,-122.394194\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\" style=\"border-color:#C05621;border-width:2px;\">\n        <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#C05621,#B7730A);\">\n          <div class=\"fc-name\">Ebisu Sushi <span style=\"background:#fff;color:#C05621;font-family:sans-serif;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:12px;margin-left:6px;\">MUST GO</span></div>\n          <div class=\"fc-loc\">1283 9th Ave, Inner Sunset · 40+ Years · Family-Owned</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Near Golden Gate Park · Landmark for 40+ years · No reservations</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Sashimi omakase set (great deal in groups), double hamachi roll, rainbow roll, Romeo &amp; Juliet, Agedashi Tofu, Toro Nigiri. Kushiyaki bites $4 each — start with Kobe beef.</div>\n          <div class=\"fc-hours\">Tue–Sat: lunch 11:30 AM–2 PM, dinner 5–9 PM · Closed Sun &amp; Mon · No reservations — arrive early and wait · (415) 566-1770</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.764457,-122.46666\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#553C9A,#2D3748);\">\n          <div class=\"fc-name\">Tonga Room &amp; Hurricane Bar</div>\n          <div class=\"fc-loc\">950 Mason St, Nob Hill · Fairmont Hotel · Since 1945</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Anthony Bourdain: \"Greatest place in the history of the world\" · $20 entertainment cover</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Mai Tai (their signature), Zombie, any of the Polynesian-fusion dishes. The indoor lagoon has simulated tropical rainstorms every ~30 min with thunder and lightning. Band plays from a floating boat.</div>\n          <div class=\"fc-hours\">Wed–Thu 5–10 PM · Fri–Sat 5–11 PM · Closed Mon–Tue &amp; Sun · Reserve via OpenTable (recommended) · $20/person entertainment cover after 7 PM · Check @tongaroom for buyout closures</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.792388,-122.410092\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#0D6B7A,#0B4F6C);\">\n          <div class=\"fc-name\">Smuggler's Cove</div>\n          <div class=\"fc-loc\">650 Gough St, Hayes Valley · World's 50 Best Bars</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">World's 50 Best Bars (2011–2016) · Largest rum selection in the US</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Any classic tiki cocktail — the Painkiller, Zombie, or Scorpion Bowl. 500+ rums from 3 centuries of rum history. Vintage tiki décor and nautical artifacts throughout.</div>\n          <div class=\"fc-hours\">Daily 5:00 PM–1:15 AM · Walk-in only (no reservations) · Adults only · Hayes Valley neighborhood · (415) 869-1900</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.779413,-122.423377\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#1A3D2B,#3A6B4A);\">\n          <div class=\"fc-name\">Taishoken</div>\n          <div class=\"fc-loc\">665 Valencia St, Mission District · Original Tsukemen</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Founded 1951 · Inventor of tsukemen (dipping noodles)</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Tsukemen — thick housemade noodles dipped in rich, near-opaque chicken-and-pork broth. The original. Also: 5 styles of ramen. Book ahead — packed even on weeknights.</div>\n          <div class=\"fc-hours\">Mon–Thu 5–9:30 PM · Fri lunch+dinner · Sat–Sun 12–9 PM · Last seating 15 min before close · (415) 400-5336</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.762224,-122.421497\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#C05621,#92400E);\">\n          <div class=\"fc-name\">Butter &amp; Crumble</div>\n          <div class=\"fc-loc\">271 Francisco St, North Beach · Sells Out by Noon</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Girl-boss owned · Elevated laminated pastries · Layer cakes</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Whatever's in the case — elevated croissants, crumble cakes, buttercream cakes, vegan/GF options available. Check @butter.and.crumble for daily menu the night before.</div>\n          <div class=\"fc-hours\">Thu–Sun 9 AM until sold out (usually by 11:30 AM–noon) · Closed Mon–Wed · Don't line up before 7:45 AM · North Beach, near Pier 39 · (415) 874-9484</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.805052,-122.409694\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">El Farolito</div>\n          <div class=\"fc-loc\">2779 Mission St, Mission District · Open Late</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">SF's most beloved late-night taqueria · Cash only</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Super burrito (carne asada or al pastor), quesadilla, tacos. Open until 2:45–3:45 AM — the go-to after a night out in the Mission.</div>\n          <div class=\"fc-hours\">Daily 10 AM–2:45 AM (Fri–Sat until 3:45 AM) · Cash only · (415) 824-7877</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.752684,-122.418212\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#5C3A1E,#B7730A);\">\n          <div class=\"fc-name\">Dandelion Chocolate</div>\n          <div class=\"fc-loc\">740 Valencia St, Mission District · Bean-to-Bar</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Mission District institution · See cacao roasting live at the 16th St Factory</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Single-origin hot chocolate, mocha, chocolate chip cookie, seasonal bonbons. Factory at 2600 16th St has tours — watch the bean-to-bar process.</div>\n          <div class=\"fc-hours\">Valencia: Daily 7:30 AM–9 PM (Fri–Sat until 10 PM) · 16th St Factory: Mon–Fri 7:30 AM–6 PM · (415) 349-0942</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.761034,-122.421861\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#2D3748,#4A5568);\">\n          <div class=\"fc-name\">Boulevard</div>\n          <div class=\"fc-loc\">1 Mission St, Embarcadero · James Beard Award</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">James Beard: Best Chef CA (2001) + Outstanding Restaurant (2012) · <em>Note: prix fixe — expensive</em></div>\n          <div class=\"fc-order\"><strong>Prix fixe dinner</strong> from ~$96/person (3 courses). Bar/lounge à la carte available as walk-in. Quintessentially Californian New American cuisine. Historic Audiffred building on the Embarcadero waterfront.</div>\n          <div class=\"fc-hours\">Mon–Sat 5:00–9:30 PM · Closed Sunday · (415) 543-6084 · Reserve on OpenTable</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.79327,-122.392868\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">Gott's Roadside — St. Helena</div>\n          <div class=\"fc-loc\">933 Main St, St. Helena, Napa Valley · James Beard Classic</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">James Beard America's Classic · Since 1999 · Wine country lunch stop</div>\n          <div class=\"fc-order\"><strong>Order:</strong> California Burger (fried egg + Zoe's bacon + balsamic onions), Ahi Poke Crispy Tacos, Chicken Schnitzel Sandwich, organic hand-spun shakes. Local wines by Joel Gott.</div>\n          <div class=\"fc-hours\">Mon–Thu 11 AM–9 PM · Fri–Sat 11 AM–9:30 PM · Sun 11 AM–8:30 PM · On-route Day 3 (Napa) or Day 4 (after Sterling) · (707) 963-3486</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=38.501899,-122.465498\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">The Bird</div>\n          <div class=\"fc-loc\">115 New Montgomery St, SoMa · Free-Range Fried Chicken</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Best fried chicken sandwich in SF · Fresh bun baked daily · Apple slaw</div>\n          <div class=\"fc-order\"><strong>Order:</strong> The Bird sandwich — free-range chicken, berbere spice rub, fresh apple slaw, toasted bun. Simple, perfect. Also at 406 Hayes St (Hayes Valley).</div>\n          <div class=\"fc-hours\">SoMa: Mon–Fri 10 AM–9 PM, Sat–Sun 11 AM–9 PM · Hayes Valley: Mon–Thu 10:30 AM–11:30 PM (Fri–Sun later) · (415) 872-9825</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.787307,-122.400016\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">Scoma's</div>\n          <div class=\"fc-loc\">1965 Al Scoma Way, Fisherman's Wharf · Family-Owned Since 1965</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Pier-to-plate since 1965 · 4.7★ / 6,492 OpenTable reviews · $$$ · Pier setting</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Lazy Man's Cioppino (Dungeness crab, clams, mussels, shrimp — whole, no cracking), Dungeness Crab, Prawns Annuzzi, Clam Chowder. Complimentary valet parking.</div>\n          <div class=\"fc-hours\">Daily 12 PM–9 PM (Fri–Sat until 10 PM) · Happy hour Mon–Fri 2–5 PM · Reservations: OpenTable or (415) 771-4383</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.808932,-122.418433\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n    </div>\n\n    <!-- ALERTS -->\n    <div class=\"section-title\">Alerts &amp; Notes</div>\n    <div class=\"alerts-grid\">\n      <div class=\"ac red\">\n        <div class=\"ac-icon\">🔴</div>\n        <div class=\"ac-title\">Waterfront Seafood Grill — Book Immediately</div>\n        <div class=\"ac-text\">Birthday dinner Jul 4 Sat evening at 720 Main St, Napa. Call (707) 699-2452 to reserve. Saturday evenings fill fast. Confirm July 4 hours (restaurant may have adjusted hours). $$ – $$$.</div>\n      </div>\n      <div class=\"ac grn\">\n        <div class=\"ac-icon\">✅</div>\n        <div class=\"ac-title\">Alcatraz — Action Items for Day 2</div>\n        <div class=\"ac-text\">Download the Alcatraz audio tour app (free) the night before. Charge all phones. QR code for the party is on one mobile device — screenshot it. No weapons. Non-refundable. Arrive Pier 33 by 8:35 AM.</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">ℹ️</div>\n        <div class=\"ac-title\">Muir Woods — No Cell Service</div>\n        <div class=\"ac-text\">Download offline NPS map before leaving Berkeley. Auto-theft warning: remove all valuables from the car at the parking lot. Parking slot is 4:00–4:30 PM — depart Berkeley at 3:00 PM.</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">ℹ️</div>\n        <div class=\"ac-title\">Sterling Vineyards — Gondola Note</div>\n        <div class=\"ac-text\">Gondola tram pauses if temperature exceeds 100°F on Jul 4. Arrive by 10:30 AM (15 min before 10:45 AM check-in). Manage reservation at tock.com — search TOCK-R-AE87DB44.</div>\n      </div>\n      <div class=\"ac amb\">\n        <div class=\"ac-icon\">⚠️</div>\n        <div class=\"ac-title\">Day 4 Departure — 7:00 AM</div>\n        <div class=\"ac-text\">Big Sur marathon day starts at 7:00 AM sharp. Check out is Jul 5 12:00 PM but you'll leave at 7 AM — drop bags with concierge if needed. Fuel up the night before.</div>\n      </div>\n    </div>\n\n    <!-- SOCIAL INTEL -->\n    <div class=\"section-title\">Social Intelligence</div>\n    <div class=\"si-grid\">\n      <div class=\"si-card\">\n        <div class=\"si-quote\">\"Audio tour like going back in time — former guards and inmates narrate their own stories.\"</div>\n        <div class=\"si-source\">@heatherr.eats · 27K followers · 9,806 views</div>\n        <div class=\"si-location\">Alcatraz Island</div>\n      </div>\n      <div class=\"si-card\">\n        <div class=\"si-quote\">Fort Point below the Golden Gate — the view straight up at the span from inside the brick fort is unlike anything else in SF.</div>\n        <div class=\"si-source\">@modicumofjoy · 377,503 plays · 23,170 likes</div>\n        <div class=\"si-location\">Fort Point NHS</div>\n      </div>\n      <div class=\"si-card\">\n        <div class=\"si-quote\">Sterling Vineyards gondola tram with Napa Valley below — the gondola ride is the signature experience before you even taste the wine.</div>\n        <div class=\"si-source\">@discover_california_ · 246K followers · 109,398 views</div>\n        <div class=\"si-location\">Sterling Vineyards, Calistoga</div>\n      </div>\n    </div>\n\n    <div class=\"footer\">\n      <strong>San Francisco · California Road Trip · July 2 in St) · Black Cat Bar &amp; Bistro (1602 Main St) · Cambria is small — call ahead on summer weekends</div>\n        </div>\n      </div>\n    </div>\n\n    <!-- OVERVIEW STRIP -->\n    <div class=\"overview-strip\">\n      <div class=\"ov-card d4\">\n        <div class=\"ov-date\">Sun, Jul 5</div>\n        <div class=\"ov-label\">Day 4 — The Big Sur Marathon Drive</div>\n        <div class=\"ov-note\">17-Mile Drive · Carmel · Point Lobos ⚠️ · Bixby Bridge · Hurricane Point · Pfeiffer Beach · McWay Falls · Elephant Seals · Cambria · Depart SF 7:00 AM — Arrive ~6:21 PM</div>\n      </div>\n    </div>\n\n    <!-- DAY 4 -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd bigsur\">\n          <div class=\"day-hd-label\">Sunday, July 5, 2026</div>\n          <div class=\"day-hd-title\">The Big Sur Marathon — 17-Mile Drive to Cambria</div>\n          <div class=\"day-hd-sub\">~4h 36m driving · Depart Hyatt SF 7:00 AM · Arrive Castle Inn Cambria ~6:21 PM · 9 stops</div>\n        </div>\n        <div class=\"day-body\">\n\n          <!-- DAY 4 MAP -->\n          <div class=\"map-section\">\n            <div id=\"map-day4\" class=\"seg-map\"></div>\n            <p class=\"map-caption\">Day 4 route: Hyatt SF → 17-Mile Drive → Carmel → Point Lobos → Bixby Bridge → Hurricane Point → Pfeiffer Beach → McWay Falls → Elephant Seals → Castle Inn Cambria · ~4h 36m driving</p>\n            <div class=\"route-strip\">\n              <div class=\"rs-node start\">\n                <span class=\"rs-badge home\">🏠</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Hyatt Regency SF</div>\n                  <div class=\"rs-sub\">Depart 7:00 AM sharp · Sunday July 5</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">1h 53m · 123.9 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 5 Sun 7:00 AM early Sunday — clear roads</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">1</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">17-Mile Drive — Pacific Grove Gate</div>\n                  <div class=\"rs-sub\">Arrive ~8:53 AM · $12.25/vehicle · 45 min–1 hr · Exit Carmel Gate</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">3 min · 0.5 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Carmel Gate exit → Carmel</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">2</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Carmel-by-the-Sea</div>\n                  <div class=\"rs-sub\">Ocean Ave · Free · 45 min–1 hr</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">13 min · 4.3 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 5 Sun ~11 AM</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">3</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Point Lobos State Natural Reserve</div>\n                  <div class=\"rs-sub\">⚠️ NOT BOOKED · $10/vehicle · China Cove Bird Island Trail 1 mi · 1–1.5 hrs</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">19 min · 11.2 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 5 Sun ~12:15 PM</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">4</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Bixby Creek Bridge</div>\n                  <div class=\"rs-sub\">Free · North turnout for full frame · 15–20 min</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">1 min · 0.7 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 5 Sun ~1 PM</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">5</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Hurricane Point</div>\n                  <div class=\"rs-sub\">Free · Dramatic headland · 15 min</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">33 min · 15.3 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 5 Sun ~1:30 PM</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">6</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Pfeiffer Beach</div>\n                  <div class=\"rs-sub\">$12/vehicle cash · Sycamore Canyon Rd · Purple sand · Keyhole Arch · 1–1.5 hrs</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">25 min · 11.9 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 5 Sun ~2:30 PM</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">7</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">McWay Falls — Julia Pfeiffer Burns SP</div>\n                  <div class=\"rs-sub\">$12/vehicle · Overlook Trail 0.5 mi flat · 80-ft waterfall onto beach · 45 min–1 hr</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">1h 17m · 57.3 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 5 Sun ~3:30 PM — remote, no change</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">8</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Elephant Seal Vista Point — Piedras Blancas</div>\n                  <div class=\"rs-sub\">Free · July = juveniles/sub-adults · Paved platform above beach · 30 min</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">25 min · 20.0 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 5 Sun ~6:00 PM</div>\n              </div>\n              <div class=\"rs-node overnight\">\n                <span class=\"rs-badge hotel\">🏨</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Castle Inn, Cambria</div>\n                  <div class=\"rs-sub\">Arrive ~6:21 PM · Check-in 3:00–9:00 PM · Moonstone Beach · Breakfast included</div>\n                </div>\n              </div>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/dir/37.786587,-122.403097/36.623213,-121.928756/36.555093,-121.923288/36.517153,-121.944422/36.371355,-121.90186/36.238406,-121.815612/36.15994,-121.672535/35.663792,-121.258537/35.578058,-121.114827\" target=\"_blank\" class=\"mab route\">Open Day 4 Route in Google Maps →</a>\n            </div>\n          </div>\n\n          <!-- STOPS: Morning -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd bigsur\">Early Morning — 17-Mile Drive (Depart SF 7:00 AM)</div>\n            <ul class=\"tb-list\">\n              <li><strong>Depart Hyatt SF at 7:00 AM sharp</strong> — 1h 53m (123.9 mi) verified, early Sunday clear roads. Arrive Pacific Grove Gate ~8:53 AM.</li>\n              <li>Pay $12.25/vehicle at the Pacific Grove Gate entrance. Keep the receipt — it's your all-day pass through all gates on the loop.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">17-Mile Drive</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Pacific Grove Gate entry · $12.25/vehicle</span>\n                  <span class=\"sc-stat\">45 min–1 hr driving loop</span>\n                  <span class=\"sc-stat\">Exit: Carmel Gate</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The most iconic coastal drive on the Monterey Peninsula — private road through Pebble Beach's coastline. Key stops: <strong>Ghost Tree</strong> (Cypress tree on a rock point, photographed more than almost anything in California), <strong>Lone Cypress</strong> (the trademark 250-year-old tree on a granite point — the most photographed tree in North America), <strong>Carmel Bay viewpoints</strong> (clear water, sea otters visible).</p>\n                  <p>Drive slowly. Stop at every pullout that interests you. Exit through the Carmel Gate at the south end — Carmel-by-the-Sea is immediately outside.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.623213,-121.928756\" target=\"_blank\" class=\"mab gmaps\">📍 17-Mile Drive</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">Carmel-by-the-Sea</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Ocean Avenue · Main village</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">45 min–1 hr</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>One of the most distinctive villages on the California coast — no chain stores, no streetlights, no house numbers. Ocean Avenue leads from the village to Carmel Beach (white sand, cypress trees, dogs allowed). The entire town is cottages, galleries, wine tasting rooms, and bakeries.</p>\n                  <p><strong>Clinton Walker House</strong> (\"Butterfly House\") at Scenic Rd — private residence designed by Frank Lloyd Wright in 1951. View from the street only. Low-slung organic form growing out of the rocks above the water — his only house on the California coast.</p>\n                  <p>@globetrottingsu (195K, 119,337 views) · @wellnesstravelled (611K, 17,064 views): \"Real life Hansel and Gretel\"</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.554715,-121.921816\" target=\"_blank\" class=\"mab gmaps\">📍 Ocean Ave, Carmel</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.555093,-121.923288\" target=\"_blank\" class=\"mab gmaps\">📍 Carmel Beach</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">Carmel Scenic Road Walkway</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Scenic Rd, Carmel-by-the-Sea (along the bluff edge)</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">1.5 mi one-way · 30–45 min stroll</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The crushed-granite pathway that runs along the bluff edge above Carmel Beach — the most scenic walk in the village. Monterey cypress trees cling to the rocky edge, the Pacific stretches out below, and the white-sand beach is visible the entire length. The path runs south from the end of Ocean Avenue along the cliff above the water. Stunning at any time of day.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.552641,-121.927847\" target=\"_blank\" class=\"mab gmaps\">📍 Carmel Scenic Road</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">Carmel Beach Boardwalk</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">End of Ocean Ave, Carmel-by-the-Sea</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">20–30 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The wooden boardwalk at the foot of Ocean Avenue leading down to Carmel Beach — white sand, turquoise water, and the Monterey cypress skyline. This is where the main village meets the beach. Dogs are welcome off-leash, which is a signature Carmel feature. The beach is one of the cleanest and most beautiful in California.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.554715,-121.921816\" target=\"_blank\" class=\"mab gmaps\">📍 Carmel Beach</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">Carmel Walks</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Meeting point: Pine Inn, Ocean Ave at Monte Verde</span>\n                  <span class=\"sc-stat\">$30/person · Sat &amp; Sun 10:00 AM</span>\n                  <span class=\"sc-stat\">2 hrs · Guided walking tour</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The original guided walking tour of Carmel-by-the-Sea — 2-hour tours through the village's back lanes, hidden gardens, and notable cottages. The guide shares stories of the literary and artist colony roots (Upton Sinclair, Sinclair Lewis, Ansel Adams all lived here). Highly rated (4.8 on TripAdvisor with 400+ reviews). Runs Saturday and Sunday mornings. Reservations recommended.</p>\n                  <p>Since Day 4 (Jul 5) is a Sunday and you arrive in Carmel ~10 AM, this tour could fit if Point Lobos is pushed to later. Alternatively, self-guided version: pick up the village map at any shop.</p>\n                </div>\n                <div class=\"sc-tip\">Book ahead at carmelwalks.com — the 10 AM Sunday tour is the only one that works with this itinerary. Skip if Point Lobos timing is tight (Point Lobos takes priority).</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.555328,-121.920474\" target=\"_blank\" class=\"mab gmaps\">📍 Pine Inn (Carmel Walks Start)</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">Carmel Plaza</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Ocean Ave at Mission St, Carmel-by-the-Sea</span>\n                  <span class=\"sc-stat free\">Free to browse</span>\n                  <span class=\"sc-stat\">20–30 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>An open-air shopping courtyard in the heart of Carmel village — boutique fashion, gourmet shops, wine tasting rooms, and specialty restaurants in a relaxed Mediterranean-style setting. Pet-friendly. Events throughout the year including cooking demonstrations and pop-up markets. Good place for a quick browse or a tasting room stop while walking Ocean Avenue.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.556173,-121.919802\" target=\"_blank\" class=\"mab gmaps\">📍 Carmel Plaza</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <!-- STOPS: Late Morning -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd bigsur\">Late Morning — Point Lobos (~11 AM)</div>\n            <ul class=\"tb-list\">\n              <li>Drive: <strong>13 min (4.3 mi)</strong> from Carmel — verified Routes API, Jul 5 Sun ~11 AM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">Point Lobos State Natural Reserve</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat pending\">⚠️ NOT BOOKED — reservecalifornia.com</span>\n                  <span class=\"sc-stat\">$10/vehicle</span>\n                  <span class=\"sc-stat\">China Cove Bird Island Trail · 1 mi flat · 45 min</span>\n                  <span class=\"sc-stat\">1–1.5 hrs total</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>\"The greatest meeting of land and sea\" (Ansel Adams). Sea lions hauled out on the rocks, sea otters floating in the kelp beds, harbor seals at China Cove. In July you'll see all three. The China Cove Bird Island Trail is the essential loop — turquoise water, seabird colonies on Bird Island, cypress groves.</p>\n                  <p><strong>Book at reservecalifornia.com before the trip</strong> — summer weekends fill. Entry is $10/vehicle. Walk-in spots are limited and fill by 9–10 AM on summer weekends.</p>\n                </div>\n                <div class=\"sc-tip\">Book reservecalifornia.com as soon as possible. The reserve closes when full — advance reservation guarantees your entry. China Cove is at the end of the main road (1.5 mi from entrance). Allow 1–1.5 hours total.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.517153,-121.944422\" target=\"_blank\" class=\"mab gmaps\">📍 Point Lobos State Reserve</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <!-- STOPS: Afternoon -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd bigsur\">Afternoon — Bixby Bridge · Hurricane Point · Pfeiffer Beach</div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">Bixby Creek Bridge</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Drive: 19 min · 11.2 mi from Point Lobos</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">15–20 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The single most photographed bridge in California — 1932 open-spandrel arch bridge, 260 feet above Bixby Creek canyon, ocean in the background. <strong>Use the north turnout</strong> (pull off before crossing the bridge going south) for the full bridge-canyon-ocean composition. The south turnout is good too but the north is the classic shot.</p>\n                  <p>@luke_eich (106K, 109,341 views): \"Most Majestic Bridge I've ever seen\"</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.371355,-121.90186\" target=\"_blank\" class=\"mab gmaps\">📍 Bixby Creek Bridge</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">Hurricane Point</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">1 min · 0.7 mi from Bixby</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">15 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The dramatic headland just south of Bixby — pull off CA-1 on the exposed promontory for views looking north (Bixby Bridge visible) and south (Big Sur coast disappearing into the haze). The wind here is relentless and powerful — it's exactly why it's called Hurricane Point. Worth 15 minutes.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.356411,-121.902411\" target=\"_blank\" class=\"mab gmaps\">📍 Hurricane Point</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">Pfeiffer Beach — Purple Sand &amp; Keyhole Arch</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">33 min · 15.3 mi from Hurricane Point</span>\n                  <span class=\"sc-stat\">$12/vehicle — CASH ONLY</span>\n                  <span class=\"sc-stat\">Sycamore Canyon Rd · Unmarked turnoff</span>\n                  <span class=\"sc-stat\">1–1.5 hrs</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The purple sand is real — manganese garnet eroded from the cliffs above stains the sand in gradients of lavender and violet. The Keyhole Arch at the south end of the beach frames the Pacific perfectly; at certain times of year (November–December) the setting sun passes through the arch, but the arch itself is always photogenic.</p>\n                  <p><strong>How to find the turnoff:</strong> On CA-1 heading south, look for Sycamore Canyon Road approximately 0.5 miles north of the Big Sur Station (small brown sign, easy to miss). Single-lane road, no large vehicles, no trailers. Standard vehicles are fine. Cash only at the booth.</p>\n                  <p>@scenic_adventure_travel (295K, 187,076 views): Purple sand — world-class unique</p>\n                </div>\n                <div class=\"sc-tip\">Cash only at the entrance booth — $12/vehicle. Have it ready. The road narrows to single-lane and is ~2 miles from the turnoff to the beach.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.238406,-121.815612\" target=\"_blank\" class=\"mab gmaps\">📍 Pfeiffer Beach</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">McWay Falls — Julia Pfeiffer Burns SP</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">25 min · 11.9 mi from Pfeiffer Beach</span>\n                  <span class=\"sc-stat\">$12/vehicle (or park free across CA-1)</span>\n                  <span class=\"sc-stat\">Overlook Trail: 0.5 mi round trip · Flat · 20 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>An 80-foot waterfall drops directly onto a secluded beach cove — the water hits a turquoise crescent of sand framed by dark rocks and Big Sur forest. One of the most photographed scenes in all of California. The overlook trail is 0.5 miles flat on a paved path — you stand above the cove on a cliff edge with the full composition below you.</p>\n                  <p>@wanderingcreator_meghana (134K, 73,988 views): \"One of the most dramatic views in California\"</p>\n                </div>\n                <div class=\"sc-tip\">You can park for free across CA-1 on the shoulder and walk in (saves $12). The overlook is accessible from the parking area via a short tunnel under the highway.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.15994,-121.672535\" target=\"_blank\" class=\"mab gmaps\">📍 McWay Falls</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <!-- STOPS: Ragged Point & Big Sur Station -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd bigsur\">Drive South — Ragged Point &amp; Big Sur Station</div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">Big Sur Station</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">CA-1, Big Sur, CA 93920 (near Pfeiffer Beach turnoff)</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">5–10 min · Visitor information &amp; maps</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The multi-agency visitor information center for the Big Sur coast — staffed by US Forest Service, State Parks, and NPS rangers. Pick up trail maps, current road/closure info, and get current conditions for every stop on the drive. The Pfeiffer Beach turnoff (Sycamore Canyon Road) is just 0.5 miles north of this station — it's the landmark to look for when finding the unmarked beach turnoff.</p>\n                </div>\n                <div class=\"sc-tip\">Stop here briefly to confirm CA-1 conditions south of Big Sur before continuing. Highway 1 closures south of here do happen — rangers will know.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=36.233418,-121.791939\" target=\"_blank\" class=\"mab gmaps\">📍 Big Sur Station</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">Ragged Point</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">CA-1, Ragged Point, CA (19 mi north of San Simeon)</span>\n                  <span class=\"sc-stat free\">Free · Pull-off viewpoint</span>\n                  <span class=\"sc-stat\">15–20 min · On the route between McWay &amp; Elephant Seals</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The dramatic southern terminus of the Big Sur wilderness — where the mountains plunge 400 feet straight into the sea. This dramatic clifftop overlook is considered one of the finest viewpoints on the entire California coast: the rocky shore below, sea stacks, and the open Pacific stretching to the horizon. A short trail leads down to a black-sand beach (steep, 20 min one-way). TripAdvisor rates it 4.5 with 350+ reviews.</p>\n                  <p>Ragged Point falls naturally on the drive between McWay Falls and the Elephant Seals — it's 30 miles south of McWay on CA-1, roughly halfway through the 57-mile stretch.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=35.793527,-121.330956\" target=\"_blank\" class=\"mab gmaps\">📍 Ragged Point</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <!-- OPTIONAL: Secret Swing -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd bigsur\">Optional Detour — Secret Swing / Plasket Ridge Road</div>\n            <ul class=\"tb-list\">\n              <li><strong>Plasket Ridge Road</strong> — east side of CA-1, ~30 min detour from McWay. Unpaved road leads to a tree swing positioned above the Big Sur cloud layer. ✅ 4WD confirmed — standard vehicles can navigate the unpaved road.</li>\n              <li>Time/energy dependent. If the day is running long, skip and proceed directly to Elephant Seals.</li>\n            </ul>\n          </div>\n\n          <!-- STOPS: Late Afternoon -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd bigsur\">Late Afternoon — Elephant Seals (Depart McWay ~3:30 PM)</div>\n            <ul class=\"tb-list\">\n              <li>Drive: <strong>1h 17m (57.3 mi)</strong> from McWay — verified Routes API, Jul 5 Sun ~3:30 PM. Remote stretch, no traffic variation. Arrive ~4:47 PM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name bigsur\">Elephant Seal Vista Point — Piedras Blancas</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">CA-1, 1.5 mi north of San Simeon</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">30 min · Paved viewing platform</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Hundreds of elephant seals hauled out on the beach directly below a paved viewing platform. In July you'll see juveniles and sub-adults molting, body-surfing, and sparring. The bulls (up to 5,000 lbs) are at sea in summer, but the younger animals are vocal and active. The distinctive vocalization carries up the cliff.</p>\n                  <p>This is one of the few places in the world where you can observe elephant seals year-round without a boat. Pull into the parking area off CA-1 — the platform is 50 feet from the parking lot. Free. No reservation needed.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=35.663792,-121.258537\" target=\"_blank\" class=\"mab gmaps\">📍 Elephant Seal Vista Point</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd bigsur\">Evening — Arrive Cambria (~6:21 PM)</div>\n            <ul class=\"tb-list\">\n              <li>Drive from Elephant Seals: <strong>25 min (20.0 mi)</strong> — verified Routes API, Jul 5 Sun ~6:00 PM. Arrive Castle Inn ~6:21 PM.</li>\n              <li>Check-in window is 3:00–9:00 PM — you're on time. Breakfast included at the hotel.</li>\n              <li>Dinner: Burton Drive restaurants in Cambria village (no specific restaurant confirmed). Moonstone Beach boardwalk walk before or after dinner.</li>\n            </ul>\n          </div>\n\n          <div class=\"drive-stat\">\n            <span class=\"drive-val\">~4h 36m total driving</span> · Depart SF 7:00 AM · Arrive Cambria ~6:21 PM · 9 stops across 223.8 mi of Pacific Coast Highway\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- HOTEL CARD -->\n    <div class=\"section-title\">Overnight — Castle Inn, Cambria</div>\n    <div class=\"hc\">\n      <div class=\"hc-hd\">\n        <span class=\"badge booked\">✅ Booked · Prepaid</span>\n        <div class=\"hc-name\">Castle Inn</div>\n        <div class=\"hc-loc\">6620 Moonstone Beach Dr, Cambria, CA 93428 · +1 805-927-8605</div>\n      </div>\n      <div class=\"hc-body\">\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Booking</span><span class=\"hc-val\">Booking.com · Conf. 6935830439 · PIN: 4816 (confidential)</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Guest</span><span class=\"hc-val\">Marina Drapkin · 4 adults</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Room</span><span class=\"hc-val\">2-Queen Partial Oceanview</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Check-in</span><span class=\"hc-val\">Jul 5 · 3:00–9:00 PM</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Check-out</span><span class=\"hc-val\">Jul 6 · 7:30–11:00 AM — depart 8:45 AM for Hearst Castle</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Rate</span><span class=\"hc-val\">$244.00 + $30.50 tax = $274.50 PREPAID</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Breakfast</span><span class=\"hc-val\">Included ✓</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Cancel</span><span class=\"hc-val\">Free until Jul 2 11:59 PM PDT · From Jul 3: full charge ($274.50) · No-show = full charge</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Location</span><span class=\"hc-val\">Moonstone Beach boardwalk steps away · 11 min to Elephant Seals · 14 min to Hearst Castle</span></div>\n        <div class=\"map-actions\" style=\"margin-top:10px;\">\n          <a href=\"https://www.google.com/maps/search/?api=1&query=35.578058,-121.114827\" target=\"_blank\" class=\"mab gmaps\">📍 Castle Inn on Google Maps</a>\n        </div>\n      </div>\n    </div>\n\n    <!-- ALERTS -->\n    <div class=\"section-title\">Alerts &amp; Notes</div>\n    <div class=\"alerts-grid\">\n      <div class=\"ac amb\">\n        <div class=\"ac-icon\">⚠️</div>\n        <div class=\"ac-title\">Point Lobos — Book Now</div>\n        <div class=\"ac-text\">reservecalifornia.com · $10/vehicle · Summer weekends fill. Walk-in spots limited — gone by 9–10 AM. Book your vehicle entry in advance to guarantee access.</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">ℹ️</div>\n        <div class=\"ac-title\">Pfeiffer Beach — Cash Only · Unmarked Turnoff</div>\n        <div class=\"ac-text\">$12/vehicle cash only. Sycamore Canyon Rd turnoff is ~0.5 mi north of Big Sur Station on CA-1 (small brown sign, easy to miss heading south). No large vehicles or trailers.</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">ℹ️</div>\n        <div class=\"ac-title\">Day 4 Is Long — Pacing Matters</div>\n        <div class=\"ac-text\">4h 36m of driving + 9 stops across 223 miles. Depart SF at 7:00 AM sharp. The Secret Swing detour is optional — skip if energy or daylight is running low. Check-in at Castle Inn closes at 9:00 PM.</div>\n      </div>\n      <div class=\"ac grn\">\n        <div class=\"ac-icon\">✅</div>\n        <div class=\"ac-title\">Castle Inn — Breakfast Included</div>\n        <div class=\"ac-text\">No need to find breakfast in Cambria before departing Jul 6. Eat at the hotel and be on the road to Hearst Castle by 8:45 AM.</div>\n      </div>\n    </div>\n\n    <!-- SOCIAL INTEL -->\n    <div class=\"section-title\">Social Intelligence</div>\n    <div class=\"si-grid\">\n      <div class=\"si-card\">\n        <div class=\"si-quote\">\"Most Majestic Bridge I've ever seen.\"</div>\n        <div class=\"si-source\">@luke_eich · 106K followers · 109,341 views</div>\n        <div class=\"si-location\">Bixby Creek Bridge, Big Sur</div>\n      </div>\n      <div class=\"si-card\">\n        <div class=\"si-quote\">\"One of the most dramatic views in California.\"</div>\n        <div class=\"si-source\">@wanderingcreator_meghana · 134K followers · 73,988 views</div>\n        <div class=\"si-location\">McWay Falls, Julia Pfeiffer Burns SP</div>\n      </div>\n      <div class=\"si-card\">\n        <div class=\"si-quote\">Purple sand beach — the manganese garnet makes it a world-class unique natural feature.</div>\n        <div class=\"si-source\">@scenic_adventure_travel · 295K followers · 187,076 views</div>\n        <div class=\"si-location\">Pfeiffer Beach, Big Sur</div>\n      </div>\n      <div class=\"si-card\">\n        <div class=\"si-quote\">\"Mini Guide to Carmel-By-The-Sea\" — storybook cottages, no chains, no streetlights.</div>\n        <div class=\"si-source\">@globetrottingsu · 195K followers · 119,337 views</div>\n        <div class=\"si-location\">Carmel-by-the-Sea</div>\n      </div>\n    </div>\n\n    <div class=\"footer\">\n      <strong>Big Sur → Cambria · California Road Trip · July 5, 2026</strong><br>\n      Castle Inn · Moonstone Beach Dr · Day 4 · 4h 36m driving · ~223 mi · All times Routes API verified\n    </div>\n\n  </div>\n  <script src=\"https://unpkg.com/leaflet@1.9.4/dist/leaflet.js\"><\/script>\n  <script>\n  function mkMap(id,center,zoom,stops,col,drawRoute){\n    var m=L.map(id,{scrollWheelZoom:false}).setView(center,zoom);\n    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© <a href=\"https://openstreetmap.org\">OpenStreetMap</a>'}).addTo(m);\n    var pts=[];\n    stops.forEach(function(s){\n      var icon=L.divIcon({html:'<div style=\"background:'+col+';color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.4)\">'+s.n+'</div>',iconSize:[26,26],iconAnchor:[13,13],className:''});\n      L.marker([s.a,s.o],{icon:icon}).addTo(m).bindPopup('<strong>'+s.name+'</strong>'+(s.note?'<br><span s
