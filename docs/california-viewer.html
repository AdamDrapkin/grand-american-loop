3E8; border: 1px solid #1A73E8; }\n    .route-strip { display: flex; flex-direction: column; gap: 0; padding: 18px 0; }\n    .rs-node { display: flex; align-items: flex-start; gap: 14px; padding: 10px 0; }\n    .rs-badge { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: sans-serif; font-size: .85rem; font-weight: 700; color: white; background: var(--golden); flex-shrink: 0; }\n    .rs-badge.home { background: #2D3748; }\n    .rs-badge.hotel { background: #553C9A; }\n    .rs-info { flex: 1; }\n    .rs-name { font-family: sans-serif; font-size: .9rem; font-weight: 700; color: var(--dark); }\n    .rs-sub { font-family: sans-serif; font-size: .75rem; color: var(--mid); margin-top: 2px; }\n    .rs-leg { display: flex; align-items: center; gap: 12px; padding-left: 46px; margin: 2px 0; }\n    .rs-leg-line { width: 2px; height: 28px; background: var(--border); flex-shrink: 0; }\n    .rs-leg-time { font-family: sans-serif; font-size: .78rem; font-weight: 700; color: var(--golden); }\n    .rs-leg-note { font-family: sans-serif; font-size: .68rem; color: var(--mid); }\n\n    .drive-stat { font-family: sans-serif; font-size: .82rem; color: var(--mid); background: var(--sand); border-radius: 8px; padding: 10px 16px; margin: 16px 0; }\n    .drive-val { font-weight: 700; color: var(--golden); }\n\n    .hc { border: 2px solid #68D391; border-radius: 10px; overflow: hidden; margin: 20px 0; }\n    .hc-hd { background: linear-gradient(135deg, #FFF9F0, #FFFBEB); padding: 14px 16px; border-bottom: 1px solid var(--border); }\n    .hc-name { font-family: Georgia, serif; font-size: 1.15rem; color: var(--dark); margin: 6px 0 2px; }\n    .hc-loc { font-family: sans-serif; font-size: .78rem; color: var(--mid); }\n    .hc-body { background: white; padding: 16px; }\n    .hc-row { display: flex; gap: 12px; margin-bottom: 7px; align-items: baseline; }\n    .hc-lbl { font-family: sans-serif; font-size: .68rem; text-transform: uppercase; letter-spacing: .5px; color: var(--mid); font-weight: 700; min-width: 80px; flex-shrink: 0; }\n    .hc-val { font-family: sans-serif; font-size: .82rem; color: var(--dark); }\n\n    .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin: 16px 0; }\n    .fc { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }\n    .fc-hd { background: linear-gradient(135deg, #5C3A1E, #B7730A); padding: 14px 16px; }\n    .fc-name { font-family: Georgia, serif; font-size: 1.0rem; color: white; }\n    .fc-loc { font-family: sans-serif; font-size: .72rem; color: rgba(255,255,255,.8); margin-top: 4px; }\n    .fc-body { background: white; padding: 14px 16px; }\n    .fc-rating { font-family: sans-serif; font-size: .78rem; color: var(--gold); font-weight: 600; margin-bottom: 6px; }\n    .fc-order { font-family: sans-serif; font-size: .82rem; color: var(--dark); line-height: 1.5; margin-bottom: 6px; }\n    .fc-order strong { color: var(--golden); }\n    .fc-hours { font-family: sans-serif; font-size: .75rem; color: var(--mid); margin-bottom: 10px; }\n\n    .alerts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin: 16px 0; }\n    .ac { border-radius: 10px; padding: 14px 16px; border: 1px solid var(--border); border-left-width: 4px; }\n    .ac.red { background: #FEF2F2; border-left-color: var(--red); }\n    .ac.amb { background: #FFFBEB; border-left-color: #D97706; }\n    .ac.blu { background: #EBF8FF; border-left-color: #2B6CB0; }\n    .ac.grn { background: #F0FFF4; border-left-color: var(--green); }\n    .ac-icon { font-size: 1.2rem; margin-bottom: 6px; }\n    .ac-title { font-family: sans-serif; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--dark); margin-bottom: 4px; }\n    .ac-text { font-family: sans-serif; font-size: .8rem; color: var(--mid); line-height: 1.55; }\n\n    .si-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin: 16px 0; }\n    .si-card { background: var(--snow); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }\n    .si-quote { font-family: Georgia, serif; font-size: .85rem; color: var(--dark); font-style: italic; margin-bottom: 6px; line-height: 1.5; }\n    .si-source { font-family: sans-serif; font-size: .7rem; color: var(--golden); font-weight: 600; }\n    .si-location { font-family: sans-serif; font-size: .7rem; color: var(--mid); margin-top: 2px; }\n\n    .footer { background: linear-gradient(135deg, #5C3A1E, #B7730A); color: rgba(255,255,255,.6); text-align: center; font-family: sans-serif; font-size: .77rem; padding: 22px 24px; margin-top: 48px; border-radius: 10px; }\n    .footer strong { color: white; }\n\n    @media (max-width: 600px) {\n      .hero h1 { font-size: 2.0rem; }\n      .day-hd-title { font-size: 1.1rem; }\n      .alerts-grid, .food-grid, .si-grid { grid-template-columns: 1fr; }\n      .hc-row { flex-direction: column; gap: 2px; }\n    }\n  <\/style>\n</head>\n<body>\n\n  <div class=\"hero\">\n    <div class=\"hero-sup\">California Road Trip · San Francisco → Los Angeles</div>\n    <h1>Central Coast</h1>\n    <div class=\"hero-dates\">July 6, 2026 · 1 Night · Santa Barbara</div>\n    <div class=\"hero-base\">Overnight: Beachside Inn · 336 W Cabrillo Blvd, Santa Barbara</div>\n    <div class=\"hero-chips\">\n      <span class=\"hchip\">Day 5</span>\n      <span class=\"hchip\">✅ Booked · Conf. 1075827673</span>\n      <span class=\"hchip\">Hearst Castle · Solvang · Santa Barbara</span>\n      <span class=\"hchip\">Depart Cambria 8:45 AM</span>\n    </div>\n  </div>\n\n  <div class=\"wrap\">\n\n    <!-- BOOKING BANNER -->\n    <div class=\"booking-banner\">\n      <div class=\"bb-title\">Booking Status — Central Coast / Santa Barbara</div>\n      <div class=\"bb-grid\">\n        <div class=\"bb-item confirmed\">\n          <span class=\"badge booked\">✅ Booked</span>\n          <div class=\"bb-name\">Beachside Inn, Santa Barbara</div>\n          <div class=\"bb-detail\">Conf. 1075827673 · Jul 6–7 · $274.07 · Breakfast + free parking + wine &amp; cheese nightly</div>\n        </div>\n        <div class=\"bb-item pending\">\n          <span class=\"badge pending\">⚠️ BOOK TODAY</span>\n          <div class=\"bb-name\">Hearst Castle Tour</div>\n          <div class=\"bb-detail\">hearstcastle.org · First slot 9:30–10:00 AM Mon Jul 6 · ~$30/adult · Summer Mondays fill — book at least 1 week before departure</div>\n        </div>\n        <div class=\"bb-item pending\">\n          <span class=\"badge pending\">⚠️ No Restaurant Confirmed</span>\n          <div class=\"bb-name\">Day 5 Dinner — Santa Barbara Funk Zone</div>\n          <div class=\"bb-detail\">Jul 6 evening · Monday walk-ins typically fine · Options: Loquita (202 State St — Spanish-California) · Bettina (14 W Figueroa — Neapolitan pizza)</div>\n        </div>\n      </div>\n    </div>\n\n    <!-- OVERVIEW STRIP -->\n    <div class=\"overview-strip\">\n      <div class=\"ov-card d5\">\n        <div class=\"ov-date\">Mon, Jul 6</div>\n        <div class=\"ov-label\">Day 5 — Hearst Castle · Solvang · Santa Barbara</div>\n        <div class=\"ov-note\">Depart Cambria 8:45 AM · Hearst Castle 9:00 AM ⚠️ · Solvang 1:30 PM · Santa Barbara 3:15 PM · Hotel after 4:00 PM · Wine &amp; cheese happy hour nightly</div>\n      </div>\n    </div>\n\n    <!-- DAY 5 -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd coast\">\n          <div class=\"day-hd-label\">Monday, July 6, 2026</div>\n          <div class=\"day-hd-title\">Hearst Castle · Solvang · Santa Barbara</div>\n          <div class=\"day-hd-sub\">~3h 54m driving total · Depart Cambria 8:45 AM · Arrive Santa Barbara ~3:15 PM</div>\n        </div>\n        <div class=\"day-body\">\n\n          <!-- DAY 5 MAP -->\n          <div class=\"map-section\">\n            <div id=\"map-day5\" class=\"seg-map\"></div>\n            <p class=\"map-caption\">Day 5 route: Castle Inn Cambria → Hearst Castle (San Simeon) → Solvang → Beachside Inn Santa Barbara · ~3h 54m driving</p>\n            <div class=\"route-strip\">\n              <div class=\"rs-node start\">\n                <span class=\"rs-badge home\">🏠</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Castle Inn, Cambria</div>\n                  <div class=\"rs-sub\">Depart 8:45 AM · Check-out 7:30–11:00 AM</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">15 min · 9.6 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 6 Mon ~8:45 AM</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">1</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Hearst Castle</div>\n                  <div class=\"rs-sub\">⚠️ NOT BOOKED · Arrive ~9:00 AM · First tour 9:30–10:00 AM · ~$30/adult · 1.5–2 hrs</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">1h 54m · 108.1 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 6 Mon ~noon</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">2</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Solvang</div>\n                  <div class=\"rs-sub\">Arrive ~1:30–2:00 PM · Danish village · Ostrichland + windmill + aebleskivers · 1–1.5 hrs</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">45 min · 33.3 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 6 Mon ~2:30 PM</div>\n              </div>\n              <div class=\"rs-node overnight\">\n                <span class=\"rs-badge hotel\">🏨</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Beachside Inn, Santa Barbara</div>\n                  <div class=\"rs-sub\">Arrive ~3:15 PM · Hotel opens at 4:00 PM · Explore SB while waiting · Wine &amp; cheese happy hour every evening</div>\n                </div>\n              </div>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/dir/35.578058,-121.114827/35.650635,-121.188229/34.595789,-120.137562/34.408356,-119.693916\" target=\"_blank\" class=\"mab route\">Open Day 5 Route in Google Maps →</a>\n            </div>\n          </div>\n\n          <!-- MORNING: Hearst Castle -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd coast\">Morning — Hearst Castle (Arrive 9:00 AM)</div>\n            <ul class=\"tb-list\">\n              <li>Drive from Cambria: <strong>15 min (9.6 mi)</strong> — verified Routes API, Jul 6 Mon ~8:45 AM. Arrive ~9:00 AM.</li>\n              <li>⚠️ <em>Book at hearstcastle.org before the trip.</em> First tour slot is 9:30–10:00 AM. Without a reservation you may wait for a later slot or miss entry entirely on a Monday in July.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name coast\">Hearst Castle — La Cuesta Encantada</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat pending\">⚠️ NOT BOOKED — hearstcastle.org</span>\n                  <span class=\"sc-stat\">750 Hearst Castle Rd, San Simeon, CA</span>\n                  <span class=\"sc-stat\">~$30/adult · ~$15/child</span>\n                  <span class=\"sc-stat\">Grand Rooms Tour · 1.5–2 hrs incl. shuttle</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>William Randolph Hearst's 165-room estate \"The Enchanted Hill\" — built 1919–1947 on a 1,600-foot hilltop with views 50 miles in every direction. The Neptune Pool (Greco-Roman columns, marble figures, turquoise water, 345,000 gallons) is the most photographed feature. The Assembly Room has a 16th-century ceiling shipped from Europe and installed intact.</p>\n                  <p><strong>Recommended tour: Grand Rooms Tour</strong> — covers the main house (Assembly Room, Refectory/Dining Room, Billiard Room, Theatre, Neptune Pool). Shuttle to the hilltop from the visitor center below. 1.5–2 hours total.</p>\n                </div>\n                <div class=\"sc-tip\">Book at hearstcastle.org. Ticket office opens at the visitor center — arrive by 9:00 AM for the first 9:30 AM tour. Finish ~11:30 AM–12:00 PM and proceed to Solvang.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=35.650635,-121.188229\" target=\"_blank\" class=\"mab gmaps\">📍 Hearst Castle</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <!-- MIDDAY: Solvang -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd coast\">Midday — Solvang (Arrive ~1:30 PM)</div>\n            <ul class=\"tb-list\">\n              <li>Drive from Hearst Castle: <strong>1h 54m (108.1 mi)</strong> — verified Routes API, Jul 6 Mon ~noon. Arrive Solvang ~1:30–2:00 PM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name coast\">Solvang — The Danish Capital of America</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Copenhagen Drive + Mission Drive · Main village</span>\n                  <span class=\"sc-stat\">1–1.5 hrs</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Founded 1911 by Danish immigrants who wanted to preserve their heritage. Today: half-timbered buildings, working windmills, Hans Christian Andersen statues, Danish bakeries, and aebleskiver stands every 50 feet. Genuinely unlike anywhere else in California.</p>\n                  <p><strong>Ostrichland USA</strong> (610 E Hwy 246) — you can feed ostriches and emus from a container of food. The birds are aggressive and the beaks are surprisingly large. Memorable and weird in the best way. 15–20 min, small admission fee.</p>\n                  <p>@a.nj.a.l.i._ (122K, 14,488 views): \"Stepped into Solvang, suddenly Denmark\"</p>\n                </div>\n                <div class=\"sc-tip\">Olsen's Danish Village Bakery or Solvang Restaurant for aebleskivers (Danish pancake balls with powdered sugar and jam). Paula's Pancake House is also good. Get food to go and walk around the village.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.606234,-120.176578\" target=\"_blank\" class=\"mab gmaps\">📍 Ostrichland USA</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.596256,-120.144224\" target=\"_blank\" class=\"mab gmaps\">📍 Solvang Village</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <!-- AFTERNOON: Santa Barbara -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd coast\">Afternoon — Santa Barbara (Arrive ~3:15 PM)</div>\n            <ul class=\"tb-list\">\n              <li>Drive from Solvang: <strong>45 min (33.3 mi)</strong> — verified Routes API, Jul 6 Mon ~2:30 PM. Arrive Santa Barbara ~3:15 PM.</li>\n              <li>⚠️ Hotel check-in opens 4:00 PM — 45 min early arrival. Drop bags at front desk if available, or leave car at hotel and walk to nearby attractions.</li>\n              <li>All Santa Barbara stops below are walkable from the hotel (0.5–1.5 miles). No car needed after arriving.</li>\n            </ul>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name coast\">Santa Barbara County Courthouse</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">1100 Anacapa St, Santa Barbara, CA</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">30–45 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The most stunning courthouse in the United States — 1929 Spanish Colonial Revival architecture with hand-painted Tunisian tile ceilings, sunken gardens, and a clock tower. Take the elevator to the clock tower (El Mirador) for a 360° panoramic view of Santa Barbara, the Pacific, and the Santa Ynez mountains behind. Free. Open during court hours.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.424201,-119.702328\" target=\"_blank\" class=\"mab gmaps\">📍 Santa Barbara Courthouse</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name coast\">Old Mission Santa Barbara 1786</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">2201 Laguna St, Santa Barbara, CA</span>\n                  <span class=\"sc-stat\">$10/adult</span>\n                  <span class=\"sc-stat\">30–45 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Founded 1786 — the only California mission with twin bell towers. Called \"Queen of the Missions.\" The rose garden, the fountain in the forecourt, and the original church interior are the highlights. Still an active parish. The museum section explains the Chumash history and the Spanish colonial system. Best viewed from the garden across the street for the classic photo.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.438326,-119.714067\" target=\"_blank\" class=\"mab gmaps\">📍 Old Mission Santa Barbara</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name coast\">El Presidio State Historic Park</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">123 E Canon Perdido St, Santa Barbara, CA</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">20–30 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Founded 1782 — one of four Spanish military forts built in Alta California. The original adobe walls and the chapel have been reconstructed on the original site in the heart of downtown. The archaeology of the site is visible through transparent floor panels. Free. Small but historically significant as the nucleus from which Santa Barbara grew.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.422594,-119.698875\" target=\"_blank\" class=\"mab gmaps\">📍 El Presidio</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name coast\">El Jardin by Jeff Shelton — Architecture Walk</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Downtown Santa Barbara</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">Walkable from courthouse · 20–30 min stroll</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Jeff Shelton is Santa Barbara's most joyful and distinctive architect — his buildings are scattered through downtown and make the whole neighborhood a scavenger hunt. Organic flowing curves, bold hand-painted tile mosaics, rooftop terraces, and colors that look like they came from a Gaudí fever dream. El Jardin (121 E Canon Perdido St) is the most photographed. Ablitt Tower, Riviera Building, and Köttinger Building are nearby.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.422458,-119.698208\" target=\"_blank\" class=\"mab gmaps\">📍 El Jardin</a>\n                </div>\n                <div class=\"sc-tip\">Walk downtown between El Presidio and State Street — Shelton buildings appear organically. No map needed, just look for the buildings with curves and mosaics.</div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name coast\">MOXI Wolf Museum of Exploration + Innovation</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">125 State St, Santa Barbara, CA</span>\n                  <span class=\"sc-stat\">Admission fee</span>\n                  <span class=\"sc-stat\">1–2 hours · Great for kids</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Hands-on science and creativity museum on the waterfront end of State Street, steps from Stearns Wharf. Six floors of interactive exhibits covering velocity, light, sound, tech, and more — the rooftop Sky Garden has harbor views. Particularly good for younger travelers, but genuinely fun for all ages. Walking distance from the hotel.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.413639,-119.692035\" target=\"_blank\" class=\"mab gmaps\">📍 MOXI Museum</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <!-- AFTERNOON: Stearns Wharf + Beach -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd coast\">Late Afternoon — State Street · Stearns Wharf · Beach</div>\n            <ul class=\"tb-list\">\n              <li><strong>State Street</strong> — the main commercial street, Spanish Colonial architecture, bougainvillea overhanging the sidewalks, wine bars, boutiques, cafes. Walk a few blocks between the Mission and the waterfront.</li>\n              <li><strong>Stearns Wharf</strong> (1872) — California's oldest operating wooden pier. Walk to the end for Channel Islands views on clear days. Sea lions occasionally visible under the pier. Free to walk.</li>\n              <li><strong>Santa Barbara West Beach</strong> — wide, protected, calm water. Swim, sit, watch the harbor. Across the street from the hotel.</li>\n            </ul>\n          </div>\n\n          <!-- EVENING -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd coast\">Evening — Funk Zone Dinner + Hotel Check-In</div>\n            <ul class=\"tb-list\">\n              <li><strong>Hotel check-in at 4:00 PM</strong> — Beachside Inn, 336 W Cabrillo Blvd. Complimentary wine &amp; cheese happy hour every evening upon arrival.</li>\n              <li><strong>Funk Zone</strong> (near the Amtrak station, 5–10 min walk from hotel) — Santa Barbara's hip arts and food neighborhood. Converted industrial buildings housing wine tasting rooms, breweries, restaurants. The SB Wine Collective, Lama Dog Tap Room. Good dinner options with no reservations needed typically on a Monday.</li>\n              <li>Alternatively: State Street restaurant row for a broader selection.</li>\n            </ul>\n          </div>\n\n          <div class=\"drive-stat\">\n            <span class=\"drive-val\">~3h 54m total driving</span> · Depart Cambria 8:45 AM · Arrive Santa Barbara ~3:15 PM · All times Routes API verified with traffic\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- HOTEL CARD -->\n    <div class=\"section-title\">Overnight — Beachside Inn, Santa Barbara</div>\n    <div class=\"hc\">\n      <div class=\"hc-hd\">\n        <span class=\"badge booked\">✅ Booked</span>\n        <div class=\"hc-name\">Beachside Inn</div>\n        <div class=\"hc-loc\">336 W Cabrillo Blvd, Santa Barbara, CA 93101 · (805) 965-6556</div>\n      </div>\n      <div class=\"hc-body\">\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Conf #</span><span class=\"hc-val\">1075827673 · Ref: 1075827673/3207970001 · Marina Drapkin · marin4ik10@gmail.com</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Check-in</span><span class=\"hc-val\">Jul 6 after 4:00 PM</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Check-out</span><span class=\"hc-val\">Jul 7 before 12:00 PM noon — depart 8:00 AM for El Matador Beach</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Rate</span><span class=\"hc-val\">$240.00 + $34.07 tax = $274.07 · Charged to Visa 9942</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Room</span><span class=\"hc-val\">2 Queen Beds · Parkside with Balcony · Faces Plaza Del Mar park</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Amenities</span><span class=\"hc-val\">Breakfast included ✓ · Free self-parking ✓ · Complimentary wine &amp; cheese happy hour every evening ✓ · Air conditioning · Bathtub + shower</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Deposit</span><span class=\"hc-val\">$150 incidentals deposit at check-in (credit/debit card only)</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Cancel</span><span class=\"hc-val\">Free until Jul 5; after: first night + tax charged</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Location</span><span class=\"hc-val\">Cabrillo Blvd · West Beach directly across street · 11 min walk to Stearns Wharf · 11 min walk to Funk Zone</span></div>\n        <div class=\"map-actions\" style=\"margin-top:10px;\">\n          <a href=\"https://www.google.com/maps/search/?api=1&query=34.408356,-119.693916\" target=\"_blank\" class=\"mab gmaps\">📍 Beachside Inn on Google Maps</a>\n        </div>\n      </div>\n    </div>\n\n    <!-- FOOD: Santa Barbara Fish Market -->\n    <div class=\"section-title\">Food &amp; Markets — Central Coast</div>\n    <div class=\"food-grid\">\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">Santa Barbara Fish Market ⭐</div>\n          <div class=\"fc-loc\">117 Harbor Way, Santa Barbara, CA 93109 · Day 5 (Jul 6) afternoon or Jul 7 morning</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Primary Uni Destination · (805) 965-9564 · Mon–Fri 9 AM–6:30 PM · Sat 7:30 AM–6:30 PM</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Fresh Santa Barbara Channel Islands red sea urchin (bright gold, firm, buttery, sweet, briny — local commercial divers bring it to this dock). Live rock crab, oysters, lobster in season. Eat at the harbor — no seats needed, benches along the waterfront.</div>\n          <div class=\"fc-hours\">Est. cost: $60–100 family · @rockstareater (80K, 13,104 views): \"Best fish market in Santa Barbara\" · @sbshellfishco: \"Top uni regions in world\"</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=34.403661,-119.69366\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">Ostrichland USA</div>\n          <div class=\"fc-loc\">610 E Hwy 246, Solvang, CA · Day 5 Midday</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Family attraction · Ostrich &amp; emu feeding · 15–20 min · Small admission fee</div>\n          <div class=\"fc-order\"><strong>Experience:</strong> Buy a container of feed at the entrance and extend it toward the ostriches through the fence. The birds are fast and aggressive — they will try to take the whole container. Emus are calmer. Memorable and genuinely unique.</div>\n          <div class=\"fc-hours\">On the drive through Solvang · Right on Hwy 246 (easy stop)</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=34.606234,-120.176578\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n    </div>\n\n    <!-- ALERTS -->\n    <div class=\"section-title\">Alerts &amp; Notes</div>\n    <div class=\"alerts-grid\">\n      <div class=\"ac amb\">\n        <div class=\"ac-icon\">⚠️</div>\n        <div class=\"ac-title\">Hearst Castle — Book Now</div>\n        <div class=\"ac-text\">hearstcastle.org · First slot 9:30–10:00 AM · Grand Rooms Tour ~$30/adult, ~$15/child · Without reservation you may wait hours or miss entry. Book immediately — Monday slots can fill.</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">ℹ️</div>\n        <div class=\"ac-title\">Hotel Opens 4:00 PM — 30–45 Min Early</div>\n        <div class=\"ac-text\">Arrive Santa Barbara ~3:15 PM. Leave car at hotel, check bags with front desk, walk to the Courthouse clock tower while waiting for room. Ask about early check-in on the day of arrival.</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">ℹ️</div>\n        <div class=\"ac-title\">Beachside Inn — Incidentals Deposit</div>\n        <div class=\"ac-text\">$150 incidentals hold at check-in. Credit or debit card required. Released at checkout. Free parking on-site — use it (parking in Santa Barbara can be $3–5/hr on State Street).</div>\n      </div>\n      <div class=\"ac grn\">\n        <div class=\"ac-icon\">✅</div>\n        <div class=\"ac-title\">Day 6 Departure — 8:00 AM</div>\n        <div class=\"ac-text\">Check-out before 12 PM but depart 8:00 AM for El Matador Beach (1h 5m drive). Grab hotel breakfast early, fuel up, and leave by 8:00 AM for Malibu timing.</div>\n      </div>\n    </div>\n\n    <!-- SOCIAL INTEL -->\n    <div class=\"section-title\">Social Intelligence</div>\n    <div class=\"si-grid\">\n      <div class=\"si-card\">\n        <div class=\"si-quote\">\"Stepped into Solvang, and suddenly I was in Denmark.\"</div>\n        <div class=\"si-source\">@a.nj.a.l.i._ · 122K followers · 14,488 views</div>\n        <div class=\"si-location\">Solvang, CA</div>\n      </div>\n      <div class=\"si-card\">\n        <div class=\"si-quote\">Santa Barbara Fish Market — local commercial divers bringing in uni from Channel Islands. \"Best fish market in Santa Barbara.\"</div>\n        <div class=\"si-source\">@rockstareater · 80K followers · 13,104 views</div>\n        <div class=\"si-location\">Santa Barbara Fish Market · 117 Harbor Way</div>\n      </div>\n      <div class=\"si-card\">\n        <div class=\"si-quote\">Santa Barbara Channel Islands — among the top sea urchin regions in the world for quality.</div>\n        <div class=\"si-source\">@sbshellfishco · 8K followers · 5,800 views</div>\n        <div class=\"si-location\">Santa Barbara Channel Islands Uni</div>\n      </div>\n    </div>\n\n    <div class=\"footer\">\n      <strong>Central Coast · Santa Barbara · California Road Trip · July 6, 2026</strong><br>\n      Beachside Inn · 336 W Cabrillo Blvd · Day 5 · All times Routes API verified\n    </div>\n\n  </div>\n  <script src=\"https://unpkg.com/leaflet@1.9.4/dist/leaflet.js\"><\/script>\n  <script>\n  function mkMap(id,center,zoom,stops,col,drawRoute){\n    var m=L.map(id,{scrollWheelZoom:false}).setView(center,zoom);\n    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© <a href=\"https://openstreetmap.org\">OpenStreetMap</a>'}).addTo(m);\n    var pts=[];\n    stops.forEach(function(s){\n      var icon=L.divIcon({html:'<div style=\"background:'+col+';color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.4)\">'+s.n+'</div>',iconSize:[26,26],iconAnchor:[13,13],className:''});\n      L.marker([s.a,s.o],{icon:icon}).addTo(m).bindPopup('<strong>'+s.name+'</strong>'+(s.note?'<br><span style=\"font-size:12px\">'+s.note+'</span>':''));\n      pts.push([s.a,s.o]);\n    });\n    if(drawRoute&&pts.length>1)L.polyline(pts,{color:col,weight:3,dashArray:'6,8',opacity:.8}).addTo(m);\n  }\n  window.addEventListener('load',function(){\n    // Day 5: Castle Inn Cambria → Hearst Castle → Solvang → Beachside Inn Santa Barbara\n    mkMap('map-day5',[34.9,-120.45],7,[\n      {a:35.564,o:-121.081,n:'🏠',name:'Castle Inn, Cambria',note:'Depart 8:45 AM · Breakfast included'},\n      {a:35.685,o:-121.168,n:'1',name:'Hearst Castle',note:'⚠️ NOT BOOKED · Arrive ~9:00 AM · ~$30/adult'},\n      {a:34.596,o:-120.138,n:'2',name:'Solvang',note:'Arrive ~1:30 PM · Danish village · Ostrichland USA'},\n      {a:34.415,o:-119.701,n:'🏨',name:'Beachside Inn, Santa Barbara',note:'Arrive ~3:15 PM · Conf. 1075827673'}\n    ],'#B7730A',true);\n  });\n  <\/script>\n<style>.goog-te-banner-frame,.skiptranslate{display:none!important}body{top:0!important}.goog-te-gadget{display:none!important}<\/style><div id=\"google_translate_element\" style=\"display:none\"></div> 2rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; padding-bottom: 8px; margin-bottom: 12px; border-bottom: 2px solid; }\n    .tb-hd.sandiego { color: var(--coastal); border-color: var(--coastal); }\n    .tb-list { list-style: none; padding: 0; }\n    .tb-list li { font-family: sans-serif; font-size: .85rem; line-height: 1.65; padding-left: 14px; margin-bottom: 6px; color: var(--dark); }\n    .tb-list li::before { content: '→ '; color: var(--coastal); font-weight: 700; margin-left: -14px; }\n    .tb-list li strong { color: var(--coastal); }\n    .tb-list li em { color: var(--amber); font-weight: 600; }\n\n    .stop-card { background: var(--snow); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }\n    .sc-hd { padding: 14px 16px; border-bottom: 1px solid var(--border); }\n    .sc-name { font-family: Georgia, serif; font-size: 1.1rem; margin-bottom: 6px; }\n    .sc-name.sandiego { color: var(--coastal); }\n    .sc-stats { display: flex; flex-wrap: wrap; gap: 6px; }\n    .sc-stat { font-family: sans-serif; font-size: .72rem; background: var(--cream); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; color: var(--mid); }\n    .sc-stat.free { background: #EBF8FF; color: #2B6CB0; border-color: #90CDF4; }\n    .sc-body { background: white; padding: 16px; }\n    .sc-notes p { font-family: sans-serif; font-size: .84rem; line-height: 1.65; color: var(--dark); margin-bottom: 8px; }\n    .sc-notes p strong { color: var(--coastal); }\n    .sc-tip { font-family: sans-serif; font-size: .8rem; font-style: italic; padding: 10px 14px; border-left: 3px solid var(--coastal); background: var(--snow); border-radius: 0 6px 6px 0; margin-top: 8px; color: var(--dark); }\n\n    .map-section { margin: 24px 0; }\n    .map-embed-wrap { border-radius: 10px; overflow: hidden; margin-bottom: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }\n    .map-caption { font-family: sans-serif; font-size: .78rem; color: var(--mid); margin-bottom: 12px; line-height: 1.4; }\n    .map-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }\n    .mab { font-family: sans-serif; font-size: .78rem; font-weight: 600; padding: 8px 16px; border-radius: 8px; text-decoration: none; }\n    .mab.route { background: #1A73E8; color: white; }\n    .mab.gmaps { background: white; color: #1A73E8; border: 1px solid #1A73E8; }\n    .route-strip { display: flex; flex-direction: column; gap: 0; padding: 18px 0; }\n    .rs-node { display: flex; align-items: flex-start; gap: 14px; padding: 10px 0; }\n    .rs-badge { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: sans-serif; font-size: .85rem; font-weight: 700; color: white; background: var(--coastal); flex-shrink: 0; }\n    .rs-badge.home { background: #2D3748; }\n    .rs-badge.hotel { background: #553C9A; }\n    .rs-info { flex: 1; }\n    .rs-name { font-family: sans-serif; font-size: .9rem; font-weight: 700; color: var(--dark); }\n    .rs-sub { font-family: sans-serif; font-size: .75rem; color: var(--mid); margin-top: 2px; }\n    .rs-leg { display: flex; align-items: center; gap: 12px; padding-left: 46px; margin: 2px 0; }\n    .rs-leg-line { width: 2px; height: 28px; background: var(--border); flex-shrink: 0; }\n    .rs-leg-time { font-family: sans-serif; font-size: .78rem; font-weight: 700; color: var(--coastal); }\n    .rs-leg-note { font-family: sans-serif; font-size: .68rem; color: var(--mid); }\n\n    .drive-stat { font-family: sans-serif; font-size: .82rem; color: var(--mid); background: var(--sand); border-radius: 8px; padding: 10px 16px; margin: 16px 0; }\n    .drive-val { font-weight: 700; color: var(--coastal); }\n\n    .hc { border: 2px solid #68D391; border-radius: 10px; overflow: hidden; margin: 20px 0; }\n    .hc-hd { background: linear-gradient(135deg, #EBF8FF, #E0F0FF); padding: 14px 16px; border-bottom: 1px solid var(--border); }\n    .hc-name { font-family: Georgia, serif; font-size: 1.15rem; color: var(--dark); margin: 6px 0 2px; }\n    .hc-loc { font-family: sans-serif; font-size: .78rem; color: var(--mid); }\n    .hc-body { background: white; padding: 16px; }\n    .hc-row { display: flex; gap: 12px; margin-bottom: 7px; align-items: baseline; }\n    .hc-lbl { font-family: sans-serif; font-size: .68rem; text-transform: uppercase; letter-spacing: .5px; color: var(--mid); font-weight: 700; min-width: 80px; flex-shrink: 0; }\n    .hc-val { font-family: sans-serif; font-size: .82rem; color: var(--dark); }\n\n    .alerts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin: 16px 0; }\n    .ac { border-radius: 10px; padding: 14px 16px; border: 1px solid var(--border); border-left-width: 4px; }\n    .ac.red { background: #FEF2F2; border-left-color: var(--red); }\n    .ac.amb { background: #FFFBEB; border-left-color: #D97706; }\n    .ac.blu { background: #EBF8FF; border-left-color: #2B6CB0; }\n    .ac.grn { background: #F0FFF4; border-left-color: var(--green); }\n    .ac-icon { font-size: 1.2rem; margin-bottom: 6px; }\n    .ac-title { font-family: sans-serif; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--dark); margin-bottom: 4px; }\n    .ac-text { font-family: sans-serif; font-size: .8rem; color: var(--mid); line-height: 1.55; }\n\n    .footer { background: linear-gradient(135deg, #0B4F6C, #0D6B7A); color: rgba(255,255,255,.6); text-align: center; font-family: sans-serif; font-size: .77rem; padding: 22px 24px; margin-top: 48px; border-radius: 10px; }\n    .footer strong { color: white; }\n\n    @media (max-width: 600px) {\n      .hero h1 { font-size: 2.0rem; }\n      .day-hd-title { font-size: 1.1rem; }\n      .alerts-grid { grid-template-columns: 1fr; }\n      .hc-row { flex-direction: column; gap: 2px; }\n    }\n  <\/style>\n</head>\n<body>\n\n  <div class=\"hero\">\n    <div class=\"hero-sup\">California Road Trip · San Francisco → Los Angeles</div>\n    <h1>San Diego</h1>\n    <div class=\"hero-dates\">July 7, 2026 · 1 Night · Coronado Island</div>\n    <div class=\"hero-base\">Overnight: Best Western Plus Suites · 275 Orange Ave, Coronado</div>\n    <div class=\"hero-chips\">\n      <span class=\"hchip\">Day 6</span>\n      <span class=\"hchip\">✅ Booked &amp; Paid · Conf. 6459555758</span>\n      <span class=\"hchip\">El Matador · Newport · Laguna · Coronado</span>\n      <span class=\"hchip\">Depart Santa Barbara 8:00 AM</span>\n    </div>\n  </div>\n\n  <div class=\"wrap\">\n\n    <!-- BOOKING BANNER -->\n    <div class=\"booking-banner\">\n      <div class=\"bb-title\">Booking Status — San Diego / Coronado</div>\n      <div class=\"bb-grid\">\n        <div class=\"bb-item confirmed\">\n          <span class=\"badge booked\">✅ Booked &amp; Paid</span>\n          <div class=\"bb-name\">Best Western Plus Coronado Island</div>\n          <div class=\"bb-detail\">Booking.com · Conf. 6459555758 · PIN: 8199 · $307.12 PAID IN FULL · Grab-and-go breakfast</div>\n        </div>\n        <div class=\"bb-item warning\">\n          <span class=\"badge warn\">⚠️ Closed</span>\n          <div class=\"bb-name\">Pool &amp; Hot Tub — CLOSED UNTIL DECEMBER</div>\n          <div class=\"bb-detail\">Pool and hot tub not available. Not reopening before departure. Plan accordingly.</div>\n        </div>\n        <div class=\"bb-item pending\">\n          <span class=\"badge pending\">⚠️ No Restaurant Confirmed</span>\n          <div class=\"bb-name\">Day 6 Dinner — Little Italy SD or Old Town SD</div>\n          <div class=\"bb-detail\">Jul 7 evening · Little Italy (10–15 min via Coronado Bridge): Bencotto (750 W Fir St) · Old Town SD (20 min): Mexican / carne asada · Coronado itself has limited dinner options — plan to drive in</div>\n        </div>\n      </div>\n    </div>\n\n    <!-- OVERVIEW STRIP -->\n    <div class=\"overview-strip\">\n      <div class=\"ov-card d6\">\n        <div class=\"ov-date\">Tue, Jul 7</div>\n        <div class=\"ov-label\">Day 6 — The Southern California Coast</div>\n        <div class=\"ov-note\">Depart Santa Barbara 8:00 AM · El Matador Beach (Malibu) · Newport Beach/Balboa Island · Laguna Beach · Drive to Coronado · Arrive ~6:00–7:00 PM</div>\n      </div>\n    </div>\n\n    <!-- DAY 6 -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd sandiego\">\n          <div class=\"day-hd-label\">Tuesday, July 7, 2026</div>\n          <div class=\"day-hd-title\">El Matador · Newport Beach · Laguna · Coronado</div>\n          <div class=\"day-hd-sub\">~4h 32m driving total · Depart Santa Barbara 8:00 AM · Arrive Coronado ~6:00 PM</div>\n        </div>\n        <div class=\"day-body\">\n\n          <!-- DAY 6 MAP -->\n          <div class=\"map-section\">\n            <div id=\"map-day6\" class=\"seg-map\"></div>\n            <p class=\"map-caption\">Day 6 route: Beachside Inn Santa Barbara → El Matador Beach (Malibu) → Newport Beach/Balboa Island → Laguna Beach → Best Western Plus Coronado · ~4h 32m driving</p>\n            <div class=\"route-strip\">\n              <div class=\"rs-node start\">\n                <span class=\"rs-badge home\">🏠</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Beachside Inn, Santa Barbara</div>\n                  <div class=\"rs-sub\">Depart 8:00 AM · Check-out before 12:00 PM (leaving 8 AM)</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">1h 5m · 60.7 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 7 Tue 8:00 AM — clear Tuesday morning</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">1</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">El Matador State Beach</div>\n                  <div class=\"rs-sub\">32215 PCH, Malibu · Arrive ~9:05 AM · $8–12/vehicle · Arrive before 10 AM · 1.5–2 hrs</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">1h 40m · 76.7 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 7 Tue ~10:30 AM with traffic</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">2</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Newport Beach / Balboa Island</div>\n                  <div class=\"rs-sub\">Marine Ave · Balboa Bar · Newport Pier · Arrive ~12:10 PM · 1–1.5 hrs</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">23 min · 10.7 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 7 Tue ~12:15 PM</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">3</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Laguna Beach</div>\n                  <div class=\"rs-sub\">Heisler Park · Main Beach · Arrive ~12:45 PM · 1–1.5 hrs</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">1h 24m · 79.3 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 7 Tue ~1:30 PM with traffic</div>\n              </div>\n              <div class=\"rs-node overnight\">\n                <span class=\"rs-badge hotel\">🏨</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Best Western Plus Coronado Island</div>\n                  <div class=\"rs-sub\">275 Orange Ave, Coronado · Check-in 3:00 PM · Arrive ~6:00–7:00 PM</div>\n                </div>\n              </div>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/dir/34.408356,-119.693916/34.040113,-118.874937/33.607326,-117.897101/33.543401,-117.790111/32.695998,-117.173408\" target=\"_blank\" class=\"mab route\">Open Day 6 Route in Google Maps →</a>\n            </div>\n          </div>\n\n          <!-- El Matador -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd sandiego\">Morning — El Matador Beach, Malibu (Arrive 9:05 AM)</div>\n            <ul class=\"tb-list\">\n              <li><strong>Depart Beachside Inn 8:00 AM</strong> — drive 1h 5m (60.7 mi), verified Routes API Tue 8:00 AM clear. Arrive El Matador ~9:05 AM.</li>\n              <li>⚠️ <em>Arrive before 10:00 AM.</em> The small parking lot fills by 10:30 AM on summer weekdays. No overflow parking. If the lot is full when you arrive, you'll need to park on PCH and walk in (~10 min).</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sandiego\">El Matador State Beach</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">32215 Pacific Coast Hwy, Malibu, CA</span>\n                  <span class=\"sc-stat\">$8–12/vehicle day use</span>\n                  <span class=\"sc-stat\">Arrive before 10 AM</span>\n                  <span class=\"sc-stat\">1.5–2 hrs</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The most dramatic beach in Southern California — sandstone sea stacks, caves you can walk into, natural rock arches, and deep blue Pacific. The descent from the parking lot is steep (about 80 feet down a wooden staircase and sandy path). The rocks are slippery at low tide — wear closed shoes or sandals with grip.</p>\n                  <p>@visitcalifornia (825K, 8,150 views): \"High tides and good vibes\" — this is the beach that defines SoCal coastal beauty without the crowds of Malibu proper.</p>\n                </div>\n                <div class=\"sc-tip\">Check tide tables before arriving — low tide (accessible caves and rock formations) vs high tide (smaller beach area) changes the experience significantly. Either is beautiful but different.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.040113,-118.874937\" target=\"_blank\" class=\"mab gmaps\">📍 El Matador Beach</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <!-- Newport Beach -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd sandiego\">Midday — Newport Beach / Balboa Island (Arrive ~12:10 PM)</div>\n            <ul class=\"tb-list\">\n              <li>Drive from El Matador: <strong>1h 40m (76.7 mi)</strong> — verified Routes API, Tue ~10:30 AM with traffic. Arrive ~12:10 PM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sandiego\">Newport Beach · Balboa Island</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Marine Avenue, Balboa Island, Newport Beach, CA</span>\n                  <span class=\"sc-stat\">1–1.5 hrs</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>Balboa Island</strong> — take the short Balboa Island Ferry (cars or walk-on, $1/person) or drive over the bridge. Marine Avenue is the main street: boutiques, ice cream, bakeries. The island is a classic Newport Beach enclave with million-dollar cottages squeezed onto tiny lots.</p>\n                  <p><strong>Balboa Bar</strong> — the original frozen vanilla ice cream bar dipped in chocolate, created on this island in 1945. Still made here. Get one. The coconut and sprinkle toppings are the classic.</p>\n                  <p><strong>Newport Beach Pier</strong> — the commercial harbor has the largest recreational sport fishing fleet in the West Coast. Walk the pier for harbor and open ocean views.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=33.606913,-117.889598\" target=\"_blank\" class=\"mab gmaps\">📍 Balboa Island</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=33.606858,-117.930013\" target=\"_blank\" class=\"mab gmaps\">📍 Newport Beach Pier</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <!-- Laguna Beach -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd sandiego\">Early Afternoon — Laguna Beach (Arrive ~12:45 PM)</div>\n            <ul class=\"tb-list\">\n              <li>Drive from Newport: <strong>23 min (10.7 mi)</strong> — verified Routes API, Tue ~12:15 PM. Arrive ~12:45 PM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sandiego\">Laguna Beach</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Heisler Park + Main Beach</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">1–1.5 hrs</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>Heisler Park</strong> — clifftop park above the ocean with winding paths, benches, and direct beach access via stairways. The views are exceptional and it's less crowded than Main Beach. Walk south along the cliff edge.</p>\n                  <p><strong>Main Beach Park</strong> — volleyball courts, lifeguard tower, wide sandy beach with gentle waves. The most iconic Laguna Beach scene. The town itself has galleries, fish tacos, and a historic arts district (Laguna Beach was a California Plein Air painting colony in the early 1900s).</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=33.543401,-117.790111\" target=\"_blank\" class=\"mab gmaps\">📍 Heisler Park</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=33.541869,-117.78479\" target=\"_blank\" class=\"mab gmaps\">📍 Main Beach</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <!-- La Jolla Cove -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd sandiego\">En Route — La Jolla Cove (San Diego Coast)</div>\n            <ul class=\"tb-list\">\n              <li>La Jolla is on I-5 south between Laguna Beach and Coronado — a natural route stop adding ~45 min to the drive. Depart Laguna Beach by 1:00 PM to reach La Jolla by ~2:00 PM and still arrive Coronado by 4:00–5:00 PM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sandiego\">La Jolla Cove</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">1100 Coast Blvd, La Jolla, CA 92037</span>\n                  <span class=\"sc-stat free\">Free · San Diego city park</span>\n                  <span class=\"sc-stat\">1–1.5 hrs · Snorkeling, sea lions, tidepools</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>One of the most beautiful beach coves in Southern California — sandstone cliffs, crystal-clear protected water, and large colonies of sea lions lounging on the rocks year-round. The water is calm enough for snorkeling and diving (70-foot kelp forests and diverse marine life). In July you'll see sea lion pups in the colony with their mothers.</p>\n                  <p>The clifftop path above the cove offers panoramic views of the sea lions and the ocean. At low tide, walk the rocky shore to explore tidal pools. <strong>Sunny Jim's Sea Cave</strong> — accessible via a tunnel from Cave Store (225 Coast Blvd) — is the only drive-in sea cave in the US open to the public (small entrance fee).</p>\n                  <p>TripAdvisor rates it 4.6 with 13,000+ reviews.</p>\n                </div>\n                <div class=\"sc-tip\">Arrive on the earlier side — parking at La Jolla Cove fills by noon on summer days. Ellen Browning Scripps Park (the clifftop grassy area above the cove) is free and has great sea lion viewing from above.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=32.850278,-117.272202\" target=\"_blank\" class=\"mab gmaps\">📍 La Jolla Cove</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <!-- Drive to San Diego -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd sandiego\">Afternoon — Drive to Coronado (Depart La Jolla ~3:00 PM)</div>\n            <ul class=\"tb-list\">\n              <li>Drive from La Jolla: <strong>~30 min (18 mi)</strong> to Coronado via I-5 South + Coronado Bridge. Arrive ~3:30–4:00 PM.</li>\n              <li>Route: I-5 South to Coronado Bridge (SR-75). The bridge approach to Coronado Island is one of the most scenic arrival experiences on the whole trip — graceful blue arc over San Diego Bay with the downtown skyline behind you.</li>\n            </ul>\n          </div>\n\n          <!-- Evening: Coronado -->\n          <div class=\"time-block\">\n            <div class=\"tb-hd sandiego\">Evening — Coronado Island</div>\n            <ul class=\"tb-list\">\n              <li>Check in at Best Western Plus. ⚠️ <em>Pool and hot tub are closed until December — not available.</em></li>\n              <li><strong>Hotel del Coronado</strong> (1888 Orange Ave — 0.4 mi from hotel) — the iconic red-roofed Victorian grand hotel. Walk the beach side for the famous white sand and the hotel backdrop. The hotel lobby is open to walk through (free). The hotel grounds and beach are public.</li>\n              <li><strong>Coronado Beach</strong> — repeatedly ranked one of the best beaches in America. Wide white sand (naturally occurring mica gives it a golden shimmer), gentle waves, calm water. Best at sunset.</li>\n              <li><strong>Dinner options:</strong> Little Italy San Diego (10–15 min via Coronado Bridge — the best restaurant neighborhood in San Diego) OR Old Town San Diego (20 min — Mexican food, historic adobe buildings, mariachi, best carne asada tacos in the city).</li>\n            </ul>\n          </div>\n\n          <div class=\"drive-stat\">\n            <span class=\"drive-val\">~4h 32m total driving</span> · Depart Santa Barbara 8:00 AM · Arrive Coronado ~6:00–7:00 PM · All times Routes API verified with traffic\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- HOTEL CARD -->\n    <div class=\"section-title\">Overnight — Best Western Plus Suites Coronado Island</div>\n    <div class=\"hc\">\n      <div class=\"hc-hd\">\n        <span class=\"badge booked\">✅ Booked &amp; Paid</span>\n        <div class=\"hc-name\">Best Western Plus Suites Hotel Coronado Island</div>\n        <div class=\"hc-loc\">275 Orange Ave, Coronado, San Diego, CA 92118 · +1 619-437-1666</div>\n      </div>\n      <div class=\"hc-body\">\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Booking</span><span class=\"hc-val\">Booking.com · Conf. 6459555758 · PIN: 8199 (confidential)</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Guest</span><span class=\"hc-val\">Marina Drapkin · 4 adults</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Room</span><span class=\"hc-val\">Suite with Two Queen Beds · Non-Smoking</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Check-in</span><span class=\"hc-val\">Jul 7 · 3:00 PM</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Check-out</span><span class=\"hc-val\">Jul 8 · 12:00 PM noon — depart for Los Angeles ~noon</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Rate</span><span class=\"hc-val\">$279.20 + $27.92 tax = $307.12 PAID IN FULL</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Breakfast</span><span class=\"hc-val\">Grab-and-go included ✓</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Deposit</span><span class=\"hc-val\">$250 damage deposit hold at check-in (refunded at checkout)</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Pool</span><span class=\"hc-val\" style=\"color:var(--red);font-weight:700;\">⚠️ Pool &amp; hot tub CLOSED until December — NOT available</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Cancel</span><span class=\"hc-val\">Free until Jul 3 11:59 PM PDT · After Jul 4: full charge ($307.12)</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Location</span><span class=\"hc-val\">0.5 mi from Coronado Beach · 10–15 min from Downtown SD via Coronado Bridge</span></div>\n        <div class=\"map-actions\" style=\"margin-top:10px;\">\n          <a href=\"https://www.google.com/maps/search/?api=1&query=32.695998,-117.173408\" target=\"_blank\" class=\"mab gmaps\">📍 Hotel on Google Maps</a>\n        </div>\n      </div>\n    </div>\n\n    <!-- ALERTS -->\n    <div class=\"section-title\">Alerts &amp; Notes</div>\n    <div class=\"alerts-grid\">\n      <div class=\"ac red\">\n        <div class=\"ac-icon\">🔴</div>\n        <div class=\"ac-title\">Pool &amp; Hot Tub — CLOSED Until December</div>\n        <div class=\"ac-text\">The pool and hot tub at Best Western Plus Coronado are closed until December 2026. This is confirmed. Plan accordingly — Coronado Beach (0.5 mi, public) is the swimming option.</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">ℹ️</div>\n        <div class=\"ac-title\">El Matador — Arrive Before 10 AM</div>\n        <div class=\"ac-text\">Small parking lot fills by 10:30 AM on summer weekdays. Depart Santa Barbara at 8:00 AM to arrive ~9:05 AM. If lot is full, park on PCH and walk (~10 min). $8–12/vehicle day use fee.</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">ℹ️</div>\n        <div class=\"ac-title\">Coronado to LA Drive — Tomorrow Jul 8</div>\n        <div class=\"ac-text\">2h 31m (139.7 mi) verified Routes API, Jul 8 Wed ~noon. I-5 N → I-405 N → LA. The 405 through South Bay/Inglewood can be slow on weekday afternoons — depart Coronado before 12:30 PM if possible.</div>\n      </div>\n      <div class=\"ac grn\">\n        <div class=\"ac-icon\">✅</div>\n        <div class=\"ac-title\">Hotel del Coronado — Walk from Hotel</div>\n        <div class=\"ac-text\">0.4 miles from the Best Western Plus. Walk the beach side in the evening. The Victorian hotel (1888) lobby is free to enter and worth seeing. Coronado Beach is public and right in front of the hotel.</div>\n      </div>\n    </div>\n\n    <div class=\"footer\">\n      <strong>San Diego · Coronado Island · California Road Trip · July 7, 2026</strong><br>\n      Best Western Plus Coronado · 275 Orange Ave · Day 6 · All times Routes API verified\n    </div>\n\n  </div>\n  <script src=\"https://unpkg.com/leaflet@1.9.4/dist/leaflet.js\"><\/script>\n  <script>\n  function mkMap(id,center,zoom,stops,col,drawRoute){\n    var m=L.map(id,{scrollWheelZoom:false}).setView(center,zoom);\n    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© <a href=\"https://openstreetmap.org\">OpenStreetMap</a>'}).addTo(m);\n    var pts=[];\n    stops.forEach(function(s){
