<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>California Road Trip · San Francisco → Los Angeles · July 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ── */
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-border:color-mix(in oklch,#28251d 12%,transparent);
  --color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;
  --color-text-faint:#bab9b4;--color-primary:#01696f;
  --color-primary-hover:#0c4e54;--color-primary-highlight:#cedcd8;
  --font-body:'Geist','Helvetica Neue',sans-serif;
  --font-mono:'Geist Mono','Fira Code',monospace;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-6:1.5rem;--space-8:2rem;
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-full:9999px;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.10);
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-border:color-mix(in oklch,#cdccca 10%,transparent);
  --color-divider:#262523;--color-text:#cdccca;--color-text-muted:#797876;
  --color-text-faint:#5a5957;--color-primary:#4f98a3;
  --color-primary-hover:#227f8b;--color-primary-highlight:#313b3b;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.2);
  --shadow-md:0 4px 12px oklch(0 0 0/0.32);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme]){
    --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
    --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
    --color-border:color-mix(in oklch,#cdccca 10%,transparent);
    --color-divider:#262523;--color-text:#cdccca;--color-text-muted:#797876;
    --color-text-faint:#5a5957;--color-primary:#4f98a3;
    --color-primary-hover:#227f8b;--color-primary-highlight:#313b3b;
    --shadow-sm:0 1px 2px oklch(0 0 0/0.2);
    --shadow-md:0 4px 12px oklch(0 0 0/0.32);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-font-smoothing:antialiased}
body{height:100dvh;font-family:var(--font-body);font-size:var(--text-sm);color:var(--color-text);background:var(--color-bg);display:flex;flex-direction:column;overflow:hidden;user-select:none;padding-bottom:env(safe-area-inset-bottom,0px)}
/* ── Top Bar ── */
.topbar{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-4);background:var(--color-surface);border-bottom:1px solid var(--color-border);box-shadow:var(--shadow-sm);z-index:100;flex-shrink:0;height:48px}
.logo{display:flex;align-items:center;gap:var(--space-2);color:var(--color-primary);font-weight:600;font-size:var(--text-sm);letter-spacing:-0.01em;flex-shrink:0}
.divider-v{width:1px;height:20px;background:var(--color-border);flex-shrink:0}
.page-title{flex:1;font-size:var(--text-sm);font-weight:500;color:var(--color-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.controls{display:flex;align-items:center;gap:var(--space-2);flex-shrink:0}
.btn-icon{display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:none;border:1px solid var(--color-border);border-radius:var(--radius-md);color:var(--color-text-muted);cursor:pointer;transition:color var(--transition),background var(--transition),border-color var(--transition);flex-shrink:0}
.btn-icon:hover{color:var(--color-text);background:var(--color-surface-offset)}
.btn-icon:active{transform:scale(0.95)}
.btn-icon:disabled{opacity:.35;cursor:default;pointer-events:none}
.btn-nav{display:flex;align-items:center;gap:var(--space-1);padding:0 var(--space-3);height:32px;background:none;border:1px solid var(--color-border);border-radius:var(--radius-md);color:var(--color-text-muted);cursor:pointer;font-family:var(--font-body);font-size:var(--text-xs);font-weight:500;white-space:nowrap;transition:color var(--transition),background var(--transition),border-color var(--transition)}
.btn-nav:hover{color:var(--color-text);background:var(--color-surface-offset)}
.btn-nav:active{transform:scale(0.97)}
.btn-nav:disabled{opacity:.35;cursor:default;pointer-events:none}
.page-counter{font-size:var(--text-xs);font-family:var(--font-mono);color:var(--color-text-muted);background:var(--color-surface-offset);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0 var(--space-3);height:32px;display:flex;align-items:center;gap:.2em;flex-shrink:0}
.page-counter .cur{color:var(--color-text);font-weight:600}
/* ── Thumbnail Strip ── */
.strip-wrapper{flex-shrink:0;background:var(--color-surface);border-bottom:1px solid var(--color-border);overflow:hidden;transition:height 300ms cubic-bezier(0.16,1,0.3,1);height:0}
.strip-wrapper.open{height:100px}
.strip{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);overflow-x:auto;height:100%;scrollbar-width:thin;scrollbar-color:var(--color-divider) transparent}
.thumb{flex-shrink:0;width:64px;height:80px;border:2px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface-offset);cursor:pointer;overflow:hidden;position:relative;transition:border-color var(--transition),box-shadow var(--transition),transform var(--transition);display:flex;flex-direction:column}
.thumb:hover{border-color:var(--color-primary);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.thumb.active{border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-highlight)}
.thumb-label{font-size:9px;font-family:var(--font-mono);color:var(--color-text-muted);padding:2px 4px;background:var(--color-surface);border-top:1px solid var(--color-border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;margin-top:auto}
.thumb-num{position:absolute;top:3px;left:4px;font-size:9px;font-family:var(--font-mono);font-weight:600;color:var(--color-text-faint)}
.thumb-preview{flex:1;overflow:hidden;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
/* ── Viewport ── */
.viewport{flex:1;overflow:hidden;position:relative;min-height:0}
.slides-track{display:flex;height:100%;width:100%;transition:transform 380ms cubic-bezier(0.16,1,0.3,1);will-change:transform}
.slide{flex-shrink:0;width:100%;height:100%;position:relative}
.slide iframe{width:100%;height:100%;border:none;display:block;background:white}
.slide-loader{position:absolute;inset:0;background:var(--color-bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:var(--space-4);color:var(--color-text-muted);font-size:var(--text-sm);transition:opacity 300ms ease,visibility 300ms ease;z-index:5}
.slide-loader.hidden{opacity:0;visibility:hidden}
.spinner{width:28px;height:28px;border:2px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── Swipe Hint ── */
.swipe-hint{position:absolute;bottom:var(--space-6);left:50%;transform:translateX(-50%);background:color-mix(in oklch,var(--color-surface) 90%,transparent);backdrop-filter:blur(8px);border:1px solid var(--color-border);border-radius:var(--radius-full);padding:var(--space-2) var(--space-4);font-size:var(--text-xs);color:var(--color-text-muted);display:flex;align-items:center;gap:var(--space-2);pointer-events:none;animation:hint-fade 3s 1.5s both;z-index:10}
@keyframes hint-fade{0%{opacity:0;transform:translateX(-50%) translateY(8px)}20%{opacity:1;transform:translateX(-50%) translateY(0)}70%{opacity:1}100%{opacity:0}}
/* ── Keyboard Shortcuts ── */
.shortcuts{position:absolute;bottom:var(--space-4);right:var(--space-4);display:flex;align-items:center;gap:var(--space-2);opacity:0;pointer-events:none;transition:opacity var(--transition);z-index:10}
.viewport:hover .shortcuts{opacity:1}
.key{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:2px 6px;font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted);box-shadow:0 1px 0 var(--color-border)}

.translate-wrap { position: relative; flex-shrink: 0; }
.translate-btn { min-width: 100px; justify-content: space-between; gap: var(--space-2); }
.lang-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 160px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  z-index: 999;
  padding: var(--space-1);
  max-height: 260px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--color-divider) transparent;
}
.lang-dropdown.open { display: block; }
.lang-option {
  padding: var(--space-2) var(--space-3);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  cursor: pointer;
  border-radius: var(--radius-md);
  transition: background var(--transition), color var(--transition);
  white-space: nowrap;
}
.lang-option:hover { background: var(--color-surface-offset); color: var(--color-text); }
.lang-option.active { color: var(--color-primary); font-weight: 600; }
/* Hide the Google Translate toolbar that appears at top of page */
.goog-te-banner-frame, #goog-te-banner-frame { display: none !important; }
body { top: 0 !important; }
.goog-te-gadget { display: none !important; }
.skiptranslate { display: none !important; }

/* ── Mobile ── */
@media(max-width:640px){
  .topbar{padding:var(--space-2) var(--space-3);gap:var(--space-2);height:52px;flex-wrap:nowrap}
  .logo span{display:none}
  .page-title{display:none}
  .divider-v{display:none}
  .btn-icon{width:40px;height:40px;border-radius:var(--radius-md)}
  .btn-nav{height:40px;padding:0 var(--space-2);font-size:.7rem}
  .page-counter{height:40px;padding:0 var(--space-2);font-size:.7rem}
  .controls{gap:var(--space-1)}
  .lang-dropdown{right:0;left:auto;min-width:150px}
  .translate-btn span#langLabel{display:none}
  .translate-btn{min-width:unset;padding:0 var(--space-2)}
  .strip-wrapper.open{height:88px}
  .thumb{width:56px;height:72px}
  .shortcuts{display:none}
}
</style>
</head>
<body>

<script>

if; font-size: .76rem; background: rgba(255,255,255,.15);\n             border: 1px solid rgba(255,255,255,.3); border-radius: 20px; padding: 5px 14px; }\n\n    /* STATS STRIP */\n    .stats-strip { display: flex; background: white; border: 1px solid var(--border);\n                   border-radius: 12px; overflow: hidden; margin: 32px 0 28px; }\n    .stat-item { flex: 1; text-align: center; padding: 18px 10px; border-right: 1px solid var(--border); }\n    .stat-item:last-child { border-right: none; }\n    .stat-val { font-family: Georgia, serif; font-size: 1.5rem; color: var(--pacific); display: block; }\n    .stat-lbl { font-family: sans-serif; font-size: .62rem; text-transform: uppercase;\n                letter-spacing: .8px; color: var(--mid); margin-top: 3px; display: block; }\n\n    /* CONFIRM NOTE */\n    .confirm-note { background: linear-gradient(135deg, #F0FFF4, #EBF8FF); border: 2px solid #68D391;\n                    border-radius: 12px; padding: 18px 22px; margin-bottom: 32px;\n                    font-family: sans-serif; font-size: .87rem; color: var(--dark); line-height: 1.8; }\n    .confirm-note strong { color: var(--green); font-size: .95rem; }\n\n    /* SECTION TITLE */\n    .section-title { font-family: sans-serif; font-size: .7rem; text-transform: uppercase;\n                     letter-spacing: 1.2px; color: var(--mid); font-weight: 700;\n                     margin: 36px 0 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }\n\n    /* SEGMENT CARDS */\n    .seg-cards { display: flex; flex-direction: column; gap: 20px; margin-bottom: 12px; }\n    .seg-card { border-radius: 12px; overflow: hidden; border: 1px solid var(--border);\n                box-shadow: 0 2px 14px rgba(0,0,0,.07); }\n    .seg-card-hd { padding: 18px 20px; color: white; display: flex; align-items: flex-start; gap: 16px; }\n    .seg-icon { font-size: 2.0rem; flex-shrink: 0; line-height: 1; }\n    .seg-hd-main { flex: 1; }\n    .seg-title { font-family: Georgia 6px 0; }\n    .drive-val { font-weight: 700; color: var(--pacific); }\n\n    /* HOTEL CARD */\n    .hc { border: 2px solid #68D391; border-radius: 10px; overflow: hidden; margin: 20px 0; }\n    .hc-hd { background: linear-gradient(135deg, #F0FFF4, #EBF8FF); padding: 14px 16px; border-bottom: 1px solid var(--border); }\n    .hc-name { font-family: Georgia, serif; font-size: 1.15rem; color: var(--dark); margin: 6px 0 2px; }\n    .hc-loc { font-family: sans-serif; font-size: .78rem; color: var(--mid); }\n    .hc-body { background: white; padding: 16px; }\n    .hc-row { display: flex; gap: 12px; margin-bottom: 7px; align-items: baseline; }\n    .hc-lbl { font-family: sans-serif; font-size: .68rem; text-transform: uppercase; letter-spacing: .5px; color: var(--mid); font-weight: 700; min-width: 80px; flex-shrink: 0; }\n    .hc-val { font-family: sans-serif; font-size: .82rem; color: var(--dark); }\n\n    /* FOOD GRID */\n    .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin: 16px 0; }\n    .fc { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }\n    .fc-hd { background: linear-gradient(135deg, #0B4F6C, #1B7A9E); padding: 14px 16px; }\n    .fc-name { font-family: Georgia, serif; font-size: 1.0rem; color: white; }\n    .fc-loc { font-family: sans-serif; font-size: .72rem; color: rgba(255,255,255,.8); margin-top: 4px; }\n    .fc-body { background: white; padding: 14px 16px; }\n    .fc-rating { font-family: sans-serif; font-size: .78rem; color: var(--gold); font-weight: 600; margin-bottom: 6px; }\n    .fc-order { font-family: sans-serif; font-size: .82rem; color: var(--dark); line-height: 1.5; margin-bottom: 6px; }\n    .fc-order strong { color: var(--pacific); }\n    .fc-hours { font-family: sans-serif; font-size: .75rem; color: var(--mid); margin-bottom: 10px; }\n\n    /* ALERTS */\n    .alerts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin: 16px 0; }\n    .ac { border-radius: 10px; padding: 14px 16px; border: 1px solid var(--border); border-left-width: 4px; }\n    .ac.red { background: #FEF2F2; border-left-color: var(--red); }\n    .ac.amb { background: #FFFBEB; border-left-color: #D97706; }\n    .ac.blu { background: #EBF8FF; border-left-color: #2B6CB0; }\n    .ac.grn { background: #F0FFF4; border-left-color: var(--green); }\n    .ac-icon { font-size: 1.2rem; margin-bottom: 6px; }\n    .ac-title { font-family: sans-serif; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--dark); margin-bottom: 4px; }\n    .ac-text { font-family: sans-serif; font-size: .8rem; color: var(--mid); line-height: 1.55; }\n\n    /* SOCIAL INTEL */\n    .si-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin: 16px 0; }\n    .si-card { background: var(--snow); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }\n    .si-quote { font-family: Georgia, serif; font-size: .85rem; color: var(--dark); font-style: italic; margin-bottom: 6px; line-height: 1.5; }\n    .si-source { font-family: sans-serif; font-size: .7rem; color: var(--pacific); font-weight: 600; }\n    .si-location { font-family: sans-serif; font-size: .7rem; color: var(--mid); margin-top: 2px; }\n\n    /* FOOTER */\n    .footer { background: var(--pacific); color: rgba(255,255,255,.6); text-align: center; font-family: sans-serif; font-size: .77rem; padding: 22px 24px; margin-top: 48px; border-radius: 10px; }\n    .footer strong { color: white; }\n\n    @media (max-width: 600px) {\n      .hero h1 { font-size: 2.0rem; }\n      .day-hd-title { font-size: 1.1rem; }\n      .overview-strip { grid-template-columns: 1fr 1fr; }\n      .bb-grid, .alerts-grid, .food-grid, .si-grid { grid-template-columns: 1fr; }\n      .hc-row { flex-direction: column; gap: 2px; }\n    }\n  <\/style>\n</head>\n<body>\n\n  <!-- HERO -->\n  <div class=\"hero\">\n    <div class=\"hero-sup\">California Road Trip · San Francisco → Los Angeles</div>\n    <h1>San Francisco</h1>\n    <div class=\"hero-dates\">July 2–5, 2026 · 3 Nights</div>\n    <div class=\"hero-base\">Base: Hyatt Regency SF · 50 Third St, Union Square</div>\n    <div class=\"hero-chips\">\n      <span class=\"hchip\">3 nights</span>\n      <span class=\"hchip\">✅ Booked · Conf. 40023B19345813</span>\n      <span class=\"hchip\">Days 1–3</span>\n      <span class=\"hchip\">Check-in: 3:00 PM · Check-out: 12:00 PM</span>\n    </div>\n  </div>\n\n  <div class=\"wrap\">\n\n    <!-- BOOKING BANNER -->\n    <div class=\"booking-banner\">\n      <div class=\"bb-title\">Booking Status — San Francisco</div>\n      <div class=\"bb-grid\">\n        <div class=\"bb-item confirmed\">\n          <span class=\"badge booked\">✅ Booked</span>\n          <div class=\"bb-name\">Hyatt Regency SF</div>\n          <div class=\"bb-detail\">Conf. 40023B19345813 · Jul 2–5 · $527.30 + taxes · NON-REFUNDABLE</div>\n        </div>\n        <div class=\"bb-item confirmed\">\n          <span class=\"badge booked\">✅ Booked</span>\n          <div class=\"bb-name\">Alcatraz Ferry</div>\n          <div class=\"bb-detail\">Conf. i77487162/77487159 · Jul 3 · 9:20 AM · Pier 33 · 4 adults</div>\n        </div>\n        <div class=\"bb-item confirmed\">\n          <span class=\"badge booked\">✅ Booked</span>\n          <div class=\"bb-name\">Muir Woods Parking</div>\n          <div class=\"bb-detail\">gomuirwoods.com · Jul 3 · 4:00–4:30 PM slot · $15/person</div>\n        </div>\n        <div class=\"bb-item confirmed\">\n          <span class=\"badge booked\">✅ Booked</span>\n          <div class=\"bb-name\">Sterling Vineyards</div>\n          <div class=\"bb-detail\">Conf. TOCK-R-AE87DB44 · Jul 4 🎂 · 10:45 AM · $192.53 paid</div>\n        </div>\n        <div class=\"bb-item pending\">\n          <span class=\"badge pending\">⚠️ Not Yet Booked</span>\n          <div class=\"bb-name\">The Waterfront Seafood Grill — Birthday Dinner 🎂</div>\n          <div class=\"bb-detail\">720 Main St, Napa · (707) 699-2452 · Jul 4 evening · BOOK IMMEDIATELY</div>\n        </div>\n        <div class=\"bb-item pending\">\n          <span class=\"badge pending\">⚠️ No Restaurant Confirmed</span>\n          <div class=\"bb-name\">Day 1 Dinner — North Beach (Jul 2)</div>\n          <div class=\"bb-detail\">Thu Jul 2 evening · Options: Cotogna (490 Pacific Ave) · SPQR (1911 Fillmore) · Tony's Coal-Fired Pizza (1570 Stockton St) · Book before departure — SF weeknight reservations fill fast</div>\n        </div>\n        <div class=\"bb-item pending\">\n          <span class=\"badge pending\">⚠️ No Restaurant Confirmed</span>\n          <div class=\"bb-name\">Day 2 Dinner — North Beach / Fisherman's Wharf (Jul 3)</div>\n          <div class=\"bb-detail\">Fri Jul 3 — pre-holiday Friday fills completely · Options: Sotto Mare (552 Green St — cioppino) · Scoma's (Pier 47 — seafood pier) · Book this one first — Friday night before July 4th is the hardest table in SF</div>\n        </div>\n      </div>\n    </div>\n\n    <!-- OVERVIEW STRIP -->\n    <div class=\"overview-strip\">\n      <div class=\"ov-card d1\">\n        <div class=\"ov-date\">Thu, Jul 2</div>\n        <div class=\"ov-label\">Day 1 — Arrival</div>\n        <div class=\"ov-note\">SFO 11:27 AM · Chinatown · Palace of Fine Arts · Powell-Hyde Cable Car · Twin Peaks sunset</div>\n      </div>\n      <div class=\"ov-card d2\">\n        <div class=\"ov-date\">Fri, Jul 3</div>\n        <div class=\"ov-label\">Day 2</div>\n        <div class=\"ov-note\">Alcatraz 9:20 AM ✅ · Fort Point (free) · UC Berkeley · Muir Woods 4:00 PM ✅</div>\n      </div>\n      <div class=\"ov-card d3\">\n        <div class=\"ov-date\">Sat, Jul 4 🎂</div>\n        <div class=\"ov-label\">Day 3 — Birthday</div>\n        <div class=\"ov-note\">Bouchon Bakery · Sterling Vineyards 10:45 AM ✅ · Napa/Oxbow · Waterfront Seafood Grill 🎂 ⚠️ BOOK</div>\n      </div>\n    </div>\n\n    <!-- ═══════════════════════════════════════════ -->\n    <!-- DAY 1 — THURSDAY, JULY 2 (ARRIVAL)         -->\n    <!-- ═══════════════════════════════════════════ -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd sf\">\n          <div class=\"day-hd-label\">Thursday, July 2, 2026</div>\n          <div class=\"day-hd-title\">Arrival · San Francisco Orientation</div>\n          <div class=\"day-hd-sub\">AA 1524 SFO 11:27 AM · Afternoon walking &amp; transit · No driving required</div>\n        </div>\n        <div class=\"day-body\">\n\n          <!-- DAY 1 MAP -->\n          <div class=\"map-section\">\n            <div id=\"map-day1\" class=\"seg-map\"></div>\n            <p class=\"map-caption\">Day 1 stops: Hyatt SF → Chinatown → Palace of Fine Arts → Powell-Hyde Cable Car → Lombard St → Painted Ladies → Twin Peaks · All transit, rideshare, or walking — no driving required</p>\n            <div class=\"route-strip\">\n              <div class=\"rs-node\">\n                <span class=\"rs-badge hotel\">🏨</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Hyatt Regency SF</div>\n                  <div class=\"rs-sub\">Arrive from SFO ~1:00 PM · Check-in 3:00 PM · 50 Third St, Union Square</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">Walk or rideshare</div>\n                <div class=\"rs-leg-note\">All Day 1 stops — no car needed</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">1</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Chinatown — Dragon Gate</div>\n                  <div class=\"rs-sub\">Grant Ave + Stockton St · 45–60 min · America's oldest Chinatown</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">Walk or transit</div>\n                <div class=\"rs-leg-note\">~10 min to Palace of Fine Arts</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">2</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Palace of Fine Arts</div>\n                  <div class=\"rs-sub\">3601 Lyon St · Free · 30–45 min · 1915 Panama-Pacific Exposition colonnade</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">Rideshare or bus</div>\n                <div class=\"rs-leg-note\">~15 min to Powell &amp; Market</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">3</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Powell-Hyde Cable Car</div>\n                  <div class=\"rs-sub\">Powell &amp; Market turnaround · $24 all-day Muni · Ride up &amp; over to Fisherman's Wharf</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">Walk</div>\n                <div class=\"rs-leg-note\">Russian Hill</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">4</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Lombard Street</div>\n                  <div class=\"rs-sub\">Russian Hill · Free · Walk down the switchbacks · 20 min</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">Rideshare</div>\n                <div class=\"rs-leg-note\">~10 min to Alamo Square</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">5</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Painted Ladies — Alamo Square</div>\n                  <div class=\"rs-sub\">710 Steiner St · Free · Classic SF photo · 20 min</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">Rideshare</div>\n                <div class=\"rs-leg-note\">~10 min to Twin Peaks</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">6</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Twin Peaks — Sunset</div>\n                  <div class=\"rs-sub\">Twin Peaks Blvd · Free · 360° Bay panorama · 20 min</div>\n                </div>\n              </div>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/dir/37.786587,-122.403097/37.794558,-122.404698/37.802931,-122.448423/37.784874,-122.407696/37.802059,-122.419555/37.776369,-122.434819/37.752915,-122.447413\" target=\"_blank\" class=\"mab route\">Open Day 1 Points in Google Maps →</a>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Arrival — SFO 11:27 AM</div>\n            <ul class=\"tb-list\">\n              <li><strong>AA 1524 arrives SFO 11:27 AM</strong> — Marina &amp; Liam. Car pickup ~12:15–12:30 PM. Drive to hotel ~1:00 PM.</li>\n              <li>Check-in at Hyatt is 3:00 PM. Drop bags with concierge and head out if room isn't ready. Hotel at 50 Third St, Union Square — central to everything.</li>\n              <li>All afternoon stops are walking distance or short rideshare hops.</li>\n            </ul>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Afternoon — Chinatown &amp; North Waterfront</div>\n            <ul class=\"tb-list\">\n              <li><strong>Chinatown</strong> (Grant Avenue + Stockton Street) — 45 min to 1 hour. America's oldest Chinatown. Dragon Gate at Bush &amp; Grant Ave is the landmark entry. Gold-coin trinkets, incense shops, dim sum bakeries. Stockton St is the working street (produce, live fish) — more authentic than touristy Grant Ave.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Palace of Fine Arts</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">3601 Lyon St, San Francisco</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">30–45 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The colonnade and dome over the lagoon — one of the most photogenic structures in SF. Originally built for the 1915 Panama-Pacific Exposition. The reflection in the lagoon in afternoon light is exceptional. Walk the colonnade perimeter, photograph across the water.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.802931,-122.448423\" target=\"_blank\" class=\"mab gmaps\">📍 Palace of Fine Arts</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Powell-Hyde Cable Car</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Powell &amp; Market turnaround · Fisherman's Wharf</span>\n                  <span class=\"sc-stat\">$24/adult all-day Muni passport</span>\n                  <span class=\"sc-stat\">Unlimited transit all day</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Board at Powell &amp; Market Street (the turnaround where they spin the cars manually — worth watching). Ride up and over the hill to Fisherman's Wharf. The Powell-Hyde line goes over the steepest grades — better views than Powell-Mason. The $24 all-day Muni passport covers all buses, streetcars, and cable cars for the rest of the day.</p>\n                </div>\n                <div class=\"sc-tip\">The turnaround at Powell &amp; Market has a line in the morning. Take the turnaround at Fisherman's Wharf (Hyde &amp; Beach) instead — board there to go back into the city with no wait.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.784661,-122.407786\" target=\"_blank\" class=\"mab gmaps\">📍 Powell &amp; Market Turnaround</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Pier 39 — Sea Lions &amp; Waterfront</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">The Embarcadero at Beach St, San Francisco</span>\n                  <span class=\"sc-stat free\">Free entry</span>\n                  <span class=\"sc-stat\">45 min–1 hr</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The cable car ends at Hyde &amp; Beach — Pier 39 is a 10-minute walk east along the waterfront. The star attraction is <strong>K-Dock</strong> on the west side of the pier, where up to 1,000 California sea lions haul out on floating docks year-round. The barking is audible from a block away — completely free to watch from the upper deck.</p>\n                  <p>Clam chowder in a sourdough bread bowl at the wharf crab stands is the definitive SF street food move. Try it here.</p>\n                </div>\n                <div class=\"sc-tip\">Best sea lion viewing is from the west side of Pier 39 looking down at the floating docks. Morning is less crowded. No admission required — just walk in.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.808673,-122.409981\" target=\"_blank\" class=\"mab gmaps\">📍 Pier 39</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Fisherman's Wharf</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Jefferson St between Taylor &amp; Hyde, San Francisco</span>\n                  <span class=\"sc-stat free\">Free to walk</span>\n                  <span class=\"sc-stat\">30–45 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>SF's most visited waterfront district — the historic fishing wharf stretching from Pier 33 to Ghirardelli Square. Walk Jefferson Street for the original crab stands, souvenir shops, and street performers. The WWII submarine USS Pampanito (Pier 45) is open for self-guided tours (optional, ticketed).</p>\n                  <p><strong>Ghirardelli Square</strong> (900 North Point St, west end) — the 1852 chocolate factory converted to shops and restaurants. Free to explore. The original Ghirardelli shop here serves the famous hot fudge sundae.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.808132,-122.416748\" target=\"_blank\" class=\"mab gmaps\">📍 Fisherman's Wharf</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.805657,-122.42273\" target=\"_blank\" class=\"mab gmaps\">📍 Ghirardelli Square</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Late Afternoon — Russian Hill &amp; Alamo Square</div>\n            <ul class=\"tb-list\">\n              <li><strong>Lombard Street</strong> (Russian Hill) — the famous crooked block between Hyde and Leavenworth. 20 min stop. Walk down (not drive) for the best photos of the switchbacks. Or walk up from the bottom and look back at the city framing.</li>\n              <li><strong>Painted Ladies</strong> (710–720 Steiner St, Alamo Square Park) — the six Victorian houses with downtown SF skyline behind them. Best from the park bench row on Steiner facing east. 20 min.</li>\n            </ul>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Sunset — Twin Peaks</div>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Twin Peaks Sunset Viewpoint</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Twin Peaks Blvd, San Francisco</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">20 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Panoramic 360° view of the Bay from a short drive south of the Mission. The city grid, the Bay Bridge, and (on clear days) the Golden Gate. Sunset here on arrival day sets the stage for everything that follows. Short walk from the parking lot to the summit.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.75455,-122.446777\" target=\"_blank\" class=\"mab gmaps\">📍 Twin Peaks</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">More to See — Nearby Day 1 Additions</div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">The Full House House — 1709 Broderick St</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">1709 Broderick St, San Francisco (Lower Pacific Heights)</span>\n                  <span class=\"sc-stat free\">Free · Sidewalk view only</span>\n                  <span class=\"sc-stat\">10–15 min · Private residence</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The blue-grey Victorian at 1709 Broderick Street used for the exterior shots in <em>Full House</em> (1987–1995). The Tanner family's house. It is a private residence — view and photograph from the sidewalk only. Just 0.4 miles from the Painted Ladies at Alamo Square, so combine both on the same walk.</p>\n                </div>\n                <div class=\"sc-tip\">Private home — sidewalk only, no knocking or entering. Quick 10-min photo stop on the way to or from Alamo Square.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.782476,-122.438339\" target=\"_blank\" class=\"mab gmaps\">📍 1709 Broderick St (Full House House)</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Mission Dolores Park</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Dolores St &amp; 18th St, Mission District, San Francisco</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">30–45 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>SF's most beloved hillside park — sun-filled terraced lawns with sweeping views of the downtown skyline and the Bay. The upper terrace gives a classic elevated view looking north over the city. The surrounding <strong>Mission District</strong> (Valencia Street, 16th–24th St) is SF's most vibrant neighborhood: colorful murals, taquerias, bookstores, and some of the city's best restaurants. The Mission is also the sunniest neighborhood in SF — shielded from coastal fog by Twin Peaks.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.759752,-122.426839\" target=\"_blank\" class=\"mab gmaps\">📍 Mission Dolores Park</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Golden Gate Park — Flexible Activity (Day 1 PM or Day 2 Extra Time)</div>\n            <ul class=\"tb-list\">\n              <li>Golden Gate Park spans 3 miles across the city from Haight-Ashbury to the ocean. Three world-class attractions sit inside it — all within walking distance of each other.</li>\n            </ul>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Golden Gate Park</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Bounded by Fulton St, Lincoln Way, Stanyan St &amp; Great Highway</span>\n                  <span class=\"sc-stat free\">Free to enter</span>\n                  <span class=\"sc-stat\">1,017 acres · 3+ hrs if seeing all attractions</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The third most visited urban park in the United States. Larger than Central Park. Contains the Japanese Tea Garden, California Academy of Sciences, de Young Museum, Conservatory of Flowers, Stow Lake, and Buffalo Paddock. The main meadow (Hellman Hollow) is perfect for a picnic.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.769421,-122.48609\" target=\"_blank\" class=\"mab gmaps\">📍 Golden Gate Park (Main Drive)</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Japanese Tea Garden</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">75 Hagiwara Tea Garden Dr, Golden Gate Park</span>\n                  <span class=\"sc-stat\">$13 adults · $8 seniors · Free before 10 AM on Mon/Wed/Fri</span>\n                  <span class=\"sc-stat\">1 hr · Oldest public Japanese garden in the US</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The oldest operating public Japanese garden in North America — opened 1894. Natural beauty and tranquility: graceful Japanese maples, twisting pines, clipped azaleas, cherry trees, a steep wooden drum bridge, pagodas, and koi ponds. The traditional teahouse serves matcha and fortune cookies (invented here). Go early — it gets crowded by 11 AM.</p>\n                </div>\n                <div class=\"sc-tip\">Admission is free Mon/Wed/Fri before 10 AM. If you're already in the park in the morning, this is the best free window.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.770455,-122.470449\" target=\"_blank\" class=\"mab gmaps\">📍 Japanese Tea Garden</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">California Academy of Sciences</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">55 Music Concourse Dr, Golden Gate Park</span>\n                  <span class=\"sc-stat\">$40 adults · $35 seniors · $30 youth (12–17) · $25 children (4–11)</span>\n                  <span class=\"sc-stat\">3–4 hrs · Opens 9:30 AM Mon–Sat / 11 AM Sun</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The world's only combined aquarium, planetarium, rainforest, and natural history museum under one living roof. The centerpiece is <strong>Osher Rainforest</strong> — a four-story glass dome with free-flying tropical birds and butterflies. The aquarium has a Philippine coral reef tank and a shark lagoon. The planetarium shows are outstanding. Albino alligator lives in the swamp exhibit.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.76987,-122.466195\" target=\"_blank\" class=\"mab gmaps\">📍 California Academy of Sciences</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Evening — Dinner Options</div>\n            <ul class=\"tb-list\">\n              <li><strong>North Beach</strong> (Broadway + Columbus Ave) — SF's Italian neighborhood. City Lights Bookstore, espresso bars, classic SF trattorie. Caffe Trieste for atmosphere. No specific restaurant confirmed.</li>\n              <li>Alternatively: <strong>Ferry Building Marketplace</strong> (Embarcadero) — open late on weekdays, great variety, walk along the waterfront.</li>\n            </ul>\n          </div>\n\n          <div class=\"drive-stat\">\n            <span class=\"drive-val\">No driving required today</span> · All stops by transit, rideshare, or walking · Hotel check-in 3:00 PM · Pack bags tonight (Day 2 departs early)\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- ═══════════════════════════════════════════════════ -->\n    <!-- DAY 2 — FRIDAY, JULY 3                             -->\n    <!-- Alcatraz · Fort Point · UC Berkeley · Muir Woods   -->\n    <!-- ═══════════════════════════════════════════════════ -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd sf\">\n          <div class=\"day-hd-label\">Friday, July 3, 2026</div>\n          <div class=\"day-hd-title\">Alcatraz · Fort Point · UC Berkeley · Muir Woods</div>\n          <div class=\"day-hd-sub\">Drive total: ~3h 46m verified · Depart hotel 8:35 AM · Return ~7:10 PM</div>\n        </div>\n        <div class=\"day-body\">\n\n          <!-- DAY 2 MAP -->\n          <div class=\"map-section\">\n            <div id=\"map-day2\" class=\"seg-map\"></div>\n            <p class=\"map-caption\">Day 2 route: Pier 33 (Alcatraz return) → Fort Point NHS → UC Berkeley → Muir Woods → Hyatt SF · ~3h 46m total driving</p>\n            <div class=\"route-strip\">\n              <div class=\"rs-node start\">\n                <span class=\"rs-badge home\">🏠</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Hyatt Regency SF</div>\n                  <div class=\"rs-sub\">Depart 8:35 AM · Walk or rideshare to Pier 33 (1.5 mi)</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">Walk/rideshare · 1.5 mi</div>\n                <div class=\"rs-leg-note\">No parking at Pier 33</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">1</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Alcatraz Ferry — Pier 33</div>\n                  <div class=\"rs-sub\">✅ Booked · 9:20 AM departure · Return ~12:00 PM · Conf. i77487162</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">17 min · 4.4 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 3 Fri ~noon</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">2</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Fort Point NHS</div>\n                  <div class=\"rs-sub\">201 Marine Dr · FREE · 10 AM–5 PM · 45–55 min · Depart by ~1:15 PM</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">48 min · 29.9 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 3 Fri ~1:15 PM with traffic</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">3</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">UC Berkeley</div>\n                  <div class=\"rs-sub\">Campanile $5 · Sproul Plaza free · Depart 3:00 PM sharp</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">65 min · 28.2 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 3 Fri ~3:30 PM Friday PM traffic</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">4</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Muir Woods National Monument</div>\n                  <div class=\"rs-sub\">✅ Booked · 4:00–4:30 PM parking slot · $15/person · Cathedral Grove 1 mi flat</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">56 min · 18.7 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 3 Fri ~7:00 PM with traffic</div>\n              </div>\n              <div class=\"rs-node overnight\">\n                <span class=\"rs-badge hotel\">🏨</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Hyatt Regency SF</div>\n                  <div class=\"rs-sub\">Return ~7:10 PM · Dinner in North Beach or Fisherman's Wharf</div>\n                </div>\n              </div>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/dir/37.806526,-122.404512/37.810612,-122.47709/37.87131,-122.255275/37.906062,-122.57121/37.786587,-122.403097\" target=\"_blank\" class=\"mab route\">Open Day 2 Route in Google Maps →</a>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Morning — Alcatraz (Depart Hotel 8:35 AM)</div>\n            <ul class=\"tb-list\">\n              <li><strong>Depart hotel 8:35 AM</strong> — Pier 33 Alcatraz Landing is 1.5 miles from the hotel. 45-minute arrival deadline before the 9:20 AM boat.</li>\n              <li>⚠️ <em>No parking at Pier 33.</em> Take rideshare (8 min) or walk 18 min via the Embarcadero along the waterfront.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Alcatraz Island — Audio Tour</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Pier 33 Alcatraz Landing · 9:20 AM departure</span>\n                  <span class=\"sc-stat booked\">✅ Booked · Conf. i77487162</span>\n                  <span class=\"sc-stat\">Return ~12:00 PM · ~2.5 hrs on island</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The cell house audio tour narrated by former guards and prisoners is the core experience — the actual voices describing life inside. Do the full route: cell house, recreation yard, library, D-block (solitary). Plan 2–2.5 hours. The views of the Bay and SF skyline from the island are extraordinary.</p>\n                  <p><strong>Arrive at Pier 33 by 8:35 AM</strong> — 45 min before departure. Boarding closes before departure time. QR code valid for the entire party (on one mobile device). No weapons, no oversized bags. Non-refundable.</p>\n                </div>\n                <div class=\"sc-tip\">Bring: Headphones (app-based audio tour), fully charged phone, backpack max 16\"×20\", closed-toe shoes (the island is uneven). The audio tour app is free — download before leaving the hotel.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.80652,-122.404921\" target=\"_blank\" class=\"mab gmaps\">📍 Pier 33 Alcatraz Landing</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Midday — Fort Point NHS</div>\n            <ul class=\"tb-list\">\n              <li>Return ferry docks ~12:00 PM. Pick up your car and drive to Fort Point — 17 min (4.4 mi verified).</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Fort Point National Historic Site</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">201 Marine Dr, San Francisco, CA 94129</span>\n                  <span class=\"sc-stat free\">Free Admission</span>\n                  <span class=\"sc-stat\">Fri 10:00 AM–5:00 PM</span>\n                  <span class=\"sc-stat\">45–55 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Built 1853–1861 directly beneath the south tower of the Golden Gate Bridge — the only pre-Civil War brick fort on the West Coast. Standing inside the fort looking straight up at the Golden Gate span above is one of the most surreal viewpoints in SF. The fort itself is fascinating: arched brick casemates, cannon placements, the narrow stairwells.</p>\n                  <p>@modicumofjoy captured this view (377,503 plays, 23,170 likes). The angle looking up at the bridge from the fort's top level is the shot.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.810612,-122.47709\" target=\"_blank\" class=\"mab gmaps\">📍 Fort Point NHS</a>\n                </div>\n                <div class=\"sc-tip\">Depart Fort Point by ~1:15 PM sharp to maintain the Berkeley timing. Fort Point closes at 5 PM — you have plenty of time with 45–55 min here.</div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Golden Gate Bridge</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Golden Gate Bridge, San Francisco · East sidewalk open daily</span>\n                  <span class=\"sc-stat free\">Free to walk</span>\n                  <span class=\"sc-stat\">30–45 min · 1.7 mi round trip across bridge</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>One of the great engineering achievements of the 20th century — 4,200 feet of Art Deco suspension span, completed 1937. The east sidewalk is open to pedestrians daily from 5 AM to sunset. Walk out to the first tower (0.5 mi) for the views back to the city and down the Bay. The view from Fort Point directly below the south tower looking straight up at the span is one of the most surreal in SF.</p>\n                  <p>The <strong>Presidio of San Francisco</strong> surrounds the bridge approach — 1,500 acres of former Army post converted to National Park. Coastal trails, beach access, and the historic Main Post. The bridge's south anchorage viewpoint (Battery East) gives the full span composition.</p>\n                </div>\n                <div class=\"sc-tip\">The Golden Gate Bridge toll plaza viewpoint (east side, off Lincoln Blvd) gives the classic full-span photograph for free. No parking needed if you walk from Fort Point.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.819929,-122.478255\" target=\"_blank\" class=\"mab gmaps\">📍 Golden Gate Bridge Pedestrian Entry</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Baker Beach</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Gibson Road, Presidio, San Francisco</span>\n                  <span class=\"sc-stat free\">Free · Presidio National Park</span>\n                  <span class=\"sc-stat\">30–45 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>A mile-long beach at the foot of serpentine cliffs in the Presidio — with the Golden Gate Bridge looming at the north end of the beach. The composition of the bridge seen from beach level with the Marin headlands behind it is one of the classic SF photographs. Large waves and undertow make it unsafe for swimming, but it's superb for walking and photography.</p>\n                  <p>From Fort Point, Baker Beach is a 5-minute drive (1.5 mi) — these three (Fort Point, GGB, Baker Beach) are all within the Presidio and can be combined efficiently in the same morning.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.794327,-122.483655\" target=\"_blank\" class=\"mab gmaps\">📍 Baker Beach</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Presidio of San Francisco</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Arguello Blvd &amp; Moraga Ave, San Francisco (Main Post)</span>\n                  <span class=\"sc-stat free\">Free · National Park Service</span>\n                  <span class=\"sc-stat\">1,491 acres · Former US Army post 1776–1994</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The Presidio is the park that holds Fort Point, Baker Beach, the Golden Gate Bridge south anchorage, and 24 miles of trails. The historic Main Post (old Army HQ, now NPS visitor center) has excellent exhibits on the Presidio's history from Spanish colonial fort to military base. Lucasfilm and the Yoda Fountain are on the grounds. Crissy Field (the restored tidal marsh and airfield) runs along the bay waterfront with views of Alcatraz and the bridge.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.799032,-122.457745\" target=\"_blank\" class=\"mab gmaps\">📍 Presidio Visitor Center</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Afternoon — UC Berkeley</div>\n            <ul class=\"tb-list\">\n              <li>Drive from Fort Point: <strong>48 min (29.9 mi)</strong> — verified Routes API, Fri ~1:15 PM with traffic. Arrive Berkeley ~2:00 PM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">UC Berkeley Campus</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">2200 Piedmont Ave, Berkeley, CA</span>\n                  <span class=\"sc-stat\">Campanile: $5/person</span>\n                  <span class=\"sc-stat\">Sproul Plaza: Free</span>\n                  <span class=\"sc-stat\">~1 hour · Depart 3:00 PM sharp</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>Sather Tower (Campanile)</strong> — $5/person to ride the elevator to the observation deck. 307 feet. Panoramic views of the Bay, SF skyline, and Berkeley hills. Worth the $5. The carillon plays at 7:50 AM, 12:00 PM, and 6:00 PM — if you're here around noon you'll hear it.</p>\n                  <p><strong>Sproul Plaza</strong> — the epicenter of Free Speech Movement history (1964). The steps, the plaza. Walk through, see the energy of the campus. Free.</p>\n                  <p>Bancroft Way and Telegraph Ave: cafes, bookstores, Berkeley street life. Good place for a quick lunch/coffee before the Muir Woods drive.</p>\n                </div>\n                <div class=\"sc-tip\">Leave Berkeley at 3:00 PM sharp. The Muir Woods parking slot is 4:00–4:30 PM and the drive is 65 min with typical Friday afternoon traffic. Missing the slot is a real risk.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.872062,-122.257812\" target=\"_blank\" class=\"mab gmaps\">📍 Sather Tower (Campanile)</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.869461,-122.25929\" target=\"_blank\" class=\"mab gmaps\">📍 Sproul Plaza</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Late Afternoon — Muir Woods (Depart Berkeley 3:00 PM)</div>\n            <ul class=\"tb-list\">\n              <li>Drive: <strong>65 min (28.2 mi)</strong> — verified Routes API, Fri 3:30 PM Friday afternoon traffic. Arrive 4:00–4:15 PM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Muir Woods National Monument</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">✅ Booked · 4:00–4:30 PM parking slot</span>\n                  <span class=\"sc-stat\">$15/person · gomuirwoods.com</span>\n                  <span class=\"sc-stat\">NPS hours: 8 AM–8 PM (May–Sep)</span>\n                  <span class=\"sc-stat\">~2 hours</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Old-growth coast redwoods — the closest ancient redwood grove to SF. Cathedral Grove Trail is 1 mile flat on a boardwalk through trees 250–1,000 years old. The canopy closes overhead and the light shifts. This is the warm-up for the giants you'll see more of on the Big Sur drive.</p>\n                  <p>Parking is required in advance (your slot is confirmed). No cell service inside the park — download the offline NPS map before leaving Berkeley. Auto-theft is common in the parking lot — remove all valuables from the car.</p>\n                </div>\n                <div class=\"sc-tip\">Arrive at your parking slot at 4:00–4:15 PM. You have until closing (8 PM) — roughly 2 hours comfortably. The Cathedral Grove and Bohemian Grove loops are the essential trails. No need to rush.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.906062,-122.57121\" target=\"_blank\" class=\"mab gmaps\">📍 Muir Woods</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Evening — Return to SF</div>\n            <ul class=\"tb-list\">\n              <li>Return drive: <strong>56 min (18.7 mi)</strong> — verified Routes API, Fri ~7:00 PM. Arrive hotel ~7:10 PM.</li>\n              <li>Dinner: North Beach (Broadway + Columbus) or Fisherman's Wharf area. No restaurant confirmed.</li>\n              <li>Pack bags tonight — <strong>Day 3 departure is 8:00 AM sharp.</strong></li>\n            </ul>\n          </div>\n\n          <div class=\"drive-stat\">\n            <span class=\"drive-val\">~3h 46m total driving</span> · Day 2: Depart 8:35 AM · Return ~7:10 PM · All times Routes API verified with traffic\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- ═══════════════════════════════════════════════════════════ -->\n    <!-- DAY 3 — SATURDAY, JULY 4 — ADAM'S 22ND BIRTHDAY 🎂        -->\n    <!-- Bouchon Bakery · Sterling Vineyards · Napa · Birthday Dinner -->\n    <!-- ═══════════════════════════════════════════════════════════ -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd sf\">\n          <div class=\"day-hd-label\">Saturday, July 4, 2026 · 🎂 Adam's 22nd Birthday</div>\n          <div class=\"day-hd-title\">Bouchon Bakery · Sterling Vineyards · Napa · Birthday Dinner</div>\n          <div class=\"day-hd-sub\">Drive total: ~3h 39m verified · Depart hotel 8:00 AM · Waterfront Seafood Grill birthday dinner in Napa</div>\n        </div>\n        <div class=\"day-body\">\n\n          <!-- DAY 3 MAP -->\n          <div class=\"map-section\">\n            <div id=\"map-day3\" class=\"seg-map\"></div>\n            <p class=\"map-caption\">Day 3 route: Hyatt SF → Bouchon Bakery (Yountville) → Sterling Vineyards (Calistoga) → Napa Oxbow Public Market → The Waterfront Seafood Grill (birthday dinner) → return Hyatt SF · ~3h 39m driving</p>\n            <div class=\"route-strip\">\n              <div class=\"rs-node start\">\n                <span class=\"rs-badge home\">🏠</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Hyatt Regency SF</div>\n                  <div class=\"rs-sub\">Depart 8:00 AM sharp · July 4 Saturday</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">61 min · 54.5 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 4 Sat 8:00 AM with traffic</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">1</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Bouchon Bakery, Yountville</div>\n                  <div class=\"rs-sub\">Arrive ~9:01 AM · 45 min takeout · Depart 9:46 AM</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">26 min · 17.0 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 4 Sat ~9:46 AM with traffic</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">2</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Sterling Vineyards, Calistoga</div>\n                  <div class=\"rs-sub\">✅ Booked · 10:45 AM (arrive 10:30 AM) · Conf. TOCK-R-AE87DB44 · $192.53 paid · ~1 hour</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">38 min · 27.5 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 4 Sat ~noon</div>\n              </div>\n              <div class=\"rs-node\">\n                <span class=\"rs-badge\">3</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">Napa Oxbow Public Market</div>\n                  <div class=\"rs-sub\">610 1st St, Napa · Arrive ~12:38 PM · Hog Island Oyster Bar</div>\n                </div>\n              </div>\n              <div class=\"rs-leg\">\n                <div class=\"rs-leg-line\"></div>\n                <div class=\"rs-leg-time\">~74 min · 46.3 mi</div>\n                <div class=\"rs-leg-note\">Routes API · Jul 4 Sat PM — heavy holiday traffic</div>\n              </div>\n              <div class=\"rs-node overnight\">\n                <span class=\"rs-badge hotel\">🎂</span>\n                <div class=\"rs-info\">\n                  <div class=\"rs-name\">The Waterfront Seafood Grill — Birthday Dinner</div>\n                  <div class=\"rs-sub\">720 Main St, Napa · ⚠️ MUST BOOK · (707) 699-2452 · Dinner on the Napa River · Then drive home to SF</div>\n                </div>\n              </div>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/dir/37.786587,-122.403097/38.402434,-122.361784/38.568705,-122.54844/38.301679,-122.281915/37.786587,-122.403097\" target=\"_blank\" class=\"mab route\">Open Day 3 Route in Google Maps →</a>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Morning — Bouchon Bakery, Yountville (Arrive 9:01 AM)</div>\n            <ul class=\"tb-list\">\n              <li><strong>Depart Hyatt 8:00 AM sharp.</strong> Drive 61 min (54.5 mi), verified Routes API Jul 4 Sat 8:00 AM. Arrive Yountville 9:01 AM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Bouchon Bakery — Thomas Keller</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">6528 Washington St, Yountville, CA</span>\n                  <span class=\"sc-stat\">Opens 7:00 AM · Takeout</span>\n                  <span class=\"sc-stat\">45 min · Depart 9:46 AM</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Thomas Keller's casual bakery in Yountville — the town he essentially owns (French Laundry is across the street). This is the birthday breakfast. Croissants that shatter at the touch, TKO (Thomas Keller Oreo) cookies, seasonal pastries. The coffee is excellent. Get what looks good and eat outside on Washington St.</p>\n                </div>\n                <div class=\"sc-tip\">Depart Bouchon at 9:46 AM exactly — Sterling check-in is 10:45 AM and you need to arrive at 10:30 AM (15 min early). The drive is 26 min.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=38.402434,-122.361784\" target=\"_blank\" class=\"mab gmaps\">📍 Bouchon Bakery</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Late Morning — Sterling Vineyards, Calistoga (10:30 AM arrive)</div>\n            <ul class=\"tb-list\">\n              <li>Drive: <strong>26 min (17.0 mi)</strong> — verified Routes API, Jul 4 Sat ~9:46 AM. Arrive ~10:12 AM. 18-minute buffer before check-in.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Sterling Vineyards — The Sterling Stroll</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">✅ Booked · Conf. TOCK-R-AE87DB44</span>\n                  <span class=\"sc-stat booked\">10:45 AM · Arrive by 10:30 AM</span>\n                  <span class=\"sc-stat\">1111 Dunaweal Ln, Calistoga, CA 94515</span>\n                  <span class=\"sc-stat\">$192.53 paid · Visa 9942</span>\n                  <span class=\"sc-stat\">~1 hour · Depart ~11:45 AM</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Sterling sits on a hilltop reached by aerial gondola tram — the gondola ride itself is the signature (@discover_california_, 246K, 109,398 views). The Sterling Stroll is a self-guided walking experience through the winery: six wine stations, stunning Napa Valley panoramas, architecture designed around the hillside site.</p>\n                  <p><strong>Booking:</strong> Sterling Stroll ×2 + Non-taster ×1 + Guest 10–20 ×1. The reservation is for 10:45 AM — arrive at the gondola base by 10:30 AM.</p>\n                  <p>Rules: No outside food or alcohol, no pets (service animals OK), no strong perfume/cologne near the wine. <strong>Gondola pauses if temperature exceeds 100°F.</strong></p>\n                </div>\n                <div class=\"sc-tip\">Manage or reschedule at tock.com (search TOCK-R-AE87DB44). Can reschedule or cancel up to 1 day before. Can transfer to another person.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=38.568705,-122.54844\" target=\"_blank\" class=\"mab gmaps\">📍 Sterling Vineyards</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Midday — Napa City / Oxbow Public Market</div>\n            <ul class=\"tb-list\">\n              <li>Drive from Sterling: <strong>38 min (27.5 mi)</strong> — verified Routes API, Jul 4 Sat ~noon. Arrive Oxbow ~12:38 PM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Oxbow Public Market, Napa</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">610 1st Street, Napa, CA</span>\n                  <span class=\"sc-stat\">Arrive ~12:38 PM</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>Hog Island Oyster Bar</strong> is the anchor — live Pacific oysters from Tomales Bay, raw bar, clam chowder, wine. Perfect post-Sterling stop. The market has multiple vendors: pastries, charcuterie, juice, chocolate. Walk around the market, graze, sit by the Napa River side.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=38.301679,-122.281915\" target=\"_blank\" class=\"mab gmaps\">📍 Oxbow Public Market</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=38.301932,-122.281754\" target=\"_blank\" class=\"mab gmaps\">📍 Hog Island Oyster Bar</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Evening — Birthday Dinner at The Waterfront Seafood Grill</div>\n            <ul class=\"tb-list\">\n              <li>A 5-minute drive (or short walk) from Oxbow Market brings you to the Waterfront Seafood Grill — right on the Napa River. Birthday dinner here, then the ~74 min drive back to SF.</li>\n              <li>After returning to SF (~9–10 PM), July 4 fireworks are visible from the Embarcadero waterfront near the hotel.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">The Waterfront Seafood Grill — Birthday Dinner 🎂</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat pending\">⚠️ NOT BOOKED — Reserve Immediately</span>\n                  <span class=\"sc-stat\">720 Main St, Napa, CA 94559</span>\n                  <span class=\"sc-stat\">Sat 11:30 AM–9:00 PM</span>\n                  <span class=\"sc-stat\">$$ – $$$ · Napa River views</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Sat right on the Napa River with gorgeous waterfront views — one of the few Napa restaurants where you're literally over the water. 4.2★ on TripAdvisor. The food is beautifully presented and precisely cooked; reviewers single out the halibut and the service by name.</p>\n                  <p><strong>Order:</strong> Chilean Sea Bass, Seafood Cioppino, Crab Enchiladas, Linguine with Clams, Lobster Bisque — finish with the Mocha Cake. The cioppino rivals anything in SF's North Beach.</p>\n                  <p><strong>Call (707) 699-2452</strong> to reserve — Saturday evenings book fast, especially around July 4. Note: 18% gratuity automatic for parties of 6+. Corkage $25 if you bring wine from Sterling.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=38.297359,-122.283712\" target=\"_blank\" class=\"mab gmaps\">📍 The Waterfront Seafood Grill</a>\n                </div>\n                <div class=\"sc-tip\">You're already in Napa after Oxbow Market — just a 5-min drive south on Main St. After dinner, the return drive to SF is ~74 min (heavy holiday traffic — leave by 9 PM).</div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"drive-stat\">\n            <span class=\"drive-val\">~3h 39m total driving</span> · Depart 8:00 AM · Return SF evening · All times Routes API verified · Pack bags tonight — depart 7:00 AM tomorrow\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- HOTEL CARD -->\n    <div class=\"section-title\">Overnight — 3 Nights</div>\n    <div class=\"hc\">\n      <div class=\"hc-hd\">\n        <span class=\"badge booked\">✅ Booked · Prepaid · NON-REFUNDABLE</span>\n        <div class=\"hc-name\">Hyatt Regency San Francisco</div>\n        <div class=\"hc-loc\">50 Third St, Union Square · San Francisco, CA 94103</div>\n      </div>\n      <div class=\"hc-body\">\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Conf #</span><span class=\"hc-val\">40023B19345813 · Marina Drapkin · World of Hyatt #*****050M</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Check-in</span><span class=\"hc-val\">Thursday Jul 2 · 3:00 PM</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Check-out</span><span class=\"hc-val\">Sunday Jul 5 · 12:00 PM — depart 7:00 AM, bags with concierge if needed</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Rate</span><span class=\"hc-val\">$157.46 (Jul 2) + $184.92 (Jul 3) + $184.92 (Jul 4) = $527.30 + taxes · NON-REFUNDABLE · full prepayment charged</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Room</span><span class=\"hc-val\">2 Queen Beds · Yerba Buena Park or City View · 55\" SMART TV · Technology Hub</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Amenities</span><span class=\"hc-val\">La Société restaurant · private parking (fee TBD) · fitness center · free WiFi · 24hr desk · ATM · sustainability certified</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Location</span><span class=\"hc-val\">4 min walk BART (Montgomery St) · 7 min walk Union Square · walkable to Chinatown, Piers, Ferry Building · Rating: 8.7 Excellent / Location 9.3/10</span></div>\n        <div class=\"map-actions\" style=\"margin-top:10px;\">\n          <a href=\"https://www.google.com/maps/search/?api=1&query=37.786587,-122.403097\" target=\"_blank\" class=\"mab gmaps\">📍 Hotel on Google Maps</a>\n        </div>\n      </div>\n    </div>\n\n    <!-- FOOD STRIP -->\n    <div class=\"section-title\">Food &amp; Markets — San Francisco Segment</div>\n    <div class=\"food-grid\">\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">Bouchon Bakery</div>\n          <div class=\"fc-loc\">6528 Washington St, Yountville, CA · Day 3 · Birthday Breakfast</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Thomas Keller · Opens 7:00 AM · Takeout · Arrive 9:01 AM</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Croissants (shatter at the touch), TKO cookies (Thomas Keller Oreo), seasonal pastries. Take it to go and eat on Washington St.</div>\n          <div class=\"fc-hours\">45 min stop · Depart by 9:46 AM for Sterling</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=38.402434,-122.361784\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">Hog Island Oyster Bar — Oxbow Market</div>\n          <div class=\"fc-loc\">610 1st St, Napa, CA · Day 3 Midday</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Live Pacific oysters from Tomales Bay · Post-Sterling · Arrive ~12:38 PM</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Raw oysters (Pacific, Sweetwater), clam chowder, wine by the glass. Inside Oxbow Public Market — multiple vendors around them for a full market lunch.</div>\n          <div class=\"fc-hours\">Market atmosphere · Napa River views</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=38.301932,-122.281754\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">The Waterfront Seafood Gr
