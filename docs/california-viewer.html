se on the Sunset Strip — prime cuts, lively atmosphere, and a mechanical bull. The definitive WeHo arrival-night experience. Open since 1999, always buzzing.</p>\n                  <p><strong>Best order:</strong> Prime Ribeye (16 oz) or the Cowboy Cut bone-in. Sides: mac &amp; cheese, truffle fries, creamed spinach. After dinner: ride the mechanical bull — it's required.</p>\n                  <p><strong>Address:</strong> 8371 W Sunset Blvd, West Hollywood, CA 90069</p>\n                  <p><strong>🅿️ Parking:</strong> None needed — walk 0.8 mi from hotel (Santa Monica Blvd north on Hilldale Ave to Sunset). Store luggage in truck before walking over. ~2 hrs at dinner, then check in ~8 PM.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.090,-118.381\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n                </div>\n              </div>\n            </div>\n          </div>\n          <div class=\"drive-stat\">\n            <span class=\"drive-val\">2h 10m · 135.5 mi</span> · Coronado → Ramada Plaza West Hollywood · Routes API verified · Jul 8 Wed · Depart noon\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- DAY 8 -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd la\">\n          <div class=\"day-hd-label\">Thursday, July 9, 2026</div>\n          <div class=\"day-hd-title\">Beverly Hills · Hollywood · Disney Concert Hall</div>\n          <div class=\"day-hd-sub\">Beverly Hills · Hollywood · DTLA · Pizzeria Mozza 7 PM · Own car + parking at each stop</div>\n        </div>\n        <div class=\"day-body\">\n          <div class=\"map-section\">\n            <div id=\"map-day8\" class=\"seg-map\"></div>\n            <p class=\"map-caption\">Day 8: Beverly Hills (Rodeo Drive) → Hollywood (Walk of Fame · Grauman's) → Downtown LA (Disney Concert Hall · Little Tokyo · Chinatown · Grand Central Market)</p>\n            <div class=\"dual-col-nav\">\n              <!-- LEFT: Driving stops (rideshare recommended) -->\n              <div class=\"nav-col drive-col\">\n                <div class=\"nav-col-hd\">🚗 Driving Stops</div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">1</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Beverly Hills / Rodeo Drive</div>\n                    <div class=\"ds-drive\">From hotel · 12 min · 2.2 mi · Routes API verified</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=34.0667,-118.3985\" target=\"_blank\">Public Lot</a> · 9454 Wilshire Blvd · or valet on Rodeo</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">2</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Hollywood</div>\n                    <div class=\"ds-drive\">From Beverly Hills · 14 min · 5.3 mi · Routes API verified</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=34.1021,-118.3270\" target=\"_blank\">Hollywood &amp; Vine Parking Lot</a> · 1721 Vine St</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">3</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Downtown LA</div>\n                    <div class=\"ds-drive\">From Hollywood · 12 min · 7.8 mi · Routes API verified</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=34.0521,-118.2476\" target=\"_blank\">Joe's Auto Parks</a> · 215 S Broadway</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">4</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Pizzeria Mozza — ✅ Dinner 7 PM</div>\n                    <div class=\"ds-drive\">From Downtown LA · 13 min · 6.7 mi · Routes API verified</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=34.0834,-118.3390\" target=\"_blank\">Street parking</a> · N Highland Ave / Clinton St · or lot behind Mozza complex on Melrose</div>\n                  </div>\n                </div>\n                <div class=\"nav-col-action\">\n                  <a class=\"mab route\" href=\"https://www.google.com/maps/dir/8585+Santa+Monica+Blvd,+West+Hollywood,+CA/Rodeo+Drive,+Beverly+Hills,+CA/Hollywood+Walk+of+Fame,+Los+Angeles,+CA/Walt+Disney+Concert+Hall,+Los+Angeles,+CA/Pizzeria+Mozza,+641+N+Highland+Ave,+Los+Angeles,+CA\" target=\"_blank\">Open Day 8 Route in Google Maps 🚗</a>\n                </div>\n              </div>\n              <!-- RIGHT: Walking within each cluster -->\n              <div class=\"nav-col walk-col\">\n                <div class=\"nav-col-hd\">📍 What to See</div>\n                <div class=\"wc-label\">Beverly Hills Cluster</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">1</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Rodeo Drive</div>\n                    <div class=\"ws-from\">Wilshire → Santa Monica · 3 blocks · 0.5 mi strip walk</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 18 min walk · 0.8 mi</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">2</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Beverly Hills Hotel (Pink Palace)</div>\n                    <div class=\"ws-from\">9641 Sunset Blvd · Polo Lounge for a drink</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">Hollywood Cluster</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">3</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Walk of Fame</div>\n                    <div class=\"ws-from\">La Brea → Gower · 15 blocks · 0.8 mi · 20 min</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 5 min walk</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">4</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Grauman's Chinese Theatre</div>\n                    <div class=\"ws-from\">Hand + footprints · free forecourt · 6925 Hollywood Blvd</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">Downtown LA Cluster</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">5</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Walt Disney Concert Hall</div>\n                    <div class=\"ws-from\">111 S Grand Ave · rooftop garden · 0.3 mi · 15 min</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 21 min · 0.9 mi</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">6</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Little Tokyo</div>\n                    <div class=\"ws-from\">Ramen · mochi · Nisei Week district</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 17 min · 0.7 mi</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">7</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Grand Central Market + Chinatown</div>\n                    <div class=\"ws-from\">317 S Broadway · 40+ vendors · open to 10 PM · then Chinatown 27 min 1.2 mi</div>\n                  </div>\n                </div>\n                <div class=\"nav-col-action\">\n                  <a class=\"mab route\" href=\"https://www.google.com/maps/dir/Rodeo+Drive,+Beverly+Hills,+CA/Hollywood+Walk+of+Fame,+Los+Angeles,+CA/Grauman%27s+Chinese+Theatre,+6925+Hollywood+Blvd,+Los+Angeles,+CA/Walt+Disney+Concert+Hall,+Los+Angeles,+CA/Grand+Central+Market,+317+S+Broadway,+Los+Angeles,+CA\" target=\"_blank\">Open Walking Stops 🚶</a>\n                </div>\n              </div>\n            </div>\n          </div>\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Morning — Beverly Hills</div>\n            <ul class=\"tb-list\">\n              <li><strong>Rodeo Drive</strong> (Wilshire Blvd to Santa Monica Blvd) — the 3-block famous luxury shopping street. Free to walk. Flagship stores for everything. The architecture at the north end (the curved two-story retail street) is the classic photo spot.</li>\n              <li><strong>Beverly Hills residential streets</strong> north of Sunset Blvd — massive hedged estates, Rolls Royces in driveways, some of the most expensive real estate in the world on streets designed for meandering.</li>\n              <li><strong>The Beverly Hills Hotel \"The Pink Palace\"</strong> (9641 Sunset Blvd) — the iconic pink and green 1912 hotel. The lobby and Polo Lounge are open to non-guests for drinks/food. The banana leaf wallpaper in the Polo Lounge is instantly recognizable.</li>\n            </ul>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Midday — Hollywood</div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Hollywood Walk of Fame</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Hollywood Blvd · La Brea Ave to Gower St · 15 blocks</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">1 hr walk</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>2,700+ stars embedded in the sidewalk honoring entertainers across film, television, music, radio, and theater. Walk the Hollywood Blvd section between La Brea and Gower for the highest concentration. The stars are organized by category (each has a symbol). Notable locations: Marilyn Monroe's star at 6774 Hollywood Blvd · Michael Jackson's star at 6927 Hollywood Blvd.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.101832,-118.336977\" target=\"_blank\" class=\"mab gmaps\">📍 Hollywood Walk of Fame</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Grauman's Chinese Theatre</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">6925 Hollywood Blvd, Hollywood, CA</span>\n                  <span class=\"sc-stat free\">Free to view forecourt</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The famous forecourt with hand and footprints of over 200 Hollywood celebrities in cement — since 1927. Find the prints of your favorites. The theatre exterior is the grand 1920s Chinese imperial architecture. IMAX screenings inside (optional). The forecourt itself is free to enter and walk.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.102023,-118.340971\" target=\"_blank\" class=\"mab gmaps\">📍 Grauman's Chinese Theatre</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Walt Disney Concert Hall</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">111 S Grand Ave, Downtown LA</span>\n                  <span class=\"sc-stat free\">Free exterior &amp; gardens</span>\n                  <span class=\"sc-stat\">30–45 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Frank Gehry's stainless steel masterpiece (2003) — billowing curves of brushed steel that look different from every angle and in every light. The rooftop garden (accessible free) has a Blue Ribbon Garden and a view of the surrounding downtown. The interior is open for self-guided tours when no performance is scheduled.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.055339,-118.249881\" target=\"_blank\" class=\"mab gmaps\">📍 Walt Disney Concert Hall</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Afternoon — Downtown LA</div>\n            <ul class=\"tb-list\">\n              <li><strong>Little Tokyo</strong> (Downtown, 5 min from Disney Hall) — ramen, udon, Japanese grocery stores, Mikawaya ice cream (mochi originator). One of only three official Japantowns in the United States.</li>\n              <li><strong>LA Chinatown</strong> (Broadway &amp; Hill St, 5 min from Little Tokyo) — red lanterns, ornate buildings, specialty restaurants. Easy walking distance from Little Tokyo — do both in the afternoon.</li>\n              <li><strong>Grand Central Market</strong> (317 S Broadway, Downtown) — 40+ food vendors in a 1917 market hall. Open until 10 PM. Eggslut, Wexler's Deli, Horse Thief BBQ, Sticky Rice — good for a midday snack before dinner.</li>\n            </ul>\n          </div>\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Dinner · Pizzeria Mozza · 7:00 PM ✅ Confirmed</div>\n            <div class=\"stop-card\" style=\"border-color:#1A7A5E;border-width:2px;\">\n              <div class=\"sc-hd\" style=\"background:linear-gradient(135deg,#1A7A5E,#2D9B6E);\">\n                <div class=\"sc-name\" style=\"color:white;\">🍽️ Pizzeria Mozza</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">✅ Confirmed · 7:00 PM</span>\n                  <span class=\"sc-stat\">641 N Highland Ave, Hollywood</span>\n                  <span class=\"sc-stat\">13 min · 6.7 mi from DTLA · Routes API verified</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>What it is:</strong> Nancy Silverton's legendary wood-fired pizzeria — the best pizza in LA by consensus. Dough fermenting since 2007. Mozzarella bar in front, full pizzeria behind. One of the most acclaimed restaurants in the country.</p>\n                  <p><strong>Best order:</strong> Mozza pizza (burrata, squash blossoms, tomato) or fennel sausage &amp; scallion pizza. Start with the mozzarella bar: burrata with bacon &amp; caramelized onions. Finish with the butterscotch budino.</p>\n                  <p><strong>Address:</strong> 641 N Highland Ave, Hollywood, CA 90038</p>\n                  <p><strong>🅿️ Parking:</strong> Street on N Highland Ave or Clinton St · or lot behind the Mozza complex on Melrose Ave (enter from Melrose). Arrive 10 min early. Return to hotel: 8 min · 2.9 mi.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.083,-118.338\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n                </div>\n              </div>\n            </div>\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- DAY 9 -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd la\">\n          <div class=\"day-hd-label\">Friday, July 10, 2026</div>\n          <div class=\"day-hd-title\">Griffith Observatory · Santa Monica · Venice · Abbot Kinney</div>\n          <div class=\"day-hd-sub\">Griffith Hills · Santa Monica Pier · Venice Boardwalk · Felix Trattoria 7 PM</div>\n        </div>\n        <div class=\"day-body\">\n          <div class=\"map-section\">\n            <div id=\"map-day9\" class=\"seg-map\"></div>\n            <p class=\"map-caption\">Day 9: Griffith Observatory (Hollywood Sign views) → Santa Monica Pier → Venice Boardwalk + Canals → Abbot Kinney Blvd</p>\n            <div class=\"dual-col-nav\">\n              <!-- LEFT: Driving/Rideshare stops -->\n              <div class=\"nav-col drive-col\">\n                <div class=\"nav-col-hd\">🚗 Driving Stops</div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">1</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Griffith Observatory Area</div>\n                    <div class=\"ds-drive\">From hotel · 33 min · 8.2 mi · Routes API verified · arrive by 10 AM · parking fills by noon</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=34.1210,-118.2965\" target=\"_blank\">Greek Theater Parking F</a> · 2700 N Vermont Ave</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">2</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Santa Monica → Venice</div>\n                    <div class=\"ds-drive\">From Griffith · 31 min · 23.8 mi · Routes API verified</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=33.9857,-118.4691\" target=\"_blank\">Venice Beach Lot</a> · N Venice Blvd · $5–8/hr</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">3</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Felix Trattoria — ✅ Dinner 7 PM</div>\n                    <div class=\"ds-drive\">From Venice Boardwalk · 3 min walk or 14 min drive · 1023 Abbot Kinney Blvd</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=33.9925,-118.4651\" target=\"_blank\">Street parking</a> · Abbot Kinney Blvd & adjacent side streets · arrive 15 min early</div>\n                  </div>\n                </div>\n                <div class=\"nav-col-action\">\n                  <a class=\"mab route\" href=\"https://www.google.com/maps/dir/8585+Santa+Monica+Blvd,+West+Hollywood,+CA/Griffith+Observatory,+Los+Angeles,+CA/Santa+Monica+Pier,+Santa+Monica,+CA/Venice+Beach+Boardwalk,+Los+Angeles,+CA/Felix+Trattoria,+1023+Abbot+Kinney+Blvd,+Venice,+CA\" target=\"_blank\">Open Day 9 Route in Google Maps 🚗</a>\n                </div>\n              </div>\n              <!-- RIGHT: Walking clusters -->\n              <div class=\"nav-col walk-col\">\n                <div class=\"nav-col-hd\">📍 What to See</div>\n                <div class=\"wc-label\">Griffith Hills</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">1</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Griffith Observatory</div>\n                    <div class=\"ws-from\">Opens 10 AM · grounds + viewpoints · 0.3 mi · 20 min</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ optional: Mt. Hollywood Trail 2.5 mi RT · 1.5 hrs</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">2</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Hollywood Sign Viewpoint</div>\n                    <div class=\"ws-from\">Best view from Observatory lawn · no hiking required</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">Santa Monica + Venice</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">3</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Santa Monica Pier</div>\n                    <div class=\"ws-from\">End of Route 66 · Pacific Park ferris wheel · 30 min</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 44 min beach path · 2.0 mi south</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">4</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Venice Boardwalk</div>\n                    <div class=\"ws-from\">Muscle Beach · street performers · skate park</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 3 blocks east</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">5</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Venice Canals</div>\n                    <div class=\"ws-from\">Dell Ave · 30–45 min · century-old canal network</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 8 min walk</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">6</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Abbot Kinney Blvd</div>\n                    <div class=\"ws-from\">Independent shops · Intelligentsia Coffee · \"Coolest block in America\"</div>\n                  </div>\n                </div>\n                <div class=\"nav-col-action\">\n                  <a class=\"mab route\" href=\"https://www.google.com/maps/dir/Santa+Monica+Pier,+Santa+Monica,+CA/Venice+Beach+Boardwalk,+Los+Angeles,+CA/Venice+Canals+Walkway,+Los+Angeles,+CA/Abbot+Kinney+Blvd,+Venice,+Los+Angeles,+CA\" target=\"_blank\">Open Walking Route 🚶</a>\n                </div>\n              </div>\n            </div>\n          </div>\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Morning — Griffith Observatory</div>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Griffith Observatory</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">2800 E Observatory Rd, Los Angeles</span>\n                  <span class=\"sc-stat free\">Free Admission</span>\n                  <span class=\"sc-stat\">Opens 10:00 AM weekdays</span>\n                  <span class=\"sc-stat\">Planetarium shows: $10/adult</span>\n                  <span class=\"sc-stat\">1.5–2 hrs</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The city's greatest view point — the 1935 Art Deco observatory on the southern slope of Mount Hollywood with a 360° panorama of the LA basin, the Hollywood Hills, and the Pacific on clear days. The Hollywood Sign is visible from the front lawn looking northwest (this is the most accessible good angle on the sign).</p>\n                  <p>Inside: the Zeiss telescope in the dome (public viewing nights), the Tesla coil, the Foucault pendulum, the triple beam coelostat. Planetarium shows are ticketed ($10/adult) and worth it for the laser show at night — but the building itself is free.</p>\n                  <p>@thisblisslife: \"Sunset = best views. Arrive early.\" — the observatory is at its most dramatic at sunset when the city lights below match the darkening sky. If energy allows, return for the evening.</p>\n                </div>\n                <div class=\"sc-tip\">Drive up or take the DASH Griffith Park shuttle from Vermont/Sunset (free). Parking is limited and fills by noon on weekdays. The Mt. Hollywood Trail (2.5 mi round trip, easy) starts from the observatory and goes to the summit for an even higher view.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.118434,-118.300393\" target=\"_blank\" class=\"mab gmaps\">📍 Griffith Observatory</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Hollywood Sign</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Best viewed from Griffith Observatory lawn or Lake Hollywood Park</span>\n                  <span class=\"sc-stat free\">Free · No access to the sign itself (restricted property)</span>\n                  <span class=\"sc-stat\">Best viewing: Griffith Observatory front lawn · 10 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The 450-foot white letter sign on Mount Lee — each letter 45 feet high, the global symbol of Hollywood glamour since 1923. The sign sits on restricted property and cannot be approached, but several viewpoints provide excellent photo opportunities: (1) <strong>Griffith Observatory front lawn</strong> — the most accessible and widely used view, looking northwest from the plaza; (2) <strong>Lake Hollywood Park</strong> (3204 Canyon Lake Dr) — the classic direct-on view that puts the sign front and center; (3) <strong>Hollywood &amp; Highland</strong> — framed view through the Babylon Court arch, easy and central.</p>\n                </div>\n                <div class=\"sc-tip\">The Observatory lawn gives you the sign AND the city panorama in one stop — do both together. Lake Hollywood Park (10 min drive from the Observatory) has the most direct, unobstructed sign view if you want the classic photo.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.134115,-118.321548\" target=\"_blank\" class=\"mab gmaps\">📍 Hollywood Sign (Mount Lee)</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.128037,-118.330792\" target=\"_blank\" class=\"mab gmaps\">📍 Lake Hollywood Park</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Griffith Park</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">4730 Crystal Springs Dr, Los Angeles</span>\n                  <span class=\"sc-stat free\">Free · Largest municipal urban wilderness park in the US</span>\n                  <span class=\"sc-stat\">4,107 acres · Trails, merry-go-round, pony rides, zoo adjacent</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The park that contains the Observatory, the Hollywood Sign approach trails, the LA Zoo, Travel Town Museum, and the Autry Museum of the American West. 4,107 acres of natural terrain — the largest municipal park and urban wilderness area in the United States. The park itself has multiple family-friendly features beyond the Observatory: the Griffith Park Merry-Go-Round (vintage 1926, $3/ride), Pony Rides (weekends), and 53 miles of hiking and horse trails. The Charlie Turner Trailhead near the Observatory gives access to the Brush Canyon Trail (leads to the Hollywood Sign base ridge).</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.136559,-118.294258\" target=\"_blank\" class=\"mab gmaps\">📍 Griffith Park Main Entrance</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Afternoon — Santa Monica · Venice · Abbot Kinney</div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Santa Monica Pier</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">200 Santa Monica Pier, Santa Monica, CA</span>\n                  <span class=\"sc-stat free\">Free to walk · Pacific Park rides separate</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The western terminus of Route 66 — a sign at the end of the pier marks it. Pacific Park's Ferris wheel and rollercoaster are on the pier (tickets optional). 3rd Street Promenade is 2 blocks east — outdoor pedestrian mall with restaurants, performers, shops.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.008288,-118.498724\" target=\"_blank\" class=\"mab gmaps\">📍 Santa Monica Pier</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Venice Boardwalk + Abbot Kinney</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Ocean Front Walk · Venice, CA</span>\n                  <span class=\"sc-stat\">5–10 min from Santa Monica Pier</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">1–2 hrs</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>Venice Boardwalk</strong> — Muscle Beach outdoor gym, street performers, roller skaters, fortune tellers, artists, vendors. Chaotic, colorful, uniquely LA. Walk south from the Santa Monica border.</p>\n                  <p><strong>Abbot Kinney Blvd</strong> (3–5 min from boardwalk) — Venice's coolest street. Independent boutiques, coffee roasters (Intelligentsia Venice), bookstores, galleries, farm-to-table restaurants. Named \"coolest block in America\" by GQ. No chains.</p>\n                  <p>@mini.jetsetter (291K, 23,338 views): \"LOS ANGELES WITH KIDS GUIDE\"</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=33.990925,-118.477444\" target=\"_blank\" class=\"mab gmaps\">📍 Venice Boardwalk</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=33.989004,-118.462658\" target=\"_blank\" class=\"mab gmaps\">📍 Abbot Kinney Blvd</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Venice Canals Walkway</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Dell Ave &amp; Eastern Canal, Venice, CA (3 blocks from boardwalk)</span>\n                  <span class=\"sc-stat free\">Free · Public walkway</span>\n                  <span class=\"sc-stat\">30–45 min · 1 mi of waterside paths</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The century-old canal network just 3 blocks from the Venice Boardwalk — a completely different world from the busy waterfront. Six canals lined with historic houses, arched bridges, wooden rowboats, and ducks. Built in 1905 by Abbot Kinney to recreate the ambiance of Venice, Italy. The residential canals are quiet, photogenic, and feel like a hidden village tucked inside the city. Linnie Canal Park has a small playground for kids.</p>\n                  <p>TripAdvisor rates it 4.4 with 2,000+ reviews. The contrast between the chaos of the boardwalk and the quiet of the canals makes this one of the most surprising experiences in LA.</p>\n                </div>\n                <div class=\"sc-tip\">From Abbot Kinney Blvd, walk 2 blocks west on Venice Blvd to reach the canals — it's an easy add-on to the boardwalk visit with no driving required.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=33.987042,-118.467726\" target=\"_blank\" class=\"mab gmaps\">📍 Venice Canals</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Dinner · Felix Trattoria · 7:00 PM ✅ Confirmed</div>\n            <div class=\"stop-card\" style=\"border-color:#1A7A5E;border-width:2px;\">\n              <div class=\"sc-hd\" style=\"background:linear-gradient(135deg,#1A7A5E,#2D9B6E);\">\n                <div class=\"sc-name\" style=\"color:white;\">🍽️ Felix Trattoria</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">✅ Confirmed · 7:00 PM</span>\n                  <span class=\"sc-stat\">1023 Abbot Kinney Blvd, Venice</span>\n                  <span class=\"sc-stat\">3 min walk from Venice Boardwalk</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>What it is:</strong> Venice's best Italian — hand-rolled pasta, wood-fired dishes, exceptional natural wine list. One of the most respected restaurants in LA. Intimate, serious, deeply good.</p>\n                  <p><strong>Best order:</strong> The rigatoni bolognese or pappardelle (order whatever housemade pasta is on tonight). Burrata to start. Focaccia. The pasta tasting menu if available. Natural wine list is outstanding — ask the server.</p>\n                  <p><strong>Address:</strong> 1023 Abbot Kinney Blvd, Venice, CA 90291</p>\n                  <p><strong>🅿️ Parking:</strong> Street parking on Abbot Kinney Blvd or adjacent side streets (Dell Ave, California Ave) — arrive 15 min early. Return to hotel: 25 min · 12.8 mi.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=33.993,-118.465\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n                </div>\n              </div>\n            </div>\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- DAY 10 -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd la\">\n          <div class=\"day-hd-label\">Saturday, July 11, 2026 — Last Full Day</div>\n          <div class=\"day-hd-title\">Farmers Market · Malibu Coast · Getty Center · Malibu Farm</div>\n          <div class=\"day-hd-sub\">8 AM Farmers Market → Malibu coast → Getty 3 PM → Malibu Farm 6:30 PM · Pack tonight · depart hotel by 9:00 AM tomorrow</div>\n        </div>\n        <div class=\"day-body\">\n          <div class=\"map-section\">\n            <div id=\"map-day10\" class=\"seg-map\"></div>\n            <p class=\"map-caption\">Day 10: Santa Monica Farmers Market (8 AM) → Point Dume / Malibu Coast (31 min, 20.1 mi) → Getty Center 3 PM (43 min, 30.0 mi) → Malibu Farm 6:30 PM (34 min, 21.0 mi)</p>\n            <div class=\"dual-col-nav\">\n              <!-- LEFT: Driving/Rideshare stops -->\n              <div class=\"nav-col drive-col\">\n                <div class=\"nav-col-hd\">🚗 Driving Route</div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">1</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Santa Monica Farmers Market</div>\n                    <div class=\"ds-drive\">From hotel · 30 min · 11.5 mi · Routes API verified · arrive by 8 AM</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=34.0141,-118.4974\" target=\"_blank\">SP+ Parking</a> · 1401 Ocean Ave, Santa Monica</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">2</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Point Dume / Malibu Coast</div>\n                    <div class=\"ds-drive\">From Farmers Market · 31 min · 20.1 mi · Routes API verified · north on PCH</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=34.003,-118.805\" target=\"_blank\">Point Dume State Beach</a> · Westward Beach Rd · $10–15/day</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">3</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Getty Center — ⚠️ Book 3 PM Timed Entry</div>\n                    <div class=\"ds-drive\">From Point Dume · 43 min · 30.0 mi · Routes API verified · arrive by 3 PM</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=34.0878,-118.4757\" target=\"_blank\">Getty Center Parking Structure</a> · 1200 Getty Center Dr · $20/car</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">4</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Malibu Farm Restaurant — ✅ Dinner 6:30 PM</div>\n                    <div class=\"ds-drive\">From Getty Center · 34 min · 21.0 mi · Routes API verified · PCH south to Malibu Pier</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=34.036,-118.681\" target=\"_blank\">Malibu Pier Parking Lot</a> · 23000 PCH · $3–5/hr · pull in directly off PCH</div>\n                  </div>\n                </div>\n                <div class=\"nav-col-action\">\n                  <a class=\"mab route\" href=\"https://www.google.com/maps/dir/8585+Santa+Monica+Blvd,+West+Hollywood,+CA/Santa+Monica+Farmers+Market,+Arizona+Ave+%26+2nd+St,+Santa+Monica,+CA/Point+Dume+State+Beach,+Malibu,+CA/Getty+Center,+1200+Getty+Center+Dr,+Los+Angeles,+CA/Malibu+Farm+Restaurant,+23000+Pacific+Coast+Hwy,+Malibu,+CA\" target=\"_blank\">Open Day 10 Route in Google Maps 🚗</a>\n                </div>\n              </div>\n              <!-- RIGHT: Stops -->\n              <div class=\"nav-col walk-col\">\n                <div class=\"nav-col-hd\">📍 What to See</div>\n                <div class=\"wc-label\">Santa Monica — 8 AM</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">1</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Arizona Ave & 3rd St Market</div>\n                    <div class=\"ws-from\">Sat 8 AM–1 PM · produce · pastries · celebrity chef browse · 0.4 mi stroll</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">Malibu — 10 AM to 2 PM</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">2</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Point Dume State Beach</div>\n                    <div class=\"ws-from\">Westward Beach Rd · dramatic bluff trail · Zuma Beach adjacent</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ few mi north on PCH</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">3</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">El Matador State Beach</div>\n                    <div class=\"ws-from\">Sea stacks & caves · most dramatic beach in LA · sunrise / afternoon light</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">Getty — 3 PM timed entry</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">4</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Getty Tram + Central Garden</div>\n                    <div class=\"ws-from\">Free tram · 0.8 mi campus · Impressionists · panoramic city view · 1.5–2 hrs</div>\n                  </div>\n                </div>\n                <div class=\"nav-col-action\">\n                  <a class=\"mab route\" href=\"https://www.google.com/maps/dir/Santa+Monica+Farmers+Market,+Arizona+Ave+%26+2nd+St,+Santa+Monica,+CA/Point+Dume+State+Beach,+Malibu,+CA/Getty+Center,+1200+Getty+Center+Dr,+Los+Angeles,+CA/Malibu+Farm+Restaurant,+23000+Pacific+Coast+Hwy,+Malibu,+CA\" target=\"_blank\">Open Day 10 Stops 🗺️</a>\n                </div>\n              </div>\n            </div>\n          </div>\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Morning — Santa Monica Farmers Market (8 AM–1 PM)</div>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Santa Monica Farmers Market</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">✅ Works — Saturday only</span>\n                  <span class=\"sc-stat\">Arizona Ave &amp; 3rd St, Santa Monica</span>\n                  <span class=\"sc-stat\">Sat 8:00 AM–1:00 PM · Year-round</span>\n                  <span class=\"sc-stat\">~$30–50 family</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Founded 1991 — one of California's most celebrated certified farmers markets. 40+ organic farm stands, fresh produce, flowers, honey, artisan goods. The Wednesday version is larger but Saturday works for this trip. Top LA chefs shop here Saturday morning. Walk the whole market, get produce for snacks, buy honey, watch the farmers interact with chefs.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.01661,-118.498872\" target=\"_blank\" class=\"mab gmaps\">📍 Santa Monica Farmers Market</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Morning — Malibu Coast (10 AM–2 PM)</div>\n            <ul class=\"tb-list\">\n              <li><strong>Point Dume State Beach</strong> (Westward Beach Rd, Malibu) — dramatic 200-ft bluff jutting into the Pacific. Short bluff trail loops the headland with views of Santa Monica Bay, Catalina Island, and migrating gray whales (Dec–Apr). Zuma Beach is directly adjacent for sand time. $10–15 parking at Westward Beach lot.</li>\n              <li><strong>El Matador State Beach</strong> (32215 PCH, Malibu) — the most dramatic beach in the LA area. Sea stacks, sea caves, and rock arches rise directly from the sand. Small, parking-limited, reached by a short cliff staircase. Go early in the day for the best light and fewer crowds. Free to visit, $8 parking lot.</li>\n              <li>These beaches are the best coastal scenery in the entire LA area — far better than Santa Monica or Venice. Morning light on the sea stacks is extraordinary.</li>\n            </ul>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Afternoon — Getty Center · 3:00 PM Timed Entry ⚠️ Book Now</div>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Getty Center</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat pending\">⚠️ Timed Entry Required — Book at getty.edu</span>\n                  <span class=\"sc-stat\">1200 Getty Center Dr, Los Angeles</span>\n                  <span class=\"sc-stat free\">Free Admission · $20 Parking</span>\n                  <span class=\"sc-stat\">2–3 hrs · 43 min from Point Dume · Routes API verified</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Richard Meier's travertine hilltop campus (1997) with world-class collections of Impressionist paintings, decorative arts, illuminated manuscripts, and photography. The Central Garden (designed by Robert Irwin) and the north overlook terrace give 270° panoramas of the LA basin, the ocean, and the Santa Monica Mountains. Free admission — book timed entry at getty.edu well in advance. Summer Saturday slots fill weeks out.</p>\n                  <p>From Point Dume: 43 min · 30.0 mi via PCH east → I-405 → Getty Center Dr. Arrive by 3 PM for timed entry. Allow 1.5–2 hrs minimum. Leave by 5:30 PM to reach Malibu Farm for 6:30 PM dinner.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.078,-118.474\" target=\"_blank\" class=\"mab gmaps\">📍 Getty Center</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Dinner · Malibu Farm Restaurant · 6:30 PM ✅ Confirmed</div>\n            <div class=\"stop-card\" style=\"border-color:#1A7A5E;border-width:2px;\">\n              <div class=\"sc-hd\" style=\"background:linear-gradient(135deg,#1A7A5E,#2D9B6E);\">\n                <div class=\"sc-name\" style=\"color:white;\">🍽️ Malibu Farm Restaurant</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">✅ Confirmed · 6:30 PM</span>\n                  <span class=\"sc-stat\">23000 PCH, Malibu Pier</span>\n                  <span class=\"sc-stat\">34 min · 21.0 mi from Getty Center · Routes API verified</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>What it is:</strong> Farm-to-table California cuisine on the historic Malibu Pier — tables suspended above the Pacific. One of the most scenic dinner settings on the entire California coast. Last meal of the trip.</p>\n                  <p><strong>Best order:</strong> Fresh catch of the day (always local, always seasonal). Fish tacos. Farm salads from the Malibu garden. The Malibu burger for the table. Rosé at sunset on the pier.</p>\n                  <p><strong>Address:</strong> 23000 Pacific Coast Hwy (Malibu Pier), Malibu, CA 90265</p>\n                  <p><strong>🅿️ Parking:</strong> Malibu Pier parking lot — pull directly off PCH into the lot · $3–5/hr · walk the pier to the restaurant. Return to hotel: 35 min · 22.5 mi. Pack tonight — leave by 9:00 AM tomorrow for LAX.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.036,-118.681\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n                </div>\n              </div>\n            </div>\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- HOTEL CARD (CONFIRMED) -->\n    <div class=\"section-title\">Overnight — Los Angeles Hotel (Confirmed)</div>\n    <div class=\"hc\" style=\"border-color:#48BB78;\">\n      <div class=\"hc-hd\" style=\"background:linear-gradient(135deg,#F0FFF4,#FAFFF8);\">\n        <span class=\"badge booked\">✅ Confirmed</span>\n        <div class=\"hc-name\">Ramada Plaza by Wyndham West Hollywood lass=\"dep-row\"><strong>Order:</strong> Double-Double Animal Style (mustard grilled into patty, secret spread, pickles, grilled caramelized onions). Fries well-done or Animal Style. \"Animal Style\" is not on the menu board — ask by name.</div>\n      <div class=\"dep-row\"><strong>Marina &amp; Liam:</strong> AA 3319 · 12:17 PM → PHL 8:39 PM · Seats 28F &amp; 28E · Conf. KYUXME · American Airlines Terminal 4</div>\n      <div class=\"dep-row\"><strong>Adam &amp; Vadim:</strong> Drop Marina &amp; Liam at Terminal 4, then drive home.</div>\n      <div class=\"dep-note\">Drive time from Ramada Plaza West Hollywood to LAX: <strong>40 min · 15.0 mi</strong> · Routes API verified. The 405 to LAX interchange can be very slow on Sunday morning. Leave by 9:00 AM at the absolute latest.</div>\n      <div class=\"map-actions\" style=\"margin-top:14px;\">\n        <a href=\"https://www.google.com/maps/search/?api=1&query=33.953707,-118.396784\" target=\"_blank\" class=\"mab gmaps\">📍 In-N-Out Burger LAX</a>\n        <a href=\"https://www.google.com/maps/search/?api=1&query=33.941923,-118.40696\" target=\"_blank\" class=\"mab gmaps\">📍 LAX Terminal 4</a>\n      </div>\n    </div>\n\n    <!-- FOOD STRIP -->\n    <div class=\"section-title\">Food &amp; Markets — Los Angeles</div>\n    <div class=\"food-grid\">\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">In-N-Out Burger — Final Meal</div>\n          <div class=\"fc-loc\">9149 S Sepulveda Blvd (across from LAX entrance) · Departure Day Jul 12</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">California institution · Departure morning · Last California food</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Double-Double Animal Style — mustard grilled into the patty, secret spread, pickles, and grilled caramelized onions. Fries: well-done (extra crispy) or Animal Style (cheese sauce, spread, grilled onions). Animal Style is not on the board — ask by name.</div>\n          <div class=\"fc-hours\">Open early AM · Drive-through + dine-in · ~0.2 mi from LAX terminals</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=33.953641,-118.39678\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">Santa Monica Farmers Market</div>\n          <div class=\"fc-loc\">Arizona Ave &amp; 3rd St, Santa Monica · Sat Jul 11 · 8 AM–1 PM</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Since 1991 · 40+ certified organic farms · Rain or shine · Year-round</div>\n          <div class=\"fc-order\"><strong>Browse:</strong> Stone fruits, berries, specialty vegetables, local honey, cut flowers, artisan goods. No specific order — walk the whole market and buy what looks extraordinary. Top LA chefs are here Saturday AM.</div>\n          <div class=\"fc-hours\">$30–50 for a full family browse · Walk 3rd Street Promenade after</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=34.01685,-118.497684\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">Grand Central Market</div>\n          <div class=\"fc-loc\">317 S Broadway, Downtown LA · Any Day · Open till 10 PM</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Since 1917 · 40+ vendors · Best casual food variety in DTLA</div>\n          <div class=\"fc-order\"><strong>Highlights:</strong> Eggslut (egg sandwiches, always a line), Wexler's Deli (NYC-style Jewish deli with LA sensibility), Horse Thief BBQ, DTLA Cheese, Sticky Rice. Go for lunch or an early dinner with the group.</div>\n          <div class=\"fc-hours\">Open late · Near Disney Concert Hall · After the Hollywood day</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=34.050872,-118.249055\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\" style=\"border-color:#0B4F6C;border-width:2px;\">\n        <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#0B4F6C,#1B7A9E);\">\n          <div class=\"fc-name\">Quality Seafood — Redondo Beach Pier</div>\n          <div class=\"fc-loc\">130 International Boardwalk, Redondo Beach · Early AM Option</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Multi-level pier fish market · Live tanks · Eat on the pier</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Red sea urchin (local), live blue crab, rock cod, lobster — buy at the market and eat right on the pier boards with the ocean below. One of the most authentic seafood experiences in the LA area.</div>\n          <div class=\"fc-hours\">Early AM solo option for Adam or Vadim · ~30 min from most LA hotels · $40–60 solo outing · (310) 372-6408 · 130 International Boardwalk, Redondo Beach · 30 min from most LA hotels</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=33.848798,-118.397675\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n    </div>\n\n    <!-- ALERTS -->\n    <div class=\"section-title\">Alerts &amp; Action Items</div>\n    <div class=\"alerts-grid\">\n      <div class=\"ac grn\">\n        <div class=\"ac-icon\">✅</div>\n        <div class=\"ac-title\">LA Hotel — Confirmed</div>\n        <div class=\"ac-text\">Ramada Plaza by Wyndham West Hollywood · 8585 Santa Monica Blvd · Jul 8–12 · 4 nights · Check-in 7 PM Jul 8 approved · Conf #6392981504</div>\n      </div>\n      <div class=\"ac amb\">\n        <div class=\"ac-icon\">⚠️</div>\n        <div class=\"ac-title\">Getty Center — Book 3 PM Timed Entry for Jul 11</div>\n        <div class=\"ac-text\">getty.edu · Free admission but timed entry required · Jul 11 (Sat) · 3 PM target · Summer Saturday slots fill weeks out — book immediately · $20 parking structure · 43 min from Point Dume · 34 min to Malibu Farm after</div>\n      </div>\n      <div class=\"ac grn\">\n        <div class=\"ac-icon\">🍽️</div>\n        <div class=\"ac-title\">LA Dinners — All 4 Confirmed ✅</div>\n        <div class=\"ac-text\">Day 7 Jul 8: Saddle Ranch 6 PM ✅ · Day 8 Jul 9: Pizzeria Mozza 7 PM ✅ · Day 9 Jul 10: Felix Trattoria 7 PM ✅ · Day 10 Jul 11: Malibu Farm 6:30 PM ✅ · Full details + parking in each day's Dinner section below</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">ℹ️</div>\n        <div class=\"ac-title\">LAX Departure — Leave Hotel by 9:00 AM Jul 12</div>\n        <div class=\"ac-text\">AA 3319 departs 12:17 PM. Check-in closes 45 min before. LAX traffic on Sunday AM is real. In-N-Out is 0.2 mi from the terminals — eat there before drop-off. Terminal 4 for American Airlines.</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">🚗</div>\n        <div class=\"ac-title\">LA Driving — Own Car All Days</div>\n        <div class=\"ac-text\">Drive your own car every day — parking spots are confirmed in each day's driving stops. Day 8: Beverly Hills lot ($) · Hollywood &amp; Vine lot · Joe's Auto Parks DTLA · Mozza street. Day 9: Greek Theater Lot F · Venice Beach Lot · Abbot Kinney street. Day 10: SP+ Ocean Ave · Point Dume lot · Getty structure ($20) · Malibu Pier lot.</div>\n      </div>\n    </div>\n\n    <!-- SOCIAL INTEL -->\n    <div class=\"section-title\">Social Intelligence</div>\n    <div class=\"si-grid\">\n      <div class=\"si-card\">\n        <div class=\"si-quote\">\"Sunset = best views at Griffith. Arrive early before the crowds.\"</div>\n        <div class=\"si-source\">@thisblisslife · 4K followers · 319 views</div>\n        <div class=\"si-location\">Griffith Observatory, Los Angeles</div>\n      </div>\n      <div class=\"si-card\">\n :</strong> Clam chowder, whole Dungeness crab, fresh swordfish, fish &amp; chips. Harbor views. Arrive early — waits run 30–45 min on summer evenings.</div>\n            <div class=\"fc-hours\">Daily 11 AM–10 PM · 2 min / 0.4 mi from Beachside Inn (Routes API) · Walk-in only</div>\n            <a href=\"https://www.google.com/maps/search/?api=1&query=34.408,-119.685\" target=\"_blank\" class=\"gmap-link food\">📍 Maps</a>\n          </div>\n        </div>\n        <div class=\"fc\" style=\"border-color:#1A7A5E;border-width:2px\">\n          <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#553C9A,#4A2D8A)\">\n            <div class=\"fc-name\">Bali Hai Restaurant</div>\n            <div class=\"fc-loc\">2230 Shelter Island Dr, San Diego · Day 6 · Jul 7 · Dinner</div>\n          </div>\n          <div class=\"fc-body\">\n            <div class=\"fc-rating\">SD tiki landmark since 1955 · Mission Bay views · (619) 222-1181</div>\n            <div class=\"fc-order\"><strong>Order:</strong> Macadamia-crusted mahi mahi, Polynesian-style seafood, Mai Tais. Indoor-outdoor dining with bay views.</div>\n            <div class=\"fc-hours\">Daily · 22 min / 11.6 mi from Best Western Coronado (Routes API) · Reservations recommended</div>\n            <a href=\"https://www.google.com/maps/search/?api=1&query=32.718,-117.222\" target=\"_blank\" class=\"gmap-link food\">📍 Maps</a>\n          </div>\n        </div>\n        <div class=\"fc\" style=\"border-color:#1A7A5E;border-width:2px\">\n          <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#5C3A1E,#92400E)\">\n            <div class=\"fc-name\">Saddle Ranch Chop House</div>\n            <div class=\"fc-loc\">8371 W Sunset Blvd, West Hollywood · Day 7 · Jul 8 · Arrival Night</div>\n          </div>\n          <div class=\"fc-body\">\n            <div class=\"fc-rating\">WeHo Hollywood staple · Steakhouse + lively Sunset Strip · (323) 656-2007</div>\n            <div class=\"fc-order\"><strong>Order:</strong> Steaks, burgers, loaded appetizers. High-energy arrival-night spot on the Strip. Mechanical bull. Great family vibe after a long travel day.</div>\n            <div class=\"fc-hours\">Daily · 6 min / 0.8 mi from hotel (Routes API) · Reserve on OpenTable</div>\n            <a href=\"https://www.google.com/maps/search/?api=1&query=8371+W+Sunset+Blvd+West+Hollywood+CA\" target=\"_blank\" class=\"gmap-link food\">📍 Maps</a>\n          </div>\n        </div>\n        <div class=\"fc\" style=\"border-color:#1A7A5E;border-width:2px\">\n          <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#C05621,#92400E)\">\n            <div class=\"fc-name\">Pizzeria Mozza</div>\n            <div class=\"fc-loc\">641 N Highland Ave, Hollywood · Day 8 · Jul 9 · Dinner</div>\n          </div>\n          <div class=\"fc-body\">\n            <div class=\"fc-rating\">Nancy Silverton · Michelin Bib Gourmand · Best pizza in LA · (323) 297-0101</div>\n            <div class=\"fc-order\"><strong>Order:</strong> Squash blossom + burrata pizza, fennel sausage pizza, fresh pasta. Wood-fired Neapolitan-style. Butterscotch budino for dessert.</div>\n            <div class=\"fc-hours\">Daily 5–10 PM (Fri–Sun from 11:30 AM) · 21 min / 6.7 mi from Grand Central Market (Routes API) · Reserve OpenTable 1–2 weeks ahead</div>\n            <a href=\"https://www.google.com/maps/search/?api=1&query=641+N+Highland+Ave+Hollywood+CA\" target=\"_blank\" class=\"gmap-link food\">📍 Maps</a>\n          </div>\n        </div>\n        <div class=\"fc\" style=\"border-color:#1A7A5E;border-width:2px\">\n          <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#1A3D2B,#3A6B4A)\">\n            <div class=\"fc-name\">Felix Trattoria</div>\n            <div class=\"fc-loc\">1023 Abbot Kinney Blvd, Venice · Day 9 · Jul 10 · Dinner</div>\n          </div>\n          <div class=\"fc-body\">\n            <div class=\"fc-rating\">Michelin-starred Italian · Best pasta in LA · Abbot Kinney Blvd · (424) 387-8622</div>\n            <div class=\"fc-order\"><strong>Order:</strong> Fresh handmade pasta — whatever the daily preparation is. Wood-fired dishes. Exceptional wine list. Budget $60–80/person.</div>\n            <div class=\"fc-hours\">Dinner nightly · 3 min / 0.3 mi from Venice Beach (Routes API) · Walk-in bar seating on weeknights · Reserve on Resy for tables</div>\n            <a href=\"https://www.google.com/maps/search/?api=1&query=1023+Abbot+Kinney+Blvd+Venice+CA\" target=\"_blank\" class=\"gmap-link food\">📍 Maps</a>\n          </div>\n        </div>\n        <div class=\"fc\" style=\"border-color:#1A7A5E;border-width:2px\">\n          <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#0B5B3A,#1A7A5E)\">\n            <div class=\"fc-name\">Malibu Farm Restaurant</div>\n            <div class=\"fc-loc\">23000 PCH, Malibu Pier · Day 10 · Jul 11 · Dinner</div>\n          </div>\n          <div class=\"fc-body\">\n            <div class=\"fc-rating\">Farm-to-table California · Ocean views · Malibu Pier · (310) 457-8100</div>\n            <div class=\"fc-order\"><strong>Order:</strong> Fresh local fish, farm-sourced salads, avocado dishes. Casual outdoor dining on the pier with Pacific Ocean views — California at its best.</div>\n            <div class=\"fc-hours\">Daily · 38 min / 21.0 mi from Getty Center (Routes API) · Call ahead for reservations · Outdoor seating</div>\n            <a href=\"https://www.google.com/maps/search/?api=1&query=23000+Pacific+Coast+Hwy+Malibu+CA\" target=\"_blank\" class=\"gmap-link food\">📍 Maps</a>\n          </div>\n        </div>\n        <div class=\"fc\" style=\"border-color:#1A7A5E;border-width:2px\">\n          <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#C05621,#B7730A)\">\n            <div class=\"fc-name\">In-N-Out Burger — Final Meal</div>\n            <div class=\"fc-loc\">9149 S Sepulveda Blvd (0.2 mi from LAX) · Jul 12 · Departure Day</div>\n          </div>\n          <div class=\"fc-body\">\n            <div class=\"fc-rating\">California tradition · Last California food before the flight · 9:30 AM stop</div>\n            <div class=\"fc-order\"><strong>Order:</strong> Double-Double Animal Style — mustard-grilled patty, secret spread, pickles, caramelized onions. Fries: well-done or Animal Style. Ask by name — not on the menu board.</div>\n            <div class=\"fc-hours\">Open early · Drive-through + dine-in · Jul 12 · 9:30 AM</div>\n            <a href=\"https://www.google.com/maps/search/?api=1&query=33.953641,-118.396780\" target=\"_blank\" class=\"gmap-link food\">📍 Maps</a>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"grp-hd\">🐟 Fish Markets — Route-Wide</div>\n      <table class=\"stop-table\">\n        <tr><th>Stop</th><th>Location</th><th>Best Order</th><th>When</th><th>Map</th></tr>\n        <tr style=\"background:#FFFFF0\">\n          <td><div class=\"stop-name\">⭐ Santa Barbara Fish Market</div><div class=\"stop-sub\">FEATURED · PRIMARY fish stop</div></td>\n          <td>117 Harbor Way, Santa Barbara</td>\n          <td>Local Channel Islands red sea urchin (from divers) · live rock crab · oysters · lobster. Buy at the counter, eat at the harbor. $60–100 family.</td>\n          <td>Jul 6 or 7<div class=\"stop-sub\">Mon–Fri 9–6:30 · Sat 7:30–6:30 · (805) 965-9564</div></td>\n          <td><a href=\"https://www.google.com/maps/search/?api=1&query=34.403661,-119.693660\" target=\"_blank\" class=\"gmap-link food\">📍 Map</a></td>\n        </tr>\n        <tr>\n          <td><div class=\"stop-name\">Swan Oyster Depot</div></td>\n          <td>1517 Polk St, San Francisco</td>\n          <td>Uni cracked fresh at marble counter · Dungeness crab legs · half-shell oysters · chowder. Cash only. No reservations.</td>\n          <td>Jul 3 8 AM (optional)<div class=\"stop-sub\">Mon–Sat 8 AM–2:30 PM · Cash only</div></td>\n          <td><a href=\"https://www.google.com/maps/search/?api=1&query=37.790971,-122.420965\" target=\"_blank\" class=\"gmap-link food\">📍 Map</a></td>\n        </tr>\n        <tr>\n          <td><div class=\"stop-name\">Quality Seafood</div><div class=\"stop-sub\">Redondo Beach Pier</div></td>\n          <td>130 International Boardwalk, Redondo Beach</td>\n          <td>Red sea urchin · live blue crab · rock cod · lobster. Buy and eat on the pier boards. $40–60 solo outing. (310) 372-6408.</td>\n          <td>LA days · early AM<div class=\"stop-sub\">~30 min from most LA hotels</div></td>\n          <td><a href=\"https://www.google.com/maps/search/?api=1&query=33.848919,-118.397224\" target=\"_blank\" class=\"gmap-link food\">📍 Map</a></td>\n        </tr>\n        <tr>\n          <td><div class=\"stop-name\">Santa Monica Seafood</div></td>\n          <td>1000 Wilshire Blvd, Santa Monica</td>\n          <td>Whatever's freshest — ask the counter staff. Full market + café in back for quick seafood lunch.</td>\n          <td>LA days · family option<div class=\"stop-sub\">(310) 393-5244 · call to confirm hours</div></td>\n          <td><a href=\"https://www.google.com/maps/search/?api=1&query=34.023693,-118.492331\" target=\"_blank\" class=\"gmap-link food\">📍 Map</a></td>\n        </tr>\n      </table>\n\n      <div class=\"grp-hd\">🥬 Farmers Markets &amp; Food Halls</div>\n      <table class=\"stop-table\">\n        <tr><th>Stop</th><th>Location</th><th>Highlights</th><th>When</th><th>Map</th></tr>\n        <tr style=\"background:#F0FFF4\">\n          <td><div class=\"stop-name\">Santa Monica Farmers Market</div><div class=\"stop-sub\">✅ Confirmed on route</div></td>\n          <td>Arizona Ave &amp; 3rd St, Santa Monica</td>\n          <td>40+ certified organic farms · Stone fruits, berries, artisan breads, cheeses. Top LA chefs shop here Saturday mornings. Walk 3rd Street Promenade after.</td>\n          <td><strong>Sat Jul 11 · 8 AM–1 PM</strong><div class=\"stop-sub\">$30–50 family browse · rain or shine · since 1991</div></td>\n          <td const LABELS    = ["california-routes", "sf-guide", "bigsur-guide", "centralcoast-guide", "sandiego-guide", "la-guide", "logistics-guide"];
const GRADIENTS = ["linear-gradient(135deg, #0B4F6C 0%, #1B7A9E 40%, #C05621 80%, #B7730A 100%)", "linear-gradient(160deg, #0B4F6C, #1B7A9E, #3A6B4A)", "linear-gradient(160deg, #1A3D2B, #3A6B4A, #6B4226)", "linear-gradient(160deg, #5C3A1E, #B7730A, #C05621)", "linear-gradient(160deg, #0B4F6C, #1B7A9E, #0D6B7A)", "linear-gradient(160deg, #3D1F00, #C05621, #B7730A)", "linear-gradient(135deg,#0B4F6C 0%,#1B7A9E 40%,#C05621 80%,#B7730A 100%)"];
let current = 0;
const track       = document.getElementById('track');
const strip       = document.getElementById('strip');
const stripWrapper= document.getElementById('stripWrapper');
const btnPrev     = document.getElementById('btnPrev');
const btnNext     = document.getElementById('btnNext');
const curPageEl   = document.getElementById('curPage');
const totalPagesEl= document.getElementById('totalPages');
const pageTitleEl = document.getElementById('pageTitle');

// ── Build slides + thumbnails ────────────────────────────────
function init() {
  totalPagesEl.textContent = PAGES.length;
  PAGES.forEach((html, i) => {
    // Slide
    const slide = document.createElement('div');
    slide.className = 'slide';
    const loader = document.createElement('div');
    loader.className = 'slide-loader';
    loader.innerHTML = '<div class="spinner"></div><span>Loading…</span>';
    slide.appendChild(loader);
    const iframe = document.createElement('iframe');
    iframe.title = 'Slide ' + (i + 1);
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox');
    if (i === 0) {
      const hide0 = () => loader.classList.add('hidden');
      iframe.onload = hide0;
      setTimeout(hide0, 6000);
      iframe.srcdoc = html;
    }
    slide.appendChild(iframe);
    track.appendChild(slide);

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'thumb' + (i === 0 ? ' active' : '');
    thumb.setAttribute('role', 'button');
    thumb.setAttribute('tabindex', '0');
    thumb.setAttribute('aria-label', 'Go to slide ' + (i + 1) + ': ' + LABELS[i]);
    thumb.innerHTML = `<span class="thumb-num">${i + 1}</span>
      <div class="thumb-preview" style="background:${GRADIENTS[i]}"></div>
      <div class="thumb-label">${LABELS[i]}</div>`;
    thumb.addEventListener('click', () => goTo(i));
    thumb.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goTo(i); } });
    strip.appendChild(thumb);
  });
  goTo(0, false);
}

// ── Navigation ───────────────────────────────────────────────
function goTo(index, animate = true) {
  if (index < 0 || index >= PAGES.length) return;
  current = index;
  if (!animate) track.style.transition = 'none';
  track.style.transform = `translateX(-${current * 100}%)`;
  if (!animate) requestAnimationFrame(() => { track.style.transition = ''; });
  loadSlide(index); loadSlide(index + 1); loadSlide(index - 1);
  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === current));
  const at = strip.children[current];
  if (at) at.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === PAGES.length - 1;
  curPageEl.textContent  = current + 1;
  pageTitleEl.textContent = LABELS[current];
  // Re-apply active translation to this slide
  if (typeof currentLang !== 'undefined' && currentLang !== 'en') {
    var _tf = track.querySelectorAll('.slide iframe')[index];
    if (_tf) setTimeout(function() {
      try { _tf.contentWindow.postMessage({type:'translate',lang:currentLang},'*'); } catch(ex) {}
    }, 400);
  }
}

function loadSlide(index) {
  if (index < 0 || index >= PAGES.length) return;
  const slide  = track.querySelectorAll('.slide')[index];
  if (!slide) return;
  const iframe = slide.querySelector('iframe');
  const loader = slide.querySelector('.slide-loader');
  if (iframe && !iframe.srcdoc) {
    const hide = () => { if (loader) loader.classList.add('hidden'); };
    iframe.onload = hide;
    setTimeout(hide, 6000);
    iframe.srcdoc = PAGES[index];
  }
}

// Hide loader and re-apply active language when a page signals DOMContentLoaded
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'page-ready') return;
  document.querySelectorAll('.slide iframe').forEach(function(f) {
    try {
      if (f.contentWindow === e.source) {
        var loader = f.parentElement.querySelector('.slide-loader');
        if (loader) loader.classList.add('hidden');
        if (typeof currentLang !== 'undefined' && currentLang !== 'en') {
          var _pf = f;
          setTimeout(function() {
            try { _pf.contentWindow.postMessage({type:'translate',lang:currentLang},'*'); } catch(ex) {}
          }, 600);
        }
      }
    } catch(err) {}
  });
});

// ── Button handlers ──────────────────────────────────────────
btnPrev.addEventListener('click', () => goTo(current - 1));
btnNext.addEventListener('click', () => goTo(current + 1));

// ── Keyboard ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.activeElement && document.activeElement.tagName === 'IFRAME') return;
  switch (e.key) {
    case 'ArrowRight': case 'ArrowDown': case 'PageDown':
      e.preventDefault(); goTo(current + 1); break;
    case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
      e.preventDefault(); goTo(current - 1); break;
    case 'Home': e.preventDefault(); goTo(0); break;
    case 'End':  e.preventDefault(); goTo(PAGES.length - 1); break;
    case 'f': case 'F': toggleFullscreen(); break;
    case 'g': case 'G': toggleStrip(); break;
    case 't': case 'T': toggleTheme(); break;
  }
});

// ── Touch swipe ──────────────────────────────────────────────
let tX = 0, tY = 0, drag = false, dDelta = 0;
const vp = document.getElementById('viewport');
vp.addEventListener('touchstart', e => { tX = e.touches[0].clientX; tY = e.touches[0].clientY; drag = false; dDelta = 0; }, { passive: true });
vp.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - tX, dy = e.touches[0].clientY - tY;
  if (!drag && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) drag = true;
  if (drag) { dDelta = dx; track.style.transition = 'none'; track.style.transform = `translateX(calc(${-current * 100}% + ${(dDelta / vp.clientWidth) * 100}%))`; }
}, { passive: true });
vp.addEventListener('touchend', () => {
  if (!drag) return;
  track.style.transition = '';
  const th = vp.clientWidth * 0.2;
  if (dDelta < -th) goTo(current + 1); else if (dDelta > th) goTo(current - 1); else goTo(current);
  drag = false; dDelta = 0;
});

// ── Mouse drag ───────────────────────────────────────────────
let mX = 0, mDown = false, mDelta = 0;
vp.addEventListener('mousedown', e => { if (e.target.tagName === 'IFRAME') return; mDown = true; mX = e.clientX; mDelta = 0; vp.style.cursor = 'grabbing'; });
window.addEventListener('mousemove', e => {
  if (!mDown) return; mDelta = e.clientX - mX;
  if (Math.abs(mDelta) > 5) { track.style.transition = 'none'; track.style.transform = `translateX(calc(${-current * 100}% + ${(mDelta / vp.clientWidth) * 100}%))`; }
});
window.addEventListener('mouseup', () => {
  if (!mDown) return; mDown = false; vp.style.cursor = '';
  if (Math.abs(mDelta) < 5) return;
  track.style.transition = '';
  const th = vp.clientWidth * 0.15;
  if (mDelta < -th) goTo(current + 1); else if (mDelta > th) goTo(current - 1); else goTo(current);
  mDelta = 0;
});

// ── Strip toggle ─────────────────────────────────────────────
let stripOpen = false;
function toggleStrip() { stripOpen = !stripOpen; stripWrapper.classList.toggle('open', stripOpen); }
document.getElementById('btnStrip').addEventListener('click', toggleStrip);

// ── Theme toggle ─────────────────────────────────────────────
let theme = document.documentElement.getAttribute('data-theme') || 'dark';
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('btnTheme');
  btn.innerHTML = theme === 'dark'
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
}
document.getElementById('btnTheme').addEventListener('click', toggleTheme);

// ── Fullscreen ───────────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen().catch(() => {});
}
document.getElementById('btnFullscreen').addEventListener('click', toggleFullscreen);


// ── Google Translate ──────────────────────────────────────────
const LANGUAGES = [["English", "en"], ["Spanish", "es"], ["French", "fr"], ["German", "de"], ["Portuguese", "pt"], ["Italian", "it"], ["Japanese", "ja"], ["Korean", "ko"], ["Chinese", "zh-CN"], ["Arabic", "ar"], ["Hindi", "hi"], ["Russian", "ru"]];
let currentLang = 'en';

function applyTranslation(langCode) {
  document.querySelectorAll('.slide iframe').forEach(function(f) {
    try { f.contentWindow.postMessage({type:'translate', lang:langCode}, '*'); } catch(e) {}
  });
}

function setLanguage(code, label) {
  currentLang = code;
  document.getElementById('langLabel').textContent = label;
  document.querySelectorAll('.lang-option').forEach(el => {
    el.classList.toggle('active', el.dataset.lang === code);
  });
  applyTranslation(code);
  closeLangDropdown();
}

function closeLangDropdown() {
  document.getElementById('langDropdown').classList.remove('open');
  document.getElementById('btnTranslate').setAttribute('aria-expanded', 'false');
}

document.getElementById('btnTranslate').addEventListener('click', (e) => {
  e.stopPropagation();
  const dd = document.getElementById('langDropdown');
  const isOpen = dd.classList.toggle('open');
  document.getElementById('btnTranslate').setAttribute('aria-expanded', isOpen);
});

document.querySelectorAll('.lang-option').forEach(el => {
  el.addEventListener('click', () => {
    const code = el.dataset.lang;
    const label = el.textContent.trim();
    setLanguage(code, label);
  });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
  });
});

document.addEventListener('click', (e) => {
  if (!document.getElementById('translateWrap').contains(e.target)) {
    closeLangDropdown();
  }
});

// Keyboard shortcut L
document.addEventListener('keydown', e => {
  if ((e.key === 'l' || e.key === 'L') && !e.target.matches('input,textarea')) {
    const dd = document.getElementById('langDropdown');
    const isOpen = dd.classList.toggle('open');
    document.getElementById('btnTranslate').setAttribute('aria-expanded', isOpen);
  }
});


init();
</script>
</body>
</html>
