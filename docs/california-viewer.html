/div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=37.7817,-122.4320\" target=\"_blank\">Fillmore Heritage Garage</a> · 1310 Fillmore St</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">6</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Golden Gate Park — Tea Garden + Academy</div>\n                    <div class=\"ds-drive\">From Alamo Square · ~7 min drive · Arrive ~3:30 PM</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=37.7700,-122.4683\" target=\"_blank\">Music Concourse Garage</a> · Music Concourse Dr</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">7</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Ebisu Sushi — 5:15 PM Dinner 🍣</div>\n                    <div class=\"ds-drive\">Same parking · 7 min walk from Music Concourse Garage</div>\n                    <div class=\"ds-park\">🅿️ Music Concourse Garage · 1283 9th Ave · 7 min walk</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">8</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Twin Peaks — Sunset 🌅</div>\n                    <div class=\"ds-drive\">From Ebisu · ~8 min drive</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=37.7546,-122.4463\" target=\"_blank\">Twin Peaks Overlook Lot</a> · Twin Peaks Blvd</div>\n                  </div>\n                </div>\n                <div class=\"nav-col-action\">\n                  <a class=\"mab route\" href=\"https://www.google.com/maps/dir/Hyatt+Regency+San+Francisco/Chinatown+San+Francisco/El+Farolito+2779+Mission+St+San+Francisco/Palace+of+Fine+Arts+San+Francisco/Powell+Hyde+Cable+Car+San+Francisco/Painted+Ladies+San+Francisco/Japanese+Tea+Garden+San+Francisco/Ebisu+Sushi+1283+9th+Ave+San+Francisco/Twin+Peaks+San+Francisco\" target=\"_blank\">Open Day 1 Route in Google Maps 🗺️</a>\n                </div>\n              </div>\n              <!-- RIGHT: Walking clusters -->\n              <div class=\"nav-col walk-col\">\n                <div class=\"nav-col-hd\">🚶 Walking Clusters</div>\n                <div class=\"wc-label\">Cluster 1 — Embarcadero / Waterfront</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">1</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Ferry Building</div>\n                    <div class=\"ws-from\">Start · Embarcadero waterfront</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 8 min · 0.4 mi</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">2</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Chinatown — Dragon Gate</div>\n                    <div class=\"ws-from\">Grant Ave &amp; Stockton St · 45–60 min</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 15 min · 0.7 mi to wharf</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">3</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Pier 39 / Sea Lions</div>\n                    <div class=\"ws-from\">Fisherman's Wharf area</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 5 min · 0.3 mi</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">4</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Fisherman's Wharf</div>\n                    <div class=\"ws-from\">Jefferson St · Crab stands</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 5 min · 0.3 mi</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">5</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Ghirardelli Square</div>\n                    <div class=\"ws-from\">Historic chocolate factory · end cluster 1</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">Cluster 2 — Russian Hill</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">6</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Powell-Hyde Cable Car</div>\n                    <div class=\"ws-from\">Board at Powell &amp; Market · $24 all-day</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ ride to Russian Hill summit</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">7</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Lombard Street</div>\n                    <div class=\"ws-from\">Walk down the switchbacks · 20 min</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 5 min walk</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">8</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Full House House</div>\n                    <div class=\"ws-from\">1709 Broderick St · exterior only</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">Cluster 3 — Alamo Square</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">9</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Painted Ladies</div>\n                    <div class=\"ws-from\">710 Steiner St · 20 min photo stop · end cluster 3</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">Cluster 4 — Golden Gate Park</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">10</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Japanese Tea Garden</div>\n                    <div class=\"ws-from\">$15 adults · arrive ~3:30 PM · closes 5 PM</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 5 min · 0.3 mi</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">11</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">CA Academy of Sciences</div>\n                    <div class=\"ws-from\">$40 adults · Aquarium + Planetarium · 3:30–4:45 PM · closes 5 PM</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">Dinner Stop</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">🍣</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Ebisu Sushi — 5:15 PM</div>\n                    <div class=\"ws-from\">1283 9th Ave · 7 min walk from Music Concourse Garage · paper waitlist at door</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 8 min drive</div>\n                <div class=\"wc-label\">Summit Stop</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">🌅</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Twin Peaks</div>\n                    <div class=\"ws-from\">360° Bay panorama · sunset after dinner · Twin Peaks Blvd overlook lot</div>\n                  </div>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Arrival — SFO 11:27 AM</div>\n            <ul class=\"tb-list\">\n              <li><strong>AA 1524 arrives SFO 11:27 AM</strong> — Marina &amp; Liam. Car pickup ~12:15–12:30 PM. Drive to hotel ~1:00 PM.</li>\n              <li>Check-in at Hyatt is 3:00 PM. Drop bags with concierge and head out if room isn't ready. Hotel at 50 Third St, Union Square — central to everything.</li>\n              <li>Drive between clusters — Music Concourse Garage serves both GG Park and Ebisu.</li>\n            </ul>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Afternoon — Chinatown &amp; North Waterfront</div>\n            <ul class=\"tb-list\">\n              <li><strong>Chinatown</strong> (Grant Avenue + Stockton Street) — 45 min to 1 hour. America's oldest Chinatown. Dragon Gate at Bush &amp; Grant Ave is the landmark entry. Gold-coin trinkets, incense shops, dim sum bakeries. Stockton St is the working street (produce, live fish) — more authentic than touristy Grant Ave.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Palace of Fine Arts</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">3601 Lyon St, San Francisco</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">30–45 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The colonnade and dome over the lagoon — one of the most photogenic structures in SF. Originally built for the 1915 Panama-Pacific Exposition. The reflection in the lagoon in afternoon light is exceptional. Walk the colonnade perimeter, photograph across the water.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.802931,-122.448423\" target=\"_blank\" class=\"mab gmaps\">📍 Palace of Fine Arts</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Powell-Hyde Cable Car</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Powell &amp; Market turnaround · Fisherman's Wharf</span>\n                  <span class=\"sc-stat\">$24/adult all-day Muni passport</span>\n                  <span class=\"sc-stat\">Unlimited transit all day</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Board at Powell &amp; Market Street (the turnaround where they spin the cars manually — worth watching). Ride up and over the hill to Fisherman's Wharf. The Powell-Hyde line goes over the steepest grades — better views than Powell-Mason. The $24 all-day Muni passport covers all buses, streetcars, and cable cars for the rest of the day.</p>\n                </div>\n                <div class=\"sc-tip\">The turnaround at Powell &amp; Market has a line in the morning. Take the turnaround at Fisherman's Wharf (Hyde &amp; Beach) instead — board there to go back into the city with no wait.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.784661,-122.407786\" target=\"_blank\" class=\"mab gmaps\">📍 Powell &amp; Market Turnaround</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Pier 39 — Sea Lions &amp; Waterfront</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">The Embarcadero at Beach St, San Francisco</span>\n                  <span class=\"sc-stat free\">Free entry</span>\n                  <span class=\"sc-stat\">45 min–1 hr</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The cable car ends at Hyde &amp; Beach — Pier 39 is a 10-minute walk east along the waterfront. The star attraction is <strong>K-Dock</strong> on the west side of the pier, where up to 1,000 California sea lions haul out on floating docks year-round. The barking is audible from a block away — completely free to watch from the upper deck.</p>\n                  <p>Clam chowder in a sourdough bread bowl at the wharf crab stands is the definitive SF street food move. Try it here.</p>\n                </div>\n                <div class=\"sc-tip\">Best sea lion viewing is from the west side of Pier 39 looking down at the floating docks. Morning is less crowded. No admission required — just walk in.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.808673,-122.409981\" target=\"_blank\" class=\"mab gmaps\">📍 Pier 39</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Fisherman's Wharf</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Jefferson St between Taylor &amp; Hyde, San Francisco</span>\n                  <span class=\"sc-stat free\">Free to walk</span>\n                  <span class=\"sc-stat\">30–45 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>SF's most visited waterfront district — the historic fishing wharf stretching from Pier 33 to Ghirardelli Square. Walk Jefferson Street for the original crab stands, souvenir shops, and street performers. The WWII submarine USS Pampanito (Pier 45) is open for self-guided tours (optional, ticketed).</p>\n                  <p><strong>Ghirardelli Square</strong> (900 North Point St, west end) — the 1852 chocolate factory converted to shops and restaurants. Free to explore. The original Ghirardelli shop here serves the famous hot fudge sundae.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.808132,-122.416748\" target=\"_blank\" class=\"mab gmaps\">📍 Fisherman's Wharf</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.805657,-122.42273\" target=\"_blank\" class=\"mab gmaps\">📍 Ghirardelli Square</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Late Afternoon — Russian Hill &amp; Alamo Square</div>\n            <ul class=\"tb-list\">\n              <li><strong>Lombard Street</strong> (Russian Hill) — the famous crooked block between Hyde and Leavenworth. 20 min stop. Walk down (not drive) for the best photos of the switchbacks. Or walk up from the bottom and look back at the city framing.</li>\n              <li><strong>Painted Ladies</strong> (710–720 Steiner St, Alamo Square Park) — the six Victorian houses with downtown SF skyline behind them. Best from the park bench row on Steiner facing east. 20 min.</li>\n            </ul>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Sunset — Twin Peaks</div>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Twin Peaks Sunset Viewpoint</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Twin Peaks Blvd, San Francisco</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">20 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Panoramic 360° view of the Bay from a short drive south of the Mission. The city grid, the Bay Bridge, and (on clear days) the Golden Gate. Sunset here on arrival day sets the stage for everything that follows. Short walk from the parking lot to the summit.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.75455,-122.446777\" target=\"_blank\" class=\"mab gmaps\">📍 Twin Peaks</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">More to See — Nearby Day 1 Additions</div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">The Full House House — 1709 Broderick St</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">1709 Broderick St, San Francisco (Lower Pacific Heights)</span>\n                  <span class=\"sc-stat free\">Free · Sidewalk view only</span>\n                  <span class=\"sc-stat\">10–15 min · Private residence</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The blue-grey Victorian at 1709 Broderick Street used for the exterior shots in <em>Full House</em> (1987–1995). The Tanner family's house. It is a private residence — view and photograph from the sidewalk only. Just 0.4 miles from the Painted Ladies at Alamo Square, so combine both on the same walk.</p>\n                </div>\n                <div class=\"sc-tip\">Private home — sidewalk only, no knocking or entering. Quick 10-min photo stop on the way to or from Alamo Square.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.782476,-122.438339\" target=\"_blank\" class=\"mab gmaps\">📍 1709 Broderick St (Full House House)</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Mission Dolores Park</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Dolores St &amp; 18th St, Mission District, San Francisco</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">30–45 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>SF's most beloved hillside park — sun-filled terraced lawns with sweeping views of the downtown skyline and the Bay. The upper terrace gives a classic elevated view looking north over the city. The surrounding <strong>Mission District</strong> (Valencia Street, 16th–24th St) is SF's most vibrant neighborhood: colorful murals, taquerias, bookstores, and some of the city's best restaurants. The Mission is also the sunniest neighborhood in SF — shielded from coastal fog by Twin Peaks.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.759752,-122.426839\" target=\"_blank\" class=\"mab gmaps\">📍 Mission Dolores Park</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Golden Gate Park — Flexible Activity (Day 1 PM or Day 2 Extra Time)</div>\n            <ul class=\"tb-list\">\n              <li>Golden Gate Park spans 3 miles across the city from Haight-Ashbury to the ocean. Three world-class attractions sit inside it — all within walking distance of each other.</li>\n            </ul>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Golden Gate Park</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Bounded by Fulton St, Lincoln Way, Stanyan St &amp; Great Highway</span>\n                  <span class=\"sc-stat free\">Free to enter</span>\n                  <span class=\"sc-stat\">1,017 acres · 3+ hrs if seeing all attractions</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The third most visited urban park in the United States. Larger than Central Park. Contains the Japanese Tea Garden, California Academy of Sciences, de Young Museum, Conservatory of Flowers, Stow Lake, and Buffalo Paddock. The main meadow (Hellman Hollow) is perfect for a picnic.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.769421,-122.48609\" target=\"_blank\" class=\"mab gmaps\">📍 Golden Gate Park (Main Drive)</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Japanese Tea Garden</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">75 Hagiwara Tea Garden Dr, Golden Gate Park</span>\n                  <span class=\"sc-stat\">$13 adults · $8 seniors · Free before 10 AM on Mon/Wed/Fri</span>\n                  <span class=\"sc-stat\">1 hr · Oldest public Japanese garden in the US</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The oldest operating public Japanese garden in North America — opened 1894. Natural beauty and tranquility: graceful Japanese maples, twisting pines, clipped azaleas, cherry trees, a steep wooden drum bridge, pagodas, and koi ponds. The traditional teahouse serves matcha and fortune cookies (invented here). Go early — it gets crowded by 11 AM.</p>\n                </div>\n                <div class=\"sc-tip\">Admission is free Mon/Wed/Fri before 10 AM. If you're already in the park in the morning, this is the best free window.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.770455,-122.470449\" target=\"_blank\" class=\"mab gmaps\">📍 Japanese Tea Garden</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">California Academy of Sciences</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">55 Music Concourse Dr, Golden Gate Park</span>\n                  <span class=\"sc-stat\">$40 adults · $35 seniors · $30 youth (12–17) · $25 children (4–11)</span>\n                  <span class=\"sc-stat\">3–4 hrs · Opens 9:30 AM Mon–Sat / 11 AM Sun</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The world's only combined aquarium, planetarium, rainforest, and natural history museum under one living roof. The centerpiece is <strong>Osher Rainforest</strong> — a four-story glass dome with free-flying tropical birds and butterflies. The aquarium has a Philippine coral reef tank and a shark lagoon. The planetarium shows are outstanding. Albino alligator lives in the swamp exhibit.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.76987,-122.466195\" target=\"_blank\" class=\"mab gmaps\">📍 California Academy of Sciences</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Lunch · El Farolito · 2:00 PM</div>\n            <div class=\"stop-card\" style=\"border-color:#1A7A5E;border-width:2px;\">\n              <div class=\"sc-hd\" style=\"background:linear-gradient(135deg,#1A7A5E,#2D9B6E);\">\n                <div class=\"sc-name\" style=\"color:white;\">🌯 El Farolito</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">Walk-In · 2:00 PM</span>\n                  <span class=\"sc-stat\">2779 Mission St, Mission District</span>\n                  <span class=\"sc-stat\">15 min · 4.0 mi from hotel</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>What it is:</strong> SF's legendary Mission-style super burrito. Cash-only taqueria in the heart of the Mission. The gold standard for burritos — bigger, fatter, and better than anything outside San Francisco. Arrival day lunch stop en route to Palace of Fine Arts.</p>\n                  <p><strong>Best order:</strong> Carne asada or al pastor super burrito — rice, beans, sour cream, guac, salsa, pico, wrapped in a massive Mission-style tortilla. Don't skip the green salsa. Horchata to drink.</p>\n                  <p><strong>Address:</strong> 2779 Mission St, San Francisco, CA 94110</p>\n                  <p><strong>🅿️ Parking:</strong> Street parking on Mission St — usually available midday. No garage needed; 15-min stop max. Cash only — stop at the ATM at the hotel before leaving.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.7527,-122.4182\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n                </div>\n              </div>\n            </div>\n          </div>\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Dinner · Ebisu Sushi · 5:15 PM</div>\n            <div class=\"stop-card\" style=\"border-color:#1A7A5E;border-width:2px;\">\n              <div class=\"sc-hd\" style=\"background:linear-gradient(135deg,#1A7A5E,#2D9B6E);\">\n                <div class=\"sc-name\" style=\"color:white;\">🍣 Ebisu</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">Paper Waitlist · Arrive 5:15 PM</span>\n                  <span class=\"sc-stat\">1283 9th Ave, Inner Sunset</span>\n                  <span class=\"sc-stat\">7 min walk from Music Concourse Garage</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>What it is:</strong> Inner Sunset neighborhood sushi institution — no reservations ever, paper waitlist only. Arrive right when dinner service opens at 5:15 PM, write your name, seated within 15–30 min. One of SF's best sushi bargains. Closes at 9 PM — don't arrive after 7:30 PM.</p>\n                  <p><strong>Best order:</strong> Sashimi omakase set. Double hamachi roll. Rainbow roll. Toro nigiri. The omakase set is the move — chef's seasonal selection, beautiful presentation.</p>\n                  <p><strong>Address:</strong> 1283 9th Ave, San Francisco, CA 94122</p>\n                  <p><strong>🅿️ Parking:</strong> Music Concourse Garage (same garage from GG Park) · 1283 9th Ave · 7-min walk to restaurant. After dinner, drive 8 min to Twin Peaks for sunset.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.7645,-122.4667\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"drive-stat\">\n            <span class=\"drive-val\">Drive route · 8 stops · parking at each</span> · Check-in 3:00 PM · Pack bags tonight — Day 2 departs 8:35 AM\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- ═══════════════════════════════════════════════════ -->\n    <!-- DAY 2 — FRIDAY, JULY 3                             -->\n    <!-- Alcatraz · Fort Point · UC Berkeley · Muir Woods   -->\n    <!-- ═══════════════════════════════════════════════════ -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd sf\">\n          <div class=\"day-hd-label\">Friday, July 3, 2026</div>\n          <div class=\"day-hd-title\">Alcatraz · Fort Point · UC Berkeley · Muir Woods</div>\n          <div class=\"day-hd-sub\">Drive total: ~3h 46m verified · Depart hotel 8:35 AM · Return ~7:10 PM</div>\n        </div>\n        <div class=\"day-body\">\n\n          <!-- DAY 2 MAP -->\n          <div class=\"map-section\">\n            <div id=\"map-day2\" class=\"seg-map\"></div>\n            <p class=\"map-caption\">Day 2 route: Pier 33 (Alcatraz return) → Fort Point NHS → UC Berkeley → Muir Woods → Hyatt SF · ~3h 46m total driving</p>\n            <div class=\"dual-col-nav\">\n              <!-- LEFT: Driving stops -->\n              <div class=\"nav-col drive-col\">\n                <div class=\"nav-col-hd\">🚗 Driving Route</div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">1</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Pier 33 — Alcatraz Ferry</div>\n                    <div class=\"ds-drive\">Walk 18 min via Embarcadero or drop car at hotel — no parking at Pier 33</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=37.8064,-122.4103\" target=\"_blank\">Impark C Garage Lot 20</a> · 2210 Stockton St</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">2</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Fort Point NHS</div>\n                    <div class=\"ds-drive\">From Pier 33 · 17 min · 4.4 mi · Routes API</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=37.8063,-122.4760\" target=\"_blank\">Battery Cranston Rd Parking</a> · Presidio</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">3</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">UC Berkeley</div>\n                    <div class=\"ds-drive\">From Fort Point · 48 min · 29.9 mi · Routes API</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=37.8734,-122.2629\" target=\"_blank\">Wellman Courtyard Parking</a> · Berkeley</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">4</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Muir Woods</div>\n                    <div class=\"ds-drive\">From Berkeley · 65 min · 28.2 mi · Routes API</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=37.8913,-122.5688\" target=\"_blank\">Muir Woods Overflow Lot</a> · ✅ Booked 4:00–4:30 PM slot</div>\n                  </div>\n                </div>\n                <div class=\"nav-col-action\">\n                  <a class=\"mab route\" href=\"https://www.google.com/maps/dir/37.806526,-122.404512/37.810612,-122.47709/37.87131,-122.255275/37.906062,-122.57121/37.786587,-122.403097\" target=\"_blank\">Open Day 2 Route in Google Maps 🚗</a>\n                </div>\n              </div>\n              <!-- RIGHT: Walking at each stop -->\n              <div class=\"nav-col walk-col\">\n                <div class=\"nav-col-hd\">🚶 Walking Route</div>\n                <div class=\"wc-label\">Pier 33 / Alcatraz Island</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">1</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Alcatraz Cell House Tour</div>\n                    <div class=\"ws-from\">9:20 AM ferry · 2.5 hrs on island · full self-guided audio route</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ ferry return · arrive Pier 33 ~noon</div>\n                <div class=\"wc-label\">Fort Point / Golden Gate Bridge</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">2</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Fort Point NHS</div>\n                    <div class=\"ws-from\">201 Marine Dr · 45–55 min · 3-story fortification under GGB</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 5 min walk to bridge overlook</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">3</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Golden Gate Bridge</div>\n                    <div class=\"ws-from\">Walk the span · north tower views · Baker Beach below</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">UC Berkeley Campus</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">4</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Sproul Plaza + Campanile</div>\n                    <div class=\"ws-from\">Campanile $5 · Sproul Plaza free · 45 min campus stroll</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">Muir Woods</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">5</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Cathedral Grove Trail</div>\n                    <div class=\"ws-from\">$15/person · 1 mi flat · old-growth coast redwoods</div>\n                  </div>\n                </div>\n                <div class=\"nav-col-action\">\n                  <a class=\"mab route\" href=\"https://www.google.com/maps/dir/37.810612,-122.47709/37.820066,-122.478394/37.872,-122.260/37.906062,-122.57121\" target=\"_blank\">Open Walking Stops 🚶</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Morning — Alcatraz (Depart Hotel 8:35 AM)</div>\n            <ul class=\"tb-list\">\n              <li><strong>Depart hotel 8:35 AM</strong> — Pier 33 Alcatraz Landing is 1.5 miles from the hotel. 45-minute arrival deadline before the 9:20 AM boat.</li>\n              <li>⚠️ <em>No parking at Pier 33.</em> Walk 18 min via the Embarcadero or leave the car at the hotel garage.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Alcatraz Island — Audio Tour</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Pier 33 Alcatraz Landing · 9:20 AM departure</span>\n                  <span class=\"sc-stat booked\">✅ Booked · Conf. i77487162</span>\n                  <span class=\"sc-stat\">Return ~12:00 PM · ~2.5 hrs on island</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The cell house audio tour narrated by former guards and prisoners is the core experience — the actual voices describing life inside. Do the full route: cell house, recreation yard, library, D-block (solitary). Plan 2–2.5 hours. The views of the Bay and SF skyline from the island are extraordinary.</p>\n                  <p><strong>Arrive at Pier 33 by 8:35 AM</strong> — 45 min before departure. Boarding closes before departure time. QR code valid for the entire party (on one mobile device). No weapons, no oversized bags. Non-refundable.</p>\n                </div>\n                <div class=\"sc-tip\">Bring: Headphones (app-based audio tour), fully charged phone, backpack max 16\"×20\", closed-toe shoes (the island is uneven). The audio tour app is free — download before leaving the hotel.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.80652,-122.404921\" target=\"_blank\" class=\"mab gmaps\">📍 Pier 33 Alcatraz Landing</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Lunch · Swan Oyster Depot · 12:00 PM</div>\n            <div class=\"stop-card\" style=\"border-color:#1A7A5E;border-width:2px;\">\n              <div class=\"sc-hd\" style=\"background:linear-gradient(135deg,#1A7A5E,#2D9B6E);\">\n                <div class=\"sc-name\" style=\"color:white;\">🦀 Swan Oyster Depot</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">Walk-In · Arrive by 12:15 PM</span>\n                  <span class=\"sc-stat\">1517 Polk St, Polk Gulch</span>\n                  <span class=\"sc-stat\">10 min · 3.7 mi from Pier 33</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>What it is:</strong> An SF institution since 1912 — a narrow marble counter with 18 seats, a handful of brothers running it, and some of the freshest seafood in the city. No reservations, no waitlist, no tables. You wait outside on the sidewalk until a counter seat opens. Closes at 2:30 PM sharp. Cash only — ATM on the corner.</p>\n                  <p><strong>Best order:</strong> Crab cocktail. Dungeness crab legs. Half-shell oysters. Clam chowder in a sourdough cup. If uni is available, get it — cracked fresh at the counter. Do not skip the chowder.</p>\n                  <p><strong>Address:</strong> 1517 Polk St, San Francisco, CA 94109 · Mon–Sat 8:00 AM–2:30 PM · Closed Sunday</p>\n                  <p><strong>🅿️ Parking:</strong> Street parking on Polk St — midday spots typically available. 10 min from Pier 33 via Van Ness Ave. Cash only for food — bring bills or hit the ATM at the corner of Polk & California.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.790971,-122.420965\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Afternoon — Fort Point NHS</div>\n            <ul class=\"tb-list\">\n              <li>Depart Swan Oyster ~1:00 PM. Drive to Fort Point — ~20 min (5 mi).</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Fort Point National Historic Site</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">201 Marine Dr, San Francisco, CA 94129</span>\n                  <span class=\"sc-stat free\">Free Admission</span>\n                  <span class=\"sc-stat\">Fri 10:00 AM–5:00 PM</span>\n                  <span class=\"sc-stat\">45–55 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Built 1853–1861 directly beneath the south tower of the Golden Gate Bridge — the only pre-Civil War brick fort on the West Coast. Standing inside the fort looking straight up at the Golden Gate span above is one of the most surreal viewpoints in SF. The fort itself is fascinating: arched brick casemates, cannon placements, the narrow stairwells.</p>\n                  <p>@modicumofjoy captured this view (377,503 plays, 23,170 likes). The angle looking up at the bridge from the fort's top level is the shot.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.810612,-122.47709\" target=\"_blank\" class=\"mab gmaps\">📍 Fort Point NHS</a>\n                </div>\n                <div class=\"sc-tip\">Depart Fort Point by ~1:15 PM sharp to maintain the Berkeley timing. Fort Point closes at 5 PM — you have plenty of time with 45–55 min here.</div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Golden Gate Bridge</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Golden Gate Bridge, San Francisco · East sidewalk open daily</span>\n                  <span class=\"sc-stat free\">Free to walk</span>\n                  <span class=\"sc-stat\">30–45 min · 1.7 mi round trip across bridge</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>One of the great engineering achievements of the 20th century — 4,200 feet of Art Deco suspension span, completed 1937. The east sidewalk is open to pedestrians daily from 5 AM to sunset. Walk out to the first tower (0.5 mi) for the views back to the city and down the Bay. The view from Fort Point directly below the south tower looking straight up at the span is one of the most surreal in SF.</p>\n                  <p>The <strong>Presidio of San Francisco</strong> surrounds the bridge approach — 1,500 acres of former Army post converted to National Park. Coastal trails, beach access, and the historic Main Post. The bridge's south anchorage viewpoint (Battery East) gives the full span composition.</p>\n                </div>\n                <div class=\"sc-tip\">The Golden Gate Bridge toll plaza viewpoint (east side, off Lincoln Blvd) gives the classic full-span photograph for free. No parking needed if you walk from Fort Point.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.819929,-122.478255\" target=\"_blank\" class=\"mab gmaps\">📍 Golden Gate Bridge Pedestrian Entry</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Baker Beach</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Gibson Road, Presidio, San Francisco</span>\n                  <span class=\"sc-stat free\">Free · Presidio National Park</span>\n                  <span class=\"sc-stat\">30–45 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>A mile-long beach at the foot of serpentine cliffs in the Presidio — with the Golden Gate Bridge looming at the north end of the beach. The composition of the bridge seen from beach level with the Marin headlands behind it is one of the classic SF photographs. Large waves and undertow make it unsafe for swimming, but it's superb for walking and photography.</p>\n                  <p>From Fort Point, Baker Beach is a 5-minute drive (1.5 mi) — these three (Fort Point, GGB, Baker Beach) are all within the Presidio and can be combined efficiently in the same morning.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.794327,-122.483655\" target=\"_blank\" class=\"mab gmaps\">📍 Baker Beach</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Presidio of San Francisco</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Arguello Blvd &amp; Moraga Ave, San Francisco (Main Post)</span>\n                  <span class=\"sc-stat free\">Free · National Park Service</span>\n                  <span class=\"sc-stat\">1,491 acres · Former US Army post 1776–1994</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The Presidio is the park that holds Fort Point, Baker Beach, the Golden Gate Bridge south anchorage, and 24 miles of trails. The historic Main Post (old Army HQ, now NPS visitor center) has excellent exhibits on the Presidio's history from Spanish colonial fort to military base. Lucasfilm and the Yoda Fountain are on the grounds. Crissy Field (the restored tidal marsh and airfield) runs along the bay waterfront with views of Alcatraz and the bridge.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.799032,-122.457745\" target=\"_blank\" class=\"mab gmaps\">📍 Presidio Visitor Center</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Afternoon — UC Berkeley</div>\n            <ul class=\"tb-list\">\n              <li>Drive from Fort Point: <strong>48 min (29.9 mi)</strong> — verified Routes API, Fri ~1:15 PM with traffic. Arrive Berkeley ~2:00 PM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">UC Berkeley Campus</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">2200 Piedmont Ave, Berkeley, CA</span>\n                  <span class=\"sc-stat\">Campanile: $5/person</span>\n                  <span class=\"sc-stat\">Sproul Plaza: Free</span>\n                  <span class=\"sc-stat\">~1 hour · Depart 3:00 PM sharp</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>Sather Tower (Campanile)</strong> — $5/person to ride the elevator to the observation deck. 307 feet. Panoramic views of the Bay, SF skyline, and Berkeley hills. Worth the $5. The carillon plays at 7:50 AM, 12:00 PM, and 6:00 PM — if you're here around noon you'll hear it.</p>\n                  <p><strong>Sproul Plaza</strong> — the epicenter of Free Speech Movement history (1964). The steps, the plaza. Walk through, see the energy of the campus. Free.</p>\n                  <p>Bancroft Way and Telegraph Ave: cafes, bookstores, Berkeley street life. Good place for a quick lunch/coffee before the Muir Woods drive.</p>\n                </div>\n                <div class=\"sc-tip\">Leave Berkeley at 3:00 PM sharp. The Muir Woods parking slot is 4:00–4:30 PM and the drive is 65 min with typical Friday afternoon traffic. Missing the slot is a real risk.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.872062,-122.257812\" target=\"_blank\" class=\"mab gmaps\">📍 Sather Tower (Campanile)</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.869461,-122.25929\" target=\"_blank\" class=\"mab gmaps\">📍 Sproul Plaza</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Late Afternoon — Muir Woods (Depart Berkeley 3:00 PM)</div>\n            <ul class=\"tb-list\">\n              <li>Drive: <strong>65 min (28.2 mi)</strong> — verified Routes API, Fri 3:30 PM Friday afternoon traffic. Arrive 4:00–4:15 PM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Muir Woods National Monument</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">✅ Booked · 4:00–4:30 PM parking slot</span>\n                  <span class=\"sc-stat\">$15/person · gomuirwoods.com</span>\n                  <span class=\"sc-stat\">NPS hours: 8 AM–8 PM (May–Sep)</span>\n                  <span class=\"sc-stat\">~2 hours</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Old-growth coast redwoods — the closest ancient redwood grove to SF. Cathedral Grove Trail is 1 mile flat on a boardwalk through trees 250–1,000 years old. The canopy closes overhead and the light shifts. This is the warm-up for the giants you'll see more of on the Big Sur drive.</p>\n                  <p>Parking is required in advance (your slot is confirmed). No cell service inside the park — download the offline NPS map before leaving Berkeley. Auto-theft is common in the parking lot — remove all valuables from the car.</p>\n                </div>\n                <div class=\"sc-tip\">Arrive at your parking slot at 4:00–4:15 PM. You have until closing (8 PM) — roughly 2 hours comfortably. The Cathedral Grove and Bohemian Grove loops are the essential trails. No need to rush.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.906062,-122.57121\" target=\"_blank\" class=\"mab gmaps\">📍 Muir Woods</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Evening — Return to SF</div>\n            <ul class=\"tb-list\">\n              <li>Return drive: <strong>56 min (18.7 mi)</strong> — verified Routes API, Fri ~7:00 PM. Arrive hotel ~7:10 PM.</li>\n              <li>Pack bags tonight — <strong>Day 3 departure is 8:00 AM sharp.</strong></li>\n            </ul>\n          </div>\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Dinner · Hẻm by LeQuy · 7:30 PM</div>\n            <div class=\"stop-card\" style=\"border-color:#1A7A5E;border-width:2px;\">\n              <div class=\"sc-hd\" style=\"background:linear-gradient(135deg,#1A7A5E,#2D9B6E);\">\n                <div class=\"sc-name\" style=\"color:white;\">🍜 Hẻm by LeQuy</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">Walk-In · 7:30 PM</span>\n                  <span class=\"sc-stat\">1050 Valencia St, Mission District</span>\n                  <span class=\"sc-stat\">15 min · 3.5 mi from hotel</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>What it is:</strong> Vietnamese street food from chef Le Quy Nguyen in the heart of the Mission. Named after the alleyways (hẻm) of Vietnamese cities — intimate, vibrant, not a tourist spot. No reservations needed. Order at the bar if there's a short wait.</p>\n                  <p><strong>Best order:</strong> Pho for Dad (the classic). Sizzling beef skillet. Garlic butter sea snails. Mango salad with squid. The snails are the sleeper hit — don't skip them.</p>\n                  <p><strong>Address:</strong> 1050 Valencia St, San Francisco, CA 94110</p>\n                  <p><strong>🅿️ Parking:</strong> Street parking on Valencia St or adjacent side streets (21st, 22nd). Mission neighborhood — spots open up in the evening. About 15-min walk to Smuggler's Cove after dinner or 10-min drive.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.757,-122.421\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n                </div>\n              </div>\n            </div>\n          </div>\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Late Night · Smuggler's Cove · 9:30 PM</div>\n            <div class=\"stop-card\" style=\"border-color:#1A7A5E;border-width:2px;\">\n              <div class=\"sc-hd\" style=\"background:linear-gradient(135deg,#1A7A5E,#2D9B6E);\">\n                <div class=\"sc-name\" style=\"color:white;\">🍹 Smuggler's Cove</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">Walk-In · No Cover · 9:30 PM</span>\n                  <span class=\"sc-stat\">650 Gough St, Hayes Valley</span>\n                  <span class=\"sc-stat\">10 min from Hẻm · Open until 1:15 AM</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>What it is:</strong> Named one of the World's 50 Best Bars. Three-level shipwreck-themed tiki bar in Hayes Valley. Over 1,300 rums from every corner of the globe. No cover charge, walk-in welcome, usually a short wait on weekends. The cocktail program is legendary — not a gimmick bar.</p>\n                  <p><strong>Best order:</strong> The Dead Reckoning — rum, pineapple, fresh lemon, maple syrup, tawny port, bitters. Also: Corn n' Oil (classic Barbadian rum cocktail). Ask the bartender for a rum recommendation from the book — they know their stuff.</p>\n                  <p><strong>Address:</strong> 650 Gough St, San Francisco, CA 94102 · Open until 1:15 AM</p>\n                  <p><strong>🅿️ Parking:</strong> Street parking on Gough St or Fell St. Hayes Valley has decent evening parking. Day 3 departs 8:00 AM sharp — plan accordingly.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.7779,-122.4234\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"drive-stat\">\n            <span class=\"drive-val\">~3h 46m total driving</span> · Day 2: Depart 8:35 AM · Return ~7:10 PM · All times Routes API verified with traffic\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- ═══════════════════════════════════════════════════════════ -->\n    <!-- DAY 3 — SATURDAY, JULY 4 — ADAM'S 22ND BIRTHDAY 🎂        -->\n    <!-- Bouchon Bakery · Sterling Vineyards · Napa · Birthday Dinner -->\n    <!-- ═══════════════════════════════════════════════════════════ -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd sf\">\n          <div class=\"day-hd-label\">Saturday, July 4, 2026 · 🎂 Adam's 22nd Birthday</div>\n          <div class=\"day-hd-title\">Bouchon Bakery · Sterling Vineyards · Napa · Birthday Dinner</div>\n          <div class=\"day-hd-sub\">Drive total: ~3h 30m verified · Depart hotel 8:00 AM · Birthday dinner 4:30 PM ✅ · Crissy Field fireworks 9:30 PM</div>\n        </div>\n        <div class=\"day-body\">\n\n          <!-- DAY 3 MAP -->\n          <div class=\"map-section\">\n            <div id=\"map-day3\" class=\"seg-map\"></div>\n            <p class=\"map-caption\">Day 3 route: Hyatt SF → Bouchon Bakery (Yountville) → Sterling Vineyards (Calistoga) → Napa Oxbow Public Market → The Waterfront Seafood Grill (birthday dinner 4:30 PM ✅) → Crissy Field SF (fireworks 9:30 PM) → Hyatt SF · ~3h 30m driving</p>\n            <div class=\"dual-col-nav\">\n              <!-- LEFT: Driving stops -->\n              <div class=\"nav-col drive-col\">\n                <div class=\"nav-col-hd\">🚗 Driving Route</div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">1</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Bouchon Bakery, Yountville</div>\n                    <div class=\"ds-drive\">From hotel · 61 min · 54.5 mi · Routes API · depart 8:00 AM</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=38.4035,-122.3616\" target=\"_blank\">Public Parking Lot</a> · Yount Street</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">2</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Sterling Vineyards, Calistoga</div>\n                    <div class=\"ds-drive\">From Yountville · 26 min · 17.0 mi · Routes API</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=38.5697,-122.5472\" target=\"_blank\">Winery Parking</a> · 1111 Dunaweal Lane · ✅ Booked 10:45 AM</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">3</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Napa Oxbow Public Market</div>\n                    <div class=\"ds-drive\">From Calistoga · 38 min · 27.5 mi · Routes API</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=38.2964,-122.2857\" target=\"_blank\">Park and Ride Lot</a> · 1215 4th Street, Napa</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">4</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">The Waterfront Seafood Grill — Birthday Dinner 🎂</div>\n                    <div class=\"ds-drive\">From Oxbow · 5 min · 0.4 mi · ✅ CONFIRMED 4:30 PM reservation</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=38.297359,-122.283712\" target=\"_blank\">Street parking</a> · 720 Main St, Napa · leave by 7:15–7:30 PM</div>\n                  </div>\n                </div>\n                <div class=\"drive-stop\">\n                  <div class=\"ds-num\">5</div>\n                  <div class=\"ds-info\">\n                    <div class=\"ds-name\">Crissy Field East Beach — Fireworks 🎆</div>\n                    <div class=\"ds-drive\">From Napa · 59 min · 49.4 mi · Routes API Jul 4 7:15 PM · plan 75 min</div>\n                    <div class=\"ds-park\">🅿️ <a href=\"https://www.google.com/maps/search/?api=1&query=37.803,-122.448\" target=\"_blank\">East Beach Parking Lot</a> · 1199 East Beach · Free · arrive by 8:30 PM</div>\n                  </div>\n                </div>\n                <div class=\"nav-col-action\">\n                  <a class=\"mab route\" href=\"https://www.google.com/maps/dir/Hyatt+Regency+San+Francisco,+50+Third+St/Bouchon+Bakery,+6528+Washington+St,+Yountville,+CA/Sterling+Vineyards,+1111+Dunaweal+Ln,+Calistoga,+CA/Oxbow+Public+Market,+610+1st+St,+Napa,+CA/The+Waterfront+Seafood+Grill,+720+Main+St,+Napa,+CA/Crissy+Field,+San+Francisco,+CA/Hyatt+Regency+San+Francisco,+50+Third+St\" target=\"_blank\">Open Day 3 Route in Google Maps 🚗</a>\n                </div>\n              </div>\n              <!-- RIGHT: Walking at each stop -->\n              <div class=\"nav-col walk-col\">\n                <div class=\"nav-col-hd\">🚶 Walking Route</div>\n                <div class=\"wc-label\">Yountville</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">1</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Bouchon Bakery</div>\n                    <div class=\"ws-from\">6528 Washington St · takeout croissants + coffee · 45 min</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ short stroll on Washington St</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">2</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Yountville village</div>\n                    <div class=\"ws-from\">Browse gallery row · 10 min · depart 9:46 AM</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">Calistoga — Sterling Vineyards</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">3</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Aerial Tram + Tasting Room</div>\n                    <div class=\"ws-from\">Tram ride up · vineyard walk · 4 wines · ~1 hour</div>\n                  </div>\n                </div>\n                <div class=\"wc-label\">Napa — Oxbow Market</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">4</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Oxbow Public Market</div>\n                    <div class=\"ws-from\">610 1st St · Hog Island Oyster Bar · 40+ vendors · 1.5 hrs</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ short walk along Napa River</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">5</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">The Waterfront Seafood Grill</div>\n                    <div class=\"ws-from\">720 Main St · birthday dinner · ✅ CONFIRMED 4:30 PM · leave by 7:15 PM</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 59 min drive US-101 → Golden Gate Bridge</div>\n                <div class=\"wc-label\">San Francisco — Crissy Field</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">6</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Crissy Field East Beach — July 4th Fireworks 🎆</div>\n                    <div class=\"ws-from\">1199 East Beach · free parking · 5-min walk to grass · fireworks 9:30 PM</div>\n                  </div>\n                </div>\n                <div class=\"ws-leg\">↓ 0.8 mi walk east on waterfront trail</div>\n                <div class=\"walk-stop\">\n                  <div class=\"ws-num\">→</div>\n                  <div class=\"ws-info\">\n                    <div class=\"ws-name\">Ghirardelli Square 🍦 Birthday Dessert</div>\n                    <div class=\"ws-from\">900 North Point St · birthday sundaes · 0.8 mi waterfront walk from East Beach · open until 11 PM · the birthday dessert finish</div>\n                  </div>\n                </div>\n                <div class=\"nav-col-action\">\n                  <a class=\"mab route\" href=\"https://www.google.com/maps/dir/The+Waterfront+Seafood+Grill,+720+Main+St,+Napa,+CA/Crissy+Field,+San+Francisco,+CA/Ghirardelli+Square,+900+North+Point+St,+San+Francisco,+CA\" target=\"_blank\">Open Evening Route 🚶</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Morning — Bouchon Bakery, Yountville (Arrive 9:01 AM)</div>\n            <ul class=\"tb-list\">\n              <li><strong>Depart Hyatt 8:00 AM sharp.</strong> Drive 61 min (54.5 mi), verified Routes API Jul 4 Sat 8:00 AM. Arrive Yountville 9:01 AM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Bouchon Bakery — Thomas Keller</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">6528 Washington St, Yountville, CA</span>\n                  <span class=\"sc-stat\">Opens 7:00 AM · Takeout</span>\n                  <span class=\"sc-stat\">45 min · Depart 9:46 AM</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Thomas Keller's casual bakery in Yountville — the town he essentially owns (French Laundry is across the street). This is the birthday breakfast. Croissants that shatter at the touch, TKO (Thomas Keller Oreo) cookies, seasonal pastries. The coffee is excellent. Get what looks good and eat outside on Washington St.</p>\n                </div>\n                <div class=\"sc-tip\">Depart Bouchon at 9:46 AM exactly — Sterling check-in is 10:45 AM and you need to arrive at 10:30 AM (15 min early). The drive is 26 min.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=38.402434,-122.361784\" target=\"_blank\" class=\"mab gmaps\">📍 Bouchon Bakery</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Late Morning — Sterling Vineyards, Calistoga (10:30 AM arrive)</div>\n            <ul class=\"tb-list\">\n              <li>Drive: <strong>26 min (17.0 mi)</strong> — verified Routes API, Jul 4 Sat ~9:46 AM. Arrive ~10:12 AM. 18-minute buffer before check-in.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Sterling Vineyards — The Sterling Stroll</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">✅ Booked · Conf. TOCK-R-AE87DB44</span>\n                  <span class=\"sc-stat booked\">10:45 AM · Arrive by 10:30 AM</span>\n                  <span class=\"sc-stat\">1111 Dunaweal Ln, Calistoga, CA 94515</span>\n                  <span class=\"sc-stat\">$192.53 paid · Visa 9942</span>\n                  <span class=\"sc-stat\">~1 hour · Depart ~11:45 AM</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Sterling sits on a hilltop reached by aerial gondola tram — the gondola ride itself is the signature (@discover_california_, 246K, 109,398 views). The Sterling Stroll is a self-guided walking experience through the winery: six wine stations, stunning Napa Valley panoramas, architecture designed around the hillside site.</p>\n                  <p><strong>Booking:</strong> Sterling Stroll ×2 + Non-taster ×1 + Guest 10–20 ×1. The reservation is for 10:45 AM — arrive at the gondola base by 10:30 AM.</p>\n                  <p>Rules: No outside food or alcohol, no pets (service animals OK), no strong perfume/cologne near the wine. <strong>Gondola pauses if temperature exceeds 100°F.</strong></p>\n                </div>\n                <div class=\"sc-tip\">Manage or reschedule at tock.com (search TOCK-R-AE87DB44). Can reschedule or cancel up to 1 day before. Can transfer to another person.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=38.568705,-122.54844\" target=\"_blank\" class=\"mab gmaps\">📍 Sterling Vineyards</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Midday — Napa City / Oxbow Public Market</div>\n            <ul class=\"tb-list\">\n              <li>Drive from Sterling: <strong>38 min (27.5 mi)</strong> — verified Routes API, Jul 4 Sat ~noon. Arrive Oxbow ~12:38 PM.</li>\n            </ul>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name sf\">Oxbow Public Market, Napa</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">610 1st Street, Napa, CA</span>\n                  <span class=\"sc-stat\">Arrive ~12:38 PM</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>Hog Island Oyster Bar</strong> is the anchor — live Pacific oysters from Tomales Bay, raw bar, clam chowder, wine. Perfect post-Sterling stop. The market has multiple vendors: pastries, charcuterie, juice, chocolate. Walk around the market, graze, sit by the Napa River side.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=38.301679,-122.281915\" target=\"_blank\" class=\"mab gmaps\">📍 Oxbow Public Market</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=38.301932,-122.281754\" target=\"_blank\" class=\"mab gmaps\">📍 Hog Island Oyster Bar</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd sf\">Afternoon + Evening — Birthday Dinner + July 4th Fireworks</div>\n            <ul class=\"tb-list\">\n              <li>After Oxbow Market, 5-min drive south on Main St to The Waterfront Seafood Grill. <strong>4:30 PM reservation ✅ confirmed.</strong></li>\n              <li>Enjoy dinner — no rush. Plan to leave Napa around <strong>7:15–7:30 PM</strong> for Crissy Field.</li>\n              <li>Drive US-101 South → Golden Gate Bridge → Crissy Field East Beach parking. Google Maps: 59 min; allow 75 min for July 4th holiday traffic.</li>\n              <li>Park at East Beach lot (1199 East Beach, free). 5-min walk to the open grass field facing the Bay.</li>\n              <li><strong>9:30 PM:</strong> Fireworks launch from barges in the Bay — Golden Gate Bridge to your left, Bay Bridge to your right, SF skyline lit up behind you. Show runs ~20 min.</li>\n              <li>After fireworks (~9:50 PM): 21 min back to the Hyatt Regency.</li>\n            </ul>\n            <div class=\"stop-card\" style=\"border-color:#1A7A5E;border-width:2px;\">\n              <div class=\"sc-hd\" style=\"background:linear-gradient(135deg,#1A7A5E,#2D9B6E);\">\n                <div class=\"sc-name\" style=\"color:white;\">🍽️ The Waterfront Seafood Grill 🎂</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">✅ Confirmed · 4:30 PM · Saturday Jul 4</span>\n                  <span class=\"sc-stat\">720 Main St, Napa, CA 94559</span>\n                  <span class=\"sc-stat\">5 min · 0.4 mi from Oxbow Market</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>What it is:</strong> Napa River waterfront dining — one of the only Napa restaurants literally over the water, with sweeping marina views. 4.2★ TripAdvisor. Birthday dinner for Adam's 22nd. Beautifully presented Pacific seafood; reviewers single out the halibut and service by name.</p>\n                  <p><strong>Best order:</strong> Chilean Sea Bass. Seafood Cioppino (rivals SF's North Beach). Crab Enchiladas. Linguine with Clams. Lobster Bisque. Finish with the Mocha Cake. If you brought a Sterling bottle, corkage is $25.</p>\n                  <p><strong>Address:</strong> 720 Main St, Napa, CA 94559 · (707) 699-2452 · Sat 11:30 AM–9:00 PM</p>\n                  <p><strong>🅿️ Parking:</strong> Street parking on Main St or the lots along Napa River (easy midday/early evening). 5-min drive south from Oxbow Market on Main St. Leave by 7:15–7:30 PM to reach Crissy Field by 8:30 PM for fireworks. 18% gratuity auto-added for 6+.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=38.297359,-122.283712\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"fireworks-banner\">\n              <div class=\"fw-emoji\">🎆</div>\n              <div>\n                <div class=\"fw-title\">July 4th Fireworks — Crissy Field, San Francisco · Adam's 22nd Birthday</div>\n                <div class=\"fw-pills\">\n                  <span class=\"fw-pill\">9:30 PM launch · ~20 min show</span>\n                  <span class=\"fw-pill\">Crissy Field, The Presidio · Free</span>\n                  <span class=\"fw-pill\">Golden Gate Bridge left · Bay Bridge right</span>\n                  <span class=\"fw-pill\">Napa → Crissy Field: 59 min (plan 75 min)</span>\n                  <span class=\"fw-pill\">Leave dinner 7:15–7:30 PM · arrive 8:15–8:45 PM</span>\n                  <span class=\"fw-pill\">Crissy Field → Hyatt: 21 min</span>\n                </div>\n                <div class=\"fw-note\">\n                  Leave The Waterfront Seafood Grill by 7:15–7:30 PM → US-101 South → Golden Gate Bridge → Crissy Field East Beach parking (1199 East Beach, free, no reservation needed). 5-min walk to the open grass field on the Bay. Fireworks launch at 9:30 PM from barges in the Bay — Golden Gate Bridge to your left, Bay Bridge to your right, SF skyline lit up behind you. Show runs approximately 20 minutes. Done by 9:50 PM, home at the Hyatt by 10:10 PM.\n                  <br><br>\n                  <strong>Crissy Field — What to Know:</strong> Free admission (Golden Gate National Recreation Area / National Park Service). East Beach parking lot is free and large — arrive by 8:15 PM to get a spot on July 4th. Walk north from the parking lot toward the water; the open grass field facing the Bay is the viewing area. Dress warm: the waterfront drops into the low 50s after sunset and is consistently windy. Bring blankets, a jacket for everyone, and snacks. Alcohol is not permitted on the beach. No ticket, no wristband, no reservation — just show up.\n                  <br><br>\n                  <strong>Traffic note:</strong> Google Maps Routes API shows 59 min from Napa at 7:15 PM on a Saturday. July 4th holiday adds unpredictability — plan 75 min as your buffer. Leaving by 7:15 PM means arrival by 8:30 PM at the latest even with delays.\n                </div>\n                <div style=\"margin-top:12px\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=37.803,-122.448\" target=\"_blank\" class=\"mab gmaps\">📍 Crissy Field East Beach</a>\n                  <a href=\"https://www.google.com/maps/dir/The+Waterfront+Seafood+Grill,+720+Main+St,+Napa,+CA/Crissy+Field,+San+Francisco,+CA\" target=\"_blank\" class=\"mab route\">🗺️ Napa → Crissy Field Route</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"drive-stat\">\n            <span class=\"drive-val\">~3h 30m total driving</span> · Depart 8:00 AM · 4:30 PM birthday dinner · Crissy Field fireworks 9:30 PM · All times Routes API verified · Pack bags tonight — depart 7:00 AM tomorrow\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- HOTEL CARD -->\n    <div class=\"section-title\">Overnight — 3 Nights</div>\n    <div class=\"hc\">\n      <div class=\"hc-hd\">\n        <span class=\"badge booked\">✅ Booked · Prepaid · NON-REFUNDABLE</span>\n        <div class=\"hc-name\">Hyatt Regency San Francisco</div>\n        <div class=\"hc-loc\">50 Third St, Union Square · San Francisco, CA 94103</div>\n      </div>\n      <div class=\"hc-body\">\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Conf #</span><span class=\"hc-val\">40023B19345813 · Marina Drapkin · World of Hyatt #*****050M</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Check-in</span><span class=\"hc-val\">Thursday Jul 2 · 3:00 PM</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Check-out</span><span class=\"hc-val\">Sunday Jul 5 · 12:00 PM — depart 7:00 AM, bags with concierge if needed</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Rate</span><span class=\"hc-val\">$157.46 (J
