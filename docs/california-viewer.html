font-size: .78rem; font-weight: 700; color: var(--sunset); }\n    .rs-leg-note { font-family: sans-serif; font-size: .68rem; color: var(--mid); }\n\n    .drive-stat { font-family: sans-serif; font-size: .82rem; color: var(--mid); background: var(--sand); border-radius: 8px; padding: 10px 16px; margin: 16px 0; }\n    .drive-val { font-weight: 700; color: var(--sunset); }\n\n    /* TBD Hotel Card */\n    .hc { border: 2px solid #F6AD55; border-radius: 10px; overflow: hidden; margin: 20px 0; }\n    .hc-hd { background: linear-gradient(135deg, #FEF3C7, #FFF9F0); padding: 14px 16px; border-bottom: 1px solid var(--border); }\n    .hc-name { font-family: Georgia, serif; font-size: 1.15rem; color: var(--dark); margin: 6px 0 2px; }\n    .hc-loc { font-family: sans-serif; font-size: .78rem; color: var(--mid); }\n    .hc-body { background: white; padding: 16px; }\n    .hc-row { display: flex; gap: 12px; margin-bottom: 7px; align-items: baseline; }\n    .hc-lbl { font-family: sans-serif; font-size: .68rem; text-transform: uppercase; letter-spacing: .5px; color: var(--mid); font-weight: 700; min-width: 80px; flex-shrink: 0; }\n    .hc-val { font-family: sans-serif; font-size: .82rem; color: var(--dark); }\n\n    .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin: 16px 0; }\n    .fc { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }\n    .fc-hd { background: linear-gradient(135deg, #3D1F00, #C05621); padding: 14px 16px; }\n    .fc-name { font-family: Georgia, serif; font-size: 1.0rem; color: white; }\n    .fc-loc { font-family: sans-serif; font-size: .72rem; color: rgba(255,255,255,.8); margin-top: 4px; }\n    .fc-body { background: white; padding: 14px 16px; }\n    .fc-rating { font-family: sans-serif; font-size: .78rem; color: var(--gold); font-weight: 600; margin-bottom: 6px; }\n    .fc-order { font-family: sans-serif; font-size: .82rem; color: var(--dark); line-height: 1.5; margin-bottom: 6px; }\n    .fc-order strong { color: var(--sunset); }\n    .fc-hours { font-family: sans-serif; font-size: .75rem; color: var(--mid); margin-bottom: 10px; }\n\n    .alerts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin: 16px 0; }\n    .ac { border-radius: 10px; padding: 14px 16px; border: 1px solid var(--border); border-left-width: 4px; }\n    .ac.red { background: #FEF2F2; border-left-color: var(--red); }\n    .ac.amb { background: #FFFBEB; border-left-color: #D97706; }\n    .ac.blu { background: #EBF8FF; border-left-color: #2B6CB0; }\n    .ac.grn { background: #F0FFF4; border-left-color: var(--green); }\n    .ac-icon { font-size: 1.2rem; margin-bottom: 6px; }\n    .ac-title { font-family: sans-serif; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--dark); margin-bottom: 4px; }\n    .ac-text { font-family: sans-serif; font-size: .8rem; color: var(--mid); line-height: 1.55; }\n\n    .si-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin: 16px 0; }\n    .si-card { background: var(--snow); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }\n    .si-quote { font-family: Georgia, serif; font-size: .85rem; color: var(--dark); font-style: italic; margin-bottom: 6px; line-height: 1.5; }\n    .si-source { font-family: sans-serif; font-size: .7rem; color: var(--sunset); font-weight: 600; }\n    .si-location { font-family: sans-serif; font-size: .7rem; color: var(--mid); margin-top: 2px; }\n\n    .departure-card { background: linear-gradient(135deg, #1A202C, #2D3748); border-radius: 12px; padding: 22px 24px; margin: 24px 0; color: white; }\n    .dep-title { font-family: Georgia, serif; font-size: 1.2rem; margin-bottom: 14px; }\n    .dep-row { font-family: sans-serif; font-size: .84rem; margin-bottom: 8px; line-height: 1.5; }\n    .dep-row strong { color: #90CDF4; }\n    .dep-note { font-family: sans-serif; font-size: .78rem; opacity: .8; margin-top: 14px; line-height: 1.6; }\n\n    .footer { background: linear-gradient(135deg, #3D1F00, #C05621); color: rgba(255,255,255,.6); text-align: center; font-family: sans-serif; font-size: .77rem; padding: 22px 24px; margin-top: 48px; border-radius: 10px; }\n    .footer strong { color: white; }\n\n    @media (max-width: 600px) {\n      .hero h1 { font-size: 2.0rem; }\n      .day-hd-title { font-size: 1.1rem; }\n      .overview-strip { grid-template-columns: 1fr 1fr; }\n      .alerts-grid, .food-grid, .si-grid { grid-template-columns: 1fr; }\n      .hc-row { flex-direction: column; gap: 2px; }\n    }\n  <\/style>\n</head>\n<body>\n\n  <div class=\"hero\">\n    <div class=\"hero-sup\">California Road Trip · San Francisco → Los Angeles</div>\n    <h1>Los Angeles</h1>\n    <div class=\"hero-dates\">July 8–12, 2026 · 3 Nights · Days 7–10 + Departure</div>\n    <div class=\"hero-base\">Hotel: TBD — Mom researching · Culver City / Hollywood / Downtown / Koreatown</div>\n    <div class=\"hero-chips\">\n      <span class=\"hchip\">Days 7–10</span>\n      <span class=\"hchip\">⚠️ Hotel Not Yet Booked</span>\n      <span class=\"hchip\">Beverly Hills · Hollywood · Griffith · Santa Monica · Venice</span>\n      <span class=\"hchip\">Depart LAX Jul 12 · 12:17 PM</span>\n    </div>\n  </div>\n\n  <div class=\"wrap\">\n\n    <!-- TBD HOTEL BANNER -->\n    <div class=\"tbd-banner\">\n      <div class=\"tbd-title\">⚠️ Hotel — Not Yet Booked</div>\n      <div class=\"tbd-body\">\n        <strong>3 nights required: Jul 8–11 (Wed → Sat)</strong><br>\n        Mom is researching budget-conscious options. Candidate neighborhoods:\n        <strong>Culver City</strong> (mid-range, 10 min to Venice Beach, good restaurants),\n        <strong>Hollywood</strong> (affordable, 10 min to Griffith, central to everything),\n        <strong>Downtown LA</strong> (cheapest per night, near Grand Central Market and Disney Concert Hall),\n        <strong>Koreatown</strong> (excellent value, central location, best Korean BBQ in the US nearby).<br><br>\n        <strong>Avoid:</strong> Beverly Hills, Santa Monica, West Hollywood — 3 nights there will be $700–$1,000+/night.\n      </div>\n    </div>\n\n    <!-- BOOKING STATUS -->\n    <div class=\"booking-banner\">\n      <div class=\"bb-title\">Booking Status — Los Angeles</div>\n      <div class=\"bb-grid\">\n        <div class=\"bb-item pending\">\n          <span class=\"badge pending\">⚠️ Not Booked</span>\n          <div class=\"bb-name\">LA Hotel — 3 Nights</div>\n          <div class=\"bb-detail\">Jul 8–11 · Wed–Sat · Mom researching neighborhood and price</div>\n        </div>\n        <div class=\"bb-item pending\">\n          <span class=\"badge pending\">⚠️ BOOK TODAY</span>\n          <div class=\"bb-name\">Getty Center Timed Entry</div>\n          <div class=\"bb-detail\">getty.edu · Free admission · Timed entry required in advance · Jul 10–11 · Summer slots fill weeks out — book immediately</div>\n        </div>\n        <div class=\"bb-item pending\">\n          <span class=\"badge pending\">⚠️ Book 1–2 Weeks Out</span>\n          <div class=\"bb-name\">LA Final Dinner (Jul 11)</div>\n          <div class=\"bb-detail\">Sat Jul 11 fills fast · Options: Nobu Malibu, Bestia, Republique, Craig's · Book via OpenTable or direct — do not leave for trip day</div>\n        </div>\n        <div class=\"bb-item confirmed\">\n          <span class=\"badge booked\">✅ Works</span>\n          <div class=\"bb-name\">Santa Monica Farmers Market</div>\n          <div class=\"bb-detail\">Jul 11 (Sat) · 8 AM–1 PM · Arizona Ave &amp; 3rd St · No reservation needed</div>\n        </div>\n      </div>\n    </div>\n\n    <!-- OVERVIEW STRIP -->\n    <div class=\"overview-strip\">\n      <div class=\"ov-card d7\">\n        <div class=\"ov-date\">Wed, Jul 8</div>\n        <div class=\"ov-label\">Day 7 — Arrival</div>\n        <div class=\"ov-note\">Drive from Coronado 2h 31m · Arrive ~3:00 PM · Settle in, explore neighborhood</div>\n      </div>\n      <div class=\"ov-card d8\">\n        <div class=\"ov-date\">Thu, Jul 9</div>\n        <div class=\"ov-label\">Day 8 — Hollywood</div>\n        <div class=\"ov-note\">Beverly Hills · Rodeo Drive · Hollywood Walk of Fame · Chinese Theatre · Disney Concert Hall</div>\n      </div>\n      <div class=\"ov-card d9\">\n        <div class=\"ov-date\">Fri, Jul 10</div>\n        <div class=\"ov-label\">Day 9 — Coast</div>\n        <div class=\"ov-note\">Griffith Observatory · Santa Monica Pier · Venice Boardwalk · Abbot Kinney</div>\n      </div>\n      <div class=\"ov-card d10\">\n        <div class=\"ov-date\">Sat, Jul 11</div>\n        <div class=\"ov-label\">Day 10 — Last Day</div>\n        <div class=\"ov-note\">Farmers Market 8 AM · Getty Center ⚠️ · LACMA Urban Light · Final LA dinner ⚠️ · Pack</div>\n      </div>\n    </div>\n\n    <!-- DAY 7 -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd la\">\n          <div class=\"day-hd-label\">Wednesday, July 8, 2026</div>\n          <div class=\"day-hd-title\">Arrival from Coronado</div>\n          <div class=\"day-hd-sub\">Drive: 2h 31m · 139.7 mi · Depart Coronado ~noon · Arrive LA ~3:00 PM</div>\n        </div>\n        <div class=\"day-body\">\n          <div class=\"map-section\">\n            <div id=\"map-day7\" class=\"seg-map\"></div>\n            <p class=\"map-caption\">Coronado → Los Angeles · 2h 31m · 139.7 mi · I-5 N → I-405 N · Jul 8 Wed ~noon · Routes API verified</p>\n          </div>\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Arrival — Depart Coronado ~Noon</div>\n            <ul class=\"tb-list\">\n              <li><strong>Depart Best Western Plus Coronado before 12:30 PM</strong> — drive 2h 31m (139.7 mi) verified Routes API, Jul 8 Wed ~noon. The I-405 through South Bay/Inglewood can slow down on weekday afternoons.</li>\n              <li>Route: Coronado Bridge → I-5 North → I-405 North → hotel neighborhood. Allow 3 hours to be safe.</li>\n              <li>Arrive hotel ~3:00 PM. Check in. Explore the neighborhood in the evening.</li>\n              <li>Dinner: Whatever is good in the hotel neighborhood. Grand Central Market (downtown, open until 10 PM) or a neighborhood option based on where you're staying.</li>\n            </ul>\n          </div>\n          <div class=\"drive-stat\">\n            <span class=\"drive-val\">2h 31m · 139.7 mi</span> · Coronado → Los Angeles · Routes API verified · Jul 8 Wed ~noon\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- DAY 8 -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd la\">\n          <div class=\"day-hd-label\">Thursday, July 9, 2026</div>\n          <div class=\"day-hd-title\">Beverly Hills · Hollywood · Disney Concert Hall</div>\n          <div class=\"day-hd-sub\">Rideshare recommended in LA — parking is expensive and traffic is real</div>\n        </div>\n        <div class=\"day-body\">\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Morning — Beverly Hills</div>\n            <ul class=\"tb-list\">\n              <li><strong>Rodeo Drive</strong> (Wilshire Blvd to Santa Monica Blvd) — the 3-block famous luxury shopping street. Free to walk. Flagship stores for everything. The architecture at the north end (the curved two-story retail street) is the classic photo spot.</li>\n              <li><strong>Beverly Hills residential streets</strong> north of Sunset Blvd — massive hedged estates, Rolls Royces in driveways, some of the most expensive real estate in the world on streets designed for meandering.</li>\n              <li><strong>The Beverly Hills Hotel \"The Pink Palace\"</strong> (9641 Sunset Blvd) — the iconic pink and green 1912 hotel. The lobby and Polo Lounge are open to non-guests for drinks/food. The banana leaf wallpaper in the Polo Lounge is instantly recognizable.</li>\n            </ul>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Midday — Hollywood</div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Hollywood Walk of Fame</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Hollywood Blvd · La Brea Ave to Gower St · 15 blocks</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">1 hr walk</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>2,700+ stars embedded in the sidewalk honoring entertainers across film, television, music, radio, and theater. Walk the Hollywood Blvd section between La Brea and Gower for the highest concentration. The stars are organized by category (each has a symbol). Notable locations: Marilyn Monroe's star at 6774 Hollywood Blvd · Michael Jackson's star at 6927 Hollywood Blvd.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.101832,-118.336977\" target=\"_blank\" class=\"mab gmaps\">📍 Hollywood Walk of Fame</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Grauman's Chinese Theatre</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">6925 Hollywood Blvd, Hollywood, CA</span>\n                  <span class=\"sc-stat free\">Free to view forecourt</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The famous forecourt with hand and footprints of over 200 Hollywood celebrities in cement — since 1927. Find the prints of your favorites. The theatre exterior is the grand 1920s Chinese imperial architecture. IMAX screenings inside (optional). The forecourt itself is free to enter and walk.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.102023,-118.340971\" target=\"_blank\" class=\"mab gmaps\">📍 Grauman's Chinese Theatre</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Walt Disney Concert Hall</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">111 S Grand Ave, Downtown LA</span>\n                  <span class=\"sc-stat free\">Free exterior &amp; gardens</span>\n                  <span class=\"sc-stat\">30–45 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Frank Gehry's stainless steel masterpiece (2003) — billowing curves of brushed steel that look different from every angle and in every light. The rooftop garden (accessible free) has a Blue Ribbon Garden and a view of the surrounding downtown. The interior is open for self-guided tours when no performance is scheduled.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.055339,-118.249881\" target=\"_blank\" class=\"mab gmaps\">📍 Walt Disney Concert Hall</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Evening</div>\n            <ul class=\"tb-list\">\n              <li><strong>Sunset Strip</strong> (West Hollywood, Sunset Blvd between Crescent Heights and Doheny) — the Whisky a Go Go, Roxy, Rainbow Bar &amp; Grill, the history of rock and roll. Walk a stretch of it after dinner.</li>\n              <li><strong>Little Tokyo</strong> (Downtown, 5 min from Disney Hall) — ramen, udon, Japanese grocery stores, Mikawaya ice cream (mochi originator). One of only three official Japantowns in the United States. Nisei Week festival every August. The Japanese American Cultural Community Center hosts regular cultural performances.</li>\n              <li><strong>LA Chinatown</strong> (Broadway &amp; Hill St, 5 min from Little Tokyo) — neighboring cultural district with red lanterns, ornate buildings, and specialty restaurants. The Central Plaza and East Gate are the main landmarks. Lunar New Year parade here is one of the largest in California. Easy walking distance from Little Tokyo — do both on the same evening.</li>\n              <li><strong>Grand Central Market</strong> (317 S Broadway, Downtown) — 40+ food vendors in a 1917 market hall. Open until 10 PM. DTLA's best casual food hall. Eggslut, Wexler's Deli, Horse Thief BBQ, Sticky Rice, DTLA Cheese. The market is at Broadway &amp; 3rd — walkable from both Chinatown and Little Tokyo.</li>\n              <li><strong>Downtown Los Angeles</strong> — the broader DTLA area within a 5-min radius of Disney Hall: Olvera Street (LA's birthplace, historic Mexican market), the Cathedral of Our Lady of the Angels, the Music Center complex, and the Arts District (east side, street art + converted warehouse galleries).</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- DAY 9 -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd la\">\n          <div class=\"day-hd-label\">Friday, July 10, 2026</div>\n          <div class=\"day-hd-title\">Griffith Observatory · Santa Monica · Venice · Abbot Kinney</div>\n          <div class=\"day-hd-sub\">The coast and the hills</div>\n        </div>\n        <div class=\"day-body\">\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Morning — Griffith Observatory</div>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Griffith Observatory</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">2800 E Observatory Rd, Los Angeles</span>\n                  <span class=\"sc-stat free\">Free Admission</span>\n                  <span class=\"sc-stat\">Opens 10:00 AM weekdays</span>\n                  <span class=\"sc-stat\">Planetarium shows: $10/adult</span>\n                  <span class=\"sc-stat\">1.5–2 hrs</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The city's greatest view point — the 1935 Art Deco observatory on the southern slope of Mount Hollywood with a 360° panorama of the LA basin, the Hollywood Hills, and the Pacific on clear days. The Hollywood Sign is visible from the front lawn looking northwest (this is the most accessible good angle on the sign).</p>\n                  <p>Inside: the Zeiss telescope in the dome (public viewing nights), the Tesla coil, the Foucault pendulum, the triple beam coelostat. Planetarium shows are ticketed ($10/adult) and worth it for the laser show at night — but the building itself is free.</p>\n                  <p>@thisblisslife: \"Sunset = best views. Arrive early.\" — the observatory is at its most dramatic at sunset when the city lights below match the darkening sky. If energy allows, return for the evening.</p>\n                </div>\n                <div class=\"sc-tip\">Drive up or take the DASH Griffith Park shuttle from Vermont/Sunset (free). Parking is limited and fills by noon on weekdays. The Mt. Hollywood Trail (2.5 mi round trip, easy) starts from the observatory and goes to the summit for an even higher view.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.118434,-118.300393\" target=\"_blank\" class=\"mab gmaps\">📍 Griffith Observatory</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Hollywood Sign</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Best viewed from Griffith Observatory lawn or Lake Hollywood Park</span>\n                  <span class=\"sc-stat free\">Free · No access to the sign itself (restricted property)</span>\n                  <span class=\"sc-stat\">Best viewing: Griffith Observatory front lawn · 10 min</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The 450-foot white letter sign on Mount Lee — each letter 45 feet high, the global symbol of Hollywood glamour since 1923. The sign sits on restricted property and cannot be approached, but several viewpoints provide excellent photo opportunities: (1) <strong>Griffith Observatory front lawn</strong> — the most accessible and widely used view, looking northwest from the plaza; (2) <strong>Lake Hollywood Park</strong> (3204 Canyon Lake Dr) — the classic direct-on view that puts the sign front and center; (3) <strong>Hollywood &amp; Highland</strong> — framed view through the Babylon Court arch, easy and central.</p>\n                </div>\n                <div class=\"sc-tip\">The Observatory lawn gives you the sign AND the city panorama in one stop — do both together. Lake Hollywood Park (10 min drive from the Observatory) has the most direct, unobstructed sign view if you want the classic photo.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.134115,-118.321548\" target=\"_blank\" class=\"mab gmaps\">📍 Hollywood Sign (Mount Lee)</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.128037,-118.330792\" target=\"_blank\" class=\"mab gmaps\">📍 Lake Hollywood Park</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Griffith Park</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">4730 Crystal Springs Dr, Los Angeles</span>\n                  <span class=\"sc-stat free\">Free · Largest municipal urban wilderness park in the US</span>\n                  <span class=\"sc-stat\">4,107 acres · Trails, merry-go-round, pony rides, zoo adjacent</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The park that contains the Observatory, the Hollywood Sign approach trails, the LA Zoo, Travel Town Museum, and the Autry Museum of the American West. 4,107 acres of natural terrain — the largest municipal park and urban wilderness area in the United States. The park itself has multiple family-friendly features beyond the Observatory: the Griffith Park Merry-Go-Round (vintage 1926, $3/ride), Pony Rides (weekends), and 53 miles of hiking and horse trails. The Charlie Turner Trailhead near the Observatory gives access to the Brush Canyon Trail (leads to the Hollywood Sign base ridge).</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.136559,-118.294258\" target=\"_blank\" class=\"mab gmaps\">📍 Griffith Park Main Entrance</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Afternoon — Santa Monica · Venice · Abbot Kinney</div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Santa Monica Pier</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">200 Santa Monica Pier, Santa Monica, CA</span>\n                  <span class=\"sc-stat free\">Free to walk · Pacific Park rides separate</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The western terminus of Route 66 — a sign at the end of the pier marks it. Pacific Park's Ferris wheel and rollercoaster are on the pier (tickets optional). 3rd Street Promenade is 2 blocks east — outdoor pedestrian mall with restaurants, performers, shops.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.008288,-118.498724\" target=\"_blank\" class=\"mab gmaps\">📍 Santa Monica Pier</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Venice Boardwalk + Abbot Kinney</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Ocean Front Walk · Venice, CA</span>\n                  <span class=\"sc-stat\">5–10 min from Santa Monica Pier</span>\n                  <span class=\"sc-stat free\">Free</span>\n                  <span class=\"sc-stat\">1–2 hrs</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p><strong>Venice Boardwalk</strong> — Muscle Beach outdoor gym, street performers, roller skaters, fortune tellers, artists, vendors. Chaotic, colorful, uniquely LA. Walk south from the Santa Monica border.</p>\n                  <p><strong>Abbot Kinney Blvd</strong> (3–5 min from boardwalk) — Venice's coolest street. Independent boutiques, coffee roasters (Intelligentsia Venice), bookstores, galleries, farm-to-table restaurants. Named \"coolest block in America\" by GQ. No chains.</p>\n                  <p>@mini.jetsetter (291K, 23,338 views): \"LOS ANGELES WITH KIDS GUIDE\"</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=33.990925,-118.477444\" target=\"_blank\" class=\"mab gmaps\">📍 Venice Boardwalk</a>\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=33.989004,-118.462658\" target=\"_blank\" class=\"mab gmaps\">📍 Abbot Kinney Blvd</a>\n                </div>\n              </div>\n            </div>\n\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Venice Canals Walkway</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat\">Dell Ave &amp; Eastern Canal, Venice, CA (3 blocks from boardwalk)</span>\n                  <span class=\"sc-stat free\">Free · Public walkway</span>\n                  <span class=\"sc-stat\">30–45 min · 1 mi of waterside paths</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>The century-old canal network just 3 blocks from the Venice Boardwalk — a completely different world from the busy waterfront. Six canals lined with historic houses, arched bridges, wooden rowboats, and ducks. Built in 1905 by Abbot Kinney to recreate the ambiance of Venice, Italy. The residential canals are quiet, photogenic, and feel like a hidden village tucked inside the city. Linnie Canal Park has a small playground for kids.</p>\n                  <p>TripAdvisor rates it 4.4 with 2,000+ reviews. The contrast between the chaos of the boardwalk and the quiet of the canals makes this one of the most surprising experiences in LA.</p>\n                </div>\n                <div class=\"sc-tip\">From Abbot Kinney Blvd, walk 2 blocks west on Venice Blvd to reach the canals — it's an easy add-on to the boardwalk visit with no driving required.</div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=33.987042,-118.467726\" target=\"_blank\" class=\"mab gmaps\">📍 Venice Canals</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Evening</div>\n            <ul class=\"tb-list\">\n              <li>Dinner: Venice neighborhood (lots of great options on Abbot Kinney and nearby), <strong>Culver City</strong> (10 min south — excellent restaurant density, lower key than WeHo), or <strong>Malibu</strong> for sunset over the ocean (20 min north on PCH).</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- DAY 10 -->\n    <section>\n      <div class=\"day-section\">\n        <div class=\"day-hd la\">\n          <div class=\"day-hd-label\">Saturday, July 11, 2026 — Last Full Day</div>\n          <div class=\"day-hd-title\">Farmers Market · Getty Center · Final Dinner</div>\n          <div class=\"day-hd-sub\">Pack tonight — depart hotel by 9:00 AM tomorrow for LAX</div>\n        </div>\n        <div class=\"day-body\">\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Morning — Santa Monica Farmers Market (8 AM–1 PM)</div>\n            <div class=\"stop-card\">\n              <div class=\"sc-hd\">\n                <div class=\"sc-name la\">Santa Monica Farmers Market</div>\n                <div class=\"sc-stats\">\n                  <span class=\"sc-stat booked\">✅ Works — Saturday only</span>\n                  <span class=\"sc-stat\">Arizona Ave &amp; 3rd St, Santa Monica</span>\n                  <span class=\"sc-stat\">Sat 8:00 AM–1:00 PM · Year-round</span>\n                  <span class=\"sc-stat\">~$30–50 family</span>\n                </div>\n              </div>\n              <div class=\"sc-body\">\n                <div class=\"sc-notes\">\n                  <p>Founded 1991 — one of California's most celebrated certified farmers markets. 40+ organic farm stands, fresh produce, flowers, honey, artisan goods. The Wednesday version is larger but Saturday works for this trip. Top LA chefs shop here Saturday morning. Walk the whole market, get produce for snacks, buy honey, watch the farmers interact with chefs.</p>\n                </div>\n                <div class=\"map-actions\">\n                  <a href=\"https://www.google.com/maps/search/?api=1&query=34.01661,-118.498872\" target=\"_blank\" class=\"mab gmaps\">📍 Santa Monica Farmers Market</a>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Late Morning / Afternoon — Options</div>\n            <ul class=\"tb-list\">\n              <li>⚠️ <strong>Getty Center</strong> (getty.edu) — NOT BOOKED. Free admission but timed entry required — book in advance. Hilltop campus connected by aerial tram. World-class collection (Impressionists, decorative arts), Richard Meier travertine architecture, formal gardens, panoramic city views. Allow 2–3 hours.</li>\n              <li><strong>LACMA Urban Light</strong> (5905 Wilshire Blvd) — 238 vintage street lamps arranged in a grid, free and accessible 24/7. Iconic LA photo. Takes 20 minutes. The permanent collection inside is also good (admission fee).</li>\n              <li><strong>Koreatown</strong> — best Korean BBQ in the US. All-you-can-eat KBBQ lunch is the move. Jongro BBQ or Soowon Galbi are excellent.</li>\n              <li><strong>Olvera Street</strong> (125 Paseo de la Plaza, Downtown) — LA's oldest street, original 1820s Mexican marketplace. Adobe buildings, folk art, handmade crafts. Free.</li>\n              <li><strong>Mulholland Drive Scenic Route</strong> — Drive the ridge from Cahuenga Pass (US-101) west toward Malibu. Sweeping views of the San Fernando Valley on one side, the LA Basin and ocean on the other. Free, self-paced. Best in the afternoon for visibility. Stop at the overlook near Mulholland &amp; Laurel Canyon for the classic LA panorama shot.</li>\n            </ul>\n          </div>\n\n          <div class=\"time-block\">\n            <div class=\"tb-hd la\">Evening — Final LA Dinner</div>\n            <ul class=\"tb-list\">\n              <li>⚠️ <em>NOT BOOKED — Book 1–2 weeks in advance.</em></li>\n              <li><strong>Nobu Malibu</strong> (22706 PCH, Malibu) — Over-water deck above the Pacific. Japanese-Peruvian fusion. The Black Cod with Miso. Sunset views. Requires advance booking.</li>\n              <li><strong>Bestia</strong> (2121 E 7th Pl, Downtown) — Rustic Italian in the Arts District. Pasta, wood-fire meats, excellent wine list. One of the hardest reservations in LA.</li>\n              <li><strong>Republique</strong> (624 S La Brea Ave, Hollywood) — Walter Manzke's French bistro. Exceptional all-day restaurant. Great for a group dinner.</li>\n              <li><strong>Craig's</strong> (8826 Melrose Ave, West Hollywood) — The celebrity haunt. Classic American food in a red-leather booth restaurant. Fun for a special night.</li>\n              <li>Pack tonight — depart hotel no later than 9:00 AM tomorrow.</li>\n            </ul>\n          </div>\n        </div>\n      </div>\n    </section>\n\n    <!-- HOTEL CARD (TBD) -->\n    <div class=\"section-title\">Overnight — Los Angeles Hotel (Pending)</div>\n    <div class=\"hc\">\n      <div class=\"hc-hd\">\n        <span class=\"badge pending\">⚠️ Not Yet Booked</span>\n        <div class=\"hc-name\">Los Angeles Hotel — TBD</div>\n        <div class=\"hc-loc\">Neighborhood TBD · Culver City / Hollywood / Downtown / Koreatown</div>\n      </div>\n      <div class=\"hc-body\">\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Dates</span><span class=\"hc-val\">Wed Jul 8 – Sat Jul 11 · 3 nights</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Status</span><span class=\"hc-val\" style=\"color:var(--amber);font-weight:700;\">⚠️ Mom researching budget-conscious options — booking pending</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Avoid</span><span class=\"hc-val\">Beverly Hills, Santa Monica, West Hollywood — too expensive for 3 nights</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Target</span><span class=\"hc-val\">Culver City (mid-range, near Venice) · Hollywood (affordable, central) · Downtown (cheapest) · Koreatown (value, central)</span></div>\n        <div class=\"hc-row\"><span class=\"hc-lbl\">Check-out</span><span class=\"hc-val\">Jul 11 morning · Leave hotel by 9:00 AM Jul 12 for LAX</span></div>\n      </div>\n    </div>\n\n    <!-- DEPARTURE CARD -->\n    <div class=\"section-title\">Departure — Sunday, July 12</div>\n    <div class=\"departure-card\">\n      <div class=\"dep-title\">🏁 Final Morning — In-N-Out + LAX Farewell</div>\n      <div class=\"dep-row\"><strong>Leave hotel no later than 9:00 AM</strong> — LAX traffic is unpredictable and the 12:17 PM flight check-in closes 45 min before departure. Terminal 4, American Airlines.</div>\n      <div class=\"dep-row\"><strong>In-N-Out Burger LAX:</strong> 9149 S Sepulveda Blvd · ~0.2 mi from LAX Terminal entrance · The last California meal.</div>\n      <div class=\"dep-row\"><strong>Order:</strong> Double-Double Animal Style (mustard grilled into patty, secret spread, pickles, grilled caramelized onions). Fries well-done or Animal Style. \"Animal Style\" is not on the menu board — ask by name.</div>\n      <div class=\"dep-row\"><strong>Marina &amp; Liam:</strong> AA 3319 · 12:17 PM → PHL 8:39 PM · Seats 28F &amp; 28E · Conf. KYUXME · American Airlines Terminal 4</div>\n      <div class=\"dep-row\"><strong>Adam &amp; Vadim:</strong> Drop Marina &amp; Liam at Terminal 4, then drive home.</div>\n      <div class=\"dep-note\">Drive time from hotel to LAX: ~20–45 min depending on neighborhood and traffic. Add buffer. The 405 to LAX interchange can be very slow on a Sunday morning. Leave by 9:00 AM at the absolute latest.</div>\n      <div class=\"map-actions\" style=\"margin-top:14px;\">\n        <a href=\"https://www.google.com/maps/search/?api=1&query=33.953707,-118.396784\" target=\"_blank\" class=\"mab gmaps\">📍 In-N-Out Burger LAX</a>\n        <a href=\"https://www.google.com/maps/search/?api=1&query=33.941923,-118.40696\" target=\"_blank\" class=\"mab gmaps\">📍 LAX Terminal 4</a>\n      </div>\n    </div>\n\n    <!-- FOOD STRIP -->\n    <div class=\"section-title\">Food &amp; Markets — Los Angeles</div>\n    <div class=\"food-grid\">\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">In-N-Out Burger — Final Meal</div>\n          <div class=\"fc-loc\">9149 S Sepulveda Blvd (across from LAX entrance) · Departure Day Jul 12</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">California institution · Departure morning · Last California food</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Double-Double Animal Style — mustard grilled into the patty, secret spread, pickles, and grilled caramelized onions. Fries: well-done (extra crispy) or Animal Style (cheese sauce, spread, grilled onions). Animal Style is not on the board — ask by name.</div>\n          <div class=\"fc-hours\">Open early AM · Drive-through + dine-in · ~0.2 mi from LAX terminals</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=33.953641,-118.39678\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">Santa Monica Farmers Market</div>\n          <div class=\"fc-loc\">Arizona Ave &amp; 3rd St, Santa Monica · Sat Jul 11 · 8 AM–1 PM</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Since 1991 · 40+ certified organic farms · Rain or shine · Year-round</div>\n          <div class=\"fc-order\"><strong>Browse:</strong> Stone fruits, berries, specialty vegetables, local honey, cut flowers, artisan goods. No specific order — walk the whole market and buy what looks extraordinary. Top LA chefs are here Saturday AM.</div>\n          <div class=\"fc-hours\">$30–50 for a full family browse · Walk 3rd Street Promenade after</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=34.01685,-118.497684\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\">\n        <div class=\"fc-hd\">\n          <div class=\"fc-name\">Grand Central Market</div>\n          <div class=\"fc-loc\">317 S Broadway, Downtown LA · Any Day · Open till 10 PM</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Since 1917 · 40+ vendors · Best casual food variety in DTLA</div>\n          <div class=\"fc-order\"><strong>Highlights:</strong> Eggslut (egg sandwiches, always a line), Wexler's Deli (NYC-style Jewish deli with LA sensibility), Horse Thief BBQ, DTLA Cheese, Sticky Rice. Go for lunch or an early dinner with the group.</div>\n          <div class=\"fc-hours\">Open late · Near Disney Concert Hall · After the Hollywood day</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=34.050872,-118.249055\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n      <div class=\"fc\" style=\"border-color:#0B4F6C;border-width:2px;\">\n        <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#0B4F6C,#1B7A9E);\">\n          <div class=\"fc-name\">Quality Seafood — Redondo Beach Pier</div>\n          <div class=\"fc-loc\">130 International Boardwalk, Redondo Beach · Early AM Option</div>\n        </div>\n        <div class=\"fc-body\">\n          <div class=\"fc-rating\">Multi-level pier fish market · Live tanks · Eat on the pier</div>\n          <div class=\"fc-order\"><strong>Order:</strong> Red sea urchin (local), live blue crab, rock cod, lobster — buy at the market and eat right on the pier boards with the ocean below. One of the most authentic seafood experiences in the LA area.</div>\n          <div class=\"fc-hours\">Early AM solo option for Adam or Vadim · ~30 min from most LA hotels · $40–60 solo outing · (310) 372-6408 · 130 International Boardwalk, Redondo Beach · 30 min from most LA hotels</div>\n          <a href=\"https://www.google.com/maps/search/?api=1&query=33.848798,-118.397675\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n        </div>\n      </div>\n    </div>\n\n    <!-- ALERTS -->\n    <div class=\"section-title\">Alerts &amp; Action Items</div>\n    <div class=\"alerts-grid\">\n      <div class=\"ac red\">\n        <div class=\"ac-icon\">🔴</div>\n        <div class=\"ac-title\">LA Hotel — Book Now</div>\n        <div class=\"ac-text\">Jul 8–11 · 3 nights · Not yet booked. July hotel prices in LA rise as dates approach. Choose neighborhood and book as soon as Mom has researched options.</div>\n      </div>\n      <div class=\"ac amb\">\n        <div class=\"ac-icon\">⚠️</div>\n        <div class=\"ac-title\">Getty Center — Book Timed Entry</div>\n        <div class=\"ac-text\">getty.edu · Free admission but timed entry required · Jul 10 or 11 · The Getty is one of the world's best museums and the hilltop view of the city is extraordinary. Don't skip due to lack of booking.</div>\n      </div>\n      <div class=\"ac amb\">\n        <div class=\"ac-icon\">⚠️</div>\n        <div class=\"ac-title\">Final LA Dinner — Book 1–2 Weeks Out</div>\n        <div class=\"ac-text\">Jul 11 · Best options require advance booking: Nobu Malibu (ocean views), Bestia (Italian, Arts District), Republique (French, Hollywood), Craig's (WeHo celebrity). Don't leave this for last minute.</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">ℹ️</div>\n        <div class=\"ac-title\">LAX Departure — Leave Hotel by 9:00 AM Jul 12</div>\n        <div class=\"ac-text\">AA 3319 departs 12:17 PM. Check-in closes 45 min before. LAX traffic on Sunday AM is real. In-N-Out is 0.2 mi from the terminals — eat there before drop-off. Terminal 4 for American Airlines.</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">ℹ️</div>\n        <div class=\"ac-title\">LA Rideshare vs Driving</div>\n        <div class=\"ac-text\">Rideshare is recommended for most LA days. Parking is expensive ($25–50/day near Hollywood or Beverly Hills) and traffic can make driving more stressful than it's worth. Use the hotel parking as a base and rideshare to attractions.</div>\n      </div>\n    </div>\n\n    <!-- SOCIAL INTEL -->\n    <div class=\"section-title\">Social Intelligence</div>\n    <div class=\"si-grid\">\n      <div class=\"si-card\">\n        <div class=\"si-quote\">\"Sunset = best views at Griffith. Arrive early before the crowds.\"</div>\n        <div class=\"si-source\">@thisblisslife · 4K followers · 319 views</div>\n        <div class=\"si-location\">Griffith Observatory, Los Angeles</div>\n      </div>\n      <div class=\"si-card\">\n        <div class=\"si-quote\">LOS ANGELES WITH KIDS GUIDE — Santa Monica Pier, Venice Boardwalk, Griffith, The Grove.</div>\n        <div class=\"si-source\">@mini.jetsetter · 291K followers · 23,338 views</div>\n        <div class=\"si-location\">Venice / Santa Monica, Los Angeles</div>\n      </div>\n      <div class=\"si-card\">\n        <div class=\"si-quote\">El Matador Beach: \"High tides and good vibes\" — the most dramatic beach in Southern California.</div>\n        <div class=\"si-source\">@visitcalifornia · 825K followers · 8,150 views</div>\n        <div class=\"si-location\">El Matador Beach, Malibu (Day 6)</div>\n      </div>\n    </div>\n\n    <div class=\"footer\" ul 12 · 9:30 AM stop</div>\n            <a href=\"https://www.google.com/maps/search/?api=1&query=33.953641,-118.396780\" target=\"_blank\" class=\"gmap-link food\">📍 Google Maps</a>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"grp-hd\">🐟 Fish Markets — Route-Wide</div>\n      <table class=\"stop-table\">\n        <tr><th>Stop</th><th>Location</th><th>Best Order</th><th>When</th><th>Map</th></tr>\n        <tr style=\"background:#FFFFF0\">\n          <td><div class=\"stop-name\">⭐ Santa Barbara Fish Market</div><div class=\"stop-sub\">FEATURED · PRIMARY fish stop</div></td>\n          <td>117 Harbor Way, Santa Barbara</td>\n          <td>Local Channel Islands red sea urchin (from divers) · live rock crab · oysters · lobster. Buy at the counter, eat at the harbor. $60–100 family.</td>\n          <td>Jul 6 or 7<div class=\"stop-sub\">Mon–Fri 9–6:30 · Sat 7:30–6:30 · (805) 965-9564</div></td>\n          <td><a href=\"https://www.google.com/maps/search/?api=1&query=34.403661,-119.693660\" target=\"_blank\" class=\"gmap-link food\">📍 Map</a></td>\n        </tr>\n        <tr>\n          <td><div class=\"stop-name\">Swan Oyster Depot</div></td>\n          <td>1517 Polk St, San Francisco</td>\n          <td>Uni cracked fresh at marble counter · Dungeness crab legs · half-shell oysters · chowder. Cash only. No reservations.</td>\n          <td>Jul 3 8 AM (optional)<div class=\"stop-sub\">Mon–Sat 8 AM–2:30 PM · Cash only</div></td>\n          <td><a href=\"https://www.google.com/maps/search/?api=1&query=37.790971,-122.420965\" target=\"_blank\" class=\"gmap-link food\">📍 Map</a></td>\n        </tr>\n        <tr>\n          <td><div class=\"stop-name\">Quality Seafood</div><div class=\"stop-sub\">Redondo Beach Pier</div></td>\n          <td>130 International Boardwalk, Redondo Beach</td>\n          <td>Red sea urchin · live blue crab · rock cod · lobster. Buy and eat on the pier boards. $40–60 solo outing. (310) 372-6408.</td>\n          <td>LA days · e maps/search/?api=1&query=37.752653,-122.418223\" target=\"_blank\" class=\"gmap-link food\">📍 Maps</a>\n          </div>\n        </div>\n        <div class=\"fc\">\n          <div class=\"fc-hd\">\n            <div class=\"fc-name\">Scoma's</div>\n            <div class=\"fc-loc\">1965 Al Scoma Way, Fisherman's Wharf · Since 1965</div>\n          </div>\n          <div class=\"fc-body\">\n            <div class=\"fc-rating\">4.7★ / 6,492 OpenTable reviews · SF Chronicle Top 100 2026 · $$$</div>\n            <div class=\"fc-order\"><strong>Order:</strong> Lazy Man's Cioppino (whole Dungeness, clams, mussels, shrimp), Prawns Annuzzi, Dungeness Crab, Clam Chowder. Complimentary valet parking.</div>\n            <div class=\"fc-hours\">Daily 12–9 PM (Fri–Sat until 10 PM) · Reserve OpenTable or (415) 771-4383</div>\n            <a href=\"https://www.google.com/maps/search/?api=1&query=37.808907,-122.418455\" target=\"_blank\" class=\"gmap-link food\">📍 Maps</a>\n          </div>\n        </div>\n        <div class=\"fc\">\n          <div class=\"fc-hd\">\n            <div class=\"fc-name\">Flour + Water</div>\n            <div class=\"fc-loc\">2401 Harrison St, Mission District · Michelin-Selected</div>\n          </div>\n          <div class=\"fc-body\">\n            <div class=\"fc-rating\">Michelin selection · Handmade pasta changes daily</div>\n            <div class=\"fc-order\"><strong>Order:</strong> Pasta tasting menu — changes daily; half-portions available. Neapolitan-style pizza also excellent.</div>\n            <div class=\"fc-hours\">Daily 5–9:30 PM · Reserve on Resy · (415) 826-7000</div>\n            <a href=\"https://www.google.com/maps/search/?api=1&query=37.758937,-122.412283\" target=\"_blank\" class=\"gmap-link food\">📍 Maps</a>\n          </div>\n        </div>\n        <div class=\"fc\">\n          <div class=\"fc-hd\" style=\"background:linear-gradient(135deg,#5C3A1E,#B7730A)\">\n            <div class=\"fc-name\">Dandelion Chocolate</div>\n name:'Santa Monica Seafood',note:'LA days'},\n    {lat:33.848919,lng:-118.397224,type:'food',lbl:'F',name:'Quality Seafood Redondo Beach',note:'LA early AM'},\n    {lat:34.016960,lng:-118.497742,type:'food',lbl:'F',name:'Santa Monica Farmers Market',note:'Sat Jul 11 · 8 AM–1 PM'},\n    {lat:34.050872,lng:-118.249055,type:'food',lbl:'F',name:'Grand Central Market DTLA',note:'Any day Jul 8–11'},\n    {lat:33.953641,lng:-118.396780,type:'food',lbl:'F',name:\"In-N-Out Burger LAX\",note:'Jul 12 departure meal'}\n  ]); };\n\n});\n<\/script>\n<style>.goog-te-banner-frame,.skiptranslate{display:none!important}body{top:0!important}.goog-te-gadget{display:none!important}<\/style><div id=\"google_translate_element\" style=\"display:none\"></div><script>var _pendingLang=null;document.addEventListener(\"DOMContentLoaded\",function(){window.parent.postMessage({type:\"page-ready\"},\"*\");});function _doTranslate(lang){_pendingLang=lang;var tries=0;var t=setInterval(function(){var s=document.querySelector(\".goog-te-combo\");if(s){clearInterval(t);s.value=_pendingLang;s.dispatchEvent(new Event(\"change\"));}else if(++tries>60){clearInterval(t);}},200);}function googleTranslateElementInit(){new google.translate.TranslateElement({pageLanguage:\"en\",autoDisplay:false},\"google_translate_element\");if(_pendingLang&&_pendingLang!==\"en\"){setTimeout(function(){_doTranslate(_pendingLang);},800);}}window.addEventListener(\"message\",function(e){if(e&&e.data&&e.data.type===\"translate\"){_doTranslate(e.data.lang);}});<\/script><script async src=\"//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit\"><\/script></body>\n</html>\n"];
const LABELS    = ["california-routes", "sf-guide", "bigsur-guide", "centralcoast-guide", "sandiego-guide", "la-guide", "logistics-guide"];
const GRADIENTS = ["linear-gradient(135deg, #0B4F6C 0%, #1B7A9E 40%, #C05621 80%, #B7730A 100%)", "linear-gradient(160deg, #0B4F6C, #1B7A9E, #3A6B4A)", "linear-gradient(160deg, #1A3D2B, #3A6B4A, #6B4226)", "linear-gradient(160deg, #5C3A1E, #B7730A, #C05621)", "linear-gradient(160deg, #0B4F6C, #1B7A9E, #0D6B7A)", "linear-gradient(160deg, #3D1F00, #C05621, #B7730A)", "linear-gradient(135deg,#0B4F6C 0%,#1B7A9E 40%,#C05621 80%,#B7730A 100%)"];
let current = 0;
const track       = document.getElementById('track');
const strip       = document.getElementById('strip');
const stripWrapper= document.getElementById('stripWrapper');
const btnPrev     = document.getElementById('btnPrev');
const btnNext     = document.getElementById('btnNext');
const curPageEl   = document.getElementById('curPage');
const totalPagesEl= document.getElementById('totalPages');
const pageTitleEl = document.getElementById('pageTitle');

// ── Build slides + thumbnails ────────────────────────────────
function init() {
  totalPagesEl.textContent = PAGES.length;
  PAGES.forEach((html, i) => {
    // Slide
    const slide = document.createElement('div');
    slide.className = 'slide';
    const loader = document.createElement('div');
    loader.className = 'slide-loader';
    loader.innerHTML = '<div class="spinner"></div><span>Loading…</span>';
    slide.appendChild(loader);
    const iframe = document.createElement('iframe');
    iframe.title = 'Slide ' + (i + 1);
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox');
    if (i === 0) {
      const hide0 = () => loader.classList.add('hidden');
      iframe.onload = hide0;
      setTimeout(hide0, 6000);
      iframe.srcdoc = html;
    }
    slide.appendChild(iframe);
    track.appendChild(slide);

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'thumb' + (i === 0 ? ' active' : '');
    thumb.setAttribute('role', 'button');
    thumb.setAttribute('tabindex', '0');
    thumb.setAttribute('aria-label', 'Go to slide ' + (i + 1) + ': ' + LABELS[i]);
    thumb.innerHTML = `<span class="thumb-num">${i + 1}</span>
      <div class="thumb-preview" style="background:${GRADIENTS[i]}"></div>
      <div class="thumb-label">${LABELS[i]}</div>`;
    thumb.addEventListener('click', () => goTo(i));
    thumb.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goTo(i); } });
    strip.appendChild(thumb);
  });
  goTo(0, false);
}

// ── Navigation ───────────────────────────────────────────────
function goTo(index, animate = true) {
  if (index < 0 || index >= PAGES.length) return;
  current = index;
  if (!animate) track.style.transition = 'none';
  track.style.transform = `translateX(-${current * 100}%)`;
  if (!animate) requestAnimationFrame(() => { track.style.transition = ''; });
  loadSlide(index); loadSlide(index + 1); loadSlide(index - 1);
  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === current));
  const at = strip.children[current];
  if (at) at.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === PAGES.length - 1;
  curPageEl.textContent  = current + 1;
  pageTitleEl.textContent = LABELS[current];
  // Re-apply active translation to this slide
  if (typeof currentLang !== 'undefined' && currentLang !== 'en') {
    var _tf = track.querySelectorAll('.slide iframe')[index];
    if (_tf) setTimeout(function() {
      try { _tf.contentWindow.postMessage({type:'translate',lang:currentLang},'*'); } catch(ex) {}
    }, 400);
  }
}

function loadSlide(index) {
  if (index < 0 || index >= PAGES.length) return;
  const slide  = track.querySelectorAll('.slide')[index];
  if (!slide) return;
  const iframe = slide.querySelector('iframe');
  const loader = slide.querySelector('.slide-loader');
  if (iframe && !iframe.srcdoc) {
    const hide = () => { if (loader) loader.classList.add('hidden'); };
    iframe.onload = hide;
    setTimeout(hide, 6000);
    iframe.srcdoc = PAGES[index];
  }
}

// Hide loader and re-apply active language when a page signals DOMContentLoaded
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'page-ready') return;
  document.querySelectorAll('.slide iframe').forEach(function(f) {
    try {
      if (f.contentWindow === e.source) {
        var loader = f.parentElement.querySelector('.slide-loader');
        if (loader) loader.classList.add('hidden');
        if (typeof currentLang !== 'undefined' && currentLang !== 'en') {
          var _pf = f;
          setTimeout(function() {
            try { _pf.contentWindow.postMessage({type:'translate',lang:currentLang},'*'); } catch(ex) {}
          }, 600);
        }
      }
    } catch(err) {}
  });
});

// ── Button handlers ──────────────────────────────────────────
btnPrev.addEventListener('click', () => goTo(current - 1));
btnNext.addEventListener('click', () => goTo(current + 1));

// ── Keyboard ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.activeElement && document.activeElement.tagName === 'IFRAME') return;
  switch (e.key) {
    case 'ArrowRight': case 'ArrowDown': case 'PageDown':
      e.preventDefault(); goTo(current + 1); break;
    case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
      e.preventDefault(); goTo(current - 1); break;
    case 'Home': e.preventDefault(); goTo(0); break;
    case 'End':  e.preventDefault(); goTo(PAGES.length - 1); break;
    case 'f': case 'F': toggleFullscreen(); break;
    case 'g': case 'G': toggleStrip(); break;
    case 't': case 'T': toggleTheme(); break;
  }
});

// ── Touch swipe ──────────────────────────────────────────────
let tX = 0, tY = 0, drag = false, dDelta = 0;
const vp = document.getElementById('viewport');
vp.addEventListener('touchstart', e => { tX = e.touches[0].clientX; tY = e.touches[0].clientY; drag = false; dDelta = 0; }, { passive: true });
vp.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - tX, dy = e.touches[0].clientY - tY;
  if (!drag && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) drag = true;
  if (drag) { dDelta = dx; track.style.transition = 'none'; track.style.transform = `translateX(calc(${-current * 100}% + ${(dDelta / vp.clientWidth) * 100}%))`; }
}, { passive: true });
vp.addEventListener('touchend', () => {
  if (!drag) return;
  track.style.transition = '';
  const th = vp.clientWidth * 0.2;
  if (dDelta < -th) goTo(current + 1); else if (dDelta > th) goTo(current - 1); else goTo(current);
  drag = false; dDelta = 0;
});

// ── Mouse drag ───────────────────────────────────────────────
let mX = 0, mDown = false, mDelta = 0;
vp.addEventListener('mousedown', e => { if (e.target.tagName === 'IFRAME') return; mDown = true; mX = e.clientX; mDelta = 0; vp.style.cursor = 'grabbing'; });
window.addEventListener('mousemove', e => {
  if (!mDown) return; mDelta = e.clientX - mX;
  if (Math.abs(mDelta) > 5) { track.style.transition = 'none'; track.style.transform = `translateX(calc(${-current * 100}% + ${(mDelta / vp.clientWidth) * 100}%))`; }
});
window.addEventListener('mouseup', () => {
  if (!mDown) return; mDown = false; vp.style.cursor = '';
  if (Math.abs(mDelta) < 5) return;
  track.style.transition = '';
  const th = vp.clientWidth * 0.15;
  if (mDelta < -th) goTo(current + 1); else if (mDelta > th) goTo(current - 1); else goTo(current);
  mDelta = 0;
});

// ── Strip toggle ─────────────────────────────────────────────
let stripOpen = false;
function toggleStrip() { stripOpen = !stripOpen; stripWrapper.classList.toggle('open', stripOpen); }
document.getElementById('btnStrip').addEventListener('click', toggleStrip);

// ── Theme toggle ─────────────────────────────────────────────
let theme = document.documentElement.getAttribute('data-theme') || 'dark';
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('btnTheme');
  btn.innerHTML = theme === 'dark'
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
}
document.getElementById('btnTheme').addEventListener('click', toggleTheme);

// ── Fullscreen ───────────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen().catch(() => {});
}
document.getElementById('btnFullscreen').addEventListener('click', toggleFullscreen);


// ── Google Translate ──────────────────────────────────────────
const LANGUAGES = [["English", "en"], ["Spanish", "es"], ["French", "fr"], ["German", "de"], ["Portuguese", "pt"], ["Italian", "it"], ["Japanese", "ja"], ["Korean", "ko"], ["Chinese", "zh-CN"], ["Arabic", "ar"], ["Hindi", "hi"], ["Russian", "ru"]];
let currentLang = 'en';

function applyTranslation(langCode) {
  document.querySelectorAll('.slide iframe').forEach(function(f) {
    try { f.contentWindow.postMessage({type:'translate', lang:langCode}, '*'); } catch(e) {}
  });
}

function setLanguage(code, label) {
  currentLang = code;
  document.getElementById('langLabel').textContent = label;
  document.querySelectorAll('.lang-option').forEach(el => {
    el.classList.toggle('active', el.dataset.lang === code);
  });
  applyTranslation(code);
  closeLangDropdown();
}

function closeLangDropdown() {
  document.getElementById('langDropdown').classList.remove('open');
  document.getElementById('btnTranslate').setAttribute('aria-expanded', 'false');
}

document.getElementById('btnTranslate').addEventListener('click', (e) => {
  e.stopPropagation();
  const dd = document.getElementById('langDropdown');
  const isOpen = dd.classList.toggle('open');
  document.getElementById('btnTranslate').setAttribute('aria-expanded', isOpen);
});

document.querySelectorAll('.lang-option').forEach(el => {
  el.addEventListener('click', () => {
    const code = el.dataset.lang;
    const label = el.textContent.trim();
    setLanguage(code, label);
  });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
  });
});

document.addEventListener('click', (e) => {
  if (!document.getElementById('translateWrap').contains(e.target)) {
    closeLangDropdown();
  }
});

// Keyboard shortcut L
document.addEventListener('keydown', e => {
  if ((e.key === 'l' || e.key === 'L') && !e.target.matches('input,textarea')) {
    const dd = document.getElementById('langDropdown');
    const isOpen = dd.classList.toggle('open');
    document.getElementById('btnTranslate').setAttribute('aria-expanded', isOpen);
  }
});


init();
</script>
