olor:#991B1B}.opt-box.b .opt-title{color:#78350F}\n    .opt-text{font-family:sans-serif;font-size:.82rem;color:var(--dark);line-height:1.55}\n\n    /* BISON PROTOCOL */\n    .bison-box{background:linear-gradient(135deg,#3D1805,#6B2A08);color:white;border-radius:14px;padding:26px 30px;margin-bottom:32px}\n    .bp-title{font-size:1.15rem;margin-bottom:5px}\n    .bp-sub{font-family:sans-serif;font-size:.81rem;opacity:.72;margin-bottom:18px}\n    .bp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}\n    .bp-step{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);border-radius:9px;padding:13px 15px}\n    .bp-num{font-family:sans-serif;font-size:.67rem;opacity:.6;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}\n    .bp-text{font-family:sans-serif;font-size:.82rem;line-height:1.5}\n\n    /* INSIDER / RULES */\n    .intel-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}\n    @media(max-width:660px){.intel-grid{grid-template-columns:1fr}}\n    .intel-card{background:white;border:1px solid var(--border);border-radius:10px;padding:15px 17px}\n    .ic-num{font-family:sans-serif;font-size:.68rem;color:var(--ys3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}\n    .ic-title{font-family:sans-serif;font-size:.87rem;font-weight:700;color:var(--ys);margin-bottom:5px}\n    .ic-text{font-family:sans-serif;font-size:.81rem;color:var(--dark);line-height:1.55}\n\n    .rules-list{display:flex;flex-direction:column;gap:12px}\n    .rule-card{background:white;border:1px solid var(--border);border-radius:10px;padding:15px 18px;display:flex;gap:12px;align-items:flex-start}\n    .rule-icon{font-size:1.3rem;flex-shrink:0;padding-top:2px}\n    .rule-title{font-family:sans-serif;font-size:.87rem;font-weight:700;color:var(--ys);margin-bottom:3px}\n    .rule-text{font-family:sans-serif;font-size:.81rem;color:var(--dark);line-height:1.55}\n    .rule-text strong{color:var(--red)}\n\n    /* WILDLIFE */\n    .wl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}\n    .wl-card{background:white;border:1px solid var(--border);border-radius:9px;padding:12px 14px}\n    .wl-name{font-size:.97rem;color:var(--ys);margin-bottom:3px}\n    .wl-prob{font-family:sans-serif;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}\n    .wl-where{font-family:sans-serif;font-size:.76rem;color:var(--mid);line-height:1.4}\n    .cert{color:var(--ys)}.hi{color:var(--green)}.mod{color:var(--amber)}\n\n    /* CONTACTS */\n    .contacts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px}\n    .cc{background:white;border:1px solid var(--border);border-radius:10px;padding:15px 17px}\n    .cc-label{font-family:sans-serif;font-size:.67rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--ys2);margin-bottom:5px;font-weight:700}\n    .cc-val{font-family:sans-serif;font-size:.88rem;color:var(--dark);font-weight:600;margin-bottom:2px}\n    .cc-note{font-family:sans-serif;font-size:.76rem;color:var(--mid);line-height:1.4}\n\n    /* FOOTER */\n    .footer{background:var(--ys);color:rgba(255,255,255,.55);text-align:center;padding:22px;font-family:sans-serif;font-size:.77rem}\n    .footer strong{color:white}\n  <\/style>\n</head>\n<body>\n\n<!-- HERO -->\n<div class=\"hero\">\n  <div class=\"hero-sup\">Field Guide · Grand American Loop</div>\n  <h1>Yellowstone National Park</h1>\n  <div class=\"hero-dates\">June 25 – 28, 2026</div>\n  <div class=\"hero-base\">Base Camp: Canyon Campground · Canyon Village · 7,900 ft elevation</div>\n  <div class=\"hero-chips\">\n    <span class=\"hchip\">3 nights</span>\n    <span class=\"hchip\">$35 / vehicle · 7-day pass</span>\n    <span class=\"hchip\">No timed entry · Open 24/7</span>\n    <span class=\"hchip\">Canyon VC: 8am–7pm daily</span>\n  </div>\n</div>\n\n<div class=\"wrap\">\n\n  <!-- LIVE NPS ALERTS -->\n  <div class=\"banner-alert\" style=\"margin-top:32px\">\n    <div class=\"ac-icon\">🚨</div>\n    <div class=\"bn-title\">Live NPS Alerts — Verified June 2026</div>\n    <div class=\"bn-text\">\n      <strong>1. Biscuit Basin area closed</strong> — Trails, backcountry campsites, and fishing areas near Biscuit Basin closed until further notice (bear-caused human injury investigation). <strong>Mystic Falls Trail affected.</strong> Do not include this trail in plans until reopened.<br><br>\n      <strong>2. Elk calves — Dangerous at Mammoth</strong> — Elk calves may be hidden near buildings, vehicles, and blind corners, particularly at Mammoth Hot Springs. Cow elk protecting calves are aggressive. Stay alert and give wide berth.<br><br>\n      <strong>3. Gardner River High Bridge traffic</strong> — Single-lane delays up to 15 minutes, 24/7, through late October 2026. Affects North Entrance route. Budget extra time if routing through Gardiner.\n    </div>\n  </div>\n\n  <!-- JUNE ADVANTAGE -->\n  <div class=\"banner-ys\">\n    <div class=\"bn-label\">June Advantage</div>\n    <div class=\"bn-title\">You arrive during peak spring runoff. The waterfalls are at maximum power.</div>\n    <div class=\"bn-text\">The Lower Falls of the Grand Canyon can push <strong style=\"color:#FCD68A\">up to 63,500 gallons per second</strong> in June. Best waterfall month of the year. Canyon Campground confirmed open May 29 — operational for your June 25 arrival. No reservations, no timed entry.</div>\n  </div>\n\n  <!-- 4-DAY OVERVIEW -->\n  <div class=\"banner-blue\">\n    <div class=\"bn-label\" style=\"color:#0E4A56;opacity:1\">Your 4 Days — At a Glance</div>\n    <div class=\"days-overview\">\n      <div class=\"do-card arrival\">\n        <div class=\"do-date\">June 25</div>\n        <div class=\"do-label\">Arrival Evening</div>\n        <div class=\"do-note\">Drive in from Glacier (6h 53m) · Canyon rims if energy allows</div>\n      </div>\n      <div class=\"do-card full1\">\n        <div class=\"do-date\">June 26</div>\n        <div class=\"do-label\">Full Day 1</div>\n        <div class=\"do-note\">Go South — Hayden Valley · Grand Prismatic · Old Faithful · Mud Volcano</div>\n      </div>\n      <div class=\"do-card full2\">\n        <div class=\"do-date\">June 27</div>\n        <div class=\"do-label\">Full Day 2</div>\n        <div class=\"do-note\">Go Northeast — Lamar Valley · Trout Lake · Canyon rims full afternoon</div>\n      </div>\n      <div class=\"do-card depart\">\n        <div class=\"do-date\">June 28</div>\n        <div class=\"do-label\">Departure</div>\n        <div class=\"do-note\">Final Artist Point · Checkout 11am · Drive to Spokane</div>\n      </div>\n    </div>\n    <p style=\"font-family:sans-serif;font-size:.8rem;color:var(--mid);margin-top:8px\">Two directions: south into geothermal country, northeast into wolf and bison territory. Canyon is your base and anchor throughout.</p>\n  </div>\n\n</div>\n\n<hr class=\"div\">\n\n<!-- ALERTS -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">All Alerts — 2026</div>\n    <div class=\"sec-sub\">Review before each morning departure</div>\n    <div class=\"alerts-grid\">\n      <div class=\"ac red\">\n        <div class=\"ac-icon\">🚧</div>\n        <div class=\"ac-title\">Dunraven Pass — Major Reconstruction</div>\n        <div class=\"ac-text\"><strong>CALL 307-344-2117 morning of June 27</strong> before any Lamar Valley departure. If closed, detour via Norris adds 45 min each way. Text 82190 to 888-777 for live road alerts.</div>\n      </div>\n      <div class=\"ac red\">\n        <div class=\"ac-icon\">🚫</div>\n        <div class=\"ac-title\">Boiling River — Permanently Closed</div>\n        <div class=\"ac-text\">Closed since 2022 floods. Not reopening. <strong>Remove from plans entirely.</strong></div>\n      </div>\n      <div class=\"ac red\">\n        <div class=\"ac-icon\">🐻</div>\n        <div class=\"ac-title\">Biscuit Basin Trails — Closed</div>\n        <div class=\"ac-text\">Trails near Biscuit Basin closed pending bear injury investigation. <strong>Mystic Falls Trail affected.</strong> Verify status at Canyon VC before attempting. West Thumb Geyser Basin is unaffected.</div>\n      </div>\n      <div class=\"ac amb\">\n        <div class=\"ac-icon\">⚠️</div>\n        <div class=\"ac-title\">Road Construction — System-Wide</div>\n        <div class=\"ac-text\">Paving and bridge work throughout. Budget <strong>up to 30-minute delays</strong> on any road. Gardner River bridge: 15-min delays 24/7 through October.</div>\n      </div>\n      <div class=\"ac amb\">\n        <div class=\"ac-icon\">⚠️</div>\n        <div class=\"ac-title\">Firehole Swimming — Verify Status</div>\n        <div class=\"ac-text\">Closed in 2025. Verify 2026 status at park entrance or Canyon VC. Do not plan around it until confirmed open.</div>\n      </div>\n      <div class=\"ac blu\">\n        <div class=\"ac-icon\">📱</div>\n        <div class=\"ac-title\">No Cell Service — Download Before You Go</div>\n        <div class=\"ac-text\">2.2M acres, minimal signal even in developed areas. <strong>Download the NPS app offline + Google Maps offline</strong> before leaving service range. Pick up physical maps at the entrance gate.</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- PARK BASICS -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">Park Basics</div>\n    <div class=\"sec-sub\">Entry, weather, gear</div>\n    <div class=\"basics-grid\">\n      <div class=\"basic-card\">\n        <div class=\"bc-label\">Entry</div>\n        <div class=\"bc-val\">$35 / vehicle</div>\n        <div class=\"bc-note\">7-day pass. No timed entry or vehicle reservations in 2026. Canyon Campground open since May 29.</div>\n      </div>\n      <div class=\"basic-card\">\n        <div class=\"bc-label\">Weather · Canyon Village (7,900 ft)</div>\n        <div class=\"bc-val\">60–80°F days · 29–32°F nights</div>\n        <div class=\"bc-note\">Near-freezing nights normal in late June. June = wettest month (rain, storms, even snow). Afternoon storms common. Layer constantly.</div>\n      </div>\n      <div class=\"basic-card\">\n        <div class=\"bc-label\">Essential Gear</div>\n        <div class=\"bc-val\">Layers every single day</div>\n        <div class=\"bc-note\">Rain jacket · Warm fleece/down · Binoculars (critical for wildlife) · Offline NPS app · Physical map from entrance · Sun protection at elevation</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ ARRIVAL EVENING ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd arrival\">\n        <div class=\"day-hd-label\">June 25 — Evening Arrival</div>\n        <div class=\"day-hd-title\">Arrive from Glacier · 6h 53m drive · Canyon Village</div>\n        <div class=\"day-hd-sub\">Light evening activities only — you've been driving all day</div>\n      </div>\n      <div class=\"day-body\">\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">On Arrival</div>\n          <ul class=\"tb-list\">\n            <li>Check in Canyon Campground (after 1pm check-in, but arriving evening is fine)</li>\n            <li>Walk to <strong>Canyon Visitor Center</strong> (8am–7pm, summer) — pick up maps, confirm June 27 road status for Lamar Valley, check Biscuit Basin closure status</li>\n            <li>Get current road conditions from the rangers — this 10-minute conversation sets up both full days</li>\n          </ul>\n        </div>\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Evening — Canyon Rims (if energy allows)</div>\n          <ul class=\"tb-list\">\n            <li><strong>Artist Point</strong> (South Rim, 0.3 mi paved) — your first Yellowstone view. In late afternoon/evening light, the canyon walls glow orange. You're right at your campsite. This requires almost nothing from you.</li>\n            <li>Walk 1/8 mile past the main Artist Point overlook — views most visitors never reach</li>\n            <li>If tired: that's fine. Canyon is right here. You'll do it properly on Day 2 afternoon.</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ FULL DAY 1 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd full1\">\n        <div class=\"day-hd-label\">June 26 · Full Day 1</div>\n        <div class=\"day-hd-title\">Go South — The Geothermal Loop</div>\n        <div class=\"day-hd-sub\">Hayden Valley · Grand Prismatic · Old Faithful · Upper Geyser Basin · Mud Volcano return</div>\n      </div>\n      <div class=\"day-body\">\n\n        <!-- DAY 1 MAP -->\n        <div id=\"map-day1\" class=\"topo-map-lg\"></div>\n        <p class=\"map-caption\">Day 1 route: Canyon Village → south through Hayden Valley → Fairy Falls TH → Old Faithful → return north via Mud Volcano · ~110 miles round trip</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/44.7353,-110.4995/44.6603,-110.4906/44.5434,-110.8444/44.5250,-110.8383/44.4605,-110.8281/44.6461,-110.4269\" target=\"_blank\" class=\"mab route\">🗺️ Open Full Day Route in Google Maps</a>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Morning — Depart 9:00am (Ideal Timing)</div>\n          <ul class=\"tb-list\">\n            <li><strong>9:00am depart</strong> Canyon Village heading south. 9am is actually optimal — less steam at Grand Prismatic by the time you arrive, most vivid colors.</li>\n            <li>Drive slowly south through <strong>Hayden Valley</strong> — windows down, speed 15 mph, scan slopes. 8–11am is a productive secondary wildlife window for grizzlies. You'll pass through Hayden both directions today.</li>\n          </ul>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Grand Prismatic — Use the Fairy Falls Trailhead</div>\n          <ul class=\"tb-list\">\n            <li>Do NOT park at the main Midway Geyser Basin lot — fills by 9–10am with no overflow. Fairy Falls TH has two lots, always available.</li>\n          </ul>\n\n          <!-- TRAIL: Grand Prismatic Overlook -->\n          <div class=\"trail-card\">\n            <div class=\"tc-hd\">\n              <div>\n                <div class=\"tc-name\">Grand Prismatic Overlook Trail</div>\n                <div class=\"tc-stats\">\n                  <span class=\"tc-stat\">1.2 mi RT</span>\n                  <span class=\"tc-stat easy\">Easy</span>\n                  <span class=\"tc-stat\">~100 ft gain</span>\n                  <span class=\"tc-stat\">45–60 min</span>\n                  <span class=\"tc-stat\">NPS: Easy · 1–2 hrs</span>\n                </div>\n              </div>\n              <a href=\"https://www.alltrails.com/trail/us/wyoming/grand-prismatic-hot-spring\" target=\"_blank\" class=\"at-btn\">AllTrails ↗</a>\n            </div>\n            <div class=\"tc-body\">\n              <div id=\"map-prismatic\" class=\"topo-map-sm\"></div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=44.5434,-110.8444\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n              </div>\n              <div class=\"tc-notes\">\n                <p>Gradual uphill from Fairy Falls TH to the overlook. At the top: the aerial rainbow view — brilliant blue center (240°F water), orange/red/yellow rings of thermophilic bacteria in cooling zones. This is the most iconic image in all of Yellowstone.</p>\n                <p><strong>9:30am arrival = ideal.</strong> Early morning steam obscures the colors. By 9:30–10am the steam has lifted and the blues and oranges are most vivid. You're arriving at the perfect time.</p>\n              </div>\n              <div class=\"tc-warn\">Stay on the boardwalk at all times. The crust over geothermal features can be inches thick over boiling water. Off-trail deaths have occurred. No exceptions for photos or any other reason.</div>\n            </div>\n          </div>\n\n          <ul class=\"tb-list\" style=\"margin-top:4px\">\n            <li>After the overlook, do the <strong>Midway Geyser Basin boardwalk</strong> (1.0 mi loop, flat, accessible) from the Midway lot — ground-level Prismatic up-close. Pair them together: overlook first, boardwalk second.</li>\n          </ul>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Midday — Old Faithful</div>\n          <ul class=\"tb-list\">\n            <li>Drive south to Old Faithful (~20 min from Midway). Arrive ~noon.</li>\n            <li>Check predicted eruption times on the board at the Visitor Center immediately on arrival.</li>\n            <li>Watch from the <strong>Old Faithful Inn balcony</strong> (second floor, outdoor, no room fee). Better sightline than the crowded boardwalk below.</li>\n            <li>Erupts every ~90 minutes. Average eruption: 1–5 minutes.</li>\n          </ul>\n\n          <!-- TRAIL: Observation Point (optional) -->\n          <div class=\"trail-card\">\n            <div class=\"tc-hd\">\n              <div>\n                <div class=\"tc-name\">Observation Point Loop</div>\n                <div class=\"tc-stats\">\n                  <span class=\"tc-stat\">1.6 mi RT</span>\n                  <span class=\"tc-stat moderate\">Moderate</span>\n                  <span class=\"tc-stat\">~160 ft gain</span>\n                  <span class=\"tc-stat\">1–1.5 hrs</span>\n                  <span class=\"tc-stat\">NPS: Moderate · 1–3 hrs</span>\n                </div>\n              </div>\n              <a href=\"https://www.alltrails.com/trail/us/wyoming/geyser-hill-loop-trail-and-observation-point\" target=\"_blank\" class=\"at-btn\">AllTrails ↗</a>\n            </div>\n            <div class=\"tc-body\">\n              <div id=\"map-observation\" class=\"topo-map-sm\"></div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=44.4617,-110.8301\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n              </div>\n              <div class=\"tc-notes\">\n                <p>Switchbacks up the hillside above Old Faithful to a commanding elevated bird's-eye view of the entire Upper Geyser Basin — Old Faithful below you, the geyser field extending in every direction. Far fewer people than the boardwalk. <strong>Optional</strong> — do this instead of the boardwalk crowd if you have energy.</p>\n              </div>\n              <div class=\"tc-tip\">The best time to do this: climb up <em>before</em> the next eruption, be at the overlook when Old Faithful goes off below you. Use the predicted eruption board to time your ascent.</div>\n            </div>\n          </div>\n\n          <ul class=\"tb-list\">\n            <li>After Old Faithful: walk the <strong>Upper Geyser Basin loop</strong> (2 hrs, boardwalk) — Castle Geyser, Grand Geyser, Riverside Geyser, Morning Glory Pool. More active geysers per square mile than anywhere on Earth. <strong>Don't leave in the traffic wave immediately after the eruption.</strong> Walk the basin first, then leave.</li>\n          </ul>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Return North — Mud Volcano Add-On</div>\n          <ul class=\"tb-list\">\n            <li>Drive back north toward Canyon. Stop at <strong>Mud Volcano</strong> on the way — it's right on the route.</li>\n          </ul>\n\n          <!-- TRAIL: Mud Volcano -->\n          <div class=\"trail-card\">\n            <div class=\"tc-hd\">\n              <div>\n                <div class=\"tc-name\">Mud Volcano Trail</div>\n                <div class=\"tc-stats\">\n                  <span class=\"tc-stat\">1.5 mi loop</span>\n                  <span class=\"tc-stat easy\">Easy*</span>\n                  <span class=\"tc-stat\">~50 ft gain</span>\n                  <span class=\"tc-stat\">45–60 min</span>\n                  <span class=\"tc-stat\">NPS: Easy, some steep sections</span>\n                </div>\n              </div>\n              <a href=\"https://www.alltrails.com/trail/us/wyoming/mud-volcano-trail\" target=\"_blank\" class=\"at-btn\">AllTrails ↗</a>\n            </div>\n            <div class=\"tc-body\">\n              <div id=\"map-mudvolcano\" class=\"topo-map-sm\"></div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=44.6461,-110.4269\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n              </div>\n              <div class=\"tc-notes\">\n                <p>Loop past turbulent mudpots, hissing steam vents, and a landscape that looks like it belongs on another planet. Dragon's Mouth Spring makes an audible sound like breathing. Mud Caldron is one of the most visually chaotic thermal features in the park. Worth every minute.</p>\n              </div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Evening — Hayden Valley Return</div>\n          <ul class=\"tb-list\">\n            <li><strong>5–7pm:</strong> Drive north through Hayden Valley one more time heading back to Canyon. This is the evening wildlife window — second chance for grizzly sightings. The day started and ended in Hayden. That's intentional.</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ FULL DAY 2 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd full2\">\n        <div class=\"day-hd-label\">June 27 · Full Day 2</div>\n        <div class=\"day-hd-title\">Go Northeast — Lamar Valley + Canyon Afternoon</div>\n        <div class=\"day-hd-sub\">Check Dunraven Pass first · Lamar morning · Canyon rims thorough in the afternoon</div>\n      </div>\n      <div class=\"day-body\">\n\n        <!-- DAY 2 MAP -->\n        <div id=\"map-day2\" class=\"topo-map-lg\"></div>\n        <p class=\"map-caption\">Day 2 route: Canyon → Dunraven Pass → Tower-Roosevelt → Lamar Valley → return → Canyon rims full afternoon</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/44.7353,-110.4995/44.9131,-110.4170/44.9369,-110.3278/44.8706,-110.1849/44.9103,-110.2578/44.7225,-110.4968/44.7163,-110.4974/44.7149,-110.4836\" target=\"_blank\" class=\"mab route\">🗺️ Open Full Day Route in Google Maps</a>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd teal\">Before You Leave — Critical Step</div>\n          <ul class=\"tb-list\">\n            <li>Call <strong>307-344-2117</strong> to confirm Dunraven Pass status. If closed for construction, the Norris detour adds 45 min each way — adjust departure time accordingly.</li>\n          </ul>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd teal\">Lamar Valley — Choose Your Approach</div>\n          <div class=\"option-split\">\n            <div class=\"opt-box a\">\n              <div class=\"opt-title\">Option A · Wolves (4:30am Departure)</div>\n              <div class=\"opt-text\">Bed by 9:30pm → 4:00am alarm → call Dunraven → <strong>4:30am depart</strong>. Arrive Lamar 5:30–6am dawn window. Wolves, grizzlies, bison — the full picture. No other timing makes wolf sightings realistic.</div>\n            </div>\n            <div class=\"opt-box b\">\n              <div class=\"opt-title\">Option B · 9:00am Departure</div>\n              <div class=\"opt-text\">Normal morning. Arrive Lamar ~10:30am. <strong>Bison: guaranteed.</strong> Grizzly: realistic. Wolves: unlikely but not impossible. Honest expectation: a great wildlife drive, just not a wolf safari.</div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd teal\">At Lamar Valley</div>\n          <ul class=\"tb-list\">\n            <li>Drive slowly east through the valley. <strong>Any car pulled over with spotting scopes = stop at the next pullout</strong> and look in the same direction. That's the system.</li>\n            <li>Wolf packs to look for: <strong>Junction Butte pack</strong> and <strong>Lamar Canyon pack</strong>. Best sightings near Slough Creek pullout and Lamar River Bridge.</li>\n            <li>Bison: the top 2 Yellowstone TikTok videos (29M + 24M views) are just bison on this road. Budget 20+ extra minutes for jams.</li>\n          </ul>\n\n          <!-- TRAIL: Trout Lake -->\n          <div class=\"trail-card teal-theme\">\n            <div class=\"tc-hd\">\n              <div>\n                <div class=\"tc-name\">Trout Lake Trail</div>\n                <div class=\"tc-stats\">\n                  <span class=\"tc-stat\">1.2 mi RT</span>\n                  <span class=\"tc-stat easy\">Easy</span>\n                  <span class=\"tc-stat\">~100 ft gain</span>\n                  <span class=\"tc-stat\">45–60 min</span>\n                </div>\n              </div>\n              <a href=\"https://www.alltrails.com/trail/us/wyoming/trout-lake-loop\" target=\"_blank\" class=\"at-btn\">AllTrails ↗</a>\n            </div>\n            <div class=\"tc-body\">\n              <div id=\"map-troutlake\" class=\"topo-map-sm\"></div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=44.9103,-110.2578\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n              </div>\n              <div class=\"tc-notes\">\n                <p>Short uphill climb to a crystal-clear lake in an open meadow bowl. In late June, cutthroat trout are visibly spawning — you can see them from the bank. Northern river otters use this lake. A quiet, easy stop after the intensity of Lamar wildlife watching.</p>\n              </div>\n              <div class=\"tc-tip teal\">Trailhead is on the north side of the road ~1 mile west of the Pebble Creek Campground turnoff. Easy to miss — watch for the small pullout and trailhead sign.</div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd teal\">Afternoon — Canyon Rims: Thorough Pass</div>\n          <ul class=\"tb-list\">\n            <li>Return to Canyon Village by 12:30–1pm (early if Option A dawn departure). <strong>You're back at your base</strong> — use the afternoon for Canyon in full.</li>\n            <li>If you did the arrival evening and yesterday morning you've only seen Artist Point. This afternoon: do the full canyon circuit.</li>\n          </ul>\n\n          <!-- TRAIL: Uncle Tom's Trail -->\n          <div class=\"trail-card\">\n            <div class=\"tc-hd\">\n              <div>\n                <div class=\"tc-name\">Uncle Tom's Trail</div>\n                <div class=\"tc-stats\">\n                  <span class=\"tc-stat\">~0.5 mi RT</span>\n                  <span class=\"tc-stat strenuous\">Strenuous*</span>\n                  <span class=\"tc-stat\">328 steel steps</span>\n                  <span class=\"tc-stat\">20–30 min</span>\n                </div>\n              </div>\n              <a href=\"https://www.alltrails.com/trail/us/wyoming/uncle-toms-trail\" target=\"_blank\" class=\"at-btn\">AllTrails ↗</a>\n            </div>\n            <div class=\"tc-body\">\n              <div id=\"map-uncletom\" class=\"topo-map-sm\"></div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=44.7163,-110.4974\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n              </div>\n              <div class=\"tc-notes\">\n                <p>328 open-grate steel steps bolted directly into the canyon wall. Descends to the closest accessible view of the Lower Falls — you feel the mist, hear the thunder, look straight up at 308 feet of waterfall. Short but intense. Not for height-sensitive visitors.</p>\n              </div>\n              <div class=\"tc-tip\">The steps are open-grate (you can see down through them). If heights are an issue, Artist Point gives a nearly equivalent view without the exposure.</div>\n            </div>\n          </div>\n\n          <!-- TRAIL: Brink of Lower Falls -->\n          <div class=\"trail-card\">\n            <div class=\"tc-hd\">\n              <div>\n                <div class=\"tc-name\">Brink of the Lower Falls Trail</div>\n                <div class=\"tc-stats\">\n                  <span class=\"tc-stat\">0.8 mi RT</span>\n                  <span class=\"tc-stat strenuous\">Steep descent</span>\n                  <span class=\"tc-stat\">600 ft drop</span>\n                  <span class=\"tc-stat\">30–45 min</span>\n                  <span class=\"tc-stat\">NPS: Steep descent</span>\n                </div>\n              </div>\n              <a href=\"https://www.alltrails.com/trail/us/wyoming/brink-of-the-lower-falls\" target=\"_blank\" class=\"at-btn\">AllTrails ↗</a>\n            </div>\n            <div class=\"tc-body\">\n              <div id=\"map-brink\" class=\"topo-map-sm\"></div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=44.7225,-110.4968\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n              </div>\n              <div class=\"tc-notes\">\n                <p>Ten paved switchbacks descend 600 ft to the exact lip of the 308-ft Lower Falls. Stand at the brink — water rushes past your feet, mist rises, the roar is visceral. One of the most powerful viewpoints in the park.</p>\n                <p>⚠️ North Rim Drive is one-way. Once you enter, you cannot reverse. Plan the drive direction accordingly.</p>\n              </div>\n            </div>\n          </div>\n\n          <ul class=\"tb-list\">\n            <li><strong>Inspiration Point</strong> — short walk from a pullout on North Rim Drive. Dramatic downstream canyon view at golden hour. Best of the day if the timing works out.</li>\n            <li><strong>South Rim Trail</strong> (2.0 mi one-way from Chittenden Bridge to Artist Point) — walk it instead of driving. The trail hugs the rim with continuous canyon views that are better than from the car.</li>\n          </ul>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd teal\">Evening</div>\n          <ul class=\"tb-list\">\n            <li>Last sunset from Artist Point or Inspiration Point — Canyon in evening light is different from morning.</li>\n            <li>Pack tonight. Checkout is 11am tomorrow.</li>\n          </ul>\n        </div>\n\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ DEPARTURE ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd depart\">\n        <div class=\"day-hd-label\">June 28</div>\n        <div class=\"day-hd-title\">Departure Morning → Spokane</div>\n        <div class=\"day-hd-sub\">Final morning · Checkout 11am · Drive north</div>\n      </div>\n      <div class=\"day-body\">\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Final Morning</div>\n          <ul class=\"tb-list\">\n            <li>One final <strong>Artist Point</strong> visit — morning light on the canyon walls for the last time. This one will be different from all the others. It always is.</li>\n            <li>OR: <strong>West Thumb Geyser Basin</strong> (1.0 mi flat loop, accessible) — geothermal pools directly on Yellowstone Lake shore. Beautiful and uncrowded in the morning. Worth it if you're routing south.</li>\n            <li><strong>Checkout by 11am</strong></li>\n          </ul>\n        </div>\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">The Drive</div>\n          <ul class=\"tb-list\">\n            <li>Exit via <strong>North Entrance (Gardiner, MT)</strong> toward Spokane. Budget 15-min delay at Gardner River High Bridge (construction, 24/7 through October).</li>\n            <li>Next chapter of the Grand American Loop begins.</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- BISON PROTOCOL -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"bison-box\">\n      <div class=\"bp-title\">Bison Jam Protocol</div>\n      <div class=\"bp-sub\">The #1 and #2 Yellowstone videos on TikTok are just bison walking on a road. It will happen to you. This is how it works.</div>\n      <div class=\"bp-grid\">\n        <div class=\"bp-step\"><div class=\"bp-num\">Rule 1</div><div class=\"bp-text\">Stay in the vehicle. Do not get out for a closer shot.</div></div>\n        <div class=\"bp-step\"><div class=\"bp-num\">Rule 2</div><div class=\"bp-text\">Give right of way. They move on their own in 10–20 minutes.</div></div>\n        <div class=\"bp-step\"><div class=\"bp-num\">Rule 3</div><div class=\"bp-text\">Do not honk. Move slowly if space opens ahead of you.</div></div>\n        <div class=\"bp-step\"><div class=\"bp-num\">Rule 4</div><div class=\"bp-text\">Budget 20+ extra minutes on every Hayden and Lamar Valley drive.</div></div>\n        <div class=\"bp-step\"><div class=\"bp-num\">Distances</div><div class=\"bp-text\"><strong>25 yards</strong> from bison + elk. <strong>100 yards</strong> from bears + wolves. Always.</div></div>\n        <div class=\"bp-step\"><div class=\"bp-num\">Live Alerts</div><div class=\"bp-text\">Text <strong>82190</strong> to <strong>888-777</strong> for live road conditions + bison jam status.</div></div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- WILDLIFE -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">Wildlife Guide</div>\n    <div class=\"sec-sub\">All from vehicle and roadside · 25 yards from bison/elk · 100 yards from bears and wolves · No exceptions</div>\n    <div class=\"wl-grid\">\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Bison</strong></div><div class=\"wl-prob cert\">Near-Certain</div><div class=\"wl-where\">Hayden Valley, Lamar Valley, every road. All day. Budget 20+ min for jams.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Bison Calves</strong></div><div class=\"wl-prob hi\">High</div><div class=\"wl-where\">Hayden Valley. Orange \"red dogs\" born Apr–May. Look alongside the main herd.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Grizzly Bear</strong></div><div class=\"wl-prob hi\">Good — June prime</div><div class=\"wl-where\">Hayden Valley slopes, Lamar meadows. 8–11am secondary window still productive.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Pronghorn</strong></div><div class=\"wl-prob hi\">High</div><div class=\"wl-where\">Lamar Valley open meadows, any open grassland. Dawn and dusk.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Osprey</strong></div><div class=\"wl-prob hi\">High (nesting)</div><div class=\"wl-where\">Canyon walls. Look at the cliffs from Artist Point — nesting pairs visible Apr–Sep.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Bald Eagle</strong></div><div class=\"wl-prob hi\">High</div><div class=\"wl-where\">Hayden Valley along the Yellowstone River. Morning.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Elk</strong></div><div class=\"wl-prob hi\">High</div><div class=\"wl-where\">Hayden Valley. Dawn and dusk. Cows with calves in June — stay back from cows.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Wolf</strong></div><div class=\"wl-prob mod\">Dawn-only realistic</div><div class=\"wl-where\">Lamar Valley, 5:30–8am window. Junction Butte + Lamar Canyon packs. Spotting scopes essential.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Black Bear</strong></div><div class=\"wl-prob mod\">Moderate</div><div class=\"wl-where\">Forest edges, roadsides. Dawn and dusk. Smaller and faster than grizzlies.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Coyote</strong></div><div class=\"wl-prob hi\">High</div><div class=\"wl-where\">Hayden Valley. Dawn and dusk. Often trots directly across the road.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Trumpeter Swan</strong></div><div class=\"wl-prob mod\">Moderate</div><div class=\"wl-where\">Hayden Valley river. Morning. Massive white birds with black bills.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Sandhill Crane</strong></div><div class=\"wl-prob mod\">Moderate</div><div class=\"wl-where\">Hayden Valley wetlands. Morning. Tall grey birds with red foreheads.</div></div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- INSIDER TIPS -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">From the Park — Insider Tips</div>\n    <div class=\"sec-sub\">Sourced from Yellowstone National Park Lodges · Things most visitors don't do</div>\n    <div class=\"intel-grid\">\n      <div class=\"intel-card\">\n        <div class=\"ic-num\">Tip 1</div>\n        <div class=\"ic-title\">Yellowstone Lake — The Quiet Alternative</div>\n        <div class=\"ic-text\">While everyone crowds Old Faithful at midday, the 136-square-mile lake (largest high-elevation lake in North America) is quiet. Scenic cruises, guided fishing, and boat rentals available. A natural afternoon complement to the morning geyser basin.</div>\n      </div>\n      <div class=\"intel-card\">\n        <div class=\"ic-num\">Tip 2</div>\n        <div class=\"ic-title\">Stargazing After Dark</div>\n        <div class=\"ic-text\">Walk 100 yards from your campsite after dark. Very little light pollution across 2.2M acres. June nights are cold but clear. Bring a layer, download a star app before you lose signal, and spend 20 minutes looking up. There's nothing else like it at 7,900 ft.</div>\n      </div>\n      <div class=\"intel-card\">\n        <div class=\"ic-num\">Tip 3</div>\n        <div class=\"ic-title\">Old Faithful Inn Balcony — For Everyone</div>\n        <div class=\"ic-text\">The Old Faithful Inn is a National Historic Landmark (1903). The second-floor outdoor balcony is open to all visitors — no room, no fee. When the boardwalk crowd is elbow-to-elbow, go up. Better angle, more breathing room, same eruption.</div>\n      </div>\n      <div class=\"intel-card\">\n        <div class=\"ic-num\">Tip 4</div>\n        <div class=\"ic-title\">West Thumb Geyser Basin — Underrated</div>\n        <div class=\"ic-text\">Boiling pools directly on the shore of Yellowstone Lake. Equal visual drama to Midway Geyser Basin, significantly fewer crowds. Great for the departure morning if you route south, or as an add-on anytime you're near Lake Village.</div>\n      </div>\n      <div class=\"intel-card\">\n        <div class=\"ic-num\">Tip 5</div>\n        <div class=\"ic-title\">98% of the Park is Off the Roads</div>\n        <div class=\"ic-text\">Even a half-mile trail completely changes the experience. The moment you step away from pavement, the crowds vanish. The park looks, sounds, and feels different when you're not in a vehicle. Every trail on this guide delivers that shift within minutes.</div>\n      </div>\n      <div class=\"intel-card\">\n        <div class=\"ic-num\">Tip 6</div>\n        <div class=\"ic-title\">~50 Miles Between Major Attractions</div>\n        <div class=\"ic-text\">Old Faithful to Canyon: ~50 miles. Factor in road construction delays on every segment. The park is genuinely large — don't assume things are close because they're \"all in Yellowstone.\" Your two full days are designed around this reality.</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- PARK RULES -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">What Not to Do</div>\n    <div class=\"sec-sub\">Rules that exist because of real incidents — not suggestions</div>\n    <div class=\"rules-list\">\n      <div class=\"rule-card\">\n        <div class=\"rule-icon\">🚷</div>\n        <div>\n          <div class=\"rule-title\">Do Not Leave Boardwalks or Designated Trails</div>\n          <div class=\"rule-text\">The ground over geothermal features can be inches thick over boiling water. The surface looks solid. It is not always solid. <strong>People have died going off-trail here.</strong> The boardwalk boundary is absolute. Supervise children at all times near thermal areas. Dogs, bikes, and scooters prohibited on boardwalks.</div>\n        </div>\n      </div>\n      <div class=\"rule-card\">\n        <div class=\"rule-icon\">🐻</div>\n        <div>\n          <div class=\"rule-title\">Maintain Distance from All Wildlife</div>\n          <div class=\"rule-text\"><strong>100 yards from bears, wolves, and nesting birds. 25 yards from all other wildlife.</strong> If an animal changes its behavior because of your presence — stops, moves away, looks at you — you are too close and must back up immediately. Bull bison and elk cows with calves are unpredictable at any distance.</div>\n        </div>\n      </div>\n      <div class=\"rule-card\">\n        <div class=\"rule-icon\">📴</div>\n        <div>\n          <div class=\"rule-title\">Do Not Rely on Cell Service for Navigation</div>\n          <div class=\"rule-text\">Minimal coverage across 2.2M acres and 350+ miles of road. <strong>Download the NPS app for offline use before leaving cell range. Download Google Maps offline. Carry the physical park map from the entrance gate.</strong> GPS works without internet — offline maps do not require signal.</div>\n        </div>\n      </div>\n      <div class=\"rule-card\">\n        <div class=\"rule-icon\">🪨</div>\n        <div>\n          <div class=\"rule-title\">Do Not Remove Anything from the Park</div>\n          <div class=\"rule-text\">Rocks, antlers, thermal deposits, flowers — all prohibited. With millions of annual visitors, even small removals degrade the park. Take photos. It's not a small rule — it's a federal violation.</div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- CONTACTS -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">Key Contacts</div>\n    <div class=\"sec-sub\">Save before you lose signal — the road hotline especially</div>\n    <div class=\"contacts-grid\">\n      <div class=\"cc\">\n        <div class=\"cc-label\">Dunraven Pass / Road Info</div>\n        <div class=\"cc-val\">307-344-2117</div>\n        <div class=\"cc-note\">Recorded road conditions. Call morning of June 27 before Lamar departure. Non-negotiable.</div>\n      </div>\n      <div class=\"cc\">\n        <div class=\"cc-label\">Live Road Alerts</div>\n        <div class=\"cc-val\">Text 82190 → 888-777</div>\n        <div class=\"cc-note\">Live bison jams, road closures, construction delays. Works without data.</div>\n      </div>\n      <div class=\"cc\">\n        <div class=\"cc-label\">Canyon Visitor Center</div>\n        <div class=\"cc-val\">307-344-7381 · 8am–7pm</div>\n        <div class=\"cc-note\">Walk from your campsite. Current trail closures, road conditions, wildlife reports.</div>\n      </div>\n      <div class=\"cc\">\n        <div class=\"cc-label\">NPS App — Download Offline Now</div>\n        <div class=\"cc-val\">Full offline functionality</div>\n        <div class=\"cc-note\">Trail maps, road closures, geyser prediction times — all offline. Download before you arrive.</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<div class=\"footer\">\n  <strong>Yellowstone National Park · June 25–28, 2026</strong> · Base: Canyon Village · Grand American Loop Field Guide<br>\n  <span style=\"font-size:.7rem;opacity:.6\">Maps: OpenTopoMap (CC-BY-SA) · Waymarked Trails overlay · Trail data validated via NPS API (developer.nps.gov)</span>\n</div>\n\n<!-- ══════════════ LEAFLET MAP INITIALIZATION ══════════════ -->\n<script>\nfunction mkMap(id, center, zoom, stops, drawRoute) {\n  var container = document.getElementById(id);\n  if (!container) return;\n  var map = L.map(id, {scrollWheelZoom: false, zoomControl: true}).setView(center, zoom);\n\n  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {\n    maxZoom: 15,\n    attribution: '© <a href=\"https://opentopomap.org\">OpenTopoMap</a>'\n  }).addTo(map);\n\n  L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png', {\n    maxZoom: 15, opacity: 0.75,\n    attribution: '© <a href=\"https://hiking.waymarkedtrails.org\">Waymarked Trails</a>'\n  }).addTo(map);\n\n  if (drawRoute && stops.length > 1) {\n    L.polyline(stops.map(function(s){ return [s.lat, s.lng]; }), {\n      color: '#B34A0A', weight: 3, opacity: 0.65, dashArray: '7,5'\n    }).addTo(map);\n  }\n\n  stops.forEach(function(s, i) {\n    var bg = s.type === 'base' ? '#5C2B0A' : (s.type === 'teal' ? '#1A7A8A' : '#B34A0A');\n    var lbl = s.num != null ? s.num : (i + 1);\n    var icon = L.divIcon({\n      html: '<div style=\"background:'+bg+';color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.4)\">'+lbl+'</div>',\n      iconSize:[26,26], iconAnchor:[13,13], className:''\n    });\n    L.marker([s.lat, s.lng], {icon:icon}).addTo(map)\n     .bindPopup('<strong>'+s.name+'</strong>'+(s.note?'<br><span style=\"font-size:12px\">'+s.note+'</span>':''));\n  });\n  return map;\n}\n\nwindow.addEventListener('load', function() {\n\n  // ── DAY 1: SOUTH LOOP ──\n  mkMap('map-day1', [44.598, -110.658], 9, [\n    {lat:44.7353,lng:-110.4995, type:'base', num:'⌂', name:'Canyon Village (Base)'},\n    {lat:44.6603,lng:-110.4906, num:'1', name:'Hayden Valley', note:'Grizzly scan · Drive slow both directions'},\n    {lat:44.5434,lng:-110.8444, num:'2', name:'Fairy Falls Trailhead', note:'Park here for Grand Prismatic Overlook'},\n    {lat:44.5250,lng:-110.8383, num:'3', name:'Grand Prismatic Spring', note:'Midway Geyser Basin boardwalk'},\n    {lat:44.4605,lng:-110.8281, num:'4', name:'Old Faithful', note:'Check eruption board on arrival'},\n    {lat:44.6461,lng:-110.4269, num:'5', name:'Mud Volcano', note:'1.5 mi loop · Return add-on'}\n  ], true);\n\n  // ── TRAIL: Grand Prismatic Overlook ──\n  mkMap('map-prismatic', [44.5434, -110.8444], 13, [\n    {lat:44.5434,lng:-110.8444, type:'base', num:'TH', name:'Fairy Falls Trailhead', note:'Park here for Grand Prismatic Overlook · Do not use Midway lot'}\n  ], false);\n\n  // ── TRAIL: Observation Point ──\n  mkMap('map-observation', [44.4617, -110.8301], 13, [\n    {lat:44.4617,lng:-110.8301, type:'base', num:'TH', name:'Observation Point Trailhead', note:'Near Old Faithful Visitor Center'}\n  ], false);\n\n  // ── TRAIL: Mud Volcano ──\n  mkMap('map-mudvolcano', [44.6461, -110.4269], 13, [\n    {lat:44.6461,lng:-110.4269, type:'base', num:'TH', name:'Mud Volcano Trailhead', note:'On the road between Canyon and Hayden Valley'}\n  ], false);\n\n  // ── DAY 2: LAMAR + CANYON ──\n  mkMap('map-day2', [44.825, -110.362], 9, [\n    {lat:44.7353,lng:-110.4995, type:'base', num:'⌂', name:'Canyon Village (Base)'},\n    {lat:44.9131,lng:-110.4170, num:'1', name:'Tower-Roosevelt Junction', note:'Watch for wildlife in meadows here'},\n    {lat:44.9369,lng:-110.3278, num:'2', name:'Slough Creek Pullout', note:'Best wolf viewing area · Look for spotting scopes'},\n    {lat:44.8706,lng:-110.1849, num:'3', name:'Lamar River Bridge', note:'Wolf and bison hotspot'},\n    {lat:44.9103,lng:-110.2578, type:'teal', num:'4', name:'Trout Lake Trailhead', note:'1.2 mi RT · Spawning trout · Otters'},\n    {lat:44.7225,lng:-110.4968, num:'5', nam 20px;padding:5px 15px;font-family:sans-serif;font-size:.78rem}\n    /* LAYOUT */\n    .wrap{max-width:980px;margin:0 auto;padding:0 20px}\n    section{padding:40px 0}\n    hr.div{border:none;border-top:1px solid var(--border);margin:0}\n    /* TRUCK STOP BANNER */\n    .ts-banner{background:linear-gradient(135deg,#1A202C,#2D3748);color:white;border-radius:12px;padding:20px 26px;margin:28px 0}\n    .ts-title{font-family:sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;opacity:.7;margin-bottom:8px}\n    .ts-text{font-family:sans-serif;font-size:.87rem;line-height:1.65;opacity:.93}\n    .ts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:14px}\n    .ts-item{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:11px 13px}\n    .ts-night{font-family:sans-serif;font-size:.67rem;text-transform:uppercase;letter-spacing:.7px;opacity:.65;margin-bottom:3px}\n    .ts-loc{font-family:sans-serif;font-size:.87rem;font-weight:700;margin-bottom:2px}\n    .ts-stop{font-family:sans-serif;font-size:.76rem;opacity:.85}\n    /* OVERVIEW */\n    .overview-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:24px 0}\n    @media(max-width:700px){.overview-strip{grid-template-columns:1fr 1fr}}\n    .ov-card{border-radius:10px;padding:12px 14px;text-align:center}\n    .ov-card.d14{background:linear-gradient(135deg,#EBF8FF,#BEE3F8);border:2px solid #63B3ED}\n    .ov-card.d15{background:linear-gradient(135deg,#EBF8FF,#C3DAFE);border:2px solid var(--rain)}\n    .ov-card.d16{background:linear-gradient(135deg,#E0FFFE,#B2F5EA);border:2px solid var(--crater)}\n    .ov-card.d17{background:linear-gradient(135deg,#FFF5F5,#FED7D7);border:2px solid #FC8181}\n    .ov-card.d18{background:linear-gradient(135deg,#FFFAF0,#FEFCBF);border:2px solid var(--sf)}\n    .ov-date{font-family:sans-serif;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:va
