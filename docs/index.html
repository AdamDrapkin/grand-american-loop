<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre-California · Grand American Loop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ── */
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-border:color-mix(in oklch,#28251d 12%,transparent);
  --color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;
  --color-text-faint:#bab9b4;--color-primary:#01696f;
  --color-primary-hover:#0c4e54;--color-primary-highlight:#cedcd8;
  --font-body:'Geist','Helvetica Neue',sans-serif;
  --font-mono:'Geist Mono','Fira Code',monospace;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-6:1.5rem;--space-8:2rem;
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-full:9999px;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.10);
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-border:color-mix(in oklch,#cdccca 10%,transparent);
  --color-divider:#262523;--color-text:#cdccca;--color-text-muted:#797876;
  --color-text-faint:#5a5957;--color-primary:#4f98a3;
  --color-primary-hover:#227f8b;--color-primary-highlight:#313b3b;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.2);
  --shadow-md:0 4px 12px oklch(0 0 0/0.32);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme]){
    --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
    --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
    --color-border:color-mix(in oklch,#cdccca 10%,transparent);
    --color-divider:#262523;--color-text:#cdccca;--color-text-muted:#797876;
    --color-text-faint:#5a5957;--color-primary:#4f98a3;
    --color-primary-hover:#227f8b;--color-primary-highlight:#313b3b;
    --shadow-sm:0 1px 2px oklch(0 0 0/0.2);
    --shadow-md:0 4px 12px oklch(0 0 0/0.32);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-font-smoothing:antialiased}
body{height:100dvh;font-family:var(--font-body);font-size:var(--text-sm);color:var(--color-text);background:var(--color-bg);display:flex;flex-direction:column;overflow:hidden;user-select:none;padding-bottom:env(safe-area-inset-bottom,0px)}
/* ── Top Bar ── */
.topbar{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-4);background:var(--color-surface);border-bottom:1px solid var(--color-border);box-shadow:var(--shadow-sm);z-index:100;flex-shrink:0;height:48px}
.logo{display:flex;align-items:center;gap:var(--space-2);color:var(--color-primary);font-weight:600;font-size:var(--text-sm);letter-spacing:-0.01em;flex-shrink:0}
.divider-v{width:1px;height:20px;background:var(--color-border);flex-shrink:0}
.page-title{flex:1;font-size:var(--text-sm);font-weight:500;color:var(--color-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.controls{display:flex;align-items:center;gap:var(--space-2);flex-shrink:0}
.btn-icon{display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:none;border:1px solid var(--color-border);border-radius:var(--radius-md);color:var(--color-text-muted);cursor:pointer;transition:color var(--transition),background var(--transition),border-color var(--transition);flex-shrink:0}
.btn-icon:hover{color:var(--color-text);background:var(--color-surface-offset)}
.btn-icon:active{transform:scale(0.95)}
.btn-icon:disabled{opacity:.35;cursor:default;pointer-events:none}
.btn-nav{display:flex;align-items:center;gap:var(--space-1);padding:0 var(--space-3);height:32px;background:none;border:1px solid var(--color-border);border-radius:var(--radius-md);color:var(--color-text-muted);cursor:pointer;font-family:var(--font-body);font-size:var(--text-xs);font-weight:500;white-space:nowrap;transition:color var(--transition),background var(--transition),border-color var(--transition)}
.btn-nav:hover{color:var(--color-text);background:var(--color-surface-offset)}
.btn-nav:active{transform:scale(0.97)}
.btn-nav:disabled{opacity:.35;cursor:default;pointer-events:none}
.page-counter{font-size:var(--text-xs);font-family:var(--font-mono);color:var(--color-text-muted);background:var(--color-surface-offset);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0 var(--space-3);height:32px;display:flex;align-items:center;gap:.2em;flex-shrink:0}
.page-counter .cur{color:var(--color-text);font-weight:600}
/* ── Thumbnail Strip ── */
.strip-wrapper{flex-shrink:0;background:var(--color-surface);border-bottom:1px solid var(--color-border);overflow:hidden;transition:height 300ms cubic-bezier(0.16,1,0.3,1);height:0}
.strip-wrapper.open{height:100px}
.strip{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);overflow-x:auto;height:100%;scrollbar-width:thin;scrollbar-color:var(--color-divider) transparent}
.thumb{flex-shrink:0;width:64px;height:80px;border:2px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface-offset);cursor:pointer;overflow:hidden;position:relative;transition:border-color var(--transition),box-shadow var(--transition),transform var(--transition);display:flex;flex-direction:column}
.thumb:hover{border-color:var(--color-primary);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.thumb.active{border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-highlight)}
.thumb-label{font-size:9px;font-family:var(--font-mono);color:var(--color-text-muted);padding:2px 4px;background:var(--color-surface);border-top:1px solid var(--color-border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;margin-top:auto}
.thumb-num{position:absolute;top:3px;left:4px;font-size:9px;font-family:var(--font-mono);font-weight:600;color:var(--color-text-faint)}
.thumb-preview{flex:1;overflow:hidden;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
/* ── Viewport ── */
.viewport{flex:1;overflow:hidden;position:relative;min-height:0}
.slides-track{display:flex;height:100%;width:100%;transition:transform 380ms cubic-bezier(0.16,1,0.3,1);will-change:transform}
.slide{flex-shrink:0;width:100%;height:100%;position:relative}
.slide iframe{width:100%;height:100%;border:none;display:block;background:white}
.slide-loader{position:absolute;inset:0;background:var(--color-bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:var(--space-4);color:var(--color-text-muted);font-size:var(--text-sm);transition:opacity 300ms ease,visibility 300ms ease;z-index:5}
.slide-loader.hidden{opacity:0;visibility:hidden}
.spinner{width:28px;height:28px;border:2px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── Swipe Hint ── */
.swipe-hint{position:absolute;bottom:var(--space-6);left:50%;transform:translateX(-50%);background:color-mix(in oklch,var(--color-surface) 90%,transparent);backdrop-filter:blur(8px);border:1px solid var(--color-border);border-radius:var(--radius-full);padding:var(--space-2) var(--space-4);font-size:var(--text-xs);color:var(--color-text-muted);display:flex;align-items:center;gap:var(--space-2);pointer-events:none;animation:hint-fade 3s 1.5s both;z-index:10}
@keyframes hint-fade{0%{opacity:0;transform:translateX(-50%) translateY(8px)}20%{opacity:1;transform:translateX(-50%) translateY(0)}70%{opacity:1}100%{opacity:0}}
/* ── Keyboard Shortcuts ── */
.shortcuts{position:absolute;bottom:var(--space-4);right:var(--space-4);display:flex;align-items:center;gap:var(--space-2);opacity:0;pointer-events:none;transition:opacity var(--transition);z-index:10}
.viewport:hover .shortcuts{opacity:1}
.key{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:2px 6px;font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted);box-shadow:0 1px 0 var(--color-border)}

.translate-wrap { position: relative; flex-shrink: 0; }
.translate-btn { min-width: 100px; justify-content: space-between; gap: var(--space-2); }
.lang-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 160px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  z-index: 999;
  padding: var(--space-1);
  max-height: 260px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--color-divider) transparent;
}
.lang-dropdown.open { display: block; }
.lang-option {
  padding: var(--space-2) var(--space-3);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  cursor: pointer;
  border-radius: var(--radius-md);
  transition: background var(--transition), color var(--transition);
  white-space: nowrap;
}
.lang-option:hover { background: var(--color-surface-offset); color: var(--color-text); }
.lang-option.active { color: var(--color-primary); font-weight: 600; }
/* Hide the Google Translate toolbar that appears at top of page */
.goog-te-banner-frame, #goog-te-banner-frame { display: none !important; }
body { top: 0 !important; }
.goog-te-gadget { display: none !important; }
.skiptranslate { display: none !important; }

/* ── Mobile ── */
@media(max-width:640px){
  .topbar{padding:var(--space-2) var(--space-3);gap:var(--space-2);height:52px;flex-wrap:nowrap}
  .logo span{display:none}
  .page-title{display:none}
  .divider-v{display:none}
  .btn-icon{width:40px;height:40px;border-radius:var(--radius-md)}
  .btn-nav{height:40px;padding:0 var(--space-2);font-size:.7rem}
  .page-counter{height:40px;padding:0 var(--space-2);font-size:.7rem}
  .controls{gap:var(--space-1)}
  .lang-dropdown{right:0;left:auto;min-width:150px}
  .translate-btn span#langLabel{display:none}
  .translate-btn{min-width:unset;padding:0 var(--space-2)}
  .strip-wrapper.open{height:88px}
  .thumb{width:56px;height:72px}
  .shortcuts{display:none}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-label="Pre-California · Grand American Loop">
      <rect x="2" y="2" width="6" height="8" rx="1" fill="currentColor" opacity="0.9"/>
      <rect x="2" y="12" width="6" height="6" rx="1" fill="currentColor" opacity="0.5"/>
      <rect x="10" y="2" width="8" height="5" rx="1" fill="currentColor" opacity="0.5"/>
      <rect x="10" y="9" width="8" height="9" rx="1" fill="currentColor" opacity="0.9"/>

    <span>Pre-California · Grand American Loop</span>
  </div>
  <div class="divider-v"></div>

    <button class="btn-nav" id="btnPrev" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>Prev

</header>

<div class="strip-wrapper" id="stripWrapper">

</div>

<div class="viewport" id="viewport">
  <div class="slides-track" id="track"></div>
  <div class="swipe-hint">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>

</div>



<script>
const PAGES     = ["<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Pre-California Road Trip — Route Explorer</title>\n  <style>\n    :root {\n      --primary: #1a365d;\n      --accent: #e53e3e;\n      --gold: #d69e2e;\n      --forest: #276749;\n      --sky: #2b6cb0;\n      --desert: #c05621;\n      --cream: #fffdf7;\n      --light: #f7fafc;\n      --dark: #1a202c;\n      --mid: #4a5568;\n      --border: #e2e8f0;\n    }\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    body { font-family: Georgia, serif; background: var(--cream); color: var(--dark); line-height: 1.6; }\n\n    /* ── HERO ── */\n    .hero {\n      background: linear-gradient(135deg, #1a365d 0%, #2d6a4f 60%, #c05621 100%);\n      color: white; padding: 56px 40px; text-align: center;\n    }\n    .hero h1 { font-size: 2.6rem; letter-spacing: -0.5px; margin-bottom: 10px; }\n    .hero .sub { font-family: sans-serif; font-size: 1.05rem; opacity: .88; margin-bottom: 6px; }\n    .hero .meta { font-family: sans-serif; font-size: 0.82rem; opacity: .65; letter-spacing: 1.2px; text-transform: uppercase; }\n    .hero .badges { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 20px; }\n    .hero-badge { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); border-radius: 20px; padding: 5px 16px; font-family: sans-serif; font-size: 0.82rem; }\n\n    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px; }\n\n    /* ── SECTION TITLES ── */\n    .sec-title { font-size: 1.55rem; color: var(--primary); margin-bottom: 4px; }\n    .sec-sub { font-family: sans-serif; font-size: 0.87rem; color: var(--mid); margin-bottom: 28px; }\n\n\n    /* ── ROUTE CARDS ── */\n    .routes-section { padding: 44px 0 60px; }\n    .confirm-note { background: linear-gradient(135deg, #fffaf0, #fff5f5); border: 2px solid #f6ad55; border-radius: 10px; padding: 18px 22px; margin-bottom: 36px; font-family: sans-serif; font-size: 0.88rem; color: var(--dark); }\n\n    .route-card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.09); margin-bottom: 44px; overflow: hidden; border: 1px solid var(--border); }\n\n    .route-header { padding: 22px 28px 18px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; border-bottom: 1px solid var(--border); }\n    .route-num { font-family: sans-serif; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--mid); margin-bottom: 3px; }\n    .route-title { font-size: 1.45rem; color: var(--primary); margin-bottom: 3px; }\n    .route-tag { font-family: sans-serif; font-size: 0.87rem; color: var(--mid); }\n    .stats { display: flex; gap: 22px; flex-wrap: wrap; }\n    .stat { text-align: center; }\n    .stat-val { display: block; font-size: 1.35rem; font-weight: bold; color: var(--primary); }\n    .stat-lbl { font-family: sans-serif; font-size: 0.68rem; text-transform: uppercase; letter-spacing: .8px; color: var(--mid); }\n\n    .route-body { display: grid; grid-template-columns: 1fr 1fr; }\n    @media(max-width:800px){ .route-body { grid-template-columns: 1fr; } }\n\n    .route-info { padding: 22px 28px; border-right: 1px solid var(--border); }\n\n    /* stop chips */\n    .path { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 16px; }\n    .sc { font-family: sans-serif; font-size: 0.76rem; background: var(--light); border: 1px solid var(--border); border-radius: 20px; padding: 3px 9px; }\n    .sc.ys  { background: #f0fff4; border-color: #68d391; color: var(--forest); font-weight: bold; }\n    .sc.hi  { background: #f0fff4; border-color: #68d391; color: var(--forest); font-weight: bold; }\n    .sc.or  { background: #fffaf0; border-color: #f6ad55; color: var(--desert); font-weight: bold; }\n    .sa { color: #cbd5e0; font-size: 0.85rem; }\n\n    /* day grid — clickable rows */\n    .day-grid { display: flex; flex-direction: column; font-family: sans-serif; font-size: 0.79rem; margin-top: 12px; }\n    .day-entry { border-bottom: 1px solid var(--border); cursor: pointer; }\n    .day-entry:last-child { border-bottom: none; }\n    .day-row { display: grid; grid-template-columns: 52px 1fr auto 20px; gap: 8px; padding: 7px 2px; align-items: center; transition: background 0.15s; }\n    .day-entry:hover .day-row { background: #f0f5ff; border-radius: 6px; }\n    .dn { font-weight: bold; color: var(--primary); }\n    .dr { color: var(--dark); }\n    .dd { color: var(--mid); text-align: right; white-space: nowrap; }\n    .di { color: #a0aec0; font-size: 0.65rem; text-align: center; transition: transform 0.25s ease; user-select: none; }\n    .day-entry.open .di { transform: rotate(180deg); color: var(--sky); }\n\n    /* expandable panel */\n    .day-panel { display: none; padding: 16px 4px 20px; border-top: 1px solid var(--border); }\n    .day-entry.open .day-panel { display: block; }\n    .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\n    @media(max-width:900px){ .panel-grid { grid-template-columns: 1fr; } }\n    .panel-section { margin-bottom: 14px; }\n    .ps-title { font-family: sans-serif; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--mid); margin-bottom: 5px; }\n    .ps-text { font-family: sans-serif; font-size: 0.82rem; color: var(--dark); line-height: 1.55; }\n    .ps-list { font-family: sans-serif; font-size: 0.82rem; color: var(--dark); line-height: 1.7; padding-left: 16px; }\n    .ps-list li { margin-bottom: 2px; }\n    .ps-list li strong { color: var(--primary); }\n    .photo-link { display: inline-block; margin-top: 14px; font-family: sans-serif; font-size: 0.8rem; color: var(--sky); text-decoration: none; border: 1px solid #bee3f8; border-radius: 20px; padding: 4px 14px; transition: background 0.15s; }\n    .photo-link:hover { background: #ebf8ff; }\n    .panel-loading { font-family: sans-serif; font-size: 0.82rem; color: #a0aec0; font-style: italic; padding: 8px 0; }\n\n    /* tags */\n    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }\n    .t { font-family: sans-serif; font-size: 0.73rem; padding: 3px 9px; border-radius: 4px; }\n    .t-park  { background: #c6f6d5; color: #276749; }\n    .t-city  { background: #bee3f8; color: #2b6cb0; }\n    .t-scen  { background: #fef3c7; color: #92400e; }\n    .t-warn  { background: #fed7d7; color: #c53030; }\n    .t-yt    { background: #f0fff4; color: #276749; border: 1px solid #68d391; }\n    .t-az    { background: #fde68a; color: #92400e; border: 1px solid #fbbf24; font-weight: 700; }\n    .t-r11   { background: linear-gradient(135deg,#fef3c7,#fde68a); color: #78350f; border: 1px solid var(--gold); font-weight: 700; }\n    .r11-badge { display:inline-block; background: var(--gold); color: white; font-family:sans-serif; font-size:0.7rem; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; padding:3px 10px; border-radius:20px; margin-bottom:6px; }\n\n\n    /* difficulty */\n    .diff { margin-top: 12px; font-family: sans-serif; font-size: 0.76rem; color: var(--mid); }\n    .bar-track { height: 5px; background: var(--border); border-radius: 3px; margin-top: 4px; }\n    .bar-fill { height: 100%; border-radius: 3px; }\n    .d1 { width: 30%; background: #68d391; }\n    .d2 { width: 50%; background: #48bb78; }\n    .d3 { width: 65%; background: #f6ad55; }\n    .d4 { width: 80%; background: #fc8181; }\n    .d5 { width: 95%; background: #e53e3e; }\n\n    /* state pills */\n    .states { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }\n    .stag { font-family: sans-serif; font-size: 0.68rem; background: var(--primary); color: white; padding: 2px 7px; border-radius: 3px; }\n\n    /* map */\n    .route-map { height: 100%; min-height: 420px; position: relative; display: flex; flex-direction: column; }\n    .route-map iframe { flex: 1; width: 100%; min-height: 360px; border: none; display: block; }\n    .map-canvas { flex: 1; width: 100%; min-height: 360px; }\n    .map-open-btn { display: block; text-align: center; background: var(--primary); color: white; font-family: sans-serif; font-size: 0.85rem; font-weight: bold; padding: 10px 0; text-decoration: none; letter-spacing: 0.5px; }\n    .map-open-btn:hover { background: #2a4a7f; }\n    /* interactive map layer controls */\n    .map-controls { display: flex; gap: 7px; padding: 9px 13px; background: var(--light); border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }\n    .map-ctrl-label { font-family: sans-serif; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--mid); margin-right: 3px; }\n    .map-layer-btn { font-family: sans-serif; font-size: 0.76rem; font-weight: 600; padding: 4px 11px; border-radius: 20px; border: 2px solid; cursor: pointer; transition: all 0.15s; background: white; }\n    .map-layer-btn.rest   { border-color: #2b6cb0; color: #2b6cb0; }\n    .map-layer-btn.shower { border-color: #276749; color: #276749; }\n    .map-layer-btn.food   { border-color: #c05621; color: #c05621; }\n    .map-layer-btn.active.rest   { background: #2b6cb0; color: white; }\n    .map-layer-btn.active.shower { background: #276749; color: white; }\n    .map-layer-btn.active.food   { background: #c05621; color: white; }\n    .map-layer-btn.dest { border-color: #6B46C1; color: #6B46C1; }\n    .map-layer-btn.active.dest { background: #6B46C1; color: white; }\n    .map-loading { display:flex; align-items:center; justify-content:center; flex:1; min-height:360px; background:var(--light); font-family:sans-serif; font-size:0.85rem; color:var(--mid); }\n    .map-api-note { background: #fff5f5; border: 1px solid #fc8181; border-radius: 0 0 4px 4px; padding: 10px 14px; font-family: sans-serif; font-size: 0.76rem; color: #c53030; text-align: center; }\n\n    /* footer */\n    footer { background: var(--primary); color: rgba(255,255,255,.8); text-align: center; padding: 28px; font-family: sans-serif; font-size: 0.82rem; }\n\n    /* ── Mobile ── */\n    @media(max-width:640px) {\n      .hero { padding: 32px 18px 28px; }\n      .hero h1 { font-size: 1.65rem; }\n      .hero .sub { font-size: 0.88rem; }\n      .hero .meta { font-size: 0.72rem; }\n      .hero-badge { font-size: 0.74rem; padding: 4px 12px; }\n      .wrap { padding: 0 14px; }\n      .routes-section { padding: 28px 0 40px; }\n      .confirm-note { padding: 13px 14px; font-size: 0.82rem; }\n      .route-header { padding: 16px 14px 14px; gap: 12px; }\n      .route-title { font-size: 1.2rem; }\n      .stats { gap: 14px; }\n      .stat-val { font-size: 1.1rem; }\n      .route-info { padding: 16px 14px; border-right: none; border-bottom: 1px solid var(--border); }\n      .day-row { grid-template-columns: 46px 1fr 18px; gap: 6px; padding: 9px 2px; }\n      .dd { display: none; }\n      .day-panel { padding: 12px 2px 16px; }\n      .panel-grid { grid-template-columns: 1fr; gap: 14px; }\n      .ps-text, .ps-list { font-size: 0.80rem; }\n      .tags { gap: 5px; }\n      .t { font-size: 0.68rem; padding: 3px 7px; }\n      .route-map { min-height: 320px; }\n      .map-canvas, .route-map iframe { min-height: 260px; }\n      .map-controls { padding: 8px 10px; gap: 5px; }\n      .map-layer-btn { font-size: 0.70rem; padding: 4px 9px; }\n      .map-open-btn { font-size: 0.78rem; padding: 11px 0; }\n      .sc { font-size: 0.70rem; padding: 2px 7px; }\n    }\n  <\/style>\n</head>\n<body>\n\n<!-- ═══════════════════════════════════════ HERO ═══════════════════════════════════════ -->\n<div class=\"hero\">\n  <h1>🗺️ The Grand American Loop</h1>\n  <p class=\"sub\">June 15 → July 2, 2026 &nbsp;·&nbsp; 18 Days &nbsp;·&nbsp; 3487 Hillcroft Rd, Huntingdon Valley, PA → San Francisco, CA</p>\n  <p class=\"meta\">All drive times Google Maps verified &nbsp;·&nbsp; Two drivers &nbsp;·&nbsp; ~5,854 miles &nbsp;·&nbsp; 12 states</p>\n</div>\n\n<!-- ══════════════════════════════ ROUTES ══════════════════════════════ -->\n<div class=\"routes-section\">\n  <div class=\"wrap\">\n\n    <h2 class=\"sec-title\">The Grand American Loop</h2>\n    <p class=\"sec-sub\">18 days · 12 states · 6 NPS sites · ~5,854 miles · every leg Google Maps verified</p>\n\n    <div class=\"confirm-note\">\n      🔒 <strong>CONFIRMED RESERVATIONS:</strong>\n      &nbsp;Johnson&#39;s of St. Mary, MT (Jun 22–25)\n      &nbsp;·&nbsp; Canyon Campground, Yellowstone (Jun 25–27 + Jun 27–28 · two tent sites)\n      &nbsp;·&nbsp; Depart Jun 15 · Arrive SF Jul 2 by 11am\n    </div>\n\n    <div class=\"route-card\" style=\"border:2px solid var(--gold);box-shadow:0 6px 40px rgba(214,158,46,.22);\">\n      <div class=\"route-header\" style=\"background:linear-gradient(135deg,#fffdf5 0%,#fff9e6 100%);\">\n        <div>\n          <div class=\"route-title\" style=\"color:#78350f;font-size:1.6rem;\">🌟 The Grand American Loop</div>\n          <div class=\"route-tag\">18 days · 12 states · 6 National Parks · ~5,854 miles · avg 450 mi/day (two drivers)</div>\n        </div>\n        <div class=\"stats\">\n          <div class=\"stat\"><span class=\"stat-val\" style=\"color:#92400e;\">5,854</span><span class=\"stat-lbl\">Total Miles</span></div>\n          <div class=\"stat\"><span class=\"stat-val\" style=\"color:#92400e;\">18</span><span class=\"stat-lbl\">Days</span></div>\n          <div class=\"stat\"><span class=\"stat-val\" style=\"color:#92400e;\">12</span><span class=\"stat-lbl\">States</span></div>\n          <div class=\"stat\"><span class=\"stat-val\" style=\"color:#92400e;\">6</span><span class=\"stat-lbl\">NPS Sites</span></div>\n        </div>\n      </div>\n      <div class=\"route-body\">\n        <div class=\"route-info\">\n          <div class=\"path\">\n            <span class=\"sc\">HV, PA</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">⛰️ Pittsburgh</span><span class=\"sa\">→</span>\n            <span class=\"sc\">Dayton, OH</span><span class=\"sa\">→</span>\n            <span class=\"sc\">Indianapolis, IN</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">⛵ Gateway Arch · STL</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">💦 Johnson&#39;s Shut-Ins</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">🗿 Meramec Caverns</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">🛣️ Springfield Route 66</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">🍖 Kansas City</span><span class=\"sa\">→</span>\n            <span class=\"sc or\">Nebraska · I-80</span><span class=\"sa\">→</span>\n            <span class=\"sc\">Rock Springs, WY</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">✅ Homestead Crater, UT · 11:30 AM BOOKED</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">🏙️ Salt Lake City</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">⬜ Bonneville Salt Flats</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">🌊 Twin Falls · Shoshone Falls</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">🦬 Bison Range</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">🏞️ Polson · Flathead Lake</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">🏔️ Whitefish</span><span class=\"sa\">→</span>\n            <span class=\"sc ys\">🏔️ Glacier NP ×3 (CONFIRMED)</span><span class=\"sa\">→</span>\n            <span class=\"sc ys\">🌋 Yellowstone ×3 (CONFIRMED)</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">Mt. Rainier NP</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">🌆 Seattle</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">🌹 Portland</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">🔵 Crater Lake</span><span class=\"sa\">→</span>\n            <span class=\"sc hi\">🌲 Redwoods</span><span class=\"sa\">→</span>\n            <span class=\"sc ys\">San Francisco ✓</span>\n          </div>\n\n          <div class=\"day-grid\">\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 15</span><span class=\"dr\">Huntington Valley, PA → Pittsburgh (stop) → Dayton, OH</span><span class=\"dd\">8h 49m · 563 mi</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">I-376 into Pittsburgh through the Fort Pitt Tunnel — the city explodes into view the instant you exit. Keep an eye on how the Monongahela and Allegheny rivers converge directly below. It's one of the most famous tunnel reveals in American road travel.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Mount Washington sits above Pittsburgh's three rivers and delivers the definitive city skyline view. The Duquesne Incline (1877, still original wooden cars) hauls you 400 feet up for $5 round trip — cash only, exact change required. At the top is a small museum on Pittsburgh's industrial funicular history.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Mid-June: highs 79°F, lows 61°F, ~9 hrs sunshine. Afternoon shower possible. The overlook is best at golden hour or after dark when city lights reflect off the rivers. Incline runs Mon–Sat 5:30am–12:45am, Sun 7am–12:45am.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">Evening rush hits the Fort Pitt Bridge and Squirrel Hill Tunnel hard 4–6 PM weekdays — arrive before or after that window. Incline sees a 10-minute wait on weekend afternoons; before 11am or after 7pm is line-free.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 16</span><span class=\"dr\">Dayton → ⭐ Indianapolis (Shapiro&#39;s Deli) → ⛵ St. Louis, MO (Gateway Arch)</span><span class=\"dd\">5h 36m · 359 mi</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">I-70 west through Ohio and Indiana is flat, fast, and wide-open corn country. Columbus and Indianapolis are the only choke points. Crossing into Missouri, rolling hills signal the Ozark Plateau and the Arch catches afternoon light above the Mississippi.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Shapiro's Deli (808 S Meridian, Indianapolis — since 1905) is a genuine Midwestern Jewish deli: corned beef, pastrami, massive portions, no pretense. Get in, eat, get back on I-70. Gateway Arch summer hours: 9am–8pm Fri–Sat, 9am–6pm Sun–Thu. Museum under the Arch is FREE. Tram tickets ($26–30) must be booked in advance — weekends sell out.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Dayton/Indy: highs ~82°F. St. Louis runs hotter and more humid, frequently topping 90°F by late June. The Arch museum is underground and fully air-conditioned. Pack water for the open riverfront esplanade.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">Active I-70 construction in Indianapolis (Washington St ramp + westbound lane closures near mile 82–83 through Nov 2026) — add 30 min. Near St. Louis: I-55/70 lane reductions between Exchange Ave and I-255 active through summer 2027 — add 15–20 min.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 17</span><span class=\"dr\">St. Louis → 💦 Johnson&#39;s Shut-Ins → 🗿 Meramec Caverns → 🛣️ Springfield, MO</span><span class=\"dd\">5h 51m · 334 mi</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">I-44 south from St. Louis, then peel off into the Ozarks on Hwy 21 toward Johnson's Shut-Ins. Terrain flips from river-bottom farmland to cedar-covered ridges and clear-running streams. After the shut-ins, rejoin I-44 west through Sullivan and Rolla — the historic Route 66 corridor all the way to Springfield.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Johnson's Shut-Ins: East Fork Black River carved through ancient rhyolite = natural water park of chutes and deep pools. Green flag season in June. Park uses color-coded flag system — green means swim. Meramec Caverns (I-44 Exit 230 near Stanton): guided tours every 20–30 min from 9am, 80 min, $30.50/adult. Cave holds a constant 60°F — bring a light layer.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Ozarks in June: 85–90°F with high humidity. River water at Shut-Ins is refreshingly cold from Ozark springs — midday swimming is ideal. Meramec open 9am–7pm in June. Weekend crowds at Shut-Ins are heavy; arriving by 9am gets you a close parking spot.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">No major highway congestion on this rural stretch. Shut-Ins parking lot fills by mid-morning on summer weekends — arrive by 9am. Cavern road off I-44 is narrow but well-signed.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 18</span><span class=\"dr\">🛣️ Springfield → 🍖 Kansas City (Joe&#39;s BBQ lunch) → Kearney, NE</span><span class=\"dd\">7h 37m · 498 mi</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">Springfield to Kansas City via I-44 and I-70 — last of the Ozark hills giving way to flat Missouri farmland. After Kansas City, I-29/I-80 north into Nebraska: enormous open sky, grain elevators on the horizon, and the Platte River valley emerging to your north. Unmistakably Great Plains.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Joe's Kansas City BBQ (3002 W 47th Ave, KC, KS — inside a working gas station). Ranked top-5 BBQ in America. Order the Z-Man: smoked brisket on a kaiser roll, provolone, crispy onion rings. 4.8⭐ / 17,469 Google reviews. Mon–Sat 11am–9pm (10pm Fri–Sat). No reservations. Use the takeout register to skip the dining line.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Kansas City: highs 86°F, high humidity, afternoon thunderstorm risk. Kearney, NE sits at 2,150 ft elevation — evenings cool to the upper 50s vs KC's heat. Great escape from Midwest humidity.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">KC's I-70/I-435 interchange is congested 4–7pm — pass through before 4pm or after 7pm. I-70 junction with I-29 (north) has interchange construction — allow extra time. Up to 93 minutes cumulative delay reported in KC metro during peak hours.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 19</span><span class=\"dr\">Kearney, NE → I-80 above Colorado → Rock Springs, WY</span><span class=\"dd\">8h 20m · 571 mi</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">I-80 west from Kearney runs arrow-straight through the Platte River valley — the same route as the Oregon, California, and Mormon Trails. Sandhill cranes may still be roosting on the sandbars in early June. A short detour north on US-26 from Scottsbluff reaches Chimney Rock. Wyoming brings high sagebrush steppe at 7,000 ft and the edge of the Red Desert before Rock Springs.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Chimney Rock rises 300+ feet above the North Platte valley floor — the single most-cited landmark in every pioneer diary. Visitor center open 9am–4pm MT. Scotts Bluff National Monument nearby: 800-ft bluff with summit road open daily 9am–5:30pm, views into Wyoming and Colorado. Both are free with America the Beautiful pass.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Western Nebraska: highs 83–87°F, low humidity. Scotts Bluff and Chimney Rock are fully exposed — sunscreen mandatory. Rock Springs, WY: 6,270 ft elevation, highs 75°F in June, nights drop to low 40s. Afternoon thunderstorms are common but brief.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">I-80 across Nebraska is truck-heavy but moves freely. Wyoming I-80 is famous for crosswinds exceeding 60 mph between Rawlins and Laramie — check WYDOT 511 before driving if it's gusty. Wind advisories post frequently and can slow all traffic.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 20</span><span class=\"dr\">Rock Springs → ✅ Homestead Crater 11:30 AM → 🏙️ SLC → ⬜ Bonneville → 🌊 Twin Falls, ID</span><span class=\"dd\">~8h · ~520 mi</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">I-80 west from Rock Springs crosses the high Red Desert then exits at US-40 to Midway, UT for the Homestead Crater swim (CONFIRMED ✅ 11:30 AM – 12:30 PM). Back north to Salt Lake City for Red Iguana, then west on I-80 across the salt-white flats toward Wendover and Bonneville. US-93 north to Twin Falls and Snake River canyon country. Manageable day without the Bentonite Hills detour.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">The Crater at Homestead (Midway, UT): CONFIRMED ✅ Swim 11:30 AM – 12:30 PM · 2 guests · $84.76 · Conf: 8a821ba9723. 55-ft limestone dome enclosing a 90–96°F geothermal pool — only warm-water scuba site in the continental US. Enter via Bluff Road entrance, park in designated Crater Parking. Arrive with swimsuits on. Bonneville Salt Flats (free): dry, drivable, polygon patterns in peak June condition — avoid June 25–Jul 1 (USFRA race week closes access). Shoshone Falls: $5/car, running strong in early–mid June before irrigation season reduces flow.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Midway/Homestead Crater: mid-70s in June, pool is 90–96°F. Salt Lake City: highs 90°F, very low humidity. Salt flats reflect UV upward — apply sunscreen under your nose and chin. Twin Falls: 81°F June average.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory & Timing</div>\n                  <div class=\"ps-text\">Depart Rock Springs ~8:00 AM. Homestead Crater slot 11:30 AM — arrive with 30 min buffer via Bluff Road entrance. After the crater (12:30 PM): ~45 min to SLC, ~1h 30m to Bonneville, ~2h to Twin Falls. Total day ~8h driving / ~520 mi (Google Maps verified). SLC's I-15/I-80 interchange has afternoon congestion — pass through before 3pm or after 6pm. US-93 north toward Twin Falls crosses high desert — fuel in Jackpot, NV if running low. Shoshone Falls closes 9pm — comfortable arrival.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 21</span><span class=\"dr\">Twin Falls + 🌊 Shoshone Falls → Salmon River Canyon → 🦬 Bison Range → 🏞️ Polson → 🏔️ Whitefish, MT</span><span class=\"dd\">9h 13m · ~580 mi</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">US-93 north from Twin Falls is one of the finest driving corridors in the American West: Snake River canyon, then central Idaho high country, then the Salmon River — called the River of No Return — through 100+ miles of deepening canyon with rhyolite cliffs and ponderosa pines. At the Montana border, the Bitterroot Valley opens before Flathead Lake and Whitefish appear below the Whitefish Range.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Salmon River Scenic Byway (US-93/SR-75): bald eagles, bighorn sheep, river otters, spawning salmon possible in a single afternoon. June is ideal — snowmelt has the river running high and dramatic. CSKT Bison Range (Moiese, MT): open 7am–8pm summer. 19-mile Red Sleep Mountain Drive (2 hrs) puts you within close range of 350 bison, antelope, elk, and bighorn sheep. Note: no longer accepts America the Beautiful pass — separate fee required.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Central Idaho canyon: 80–85°F at lower elevations, river provides ambient cooling. Flathead Lake/Polson: 72–76°F. Whitefish in June: highs ~68°F, nights in low 40s — pack a real jacket. Flathead Valley can see afternoon showers.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">US-93 through Salmon River Canyon is a two-lane mountain highway — follow the river's rhythm, don't push pace. Watch for cattle on road near Elk Bend and Challis. Red Sleep Drive gate at Bison Range closes at 6pm sharp — enter by 5:45pm. No significant congestion anywhere on this corridor.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 22</span><span class=\"dr\">🏔️ Whitefish → St. Mary · CHECK-IN Johnson&#39;s · Glacier NP Day 1</span><span class=\"dd\">2h 12m · 111 mi ✅</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">US-2 east from Whitefish follows Glacier's southern boundary along the Middle Fork Flathead River — pressed between steep canyon walls with the park's peaks rising north. Through West Glacier, over Marias Pass (5,213 ft, lowest northern Rockies continental divide crossing), then down to the Rocky Mountain Front and St. Mary on the park's east side. One of the finest threshold drives in North America.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Lake McDonald (west side): 10-mile turquoise glacial lake rimmed in old-growth cedar/hemlock with multicolored rounded stones on the shoreline. Going-to-the-Sun Road climbs above treeline with the Garden Wall as vertical backdrop. St. Mary visitor center has full services and access to Many Glacier Valley (11 mi north). Park entry: $35/vehicle 7-day pass.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Valley floors: ~70°F late June. Logan Pass (6,646 ft) runs 10–15°F cooler with rain, sleet, or snow possible any time. Going-to-the-Sun Road full opening to Logan Pass is weather-dependent — historically mid-June to early July. Check nps.gov/glac the morning of your drive for current road status.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">Going-to-the-Sun Road limits vehicles over 21 ft long between Avalanche Creek and Sun Point — verify dimensions. Logan Pass parking fills by 9:30am in season; arrive before 8am or use the shuttle from Apgar (west) or St. Mary (east). The new 2026 ticketed shuttle system doesn't launch until July 1 — you arrive June 22, so access is simpler.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 23</span><span class=\"dr\">🏔️ Glacier NP Day 2 — Going-to-the-Sun Road · Logan Pass · Hidden Lake</span><span class=\"dd\">~100 mi · park day ✅</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">No driving needed — Glacier NP full day. Going-to-the-Sun Road: 50-mile engineering feat built into the Continental Divide, climbing from cedar forest at West Glacier through avalanche meadows, along the Garden Wall, over Logan Pass, descending through the glacier-carved St. Mary Valley. Nothing comparable in the lower 48.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Logan Pass (6,646 ft): trailhead for Hidden Lake Overlook (2.7 mi RT, moderate, snow patches likely in late June but passable) and the Highline Trail along the Garden Wall — Glacier's most iconic ridgeline walk. Many Glacier Valley (east side): Grinnell Glacier Trail (10.3 mi, passes 3 lakes, reaches retreating glacier) and Iceberg Lake (9.7 mi, floating ice into August, known grizzly corridor). Bear spray is mandatory — rentals at West Glacier and St. Mary.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Park entrances: 65–68°F. Logan Pass: 45–55°F with wind chill. June is Glacier's shoulder season — significantly fewer crowds than July. Grizzly bears are highly active on avalanche slopes in June — best month for wildlife sightings. Trail status at nps.gov/glac updates daily; check each morning for closures.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">Arrive at Logan Pass before 8am or use shuttle. Many Glacier is accessed from Babb, MT via Many Glacier Road off US-89 — do NOT try to reach it via Going-to-the-Sun Road (not directly connected). The new 339-space parking lot at Swiftcurrent opened in 2026.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 24</span><span class=\"dr\">🏔️ Glacier NP Day 3 — Many Glacier Valley · Grinnell Glacier hike</span><span class=\"dd\">~50 mi · park day ✅</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">Second full day in Glacier — east-side focus. Many Glacier Valley dead-ends in a cirque of peaks surrounding Swiftcurrent Lake. Drive it at dawn for wildlife on the valley floor: grizzly, moose, mountain goats, wolves. The Saint Mary Lake corridor connects the valley to the park's main visitor infrastructure.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Many Glacier Hotel (1915, Swiss chalet style) is open for day visitors — grab coffee on the lake-view deck. The short Swiftcurrent Nature Trail (2.6 mi loop) around the lake sees mountain goats on the cliffs above. Red Rock Falls (3.6 mi RT) leads through colorful canyon to a small cascade — one of Glacier's most photogenic short hikes. Two Medicine area on the south end of the park is a quieter alternative — no shuttle crowds, pristine lakes.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Many Glacier Valley: 60–65°F June average, windier than the west side. Evening light on the Grinnell Point cirque is exceptional — the valley faces west and catches all of it. Bears remain very active; make noise on trails. Logan Pass can be revisited at sunset for dramatically different light than the morning rush.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">Many Glacier Road from Babb can back up at the entrance gate by 8am in peak season — arrive at park opening or use the Many Glacier Express shuttle from St. Mary. St. Mary Lake Visitor Center closes at 6pm; Many Glacier services close at 8pm.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 25</span><span class=\"dr\">St. Mary (checkout 11am) → 🌋 Canyon Village, Yellowstone NP (check-in 1pm)</span><span class=\"dd\">6h 53m · 412 mi ✅</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">US-89 south from St. Mary drops immediately into the grassland sweep of the Rocky Mountain Front on the Blackfeet Reservation — open cattle country through Browning and Choteau. South through Great Falls and then Paradise Valley along the Yellowstone River near Livingston, one of Montana's finest road stretches. The final approach through Yankee Jim Canyon, where the gorge tightens dramatically, signals you're almost in the park.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Canyon Village sits within a mile of the Grand Canyon of the Yellowstone. The canyon drops over 1,000 feet with yellow rhyolite walls stained by iron and sulfur. Artist Point (0.2-mile paved, accessible) provides the definitive view of the 308-ft Lower Falls. The Brink of the Lower Falls Trail descends 265 feet to a thundering mist-soaked platform directly above the drop. Canyon Campground opened May 29, 2026 — fully operational with 24-hour credit-card fuel station on site.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Highs 55–70°F at Canyon Village in late June with cool nights dropping to 35–45°F. Snow is possible at any time but unlikely by June 25. All park roads to Canyon Village are open. Canyon Adventure Store open daily mid-June through August.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">US-89 through Montana carries minimal traffic — biggest slowdown is often bison herds on the road south of Gardiner. Add 20–30 minutes buffer at Yellowstone's north entrance if arriving mid-afternoon; entry queues build 10am–3pm. Check In: 1pm at Canyon Campground — reservation confirmed.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 26</span><span class=\"dr\">🌋 Yellowstone Day 2 — Grand Prismatic Spring · Old Faithful · Grand Canyon of Yellowstone</span><span class=\"dd\">park day ✅</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">In-park driving day on the Grand Loop Road — roughly 50 miles separating the major sites. Canyon Village west and south to Midway Geyser Basin (Grand Prismatic), then south to Old Faithful Village, then return north to Canyon. The road passes through lodgepole forest, open meadows with bison, and thermal steam vents visible from the roadside.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Grand Prismatic Spring (370 ft across, 121 ft deep) is the largest hot spring in the US — its rings of red, orange, and yellow bacteria are most vivid in June's warm sun with minimal steam. Grand Prismatic Overlook trail (1.6 mi RT) gives the aerial perspective. Old Faithful erupts every ~90 minutes — predicted times posted at the Visitor Education Center; the Upper Geyser Basin boardwalk loop hits Beehive, Grand, Castle, and Morning Glory Pool in a 3-mile walk. Return to Artist Point at golden hour for dramatically different light than morning.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Late June ideal for Grand Prismatic: sun angle and warm air minimize steam, making colors vivid. Best light 10am–2pm. Park-wide temps 55–72°F mid-day. All three sites fully open. Old Faithful Inn dining reservations recommended — book the night before.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">Grand Prismatic parking fills by 9am — arrive before 8:30am or after 4pm. Old Faithful overflow lot fills by 10am. Wildlife jams (bison, elk) are common on the Grand Loop and can add 15–30 minutes without warning. No advance reservations required for park entry in 2026.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 27</span><span class=\"dr\">🌋 Yellowstone Day 3 — switch Res. 1→2 · Lamar Valley wildlife</span><span class=\"dd\">park day ✅</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">Lamar Valley is in the northeast corner of the park — 29 miles one-way from Canyon Village via the Tower-Roosevelt junction on the Grand Loop. The road climbs to Dunraven Pass (8,859 ft) with sweeping Absaroka Range views before dropping into the Lamar River corridor, a broad glacially-carved valley that feels like Montana plains transplanted inside Yellowstone.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Lamar Valley is the 'Serengeti of North America' — bison herds are virtually guaranteed, and late June is prime grizzly and wolf viewing season. The Junction Butte and Lamar Canyon wolf packs are regularly spotted with scopes; Slough Creek pullout and the Lamar River Bridge are prime wolf positions. Bring 10x+ binoculars. Maintain 100-yard minimum from bears and wolves (federal law). In the evening: complete your campsite switch from Reservation 1 to Reservation 2 at the Canyon registration desk before 6pm.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Dawn in Lamar Valley (5–7am) can be 32–42°F — bring full insulation layers. Midday warms to 60–70°F. This is calving season for bison and elk, concentrating predator activity. Newborn calves visible in the meadows.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">Dunraven Pass Road (Tower–Canyon connection) opens mid-May seasonally — confirmed open 2026, but call 307-344-2117 morning of. Road is narrow with no guardrails on some switchbacks; RVs over 25 ft not recommended. Wildlife jams in Lamar can add 30–45 minutes each direction — build that in.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 28</span><span class=\"dr\">Canyon Village (checkout 11am) → Spokane, WA ⚡</span><span class=\"dd\">8h 7m · 500 mi</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">Check out by 11am, exit Yellowstone via the west or north entrance, and pick up I-90 west through Butte and Missoula — the highway follows the Clark Fork River through forested mountain valleys before crossing into Idaho and Washington. The Coeur d'Alene section of I-90 is genuinely scenic with lake views from the highway. With two drivers, split the wheel at the Missoula area (roughly the 3-hour mark).</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Spokane is a practical overnight for this push — a functional mid-sized city with a walkable downtown and the Spokane River Gorge cutting dramatically through the city center. If energy remains after the 500-mile drive, Riverfront Park (1974 World's Fair grounds) is a 5-minute walk from most downtown hotels. The Petro Stopping Center and Pilot Flying J are both at I-90 Exit 272 — confirmed showers, 200 truck parking spaces at Petro (Reserve-It parking available).</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Eastern Washington in late June: 75–85°F, low humidity. I-90 through Idaho and Washington fully open with no seasonal restrictions. Sharp contrast to Montana mountain passes you'll be leaving behind.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">I-90 westbound through downtown Spokane has active construction near Exits 279–281 — expect possible delays. Montana DOT traveler info at mdt.mt.gov/travinfo for live cameras and conditions. Budget a fuel stop on the Montana stretch — services gap between Billings and Missoula is wide.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 29</span><span class=\"dr\">Spokane → 🌋 Mt. Rainier NP (Paradise) → Seattle, WA</span><span class=\"dd\">7h 29m · 395 mi</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">West on I-90 through the Columbia Basin, crossing the Cascades via Snoqualmie Pass (3,022 ft) — a dramatic transition from dry eastern Washington to lush dripping-green western Washington. Exit I-90 south of Tacoma and take SR-7 through Elbe to SR-706 (the Road to Paradise), which climbs 10.5 miles of tight switchbacks through old-growth fir forest to Paradise at 5,400 ft. After your stop, continue north through Tacoma to Seattle.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Paradise is the most visited destination in Mount Rainier NP. In late June 2026, snowpack is second lowest on record — expect significantly more trail access than a typical June. The Skyline Trail loop (5 miles, 1,400 ft gain) offers glacier close-ups and panoramic Cascades views if clear. The mountain is visible from Paradise ~50% of summer days — check a webcam before committing to the detour. No timed-entry reservations required in 2026. Henry M. Jackson Visitor Center open daily ~9am–5pm.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Paradise late June: 45–60°F with lingering snowfields, though 2026's record-low snowpack opens more trails. Morning fog common; best mountain views before noon or after 4pm. Bring waterproof layers — weather can shift from sunny to rain in under an hour at this elevation.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">SR-706 through Ashford is a two-lane road with RV traffic — allow 45 minutes from Elbe to Paradise, not 30. SR-123 east-side entrance has active 2025–2026 construction with delays up to 30 minutes; use SR-706 Nisqually approach only. I-5 northbound into Seattle from Tacoma is heavily congested 3–6pm — arrive post-6pm or allow an extra hour.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jun 30</span><span class=\"dr\">Seattle → 🌹 Portland, OR → 🔵 Crater Lake NP</span><span class=\"dd\">6h 38m · 407 mi</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">South on I-5 through Tacoma, Olympia, and the Willamette Valley into Portland. Views of Mt. St. Helens visible to the east near Toutle, WA on a clear day. From Portland, I-5 south through the Willamette Valley to Roseburg, then OR-138 east through the North Umpqua River canyon — 60 miles of stunning river gorge with zero cell service — climbing to Crater Lake's north entrance. Alternative: continue I-5 past Medford and approach via OR-62 from the south (guaranteed open, slightly longer).</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Crater Lake is the deepest lake in the US at 1,943 ft with water of extraordinary clarity and blue that photographs cannot fully capture. The 33-mile Rim Drive (east section opens late June–early July — call 541-594-3000 to confirm) is the experience. Rim Village Visitor Center open 9:30am–4:30pm. Steel Information Center open year-round 9am–5pm. Entry: $30/vehicle 7-day pass.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Rim sits at ~7,000 ft — expect 45–65°F highs with possible afternoon thunderstorms in late June. Snow can be substantial in early June but mostly cleared by June 30 in a low-snowpack year.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">I-5 through downtown Portland: morning rush on I-5 southbound (7–9am) is heavy near the Rose Quarter (exits 300–302); I-405 bypass loop can save 20 minutes. OR-138 through North Umpqua canyon has no cell service for ~60 miles — download offline maps before leaving Roseburg.</div>\n                </div>\n              </div>\n              <div style=\"background:#fed7d7;border:1px solid #fc8181;border-radius:6px;padding:10px 13px;margin-top:12px;font-family:sans-serif;font-size:0.79rem;color:#c53030;\"><strong>⚠️ Alert:</strong> Cleetwood Cove Trail — the ONLY trail to the water's edge — is CLOSED ALL OF 2026, 2027, and 2028 for geotechnical rehabilitation. All boat tours and Wizard Island access are suspended through 2028. Rim Drive and Rim Village remain open. Verified via nps.gov/crla.</div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jul 1</span><span class=\"dr\">Crater Lake (10am) → 🌲 Jedediah Smith Redwoods (Crescent City) → 🌲 Avenue of the Giants → Santa Rosa, CA</span><span class=\"dd\">8h 24m · 465 mi</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">Exit Crater Lake south via OR-62 to Eagle Point, then OR-234 through Gold Hill to Grants Pass — picking up US-199 southwest (the Redwood Highway). US-199 is a narrow two-lane road with tight switchbacks through the Smith River canyon; scenic but demands full attention, unsuitable for towing. Cross into California and immediately enter Jedediah Smith Redwoods. From Crescent City, US-101 south runs through Del Norte, Humboldt, and into Humboldt Redwoods State Park (Avenue of the Giants), then continues south to Santa Rosa.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">Jedediah Smith Redwoods (9 miles east of Crescent City on US-199): some of the densest old-growth redwood groves anywhere — canopy so thick the forest floor stays dim and cool in midday July sun. Howland Hill Road (6 miles, unpaved, no trailers) is the most intimate old-growth drive in the park system. The Avenue of the Giants (31-mile US-101 scenic alternate through Humboldt Redwoods): enter from the north end — larger trees, focus on Founders Grove and the Drury Scenic Parkway. State park day-use fee $8/vehicle at Jedediah Smith picnic areas.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">July 1 in the redwoods: 55–75°F, foggy morning, clearing to partly sunny. Smith River runs clear and cold — local swimming by late June. US-199 fully open in summer. Avenue of the Giants is a functioning county road open year-round.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">US-199 through Smith River canyon: budget 1.5 hours for the 80-mile Grants Pass → Crescent City stretch — not 1 hour. July 4th weekend traffic builds on US-101 south of Fortuna from July 1 afternoon — clear Eureka before 3pm. Avenue of the Giants has NO gas stations; fuel in Fortuna before turning off. No cell service on US-199 — download offline maps.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n            <div class=\"day-entry\" onclick=\"toggleDay(this)\">\n              <div class=\"day-row\"><span class=\"dn\">Jul 2</span><span class=\"dr\">Santa Rosa (9am) → 🌉 San Francisco International Airport · arrive by 11am ✅</span><span class=\"dd\">1h 16m · 74 mi · California begins</span><span class=\"di\">▼</span></div>\n              <div class=\"day-panel\">\n              <div class=\"panel-grid\">\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚗 Drive Summary</div>\n                  <div class=\"ps-text\">US-101 south from Santa Rosa straight through Marin County — Petaluma, Novato, San Rafael — to the Peninsula and SFO. 74 miles, nominally 1h 16m but Bay Area morning traffic makes this 90–120 minutes in reality. Depart no later than 9am.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">📍 About This Stop</div>\n                  <div class=\"ps-text\">No stops needed or recommended on this final stretch — the 11am SFO hard deadline is the entire focus of Day 18. The drive through Marin gives bay glimpses and a fitting close: transitioning from Northern California's open space into Bay Area density, ending a trip that began in the wide-open Northern Rockies. Arrive at SFO departures level, set down the gear, and start the California chapter.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">☀️ June Conditions</div>\n                  <div class=\"ps-text\">Late June/early July mornings: 55–65°F with marine fog through Marin that burns off by 9–10am. No seasonal road issues on US-101 in summer. SFO runs on schedule in early July.</div>\n                </div>\n                <div class=\"panel-section\">\n                  <div class=\"ps-title\">🚦 Traffic Advisory</div>\n                  <div class=\"ps-text\">Highest-stakes driving segment of the entire 18-day trip. Leave Santa Rosa at 9am SHARP. Worst pinch points: Corte Madera, San Rafael, and the 101/580 interchange near Mill Valley. Use Waze or Google Maps live routing from the moment you depart. 511.org (Bay Area official) shows live conditions. SFO recommends arriving 2 hours before domestic departure — a 10:15–10:30am terminal arrival gives a solid 30-minute buffer for the 11am requirement.</div>\n                </div>\n              </div>\n            </div>\n            </div>\n\n          </div>\n\n          <div class=\"tags\">\n            <span class=\"t t-city\">⛰️ Pittsburgh, PA</span>\n            <span class=\"t t-city\">⛵ Gateway Arch · St. Louis</span>\n            <span class=\"t t-scen\">💦 Johnson&#39;s Shut-Ins</span>\n            <span class=\"t t-scen\">🗿 Meramec Caverns</span>\n            <span class=\"t t-r11\">🛣️ Route 66 Birthplace · Springfield</span>\n            <span class=\"t t-city\">🍖 Kansas City BBQ</span>\n            <span class=\"t t-scen\">🌡️ Homestead Crater · Midway UT</span>\n            <span class=\"t t-city\">🏙️ Salt Lake City</span>\n            <span class=\"t t-scen\">⬜ Bonneville Salt Flats</span>\n            <span class=\"t t-scen\">🌊 Twin Falls · Shoshone Falls</span>\n            <span class=\"t t-scen\">🦬 National Bison Range</span>\n            <span class=\"t t-scen\">🏞️ Flathead Lake · Polson</span>\n            <span class=\"t t-park\">🏔️ Glacier NP ×3 days (CONFIRMED)</span>\n            <span class=\"t t-park\">🌋 Yellowstone NP ×3 days (CONFIRMED)</span>\n            <span class=\"t t-park\">🌋 Mt. Rainier NP</span>\n            <span class=\"t t-city\">🌆 Seattle, WA</span>\n            <span class=\"t t-city\">🌹 Portland, OR</span>\n            <span class=\"t t-park\">🔵 Crater Lake NP</span>\n            <span class=\"t t-park\">🌲 Redwood NP</span>\n            <span class=\"t t-warn\">⚡ Hard days: Jun 19 (Kearney→Rock Springs 571 mi) · Jun 28 (Yellowstone→Spokane 500 mi)</span>\n          </div>\n\n          <div class=\"states\">\n            <span class=\"stag\">PA</span><span class=\"stag\">OH</span><span class=\"stag\">IN</span><span class=\"stag\">MO</span><span class=\"stag\">NE</span><span class=\"stag\">WY</span><span class=\"stag\">UT</span><span class=\"stag\">ID</span><span class=\"stag\">MT</span><span class=\"stag\">WA</span><span class=\"stag\">OR</span><span class=\"stag\">CA</span>\n          </div>\n\n          <div class=\"diff\" style=\"border-top:1px solid var(--border);padding-top:12px;margin-top:12px;\">\n            Drive difficulty: Two-driver manageable — no single day exceeds 600 mi, max is 571 mi (Jun 19). Longest drive days: Jun 18 (498 mi) · Jun 19 (571 mi) · Jun 28 (500 mi). All others under 420 mi.\n            <div class=\"bar-track\"><div class=\"bar-fill d3\" style=\"width:65%\"></div></div>\n          </div>\n        </div>\n\n        <div class=\"route-map\">\n          <div class=\"map-controls\" style=\"background:linear-gradient(135deg,#fffdf5,#fff9e6);\">\n            <span class=\"map-ctrl-label\" style=\"color:var(--gold);\">🗺️ Map Layers</span>\n            <button class=\"map-layer-btn dest active\" onclick=\"toggleLayer('r11','dest',this)\">📍 Destinations</button>\n            <button class=\"map-layer-btn rest active\" onclick=\"toggleLayer('r11','rest',this)\">🛌 Rest Stops</button>\n            <button class=\"map-layer-btn shower active\" onclick=\"toggleLayer('r11','shower',this)\">🚿 Showers</button>\n            <button class=\"map-layer-btn food active\" onclick=\"toggleLayer('r11','food',this)\">🍳 Food</button>\n          </div>\n          <div id=\"r11-map-canvas\" class=\"map-canvas\"><div class=\"map-loading\">Loading map…</div></div>\n          <a class=\"map-open-btn\" href=\"https://www.google.com/maps/dir/3487+Hillcroft+Road,+Huntingdon+Valley,+PA+19006/Pittsburgh,PA/Dayton,OH/Indianapolis,IN/St.+Louis,MO/Johnson's+Shut-Ins+State+Park,MO/Meramec+Caverns,MO/Cuba,MO/Springfield,MO/Kansas+City,MO/Rock+Springs,WY/Midway,UT/Salt+Lake+City,UT/Wendover,UT/Twin+Falls,ID/National+Bison+Range,Moiese,MT/Whitefish,MT/St.+Mary,MT/Canyon+Village,Yellowstone,WY/Spokane,WA/Mount+Rainier+National+Park,WA/Seattle,WA/Portland,OR/Crater+Lake+National+Park,OR/Crescent+City,CA/San+Francisco,CA\" target=\"_blank\">🗺️ Open Grand American Loop in Google Maps ↗</a>\n        </div>\n      </div>\n    </div><!-- /route 11 -->\n\n  </div><!-- /wrap -->\n</div><!-- /routes-section -->\n\n<footer>\n  <p>All driving times validated via Google Maps Distance Matrix API &nbsp;·&nbsp; Baselines only (no future departure_time, add 15–30% for Yellowstone + park corridors in peak summer) &nbsp;·&nbsp; All 10 routes arrive SF before noon July 2</p>\n  <p style=\"margin-top:8px;opacity:.6;\">© 2026 Drapkin Family California Road Trip · Built with Google Maps Platform + Claude</p>\n</footer>\n\n<script>\n// ── Day card expand/collapse ───────────────────────────────────────────\nfunction toggleDay(el) { el.classList.toggle('open'); }\n\n// ── Interactive map layer data ────────────────────────────────────────\nconst ROUTE_STOPS = {\n  r11: {\n    origin: '3487 Hillcroft Road, Huntingdon Valley, PA 19006',\n    destination: 'San Francisco, CA',\n    waypoints: [\n      'Pittsburgh, PA','Dayton, OH','Indianapolis, IN','St. Louis, MO',\n      \"Johnson's Shut-Ins State Park, MO\",'Meramec Caverns, Stanton, MO',\n      'Cuba, MO','Springfield, MO','Kansas City, MO',\n      'Rock Springs, WY','Homestead Crater, Midway UT','Salt Lake City, UT','Wendover, UT',\n      'Twin Falls, ID','National Bison Range, Moiese, MT',\n      'Whitefish, MT','St. Mary, MT',\n      'Canyon Village, Yellowstone National Park, WY',\n      'Spokane, WA','Paradise, Mt. Rainier National Park, WA','Seattle, WA',\n      'Portland, OR','Crater Lake National Park, OR','Crescent City, CA'\n    ],\n    stops: {\n      dest: [\n        /* ── Pennsylvania ── */\n        {n:'Mount Washington Overlook — Pittsburgh', lat:40.427, lng:-80.013, note:'Best Pittsburgh skyline view · Duquesne Incline · overlooks all three rivers'},\n        /* ── Ohio ── */\n        {n:'Dayton Aviation Heritage NHP',          lat:39.771, lng:-84.194, note:'Wright Brothers museum · free NPS site · great 30-min stop'},\n        /* ── Indiana ── */\n        {n:\"Shapiro's Delicatessen — Indianapolis\", lat:39.762,
