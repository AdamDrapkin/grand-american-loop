ort\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Segment Guide · Kansas City → Glacier NP · Jun 19–22</title>\n  <link rel=\"stylesheet\" href=\"https://unpkg.com/leaflet@1.9.4/dist/leaflet.css\"/>\n  <script src=\"https://unpkg.com/leaflet@1.9.4/dist/leaflet.js\"><\/script>\n  <style>\n    :root {\n      --ut:    #C05621;\n      --id:    #2D6A4F;\n      --mt:    #1B3D6E;\n      --gold:  #D69E2E;\n      --cream: #FDFAF4;\n      --snow:  #FFF8F0;\n      --dark:  #1A202C;\n      --mid:   #5A4A3A;\n      --border:#E4D0BC;\n      --amber: #92400E;\n      --green: #1F6B2A;\n      --red:   #C0392B;\n    }\n    *{box-sizing:border-box;margin:0;padding:0}\n    body{font-family:Georgia,serif;background:var(--cream);color:var(--dark);line-height:1.6}\n    a{color:var(--mt)}\n    .hero{background:linear-gradient(160deg,#1A202C 0%,#1B3D6E 30%,#C05621 65%,#D69E2E 100%);color:white;padding:52px 24px 60px;text-align:center;position:relative;overflow:hidden}\n    .hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:36px;background:var(--cream);clip-path:ellipse(55% 100% at 50% 100%)}\n    .hero-sup{font-family:sans-serif;font-size:.68rem;letter-spacing:2.5px;text-transform:uppercase;opacity:.6;margin-bottom:12px}\n    .hero h1{font-size:2.6rem;font-weight:normal;margin-bottom:8px;text-shadow:0 2px 10px rgba(0,0,0,.3)}\n    .hero-dates{font-family:sans-serif;font-size:1rem;opacity:.85;margin-bottom:6px}\n    .hero-route{font-family:sans-serif;font-size:.82rem;opacity:.62;margin-bottom:22px}\n    .hero-chips{display:flex;justify-content:center;flex-wrap:wrap;gap:9px}\n    .hchip{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28);border-radius:20px;padding:5px 15px;font-family:sans-serif;font-size:.78rem}\n    .wrap{max-width:980px;margin:0 auto;padding:0 20px}\n    section{padding:42px 0}\n    hr.div{border:none;border-top:1px solid var(--border);margin:0}\n    .overview-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:28px 0}\n    @media(max-width:640px){.overview-strip{grid-template-columns:1fr 1fr}}\n    .ov-card{border-radius:10px;padding:14px 16px;text-align:center}\n    .ov-card.d5{background:linear-gradient(135deg,#FFFFF0,#FEFCBF);border:2px solid #ECC94B}\n    .ov-card.d6{background:linear-gradient(135deg,#FFF5F5,#FED7D7);border:2px solid #FC8181}\n    .ov-card.d7{background:linear-gradient(135deg,#F0FFF4,#C6F6D5);border:2px solid #68D391}\n    .ov-card.d8{background:linear-gradient(135deg,#EBF8FF,#BEE3F8);border:2px solid #63B3ED}\n    .ov-date{font-family:sans-serif;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--mid);margin-bottom:4px}\n    .ov-label{font-family:sans-serif;font-size:.82rem;font-weight:700;margin-bottom:3px}\n    .ov-note{font-family:sans-serif;font-size:.72rem;color:var(--mid);line-height:1.4}\n    .day-section{margin-bottom:52px}\n    .day-hd{border-radius:12px;padding:18px 24px;color:white;cursor:pointer;user-select:none;position:relative}\n    .day-hd::after{content:'▶';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:.72rem;opacity:.65;transition:transform .2s ease}\n    .day-section.open .day-hd{border-radius:12px 12px 0 0}\n    .day-section.open .day-hd::after{transform:translateY(-50%) rotate(90deg)}\n    .day-hd.d5{background:linear-gradient(135deg,#744210,#C05621)}\n    .day-hd.d6{background:linear-gradient(135deg,#92400E,#ED8936)}\n    .day-hd.d7{background:linear-gradient(135deg,#276749,#38A169)}\n    .day-hd.d8{background:linear-gradient(135deg,#1B3D6E,#3A7DC9)}\n    .day-hd-label{font-family:sans-serif;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;opacity:.7;margin-bottom:4px}\n    .day-hd-title{font-size:1.35rem;font-weight:normal;margin-bottom:3px}\n    .day-hd-sub{font-family:sans-serif;font-size:.82rem;opacity:.82}\n    .day-body{background:white;border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;padding:26px;display:none}\n    .day-section.open .day-body{display:block}\n    .seg-map{height:320px;border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:8px}\n    .map-caption{font-family:sans-serif;font-size:.72rem;color:var(--mid);margin-bottom:6px;font-style:italic}\n    .map-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}\n    .mab{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:6px 14px;font-family:sans-serif;font-size:.76rem;font-weight:700;text-decoration:none;transition:opacity .15s;white-space:nowrap}\n    .mab:hover{opacity:.82}\n    .mab.gmaps{background:white;border:1.5px solid #1A73E8;color:#1A73E8}\n    .mab.route{background:#1A73E8;color:white;border:1.5px solid #1A73E8}\n    .time-block{margin-bottom:22px}\n    .tb-hd{font-family:sans-serif;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ut);padding-bottom:6px;border-bottom:2px solid var(--ut);margin-bottom:12px}\n    .tb-hd.id{color:var(--id);border-color:var(--id)}\n    .tb-hd.mt{color:var(--mt);border-color:var(--mt)}\n    .tb-hd.gold{color:var(--gold);border-color:var(--gold)}\n    .tb-list{font-family:sans-serif;font-size:.85rem;color:var(--dark);line-height:1.75;list-style:none;padding:0}\n    .tb-list li{padding-left:14px;position:relative;margin-bottom:2px}\n    .tb-list li::before{content:'→';position:absolute;left:0;color:var(--ut);font-size:.8rem}\n    .tb-list strong{color:var(--mt)}\n    .stop-card{background:var(--snow);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:14px 0 22px}\n    .stop-card.id-theme{background:#F0FFF4}\n    .stop-card.mt-theme{background:#EFF6FF}\n    .sc-hd{padding:14px 18px 12px;border-bottom:1px solid var(--border)}\n    .sc-name{font-size:1.08rem;color:var(--ut);margin-bottom:5px;font-weight:600}\n    .stop-card.id-theme .sc-name{color:var(--id)}\n    .stop-card.mt-theme .sc-name{color:var(--mt)}\n    .sc-stats{display:flex;flex-wrap:wrap;gap:7px}\n    .sc-stat{font-family:sans-serif;font-size:.74rem;background:white;border:1px solid var(--border);border-radius:5px;padding:3px 8px;color:var(--mid)}\n    .sc-stat.must{background:#FFF5F5;border-color:#FCA5A5;color:var(--red);font-weight:700}\n    .sc-stat.free{background:#F0FFF4;border-color:#86EFAC;color:var(--green);font-weight:700}\n    .sc-stat.book{background:#FFFBEB;border-color:#FCD34D;color:var(--amber);font-weight:700}\n    .sc-body{padding:14px 18px 16px}\n    .sc-notes{font-family:sans-serif;font-size:.82rem;color:var(--dark);line-height:1.6;margin-bottom:10px}\n    .sc-notes p{margin-bottom:6px}\n    .sc-tip{background:linear-gradient(135deg,#FFF9F0,#FDEBD0);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:10px 14px;margin-top:10px;font-family:sans-serif;font-size:.81rem;color:var(--dark);line-height:1.5}\n    .sc-tip.id{background:linear-gradient(135deg,#F0FFF4,#DCFCE7);border-color:var(--id)}\n    .sc-tip.mt{background:linear-gradient(135deg,#EBF8FF,#BEE3F8);border-color:var(--mt)}\n    /* LOGISTICS STRIP */\n    .logistics-strip{background:#F7FAFC;border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin:20px 0}\n    .ls-title{font-family:sans-serif;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--mt);margin-bottom:10px}\n    .ls-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}\n    @media(max-width:580px){.ls-grid{grid-template-columns:1fr}}\n    .ls-card{background:white;border:1px solid var(--border);border-radius:8px;padding:10px 12px}\n    .ls-type{font-family:sans-serif;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}\n    .ls-type.rest{color:#2B6CB0}.ls-type.shower{color:var(--green)}.ls-type.food{color:var(--ut)}\n    .ls-name{font-family:sans-serif;font-size:.82rem;font-weight:700;color:var(--dark);margin-bottom:2px}\n    .ls-note{font-family:sans-serif;font-size:.75rem;color:var(--mid);line-height:1.4}\n    .long-day-banner{background:linear-gradient(135deg,#742A2A,#C0392B);color:white;border-radius:12px;padding:18px 24px;margin:16px 0}\n    .ld-title{font-family:sans-serif;font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;opacity:.8;margin-bottom:4px}\n    .ld-text{font-family:sans-serif;font-size:.87rem;line-height:1.6;opacity:.94}\n    .alert-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}\n    @media(max-width:640px){.alert-grid{grid-template-columns:1fr}}\n    .ac{border-radius:10px;padding:14px 16px;border-left:4px solid}\n    .ac.red{background:#FEF2F2;border-color:var(--red)}\n    .ac.amb{background:#FFFBEB;border-color:var(--amber)}\n    .ac.grn{background:#F0FDF4;border-color:var(--green)}\n    .ac.blu{background:#EFF6FF;border-color:var(--mt)}\n    .ac-title{font-family:sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}\n    .ac.red .ac-title{color:var(--red)}.ac.amb .ac-title{color:var(--amber)}.ac.grn .ac-title{color:var(--green)}.ac.blu .ac-title{color:var(--mt)}\n    .ac-text{font-family:sans-serif;font-size:.81rem;color:var(--dark);line-height:1.5}\n    .drive-stat{display:inline-flex;align-items:center;gap:6px;background:#F7FAFC;border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-family:sans-serif;font-size:.82rem;margin:6px 0}\n    .drive-val{font-weight:700;color:var(--mt);font-size:1rem}\n    .footer{background:var(--mt);color:rgba(255,255,255,.55);text-align:center;padding:22px;font-family:sans-serif;font-size:.77rem}\n    .footer strong{color:white}\n  <\/style>\n</head>\n<body>\n\n<div class=\"hero\">\n  <div class=\"hero-sup\">Segment Guide · Grand American Loop · Days 5–8</div>\n  <h1>Kansas City → Glacier National Park</h1>\n  <div class=\"hero-dates\">June 19 – 22, 2026</div>\n  <div class=\"hero-route\">Kearney, NE → Rock Springs, WY → Utah → Idaho → Montana → Johnson's of St. Mary CHECK-IN</div>\n  <div class=\"hero-chips\">\n    <span class=\"hchip\">✅ Homestead Crater · 11:30 AM BOOKED</span>\n    <span class=\"hchip\">⬜ Bonneville Salt Flats</span>\n    <span class=\"hchip\">🏙️ Salt Lake City · Red Iguana</span>\n    <span class=\"hchip\">🌊 Shoshone Falls · Twin Falls</span>\n    <span class=\"hchip\">🏔️ Salmon River of No Return</span>\n    <span class=\"hchip\">🦬 National Bison Range</span>\n    <span class=\"hchip\">🏞️ Flathead Lake · Whitefish</span>\n    <span class=\"hchip\">✅ Glacier Check-In Jun 22</span>\n  </div>\n</div>\n\n<div class=\"wrap\">\n  <div class=\"overview-strip\">\n    <div class=\"ov-card d5\"><div class=\"ov-date\">Jun 19</div><div class=\"ov-label\">Day 5</div><div class=\"ov-note\">Kearney → Chimney Rock → Rock Springs, WY · 571 mi HARDEST DAY</div></div>\n    <div class=\"ov-card d6\"><div class=\"ov-date\">Jun 20</div><div class=\"ov-label\">Day 6</div><div class=\"ov-note\">Rock Springs → Homestead Crater ✅ 11:30 AM → SLC (Red Iguana) → Bonneville Salt Flats → Shoshone Falls · Twin Falls</div></div>\n    <div class=\"ov-card d7\"><div class=\"ov-date\">Jun 21</div><div class=\"ov-label\">Day 7</div><div class=\"ov-note\">Twin Falls → Salmon River Canyon → Bison Range → Flathead Lake → Whitefish</div></div>\n    <div class=\"ov-card d8\"><div class=\"ov-date\">Jun 22</div><div class=\"ov-label\">Day 8</div><div class=\"ov-note\">Whitefish → Lake McDonald → Marias Pass → Johnson's of St. Mary CHECK-IN ✅</div></div>\n  </div>\n</div>\n\n<hr class=\"div\">\n\n<!-- ═══ DAY 5 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd d5\">\n        <div class=\"day-hd-label\">June 19 · Day 5 · 8h 20m · 570 mi (direct) · +1h 2m if Chimney Rock — HARDEST DRIVE</div>\n        <div class=\"day-hd-title\">Oregon Trail Country → Rock Springs</div>\n        <div class=\"day-hd-sub\">Kearney, NE → Chimney Rock (optional) → Scotts Bluff → Rock Springs, WY overnight</div>\n      </div>\n      <div class=\"day-body\">\n        <div class=\"long-day-banner\">\n          <div class=\"ld-title\">Hardest Drive Day of the Entire Trip · Two Drivers Required</div>\n          <div class=\"ld-text\">571 miles. Split the wheel near Scottsbluff (~2.5 hrs in). I-80 through Wyoming is notorious for crosswind advisories — check WYDOT 511 (dial 511 or wydot.gov/511) before entering Wyoming. Rock Springs sits at 6,270 ft — nights drop to low 40s even in late June. Have layers accessible before Wyoming.</div>\n        </div>\n\n        <div id=\"map-day5\" class=\"seg-map\"></div>\n        <p class=\"map-caption\">Day 5: Kearney NE → Chimney Rock (opt.) → Scotts Bluff → Rock Springs WY · I-80 West all day</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/Kearney+NE/Chimney+Rock+Bayard+NE/Rock+Springs+WY\" target=\"_blank\" class=\"mab route\">🗺️ Open Day 5 Route in Google Maps</a>\n        </div>\n\n        <div class=\"stop-card\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name\">Chimney Rock &amp; Scotts Bluff National Monument</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">US-26 north of I-80, western Nebraska</span>\n              <span class=\"sc-stat free\">Free w/ NPS Pass</span>\n              <span class=\"sc-stat\">1.5 hrs total</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p><strong>Chimney Rock</strong> rises 300+ ft above the North Platte valley floor — the single most-cited landmark in every Oregon, California, and Mormon Trail pioneer diary. Every wagon train heading west saw it as a navigation marker for weeks before passing it. Visitor center open 9am–4pm MT. Scotts Bluff NM nearby: 800-ft bluff, summit road 9am–5:30pm, views into Wyoming and Colorado.</p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Chimney+Rock+National+Historic+Site+Nebraska\" target=\"_blank\" class=\"mab gmaps\">📍 Chimney Rock</a>\n              <a href=\"https://www.google.com/maps/search/Scotts+Bluff+National+Monument+Nebraska\" target=\"_blank\" class=\"mab gmaps\">📍 Scotts Bluff NM</a>\n            </div>\n            <div class=\"sc-tip\">Both sites are free with America the Beautiful pass. Western Nebraska is fully exposed — sunscreen mandatory. Split wheel at Scottsbluff (2.5 hrs in).</div>\n          </div>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd gold\">Rock Springs, WY — Overnight</div>\n          <ul class=\"tb-list\">\n            <li>6,270 ft elevation. Nights drop to the low 40s even in June. Layers accessible before Wyoming.</li>\n            <li>Check WYDOT 511 tonight for any wind advisories for tomorrow morning on I-80.</li>\n          </ul>\n          <div class=\"drive-stat\"><span class=\"drive-val\">8h 20m</span>&nbsp;·&nbsp;571 mi · Rock Springs, WY overnight</div>\n        </div>\n\n        <div class=\"logistics-strip\">\n          <div class=\"ls-title\">🛌 Rest Stops · 🚿 Showers · Day 5 Corridor (NE → WY)</div>\n          <div class=\"ls-grid\">\n            <div class=\"ls-card\">\n              <div class=\"ls-type rest\">🛌 Rest Stop</div>\n              <div class=\"ls-name\">Petro — York, NE</div>\n              <div class=\"ls-note\">I-80 Exit 353 / US-81 · 4700 S Lincoln Ave · 250 truck spaces · laundry · CAT scale · eastern NE</div>\n              <a href=\"https://maps.google.com/?q=40.8183,-97.5988\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type shower\">🚿 Shower</div>\n              <div class=\"ls-name\">Pilot Flying J — North Platte, NE</div>\n              <div class=\"ls-note\">I-80 · 3400 S Newberry Rd · $15 · 24hr · western Nebraska milestone</div>\n              <a href=\"https://maps.google.com/?q=41.1014,-100.7270\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type rest\">🛌 Rest Stop</div>\n              <div class=\"ls-name\">TA — Rawlins, WY</div>\n              <div class=\"ls-note\">I-80 Exit 214 · 1400 Higley Blvd · 188 truck spaces · laundry · pet area · mid-Wyoming</div>\n              <a href=\"https://maps.google.com/?q=41.7762,-107.2244\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type shower\">🚿 Shower + Overnight</div>\n              <div class=\"ls-name\">Pilot Flying J — Rock Springs, WY ⭐</div>\n              <div class=\"ls-note\">I-80 Exit 102 · 650 Stagecoach Blvd · overnight base · $15 showers · 24hr · EV charging · 6,270 ft</div>\n              <a href=\"https://maps.google.com/?q=41.6090,-109.2306\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ DAY 6 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd d6\">\n        <div class=\"day-hd-label\">June 20 · Day 6 · ~8h drive · ~520 mi · Rock Springs, WY → Twin Falls, ID</div>\n        <div class=\"day-hd-title\">Utah Epic — Crater, City, Salt Flats</div>\n        <div class=\"day-hd-sub\">Rock Springs → Homestead Crater ✅ 11:30 AM → SLC (Red Iguana) → Bonneville Salt Flats → Shoshone Falls · Twin Falls, ID overnight</div>\n      </div>\n      <div class=\"day-body\">\n        <div id=\"map-day6\" class=\"seg-map\"></div>\n        <p class=\"map-caption\">Day 6: Rock Springs WY → Midway UT (Homestead Crater ✅ 11:30 AM) → Salt Lake City → Wendover/Bonneville → Twin Falls ID · I-80 West + US-40 + I-15 + I-80 + US-93 North</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/Rock+Springs+WY/Homestead+Crater+Midway+UT/Salt+Lake+City+UT/Wendover+UT/Twin+Falls+ID\" target=\"_blank\" class=\"mab route\">🗺️ Open Day 6 Route in Google Maps</a>\n        </div>\n\n        <div class=\"stop-card\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name\">The Crater at Homestead — Midway, UT ✅</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">700 N Homestead Drive, Midway UT 84049</span>\n              <span class=\"sc-stat free\">CONFIRMED ✅ · Swim · 11:30 AM – 12:30 PM · Jun 20</span>\n              <span class=\"sc-stat\">2 guests · $84.76 · Conf: 8a821ba9723</span>\n              <span class=\"sc-stat\">90–96°F geothermal pool · only warm-water scuba in continental US</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p>A 55-foot dome of travertine limestone enclosing a 90–96°F geothermal pool. Swim in it, scuba dive in it, or just stand inside the cave opening and watch the blue light hit the water. Changing areas and storage inside the Crater. Restrooms in the building just south of the Activity Center.</p>\n              <p><strong>Check-in:</strong> Enter via the <strong>Bluff Road entrance</strong> — not the main resort entrance. Park in the designated Crater Parking spot. Arrive at your designated time: no early access to the Crater. Arrive with swimsuits already on. Bring towels.</p>\n              <p><strong>Confirmation:</strong> 8a821ba9723 · thecrater@homesteadmidwayutah.com · (435) 657-3840</p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Homestead+Crater+Midway+Utah\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n            </div>\n            <div class=\"sc-tip\">Sign the liability waiver at homesteadresort.com before arrival. Bluff Road entrance only — the main resort driveway will not take you to Crater Parking. Slot is 11:30 AM sharp; no access before your time.</div>\n          </div>\n        </div>\n\n\n        <div class=\"stop-card\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name\">Salt Lake City — Red Iguana Lunch</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">736 W North Temple, SLC, UT</span>\n              <span class=\"sc-stat\">4.6⭐ · 10,374 reviews · legendary mole</span>\n              <span class=\"sc-stat\">45–60 min stop</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p>The city backed by 11,000-ft Wasatch peaks is one of the most dramatic urban settings in America. Red Iguana (736 W North Temple) is the legendary mole restaurant — 30-ingredient mole negro, expect a line, worth every minute. SLC pass-through, not overnight.</p>\n              <p>Temple Square is a 5-minute walk from Red Iguana — free outdoor grounds, impressive architecture regardless of your beliefs.</p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Red+Iguana+Salt+Lake+City+UT\" target=\"_blank\" class=\"mab gmaps\">📍 Red Iguana</a>\n              <a href=\"https://www.google.com/maps/search/Temple+Square+Salt+Lake+City\" target=\"_blank\" class=\"mab gmaps\">📍 Temple Square</a>\n            </div>\n            <div class=\"sc-tip\">SLC's I-15/I-80 interchange congests 3–6pm — pass through before 3pm or after 6pm.</div>\n          </div>\n        </div>\n\n        <div class=\"stop-card\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name\">Bonneville Salt Flats</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">Wendover, UT · I-80 Exit 4</span>\n              <span class=\"sc-stat free\">Free</span>\n              <span class=\"sc-stat\">30,000 acres white · land speed records</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p>You step out of the car onto a surface that looks like a frozen white planet. 30,000 acres of perfectly flat salt crust. Drive on it. Walk on it. The salt reflects UV upward — sunscreen under your chin and nose. June is peak crust condition before summer heat cracks the patterns. The ThrustSSC broke the sound barrier here at 763 mph in 1997. ⚠️ Check usfra.org for any race week closures around June 20.</p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Bonneville+Salt+Flats+Utah\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"stop-card id-theme\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name\">Shoshone Falls + Perrine Bridge — Twin Falls, ID</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">Twin Falls, ID · US-93 North from Wendover</span>\n              <span class=\"sc-stat\">212 ft drop · taller than Niagara</span>\n              <span class=\"sc-stat\">$5/vehicle · closes at sunset · June sunset 9–10pm</span>\n              <span class=\"sc-stat\">⚠️ America the Beautiful pass NOT valid — city park, not federal</span>\n              <span class=\"sc-stat\">35 min total · Perrine Bridge 5 min by car</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p>The Snake River drops 212 feet over a 900-foot-wide basalt ledge — taller than Niagara by 36 feet. June is the best month: full snowmelt flow before irrigation diversions begin. The overlook is a 3-minute walk from the parking lot. Spray is heavy enough to feel from 100 feet away. This is the whole experience — 20 minutes is enough.</p>\n              <p><strong>Perrine Bridge</strong> — 5 minutes by car. A 486-foot span above the Snake River Canyon where BASE jumping is legal year-round, no permit required. On a Saturday evening in June you will almost certainly watch someone step off the edge. Pull over, watch one jump, take the photo, leave. Add 15 minutes.</p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Shoshone+Falls+Twin+Falls+Idaho\" target=\"_blank\" class=\"mab gmaps\">📍 Shoshone Falls</a>\n              <a href=\"https://www.google.com/maps/search/Perrine+Bridge+Twin+Falls+Idaho\" target=\"_blank\" class=\"mab gmaps\">📍 Perrine Bridge</a>\n            </div>\n            <div class=\"sc-tip id\">Closes at sunset — confirmed by Twin Falls Parks. June 20 sunset is approximately 9:15 PM MDT, so the park stays open until 9–10 PM. A 7:45 PM arrival gives you a full hour of light with zero time pressure.</div>\n          </div>\n        </div>\n\n        <div class=\"drive-stat\"><span class=\"drive-val\">~8h</span>&nbsp;·&nbsp;~520 mi · Twin Falls, ID overnight · Google Maps verified</div>\n\n        <div class=\"logistics-strip\">\n          <div class=\"ls-title\">🛌 Rest Stops · 🚿 Showers · Day 6 Corridor (WY → UT → ID)</div>\n          <div class=\"ls-grid\">\n            <div class=\"ls-card\">\n              <div class=\"ls-type rest\">🛌 Rest Stop</div>\n              <div class=\"ls-name\">TA — Fort Bridger, WY</div>\n              <div class=\"ls-note\">I-80 @ Bigelow Rd, Exit 34 · WY/UT border · truck lot · laundry · last WY stop</div>\n              <a href=\"https://maps.google.com/?q=41.3143,-110.5095\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type shower\">🚿 Shower</div>\n              <div class=\"ls-name\">Pilot Flying J — Salt Lake City</div>\n              <div class=\"ls-note\">2025 S 900 W · I-15 / 2100 S · $15 · 24hr · EV charging · SLC pass-through</div>\n              <a href=\"https://maps.google.com/?q=40.7266,-111.9156\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type shower\">🚿 Shower</div>\n              <div class=\"ls-name\">Pilot Travel Center — West Wendover, NV</div>\n              <div class=\"ls-note\">1200 Wendover Blvd · I-80 state line · after Salt Flats · $15 · 24hr</div>\n              <a href=\"https://maps.google.com/?q=40.7394,-114.0664\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type shower\">🚿 Shower + Rest</div>\n              <div class=\"ls-name\">Flying J Travel Center — Jerome, ID ⭐</div>\n              <div class=\"ls-note\">5350 US-93, Jerome · 6 mi north of Twin Falls · US-93 North · $15 · 24hr · overnight corridor</div>\n              <a href=\"https://maps.google.com/?q=42.6495,-114.4427\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ DAY 7 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd d7\">\n        <div class=\"day-hd-label\">June 21 · Day 7 · 9h 13m · ~580 mi</div>\n        <div class=\"day-hd-title\">River of No Return → Bison Range → Flathead Lake</div>\n        <div class=\"day-hd-sub\">Twin Falls → Salmon River Canyon → National Bison Range → Flathead Lake → Whitefish, MT overnight</div>\n      </div>\n      <div class=\"day-body\">\n        <div id=\"map-day7\" class=\"seg-map\"></div>\n        <p class=\"map-caption\">Day 7: Twin Falls → Salmon River Scenic Byway → Bison Range Moiese MT → Polson → Whitefish · US-93 North all day</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/Twin+Falls+ID/Salmon+ID/National+Bison+Range+Moiese+MT/Polson+MT/Whitefish+MT\" target=\"_blank\" class=\"mab route\">🗺️ Open Day 7 Route in Google Maps</a>\n        </div>\n\n        <div class=\"stop-card id-theme\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name\">Salmon River Scenic Byway — River of No Return</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">US-93 North from Twin Falls · ~3.5 hrs driving</span>\n              <span class=\"sc-stat free\">Free · On-Route</span>\n              <span class=\"sc-stat\">100+ mi canyon · No cell service</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p>US-93 enters a landscape most Americans have never seen. The Snake River canyon gives way to central Idaho high country, then the Salmon River — the <strong>River of No Return</strong> — carves 100+ miles through vertical rhyolite cliffs. June: the river runs jade-green and high from snowmelt. Bald eagles, bighorn sheep on cliff faces, river otters in pools, spawning salmon leaping in shallows — visible from the road. <strong>Zero cell service for ~80 miles. Download offline maps in Twin Falls.</strong></p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Salmon+River+Scenic+Byway+Idaho\" target=\"_blank\" class=\"mab gmaps\">📍 Salmon River Canyon</a>\n            </div>\n            <div class=\"sc-tip id\">Two-lane mountain highway — follow the river, don't push pace. Watch for cattle near Elk Bend and Challis. You'll get behind RVs. It doesn't matter. This road is driven slowly on purpose.</div>\n          </div>\n        </div>\n\n        <div class=\"stop-card mt-theme\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name\">CSKT National Bison Range — Red Sleep Mountain Drive</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">Moiese, MT · US-93 via Ronan</span>\n              <span class=\"sc-stat must\">⚠️ Gate closes 6pm sharp</span>\n              <span class=\"sc-stat\">19-mile drive · 1.5–2 hrs</span>\n              <span class=\"sc-stat\">350 bison + pronghorn + elk + bighorn</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p>18,800 acres of native Palouse grassland managed by the Confederated Salish and Kootenai Tribes. The 19-mile Red Sleep Mountain Drive puts you at close range with the herd on open hillside. June: bison calves (\"red dogs\") born April–May are visible alongside the main herd. <strong>Note: does NOT accept America the Beautiful pass — separate fee required. Gate closes at 6pm sharp — enter by 5:45pm maximum.</strong></p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/National+Bison+Range+Moiese+Montana\" target=\"_blank\" class=\"mab gmaps\">📍 National Bison Range</a>\n            </div>\n            <div class=\"sc-tip mt\">From Twin Falls to the Bison Range is ~3.5 hrs. Arriving by 4pm gives a comfortable 1.5-hr drive window before gate closes. Depart Twin Falls by 7–7:30am to make this work.</div>\n          </div>\n        </div>\n\n        <div class=\"stop-card mt-theme\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name\">Flathead Lake + Polson, MT</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">Polson, MT · US-93 north of Ronan</span>\n              <span class=\"sc-stat free\">Free · Pass-Through</span>\n              <span class=\"sc-stat\">Largest freshwater lake west of Mississippi</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p>30 miles long, glacier-cold, crystal clear, absurdly blue against the Mission Mountains to the east. US-93 runs along the east shore for 15 miles — pull off at any overlook. Montana residents consider this the crown jewel of the state.</p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Flathead+Lake+Polson+Montana\" target=\"_blank\" class=\"mab gmaps\">📍 Flathead Lake</a>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd mt\">Overnight — Whitefish, MT</div>\n          <ul class=\"tb-list\">\n            <li><strong>Montana Coffee Traders</strong> (110 Central Ave) — opens 6:30am. Your tomorrow morning ritual before Glacier. 4.6⭐, best coffee in Montana.</li>\n            <li>Downtown Whitefish has excellent restaurants — Great Northern Bar &amp; Grill or Bonsai Brewing Project are local favorites after a 580-mile day.</li>\n          </ul>\n          <div class=\"map-actions\" style=\"margin-top:8px\">\n            <a href=\"https://www.google.com/maps/search/Montana+Coffee+Traders+Whitefish+MT\" target=\"_blank\" class=\"mab gmaps\">📍 Montana Coffee Traders</a>\n          </div>\n          <div class=\"drive-stat\"><span class=\"drive-val\">9h 13m</span>&nbsp;·&nbsp;~580 mi · Whitefish, MT overnight</div>\n        </div>\n\n        <div class=\"logistics-strip\">\n          <div class=\"ls-title\">🛌 Rest Stops · 🚿 Showers · Day 7 Corridor (ID → MT)</div>\n          <div class=\"ls-grid\">\n            <div class=\"ls-card\">\n              <div class=\"ls-type shower\">🚿 Shower</div>\n              <div class=\"ls-name\">Love's — Missoula, MT</div>\n              <div class=\"ls-note\">8077 US Hwy 10 W · I-90 / US-93 interchange · $15 · 24hr · Missoula pass-through on Day 7</div>\n              <a href=\"https://maps.google.com/?q=46.9474,-114.1338\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type rest\">🛌 Rest Stop</div>\n              <div class=\"ls-name\">TA — Missoula, MT</div>\n              <div class=\"ls-note\">8018 US Hwy 93 N · US-93 N · 130 truck spaces · 4 service bays · 24/7 fuel</div>\n              <a href=\"https://maps.google.com/?q=46.9486,-114.1298\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type rest\">🛌 Rest Stop</div>\n              <div class=\"ls-name\">Pilot Flying J — Columbia Falls, MT</div>\n              <div class=\"ls-note\">6102 US-2 · gateway to Glacier &amp; Whitefish · DEF · 24/7 fuel · call ahead showers</div>\n              <a href=\"https://maps.google.com/?q=48.3700,-114.2397\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type food\">🍽️ Food Stop</div>\n              <div class=\"ls-name\">Montana Coffee Traders — Whitefish</div>\n              <div class=\"ls-note\">110 Central Ave · opens 6:30am · best coffee in Montana · Glacier departure ritual</div>\n              <a href=\"https://www.google.com/maps/search/Montana+Coffee+Traders+Whitefish+MT\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ DAY 8 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd d8\">\n        <div class=\"day-hd-label\">June 22 · Day 8 · 2h 12m · 111 mi</div>\n        <div class=\"day-hd-title\">The Threshold Drive → Glacier Check-In</div>\n        <div class=\"day-hd-sub\">Whitefish → Coffee → Lake McDonald first look → Marias Pass → Johnson's of St. Mary · CHECK-IN ✅</div>\n      </div>\n      <div class=\"day-body\">\n        <div id=\"map-day8\" class=\"seg-map\"></div>\n        <p class=\"map-caption\">Day 8: Whitefish → US-2 East → West Glacier → Marias Pass → St. Mary · 2h 12m of one of the finest threshold drives in North America</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/Whitefish+MT/West+Glacier+MT/St.+Mary+MT\" target=\"_blank\" class=\"mab route\">🗺️ Open Day 8 Route in Google Maps</a>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd mt\">Morning — Coffee First</div>\n          <ul class=\"tb-list\">\n            <li>Montana Coffee Traders opens 6:30am. Have coffee before driving to Glacier. Always.</li>\n            <li>US-2 East from Whitefish immediately enters Glacier's southern boundary along the Middle Fork Flathead River — canyon walls, peaks rising north. This drive sets the tone.</li>\n          </ul>\n        </div>\n\n        <div class=\"stop-card mt-theme\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name\">West Glacier + Lake McDonald — First Look</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">West Glacier, MT · West Entrance</span>\n              <span class=\"sc-stat\">$35/vehicle 7-day park pass</span>\n              <span class=\"sc-stat\">45–60 min stop</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p>Lake McDonald: 10-mile turquoise glacial lake rimmed in old-growth cedar and hemlock. The shoreline stones are multicolored — red, green, blue — from iron and mineral staining, polished by glaciers. Drive the Going-to-the-Sun Road as far as you like. This is the orientation. You have three full days starting tomorrow.</p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Lake+McDonald+Glacier+National+Park\" target=\"_blank\" class=\"mab gmaps\">📍 Lake McDonald</a>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd mt\">Marias Pass → St. Mary → Johnson's Check-In</div>\n          <ul class=\"tb-list\">\n            <li><strong>Marias Pass</strong> (5,213 ft) — the lowest northern Rockies Continental Divide crossing, used by the Great Northern Railroad in 1891. At the summit, the Rockies open east into flat grassland. One of the most dramatic landscape transitions in North America.</li>\n            <li><strong>St. Mary Visitor Center</strong> (8am–4:30pm): stop before anything else — confirm Many Glacier shuttle status for June 24, pick up trail maps, get current road and trail conditions from rangers.</li>\n            <li><strong>Check into Johnson's of St. Mary.</strong> CONFIRMED reservation June 22–25. Open the <a href=\"glacier-guide.html\">glacier-guide.html</a> for the full 4-day plan.</li>\n          </ul>\n          <div class=\"map-actions\" style=\"margin-top:8px\">\n            <a href=\"https://www.google.com/maps/search/Johnson's+of+St+Mary+Montana+Glacier\" target=\"_blank\" class=\"mab gmaps\">📍 Johnson's of St. Mary ✅</a>\n            <a href=\"https://www.google.com/maps/search/St+Mary+Visitor+Center+Glacier+National+Park\" target=\"_blank\" class=\"mab gmaps\">📍 St. Mary Visitor Center</a>\n          </div>\n          <div class=\"drive-stat\"><span class=\"drive-val\">2h 12m</span>&nbsp;·&nbsp;111 mi · Johnson's of St. Mary · CONFIRMED ✅</div>\n        </div>\n\n        <div class=\"logistics-strip\">\n          <div class=\"ls-title\">🛌 Rest Stops · Showers not needed Day 8 — short 2h drive</div>\n          <div class=\"ls-grid\">\n            <div class=\"ls-card\">\n              <div class=\"ls-type food\">🍽️ Coffee</div>\n              <div class=\"ls-name\">Montana Coffee Traders — Whitefish</div>\n              <div class=\"ls-note\">110 Central Ave · 6:30am · depart after coffee · don't skip this</div>\n              <a href=\"https://www.google.com/maps/search/Montana+Coffee+Traders+Whitefish+MT\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type rest\">🛌 Emergency Stop</div>\n              <div class=\"ls-name\">Pilot Flying J — Columbia Falls, MT</div>\n              <div class=\"ls-note\">6102 US-2 · between Whitefish and West Glacier · DEF · fuel · last stop before Glacier</div>\n              <a href=\"https://maps.google.com/?q=48.3700,-114.2397\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"alert-grid\">\n          <div class=\"ac blu\">\n            <div class=\"ac-title\">You've Arrived — Glacier Starts Now</div>\n            <div class=\"ac-text\">Open the <strong>glacier-guide.html</strong> for the full 4-day plan. Tonight: Wild Goose Island Overlook (48.6972, -113.5425) — 6.7 miles west on GTTS Road. First \"oh\" moment of the entire trip.</div>\n          </div>\n          <div class=\"ac grn\">\n            <div class=\"ac-title\">Tonight's First Move</div>\n            <div class=\"ac-text\">St. Mary Visitor Center (8am–4:30pm) before anything else. Confirm Many Glacier shuttle for June 24. Get real-time trail and GTTS Road status from rangers.</div>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<section>\n  <div class=\"wrap\">\n    <div class=\"sec-hd\" style=\"color:var(--mt)\">Pre-Drive Checklist< :14px 16px;text-align:center}\n    .do-card.arr{background:#F1F5F9;border:1px solid #CBD5E1}\n    .do-card.f1{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border:2px solid var(--ice)}\n    .do-card.f2{background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border:2px solid #4ADE80}\n    .do-card.dep{background:#F1F5F9;border:1px solid #CBD5E1}\n    .do-date{font-family:sans-serif;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--mid);margin-bottom:4px}\n    .do-label{font-family:sans-serif;font-size:.82rem;font-weight:700;color:var(--dark);margin-bottom:4px}\n    .do-card.f1 .do-label{color:var(--gl)}.do-card.f2 .do-label{color:var(--pine)}\n    .do-note{font-family:sans-serif;font-size:.73rem;color:var(--mid);line-height:1.4}\n\n    /* DAY SECTIONS */\n    .day-section{margin-bottom:52px}\n    .day-hd{border-radius:12px 12px 0 0;padding:18px 24px;color:white}\n    .day-hd.arr,.day-hd.dep{background:linear-gradient(135deg,#4A5568,#718096)}\n    .day-hd.f1{background:linear-gradient(135deg,#1B3D6E,#3A7DC9)}\n    .day-hd.f2{background:linear-gradient(135deg,#2D5A3D,#4A9B6A)}\n    .day-hd-label{font-family:sans-serif;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;opacity:.7;margin-bottom:4px}\n    .day-hd-title{font-size:1.35rem;font-weight:normal;margin-bottom:3px}\n    .day-hd-sub{font-family:sans-serif;font-size:.82rem;opacity:.82}\n    .day-body{background:white;border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;padding:26px}\n\n    /* LEAFLET */\n    .topo-map-lg{height:380px;border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px}\n    .topo-map-sm{height:260px;border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px}\n    .map-caption{font-family:sans-serif;font-size:.72rem;color:var(--mid);margin-bottom:6px;font-style:italic}\n\n    /* MAP ACTION BUTTONS */\n    .map-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}\n    .mab{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:6px 14px;font-family:sans-serif;font-size:.76rem;font-weight:700;text-decoration:none;transition:opacity .15s;white-space:nowrap}\n    .mab:hover{opacity:.82}\n    .mab.gmaps{background:white;border:1.5px solid #1A73E8;color:#1A73E8}\n    .mab.at{background:white;border:1.5px solid #5EAA3C;color:#5EAA3C}\n    .mab.route{background:#1A73E8;color:white;border:1.5px solid #1A73E8}\n\n    /* TIME BLOCKS */\n    .time-block{margin-bottom:22px}\n    .tb-hd{font-family:sans-serif;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ice);padding-bottom:6px;border-bottom:2px solid var(--ice);margin-bottom:12px}\n    .tb-hd.pine{color:var(--pine);border-color:var(--pine)}\n    .tb-list{font-family:sans-serif;font-size:.85rem;color:var(--dark);line-height:1.75;list-style:none;padding:0}\n    .tb-list li{padding-left:14px;position:relative;margin-bottom:2px}\n    .tb-list li::before{content:'→';position:absolute;left:0;color:var(--ice);font-size:.8rem}\n    .tb-list strong{color:var(--gl)}\n    .tb-list em{color:var(--amber);font-style:normal;font-weight:600}\n\n    /* OPTION BOXES */\n    .option-split{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:12px 0}\n    @media(max-width:580px){.option-split{grid-template-columns:1fr}}\n    .opt-box{border-radius:10px;padding:14px 16px}\n    .opt-box.a{background:#EFF6FF;border:1px solid #93C5FD}\n    .opt-box.b{background:#F0FDF4;border:1px solid #86EFAC}\n    .opt-title{font-family:sans-serif;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}\n    .opt-box.a .opt-title{color:#1D4E89}.opt-box.b .opt-title{color:#14532D}\n    .opt-text{font-family:sans-serif;font-size:.82rem;color:var(--dark);line-height:1.55}\n\n    /* TRAIL CARDS */\n    .trail-card{background:var(--snow);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:14px 0 22px}\n    .trail-card.pine-theme{background:#F0FDF4}\n    .tc-hd{padding:14px 18px 10px;border-bottom:1px solid var(--border)}\n    .tc-name{font-size:1.1rem;color:var(--gl);margin-bottom:5px}\n    .trail-card.pine-theme .tc-name{color:var(--pine)}\n    .tc-stats{display:flex;flex-wrap:wrap;gap:7px}\n    .tc-stat{font-family:sans-serif;font-size:.74rem;background:white;border:1px solid var(--border);border-radius:5px;padding:3px 8px;color:var(--mid)}\n    .tc-stat.easy{color:var(--green);font-weight:700;border-color:#86EFAC}\n    .tc-stat.mod{color:var(--amber);font-weight:700;border-color:#FCD34D}\n    .tc-stat.hard{color:var(--red);font-weight:700;border-color:#FCA5A5}\n    .tc-body{padding:14px 18px 16px}\n    .tc-notes{font-family:sans-serif;font-size:.82rem;color:var(--dark);line-height:1.6;margin-bottom:10px}\n    .tc-notes p{margin-bottom:6px}\n    .tc-tip{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-left:3px solid var(--ice);border-radius:0 6px 6px 0;padding:10px 14px;margin-top:10px;font-family:sans-serif;font-size:.81rem;color:var(--dark);line-height:1.5}\n    .tc-tip.pine{background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border-color:var(--pine)}\n\n    /* WILDLIFE */\n    .wl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}\n    .wl-card{background:white;border:1px solid var(--border);border-radius:9px;padding:12px 14px}\n    .wl-name{font-size:.97rem;color:var(--gl);margin-bottom:3px}\n    .wl-prob{font-family:sans-serif;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}\n    .wl-where{font-family:sans-serif;font-size:.76rem;color:var(--mid);line-height:1.4}\n    .cert{color:var(--gl)}.hi{color:var(--green)}.mod{color:var(--amber)}\n\n    /* CONTACTS */\n    .contacts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px}\n    .cc{background:white;border:1px solid var(--border);border-radius:10px;padding:15px 17px}\n    .cc-label{font-family:sans-serif;font-size:.67rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--ice);margin-bottom:5px;font-weight:700}\n    .cc-val{font-family:sans-serif;font-size:.88rem;color:var(--dark);font-weight:600;margin-bottom:2px}\n    .cc-note{font-family:sans-serif;font-size:.76rem;color:var(--mid);line-height:1.4}\n    .cc a{color:var(--ice);text-decoration:none;word-break:break-all;font-size:.81rem}\n\n    /* FOOTER */\n    .footer{background:var(--gl);color:rgba(255,255,255,.55);text-align:center;padding:22px;font-family:sans-serif;font-size:.77rem}\n    .footer strong{color:white}\n  <\/style>\n</head>\n<body>\n\n<div class=\"hero\">\n  <div class=\"hero-sup\">Field Guide · Grand American Loop</div>\n  <h1>Glacier National Park</h1>\n  <div class=\"hero-dates\">June 22 – 25, 2026</div>\n  <div class=\"hero-base\">Base Camp: Johnson's of St. Mary · East Entrance · 4,500 ft</div>\n  <div class=\"hero-chips\">\n    <span class=\"hchip\">3 nights</span>\n    <span class=\"hchip\">$35 / vehicle · 7-day pass</span>\n    <span class=\"hchip\">No vehicle reservations · No timed entry</span>\n    <span class=\"hchip\">St. Mary VC: 8am–4:30pm daily</span>\n  </div>\n</div>\n\n<div class=\"wrap\">\n  <div class=\"banner-alert\" style=\"margin-top:32px\">\n    <div class=\"ac-icon\">🚧</div>\n    <div class=\"bn-title\">Live NPS Road Status — As of Early June 2026</div>\n    <div class=\"bn-text\">GTTS Road is currently open <strong>to Avalanche Creek (west)</strong> and <strong>to Jackson Glacier Overlook (east)</strong>. Logan Pass opening <strong>not yet confirmed</strong>. Typically reaches Logan Pass mid-June. <strong>Check nps.gov/glac/conditions daily from June 18.</strong> If Logan Pass isn't open by June 23, swap Days 1 and 2.</div>\n  </div>\n\n  <div class=\"banner-green\">\n    <div class=\"bn-label\">Your Timing Advantage</div>\n    <div class=\"bn-title\">You arrive before July 1 — the last day of unrestricted access.</div>\n    <div class=\"bn-text\">The new 2026 ticketed shuttle system and Logan Pass 3-hour parking limit don't launch until <strong style=\"color:#86EFAC\">July 1</strong>. You drive freely, park without time limits, and face lighter crowds. This is a real advantage.</div>\n  </div>\n\n  <div class=\"banner-blue\">\n    <div class=\"bn-label\" style=\"color:#1D4E89;opacity:1\">Your 4 Days — At a Glance</div>\n    <div class=\"days-overview\">\n      <div class=\"do-card arr\"><div class=\"do-date\">June 22</div><div class=\"do-label\">Arrival</div><div class=\"do-note\">Drive in · GTTS Road orientation · Wild Goose Island</div></div>\n      <div class=\"do-card f1\"><div class=\"do-date\">June 23</div><div class=\"do-label\">Full Day 1</div><div class=\"do-note\">Go West — Logan Pass · Hidden Lake · GTTS full corridor</div></div>\n      <div class=\"do-card f2\"><div class=\"do-date\">June 24</div><div class=\"do-label\">Full Day 2</div><div class=\"do-note\">Go North — Many Glacier · Redrock Falls · St. Mary Falls return</div></div>\n      <div class=\"do-card dep\"><div class=\"do-date\">June 25</div><div class=\"do-label\">Departure</div><div class=\"do-note\">Wild Goose sunrise · Sunrift Gorge → Yellowstone</div></div>\n    </div>\n    <p style=\"font-family:sans-serif;font-size:.8rem;color:var(--mid);margin-top:8px\">Two full days, two opposite directions. Nothing is rushed. Everything fits.</p>\n  </div>\n</div>\n\n<hr class=\"div\">\n\n<section>\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">2026 Alerts</div>\n    <div class=\"sec-sub\">Review before each morning departure</div>\n    <div class=\"alerts-grid\">\n      <div class=\"ac amb\"><div class=\"ac-icon\">⚠️</div><div class=\"ac-title\">GTTS Road — Logan Pass Opening TBD</div><div class=\"ac-text\">Typically reaches Logan Pass mid-June. <strong>Check nps.gov/glac/conditions daily from June 18.</strong> If closed June 23, run Day 2 (Many Glacier) first.</div></div>\n      <div class=\"ac amb\"><div class=\"ac-icon\">⚠️</div><div class=\"ac-title\">Many Glacier — Verify 2026 Access</div><div class=\"ac-text\">Required shuttle tickets in 2025. Verify status at St. Mary VC on June 22. If required: <strong>Recreation.gov at 7 PM MDT the night before.</strong></div></div>\n      <div class=\"ac amb\"><div class=\"ac-icon\">🧊</div><div class=\"ac-title\">Hidden Lake Overlook — Snow Likely</div><div class=\"ac-text\">Trail starts at 6,646 ft. Boardwalk may be buried. Yellow markers guide through snowpack. <strong>Microspikes + waterproof boots required.</strong></div></div>\n      <div class=\"ac blu\"><div class=\"ac-icon\">🐻</div><div class=\"ac-title\">Peak Bear Activity — Late June</div><div class=\"ac-text\">Bring bear spray — rentals at West Glacier and St. Mary. Make noise on every trail. <strong>100-yard minimum from bears.</strong></div></div>\n      <div class=\"ac amb\"><div class=\"ac-icon\">🚗</div><div class=\"ac-title\">GTTS Vehicle Restriction</div><div class=\"ac-text\">Vehicles over <strong>21 ft or 8 ft wide</strong> cannot drive between Avalanche Creek and Rising Sun. Standard SUVs: fine.</div></div>\n      <div class=\"ac grn\"><div class=\"ac-icon\">📍</div><div class=\"ac-title\">St. Mary VC — Use It Every Morning</div><div class=\"ac-text\">8am–4:30pm daily. Real-time trail status, road conditions, wildlife sightings. <strong>Stop here every morning before driving out.</strong></div></div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<section>\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">Park Basics</div>\n    <div class=\"sec-sub\">Entry, weather, and gear</div>\n    <div class=\"basics-grid\">\n      <div class=\"basic-card\"><div class=\"bc-label\">Entry</div><div class=\"bc-val\">$35 / vehicle</div><div class=\"bc-note\">7-day pass. No vehicle reservations or timed entry in 2026. Drive in freely any time.</div></div>\n      <div class=\"basic-card\"><div class=\"bc-label\">Weather · St. Mary (4,500 ft)</div><div class=\"bc-val\">68–76°F days · Low 40s nights</div><div class=\"bc-note\">East side is drier + warmer than west. Logan Pass: 45–60°F with significant wind. Afternoon thunderstorms possible.</div></div>\n      <div class=\"basic-card\"><div class=\"bc-label\">Essential Gear</div><div class=\"bc-val\">Layers every day</div><div class=\"bc-note\">Rain jacket · Warm fleece · Waterproof boots · Microspikes (Logan Pass) · Bear spray · Sun protection</div></div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ ARRIVAL DAY ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd arr\">\n        <div class=\"day-hd-label\">June 22</div>\n        <div class=\"day-hd-title\">Arrival Day</div>\n        <div class=\"day-hd-sub\">Drive in, settle, first orientation along GTTS Road — easy afternoon</div>\n      </div>\n      <div class=\"day-body\">\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">First Stop: St. Mary Visitor Center</div>\n          <ul class=\"tb-list\">\n            <li>Before anything else — <strong>St. Mary Visitor Center</strong> (8am–4:30pm). Get trail maps, confirm GTTS Road status, verify Many Glacier shuttle for June 24.</li>\n            <li>If Many Glacier tickets needed: set a 6:50pm alarm for Recreation.gov tonight.</li>\n          </ul>\n        </div>\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Afternoon — First GTTS Road Drive</div>\n          <ul class=\"tb-list\">\n            <li><strong>Wild Goose Island Overlook</strong> — 6.7 miles west of St. Mary VC. A 14-foot island in St. Mary Lake backed by 8,000-ft peaks. The opening sequence of <em>The Shining</em>. Your first \"oh\" moment.\n              <div class=\"map-actions\" style=\"margin-top:8px\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=48.6972,-113.5425\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n              </div>\n            </li>\n            <li><strong>Two Dog Flats</strong> — scan slopes slowly for grizzlies and elk</li>\n            <li><strong>Rising Sun</strong> area — pull off, walk to the lakeshore</li>\n            <li><strong>Sun Point Nature Trail</strong> (1.6 mi RT, 45 min) if energy allows\n              <div class=\"map-actions\" style=\"margin-top:6px\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=48.6817,-113.5339\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n                <a href=\"https://www.alltrails.com/trail/us/montana/sun-point-nature-trail\" target=\"_blank\" class=\"mab at\">AllTrails ↗</a>\n              </div>\n            </li>\n          </ul>\n        </div>\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Evening</div>\n          <ul class=\"tb-list\">\n            <li>St. Mary lake shore for sunset. Drive back along GTTS Road — different light on return.</li>\n            <li>Dinner, unpack. <em>Tomorrow is the full western corridor.</em></li>\n          </ul>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ FULL DAY 1 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd f1\">\n        <div class=\"day-hd-label\">June 23 · Full Day 1</div>\n        <div class=\"day-hd-title\">Go West — The GTTS Road Corridor</div>\n        <div class=\"day-hd-sub\">Logan Pass · Hidden Lake Overlook · West Side Viewpoints · Return east at sunset</div>\n      </div>\n      <div class=\"day-body\">\n        <div id=\"map-day1\" class=\"topo-map-lg\"></div>\n        <p class=\"map-caption\">Interactive topo + Waymarked Trails hiking overlay · Numbered markers show day sequence · Tap any marker for details</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/48.7456,-113.4339/48.6972,-113.5425/48.6875,-113.4762/48.6786,-113.4747/48.6817,-113.5339/48.6868,-113.5713/48.6853,-113.5928/48.6959,-113.7178/48.7031,-113.7508/48.7073,-113.7731/48.6787,-113.8194\" target=\"_blank\" class=\"mab route\">🗺️ Open Full Day Route in Google Maps</a>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Logan Pass — Choose Your Arrival Window</div>\n          <div class=\"option-split\">\n            <div class=\"opt-box a\">\n              <div class=\"opt-title\">Option A · 6am Wake-Up</div>\n              <div class=\"opt-text\"><strong>6:00am depart → 6:30am at Logan Pass.</strong> Lot wide open. Mountain goats in morning light. Hidden Lake Overlook with fewer people. Done by late breakfast, then drive the full west side.</div>\n            </div>\n            <div class=\"opt-box b\">\n              <div class=\"opt-title\">Option B · No Early Start</div>\n              <div class=\"opt-text\">Drive the west side first (Weeping Wall, Triple Arches, Avalanche). <strong>Arrive Logan Pass 3:30–4:30pm</strong> when families leave for dinner. Spots open. Goats still there. Afternoon light on peaks is beautiful.</div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Logan Pass — The Hike</div>\n          <ul class=\"tb-list\">\n            <li><strong>Mountain goats visible from the parking lot</strong> — you don't need to hike. June = peak season with kids grazing right at the VC area.</li>\n          </ul>\n\n          <div class=\"trail-card\">\n            <div class=\"tc-hd\">\n              <div class=\"tc-name\">Hidden Lake Overlook</div>\n              <div class=\"tc-stats\">\n                <span class=\"tc-stat\">2.7 mi RT</span>\n                <span class=\"tc-stat mod\">Moderate</span>\n                <span class=\"tc-stat\">551 ft gain</span>\n                <span class=\"tc-stat\">1.5–2 hrs</span>\n                <span class=\"tc-stat\">Starts at 6,646 ft</span>\n              </div>\n            </div>\n            <div class=\"tc-body\">\n              <div id=\"map-hidden-lake\" class=\"topo-map-sm\"></div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=48.6959,-113.7178\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n                <a href=\"https://www.alltrails.com/trail/us/montana/hidden-lake-overlook\" target=\"_blank\" class=\"mab at\">AllTrails ↗</a>\n              </div>\n              <div class=\"tc-notes\">\n                <p>The boardwalk from Logan Pass VC to the Hidden Lake Overlook is likely buried under snow in late June. Yellow road markers guide you through. The trail climbs through alpine meadow with goats on surrounding ridges and views extending to the Continental Divide.</p>\n                <p><strong>Microspikes are not optional.</strong> The snow makes it more beautiful, not harder. Overlook is the destination — you don't need to descend to the lake itself.</p>\n              </div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">GTTS Road West Side</div>\n          <ul class=\"tb-list\">\n            <li>Continue west past Logan Pass. Drive to Avalanche Creek and back.</li>\n            <li><strong>Weeping Wall</strong> — a waterfall that flows over the road during snowmelt. Stop and stand under it.\n              <div class=\"map-actions\" style=\"margin-top:6px\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=48.7031,-113.7508\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n              </div>\n            </li>\n            <li><strong>Triple Arches</strong> — remarkable stone bridge construction visible from road</li>\n            <li><strong>Avalanche Creek</strong> — end of restricted vehicle zone. Walk to the creek, then turn around.</li>\n            <li>Drive back east — completely different light and perspective on the return.</li>\n          </ul>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Evening — Return to St. Mary</div>\n          <ul class=\"tb-list\">\n            <li><strong>Sunrift Gorge</strong> on the way back — 5-minute walk into a narrow rock gorge with water churning through it.\n              <div class=\"map-actions\" style=\"margin-top:6px\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=48.6868,-113.5713\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n              </div>\n            </li>\n            <li><strong>Two Dog Flats / Rising Sun</strong> — evening grizzly and elk scan. Slow way down.</li>\n            <li><strong>Wild Goose Island</strong> — evening light on the lake as the sun drops. Go both morning and evening.</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ FULL DAY 2 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd f2\">\n        <div class=\"day-hd-label\">June 24 · Full Day 2</div>\n        <div class=\"day-hd-title\">Go North — Many Glacier Valley</div>\n        <div class=\"day-hd-sub\">Depart 8am · Arrive by 9am · Redrock Falls · Return via St. Mary Falls</div>\n      </div>\n      <div class=\"day-body\">\n        <div id=\"map-day2\" class=\"topo-map-lg\"></div>\n        <p class=\"map-caption\">Day 2 route: St. Mary → US-89 North → Babb → Many Glacier → return south → St. Mary Falls · Evening at Wild Goose Island</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/48.7456,-113.4339/48.7975,-113.6594/48.7972,-113.6600/48.6853,-113.5928/48.6868,-113.5713/48.6972,-113.5425\" target=\"_blank\" class=\"mab route\">🗺️ Open Full Day Route in Google Maps</a>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd pine\">Morning — Drive North to Many Glacier (8:00am)</div>\n          <ul class=\"tb-list\">\n            <li><strong>8:00am depart</strong> — north on US-89 (~12 mi), left at Babb, west 12 miles. Arrive ~9–9:30am.</li>\n            <li>Pull into <strong>Swiftcurrent Motor Lodge parking</strong> — park rangers often have spotting scopes aimed at goats on the cliffs above.\n              <div class=\"map-actions\" style=\"margin-top:6px\">\n                <a href=\"https://www.google.com/maps/dir/48.7456,-113.4339/48.7975,-113.6594\" target=\"_blank\" class=\"mab route\">🗺️ Directions: Base → Many Glacier</a>\n              </div>\n            </li>\n          </ul>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd pine\">Morning Hike — Redrock Falls (Recommended)</div>\n          <div class=\"trail-card pine-theme\">\n            <div class=\"tc-hd\">\n              <div class=\"tc-name\">Redrock Falls Trail</div>\n              <div class=\"tc-stats\">\n                <span class=\"tc-stat\">3.6 mi RT</span>\n                <span class=\"tc-stat easy\">Easy</span>\n                <span class=\"tc-stat\">~100 ft gain</span>\n                <span class=\"tc-stat\">2–2.5 hrs</span>\n                <span class=\"tc-stat\">Flattest in Many Glacier</span>\n              </div>\n            </div>\n            <div class=\"tc-body\">\n              <div id=\"map-redrock\" class=\"topo-map-sm\"></div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=48.7972,-113.6600\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n                <a href=\"https://www.alltrails.com/trail/us/montana/redrock-falls-via-swiftcurrent-pass\" target=\"_blank\" class=\"mab at\">AllTrails ↗</a>\n              </div>\n              <div class=\"tc-notes\">\n                <p>The flattest significant hike in Many Glacier — only ~100 ft of elevation gain. Follows Swiftcurrent Lake and Lake Josephine to a vivid red argillite rock waterfall. The red color is iron-rich sediment from 1.5 billion years ago.</p>\n                <p><strong>Best family option here.</strong> Easy pace, beautiful lake views, moose in the wetlands, goats visible on cliffs above.</p>\n              </div>\n              <div class=\"tc-tip pine\">Make noise on this trail — forested sections are prime bear habitat. Bear spray accessible, not buried in your pack.</div>\n            </div>\n          </div>\n\n          <p style=\"font-family:sans-serif;font-size:.83rem;color:var(--mid);margin:4px 0 10px\">— or if you prefer a shorter loop —</p>\n\n          <div class=\"trail-card pine-theme\">\n            <div class=\"tc-hd\">\n              <div class=\"tc-name\">Swiftcurrent Lake Nature Trail</div>\n              <div class=\"tc-stats\">\n                <span class=\"tc-stat\">2.6 mi RT</span>\n                <span class=\"tc-stat easy\">Easy</span>\n                <span class=\"tc-stat\">~30 ft gain</span>\n                <span class=\"tc-stat\">1–1.5 hrs</span>\n                <span class=\"tc-stat\">First 0.9 mi accessible</span>\n              </div>\n            </div>\n            <div class=\"tc-body\">\n              <div id=\"map-swiftcurrent\" class=\"topo-map-sm\"></div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=48.7975,-113.6594\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n                <a href=\"https://www.alltrails.com/trail/us/montana/swiftcurrent-lake-nature-trail\" target=\"_blank\" class=\"mab at\">AllTrails ↗</a>\n              </div>\n              <div class=\"tc-notes\">\n                <p>Loops around Swiftcurrent Lake with Many Glacier Hotel in the backdrop. First 0.9 miles is wheelchair accessible. The wetlands section is prime moose habitat. Goats on cliffs above throughout.</p>\n              </div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd pine\">Afternoon — Return South via St. Mary Falls</div>\n          <ul class=\"tb-list\">\n            <li>Leave Many Glacier by noon–12:30pm. Drive south back (35–40 min).</li>\n            <li>Stop at <strong>St. Mary Falls + Virginia Falls</strong> — right off GTTS Road near St. Mary.</li>\n          </ul>\n\n          <div class=\"trail-card\">\n            <div class=\"tc-hd\">\n              <div class=\"tc-name\">St. Mary Falls + Virginia Falls</div>\n              <div class=\"tc-stats\">\n                <span class=\"tc-stat\">3.2 mi RT (both)</span>\n                <span class=\"tc-stat mod\">Moderate</span>\n                <span class=\"tc-stat\">Descend 260 ft · Climb 285 ft</span>\n                <span class=\"tc-stat\">2–2.5 hrs</span>\n              </div>\n            </div>\n            <div class=\"tc-body\">\n              <div id=\"map-stmaryfalls\" class=\"topo-map-sm\"></div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=48.6853,-113.5928\" target=\"_blank\" class=\"mab gmaps\">📍 Open in Google Maps</a>\n                <a href=\"https://www.alltrails.com/trail/us/montana/st-mary-and-virginia-falls-trail\" target=\"_blank\" class=\"mab at\">AllTrails ↗</a>\n              </div>\n              <div class=\"tc-notes\">\n                <p><strong>St. Mary Falls</strong> (0.8 mi one-way): 35-ft waterfall dropping into brilliant aqua-green pools over red argillite rock. June runoff makes it even more vivid.</p>\n                <p><strong>Virginia Falls</strong> (1.6 mi one-way): Larger and more dramatic. Do not turn back at St. Mary Falls — the extra half-mile is always worth it.</p>\n              </div>\n              <div class=\"tc-tip\">Park at the St. Mary Falls Trailhead on GTTS Road. Late afternoon (2–4pm) is a sweet window — crowds thin and the light in the canyon is warm.</div>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd pine\">Evening</div>\n          <ul class=\"tb-list\">\n            <li><strong>Sunrift Gorge</strong> — 5-minute walk, never skip it\n              <div class=\"map-actions\" style=\"margin-top:6px\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=48.6868,-113.5713\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n              </div>\n            </li>\n            <li><strong>Wild Goose Island Overlook</strong> — final evening light before your last night. Three visits and every one looks different.\n              <div class=\"map-actions\" style=\"margin-top:6px\">\n                <a href=\"https://www.google.com/maps/search/?api=1&query=48.6972,-113.5425\" target=\"_blank\" class=\"mab gmaps\">📍 Google Maps</a>\n              </div>\n            </li>\n            <li>Pack tonight — departure is early-ish tomorrow for the Yellowstone drive.</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ DEPARTURE ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd dep\">\n        <div class=\"day-hd-label\">June 25</div>\n        <div class=\"day-hd-title\">Departure Morning → Yellowstone</div>\n        <div class=\"day-hd-sub\">Leave by 9–10am · 6h 53m to Canyon Village</div>\n      </div>\n      <div class=\"day-body\">\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">Before You Leave</div>\n          <ul class=\"tb-list\">\n            <li><strong>Wild Goose Island</strong> — one final look on the way out (10 min from base)</li>\n            <li><strong>Sunrift Gorge</strong> — 5-minute stop heading west on GTTS Road</li>\n            <li><strong>Checkout Johnson's by 11am</strong></li>\n          </ul>\n        </div>\n        <div class=\"time-block\">\n          <div class=\"tb-hd\">The Drive South</div>\n          <ul class=\"tb-list\">\n            <li>US-89 South → Browning → US-2 East → MT-287 → US-191 → West Yellowstone entrance</li>\n            <li><strong>6h 53m</strong> total. Arrive Canyon Village by early–mid evening.</li>\n            <li>Canyon rims at sunset if you have energy — Artist Point works in any light.</li>\n          </ul>\n          <div class=\"map-actions\" style=\"margin-top:10px\">\n            <a href=\"https://www.google.com/maps/dir/48.7456,-113.4339/44.7353,-110.4995\" target=\"_blank\" class=\"mab route\">🗺️ St. Mary → Yellowstone Canyon Village</a>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<section>\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">Wildlife Guide</div>\n    <div class=\"sec-sub\">All from vehicle and roadside · 100 yards from bears · 25 yards from all other wildlife</div>\n    <div class=\"wl-grid\">\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Mountain Goat</strong></div><div class=\"wl-prob cert\">Near-Certain</div><div class=\"wl-where\">Logan Pass — from the parking lot. June = peak. No hiking needed.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Bighorn Sheep</strong></div><div class=\"wl-prob hi\">High</div><div class=\"wl-where\">Oberlin Bend (GTTS Road), Many Glacier slopes. Morning.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Grizzly Bear</strong></div><div class=\"wl-prob mod\">Good — June prime</div><div class=\"wl-where\">Two Dog Flats, Many Glacier slopes. Dawn and dusk.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Marmot</strong></div><div class=\"wl-prob hi\">Very High</div><div class=\"wl-where\">Logan Pass rocky slopes. They sunbathe — midday is best.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Moose</strong></div><div class=\"wl-prob mod\">Moderate</div><div class=\"wl-where\">Swiftcurrent wetlands at Many Glacier. Dawn and dusk.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Pika</strong></div><div class=\"wl-prob hi\">Very High</div><div class=\"wl-where\">Logan Pass rocky slopes. Listen for high-pitched \"eep.\"</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Elk</strong></div><div class=\"wl-prob mod\">Moderate</div><div class=\"wl-where\">Two Dog Flats spring mornings.</div></div>\n      <div class=\"wl-card\"><div class=\"wl-name\"><strong>Bald / Golden Eagle</strong></div><div class=\"wl-prob mod\">Moderate</div><div class=\"wl-where\">Lake areas, Sherburne Reservoir. Morning.</div></div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<section>\n  <div class=\"wrap\">\n    <div class=\"sec-hd\">Key Contacts</div>\n    <div class=\"sec-sub\">Save before you lose signal</div>\n    <div class=\"contacts-grid\">\n      <div class=\"cc\"><div class=\"cc-label\">NPS Conditions — Check from June 18</div><div class=\"cc-val\">Daily GTTS Road + trail status</div><a href=\"https://www.nps.gov/glac/planyourvisit/conditions.htm\" target=\"_blank\">nps.gov/glac/conditions</a></div>\n      <div class=\"cc\"><div class=\"cc-label\">Logan Pass 2026</div><div class=\"cc-val\">Shuttle + parking limit details</div><a href=\"https://www.nps.gov/glac/planyourvisit/visiting-loganpass-2026.htm\" target=\"_blank\">nps.gov — Logan Pass 2026</a></div>\n      <div class=\"cc\"><div class=\"cc-label\">St. Mary Visitor Center</div><div class=\"cc-val\">8am – 4:30pm daily</div><div class=\"cc-note\">Stop here every morning. Rangers have real-time conditions for trails, roads, and wildlife sightings.</div></div>\n      <div class=\"cc\"><div class=\"cc-label\">Many Glacier Shuttle (if required)</div><div class=\"cc-val\">7 PM MDT night before</div><div class=\"cc-note\">Recreation.gov. Verify 2026 status at St. Mary VC on June 22.</div></div>\n    </div>\n  </div>\n</section>\n\n<div class=\"footer\">\n  <strong>Glacier National Park · June 22–25, 2026</strong> · Base: Johnson's of St. Mary · Grand American Loop Field Guide<br>\n  <span style=\"font-size:.7rem;opacity:.6\">Maps: OpenTopoMap (CC-BY-SA) · Waymarked Trails hiking overlay · AllTrails URLs verified June 2026 · NPS trail data via developer.nps.gov</span>\n</div>\n\n<script>\nfunction mkMap(id, center, zoom, stops, drawRoute) {\n  var el = document.getElementById(id);\n  if (!el) return;\n  var map = L.map(id, {scrollWheelZoom:false}).setView(center, zoom);\n  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:15,attribution:'© <a href=\"https://opentopomap.org\">OpenTopoMap</a>'}).addTo(map);\n  L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png',{maxZoom:15,opacity:.75,attribution:'© <a href=\"https://hiking.waymarkedtrails.org\">Waymarked Trails</a>'}).addTo(map);\n  if (drawRoute && stops.length > 1) {\n    L.polyline(stops.map(s=>[s.lat,s.lng]),{color:'#3A7DC9',weight:3,opacity:.65,dashArray:'7,5'}).addTo(map);\n  }\n  stops.forEach(function(s,i){\n    var bg = s.type==='base' ? '#5C2B0A' : (s.type==='pine' ? '#2D5A3D' : '#3A7DC9');\n    var lbl = s.num!=null ? s.num : (i+1);\n    var icon = L.divIcon({html:'<div style=\"background:'+bg+';color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.4)\">'+lbl+'</div>',iconSize:[26,26],iconAnchor:[13,13],className:''});\n    L.marker([s.lat,s.lng],{icon}).addTo(map).bindPopup('<strong>'+s.name+'</strong>'+(s.note?'<br><span style=\"font-size:12px\">'+s.note+'</span>':''));\n  });\n  return map;\n}\n\nwindow.addEventListener('load', function(){\n  mkMap('map-day1',[48.702,-113.638],10,[\n    {lat:48.7456,lng:-113.4339,type:'base',num:'⌂',name:\"Johnson's of St. Mary\"},\n    {lat:48.6972,lng:-113.5425,num:'1',name:'Wild Goose Island Overlook',note:'5–10 min from base · Roadside pullout'},\n    {lat:48.6875,lng:-113.4762,num:'2',name:'Two Dog Flats',note:'Best roadside grizzly area'}, ight:700}\n    .bc-val{font-size:1.05rem;color:var(--ys);margin-bottom:2px}\n    .bc-note{font-family:sans-serif;font-size:.78rem;color:var(--mid);line-height:1.45}\n\n    /* 4-DAY OVERVIEW GRID */\n    .days-overview{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:8px}\n    @media(max-width:640px){.days-overview{grid-template-columns:1fr 1fr}}\n    .do-card{border-radius:10px;padding:14px 16px;text-align:center}\n    .do-card.arrival{background:#F1F5F9;border:1px solid #CBD5E1}\n    .do-card.full1{background:linear-gradient(135deg,#FFF8F0,#FDEBD0);border:2px solid var(--ys3)}\n    .do-card.full2{background:linear-gradient(135deg,#F0FAFA,#CCECF0);border:2px solid var(--teal)}\n    .do-card.depart{background:#F1F5F9;border:1px solid #CBD5E1}\n    .do-date{font-family:sans-serif;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--mid);margin-bottom:4px}\n    .do-label{font-family:sans-serif;font-size:.82rem;font-weight:700;color:var(--dark);margin-bottom:4px}\n    .do-card.full1 .do-label{color:var(--ys)}.do-card.full2 .do-label{color:var(--day2)}\n    .do-note{font-family:sans-serif;font-size:.73rem;color:var(--mid);line-height:1.4}\n\n    /* DAY SECTION HEADERS */\n    .day-section{margin-bottom:52px}\n    .day-hd{border-radius:12px 12px 0 0;padding:18px 24px;color:white}\n    .day-hd.arrival{background:linear-gradient(135deg,#4A5568,#718096)}\n    .day-hd.full1{background:linear-gradient(135deg,#5C2B0A,var(--ys2))}\n    .day-hd.full2{background:linear-gradient(135deg,#0E4A56,var(--teal))}\n    .day-hd.depart{background:linear-gradient(135deg,#4A5568,#718096)}\n    .day-hd-label{font-family:sans-serif;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;opacity:.7;margin-bottom:4px}\n    .day-hd-title{font-size:1.35rem;font-weight:normal;margin-bottom:3px}\n    .day-hd-sub{font-family:sans-serif;font-size:.82rem;opacity:.82}\n    .day-body{background:white;border:1px solid var(--border);border-top:none;border-radiu
