ight:normal;margin-bottom:5px}\n    .park-hd-sub{font-family:sans-serif;font-size:.87rem;opacity:.82;margin-bottom:12px}\n    .park-chips{display:flex;flex-wrap:wrap;gap:8px}\n    .park-chip{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 13px;font-family:sans-serif;font-size:.76rem}\n    .park-body{background:white;border:1px solid var(--border);border-top:none;padding:26px}\n    /* MAPS */\n    .seg-map{height:300px;border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:8px}\n    .park-map{height:340px;border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:8px}\n    .map-caption{font-family:sans-serif;font-size:.72rem;color:var(--mid);margin-bottom:6px;font-style:italic}\n    .map-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}\n    .mab{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:6px 14px;font-family:sans-serif;font-size:.76rem;font-weight:700;text-decoration:none;transition:opacity .15s;white-space:nowrap}\n    .mab:hover{opacity:.82}\n    .mab.gmaps{background:white;border:1.5px solid #1A73E8;color:#1A73E8}\n    .mab.route{background:#1A73E8;color:white;border:1.5px solid #1A73E8}\n    .mab.rain{background:white;border:1.5px solid var(--rain);color:var(--rain)}\n    .mab.crat{background:white;border:1.5px solid var(--crater);color:var(--crater)}\n    /* TIME BLOCKS */\n    .time-block{margin-bottom:22px}\n    .tb-hd{font-family:sans-serif;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding-bottom:6px;border-bottom:2px solid;margin-bottom:12px}\n    .tb-hd.wa{color:var(--wa);border-color:var(--wa)}\n    .tb-hd.or{color:var(--or);border-color:var(--or)}\n    .tb-hd.ca{color:var(--ca);border-color:var(--ca)}\n    .tb-hd.rain{color:var(--rain);border-color:var(--rain)}\n    .tb-hd.crat{color:var(--crater);border-color:var(--crater)}\n    .tb-list{font-family:sans-serif;font-size:.85rem;color:var(--dark);line-height:1.75;list-style:none;padding:0}\n    .tb-list li{padding-left:14px;position:relative;margin-bottom:2px}\n    .tb-list li::before{content:'→';position:absolute;left:0;font-size:.8rem}\n    .tb-hd.wa ~ .tb-list li::before{color:var(--wa)}\n    .tb-hd.or ~ .tb-list li::before{color:var(--or)}\n    .tb-hd.rain ~ .tb-list li::before{color:var(--rain)}\n    .tb-hd.crat ~ .tb-list li::before{color:var(--crater)}\n    .tb-list strong{color:var(--dark)}\n    /* TRAIL/ACTIVITY CARDS */\n    .trail-card{background:#F0F7FF;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:14px 0 20px}\n    .trail-card.crater-theme{background:#E0FFFE}\n    .tc-hd{padding:13px 18px 11px;border-bottom:1px solid var(--border)}\n    .tc-name{font-size:1.05rem;color:var(--rain);margin-bottom:4px;font-weight:600}\n    .trail-card.crater-theme .tc-name{color:var(--crater)}\n    .tc-stats{display:flex;flex-wrap:wrap;gap:7px}\n    .tc-stat{font-family:sans-serif;font-size:.74rem;background:white;border:1px solid var(--border);border-radius:5px;padding:3px 8px;color:var(--mid)}\n    .tc-stat.mod{color:var(--amber);font-weight:700;border-color:#FCD34D}\n    .tc-stat.easy{color:var(--green);font-weight:700;border-color:#86EFAC}\n    .tc-stat.warn{color:var(--red);font-weight:700;border-color:#FCA5A5}\n    .tc-body{padding:13px 18px 15px}\n    .tc-notes{font-family:sans-serif;font-size:.82rem;color:var(--dark);line-height:1.6;margin-bottom:10px}\n    .tc-notes p{margin-bottom:6px}\n    .tc-tip{background:linear-gradient(135deg,#EBF8FF,#BEE3F8);border-left:3px solid var(--rain);border-radius:0 6px 6px 0;padding:10px 14px;margin-top:10px;font-family:sans-serif;font-size:.81rem;color:var(--dark);line-height:1.5}\n    .tc-tip.crater{background:linear-gradient(135deg,#E0FFFE,#B2F5EA);border-color:var(--crater)}\n    /* STOP CARDS */\n    .stop-card{background:var(--snow);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:14px 0 20px}\n    .stop-card.or-theme{background:#F0FFF4}\n    .stop-card.ca-theme{background:#FFF9F0}\n    .sc-hd{padding:13px 18px 11px;border-bottom:1px solid var(--border)}\n    .sc-name{font-size:1.05rem;font-weight:600;margin-bottom:4px}\n    .sc-name.wa{color:var(--wa)}.sc-name.or{color:var(--or)}.sc-name.ca{color:var(--ca)}\n    .sc-stats{display:flex;flex-wrap:wrap;gap:7px}\n    .sc-stat{font-family:sans-serif;font-size:.74rem;background:white;border:1px solid var(--border);border-radius:5px;padding:3px 8px;color:var(--mid)}\n    .sc-stat.free{background:#F0FFF4;border-color:#86EFAC;color:var(--green);font-weight:700}\n    .sc-body{padding:13px 18px 15px}\n    .sc-notes{font-family:sans-serif;font-size:.82rem;color:var(--dark);line-height:1.6;margin-bottom:8px}\n    .sc-notes p{margin-bottom:6px}\n    .sc-tip{border-left:3px solid;border-radius:0 6px 6px 0;padding:10px 14px;margin-top:10px;font-family:sans-serif;font-size:.81rem;color:var(--dark);line-height:1.5}\n    .sc-tip.or{background:linear-gradient(135deg,#F0FFF4,#C6F6D5);border-color:var(--or)}\n    .sc-tip.ca{background:linear-gradient(135deg,#FFFAF0,#FEEBC8);border-color:var(--ca)}\n    /* LOGISTICS STRIP */\n    .logistics-strip{background:#F7FAFC;border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin:20px 0}\n    .ls-title{font-family:sans-serif;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--wa);margin-bottom:10px}\n    .ls-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}\n    @media(max-width:580px){.ls-grid{grid-template-columns:1fr}}\n    .ls-card{background:white;border:1px solid var(--border);border-radius:8px;padding:10px 12px}\n    .ls-type{font-family:sans-serif;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}\n    .ls-type.rest{color:var(--wa)}.ls-type.shower{color:var(--or)}.ls-type.food{color:var(--ca)}.ls-type.sleep{color:#553C9A}\n    .ls-name{font-family:sans-serif;font-size:.82rem;font-weight:700;color:var(--dark);margin-bottom:2px}\n    .ls-note{font-family:sans-serif;font-size:.75rem;color:var(--mid);line-height:1.4}\n    /* OPTION SPLIT */\n    .option-split{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:12px 0}\n    @media(max-width:580px){.option-split{grid-template-columns:1fr}}\n    .opt-box{border-radius:10px;padding:14px 16px}\n    .opt-box.a{background:#EBF8FF;border:1px solid #90CDF4}\n    .opt-box.b{background:#F0FFF4;border:1px solid #9AE6B4}\n    .opt-title{font-family:sans-serif;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}\n    .opt-box.a .opt-title{color:#1A365D}.opt-box.b .opt-title{color:#1C4532}\n    .opt-text{font-family:sans-serif;font-size:.82rem;color:var(--dark);line-height:1.55}\n    /* HARD STOP */\n    .hard-stop-banner{background:linear-gradient(135deg,#744210,#D69E2E);color:white;border-radius:12px;padding:18px 24px;margin:16px 0}\n    .hs-title{font-family:sans-serif;font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;opacity:.85;margin-bottom:5px}\n    .hs-text{font-family:sans-serif;font-size:.9rem;line-height:1.6;opacity:.95}\n    /* ALERTS */\n    .alert-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}\n    @media(max-width:640px){.alert-grid{grid-template-columns:1fr}}\n    .ac{border-radius:10px;padding:14px 16px;border-left:4px solid}\n    .ac.red{background:#FEF2F2;border-color:var(--red)}.ac.amb{background:#FFFBEB;border-color:var(--amber)}\n    .ac.grn{background:#F0FDF4;border-color:var(--green)}.ac.blu{background:#EFF6FF;border-color:var(--wa)}\n    .ac-title{font-family:sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}\n    .ac.red .ac-title{color:var(--red)}.ac.amb .ac-title{color:var(--amber)}.ac.grn .ac-title{color:var(--green)}.ac.blu .ac-title{color:var(--wa)}\n    .ac-text{font-family:sans-serif;font-size:.81rem;color:var(--dark);line-height:1.5}\n    .drive-stat{display:inline-flex;align-items:center;gap:6px;background:#F7FAFC;border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-family:sans-serif;font-size:.82rem;margin:6px 0}\n    .drive-val{font-weight:700;color:var(--wa);font-size:1rem}\n    .footer{background:var(--dark);color:rgba(255,255,255,.55);text-align:center;padding:22px;font-family:sans-serif;font-size:.77rem}\n    .footer strong{color:white}\n  <\/style>\n</head>\n<body>\n\n<div class=\"hero\">\n  <div class=\"hero-sup\">Segment Guide · Grand American Loop · Days 14–18</div>\n  <h1>Yellowstone → San Francisco</h1>\n  <div class=\"hero-dates\">June 28 – July 2, 2026 · Final Segment</div>\n  <div class=\"hero-route\">Canyon Village → Spokane → Mt. Rainier → Seattle → Portland → Crater Lake → Redwoods → SFO 11am</div>\n  <div class=\"hero-chips\">\n    <span class=\"hchip\">🌲 Mt. Rainier · Paradise 5,400 ft</span>\n    <span class=\"hchip\">🐟 Pike Place Chowder</span>\n    <span class=\"hchip\">🍩 Voodoo Doughnut</span>\n    <span class=\"hchip\">💧 Multnomah Falls</span>\n    <span class=\"hchip\">🔵 Crater Lake · Rim Drive</span>\n    <span class=\"hchip\">🌲 Jedediah Smith Redwoods</span>\n    <span class=\"hchip\">🌲 Avenue of the Giants</span>\n    <span class=\"hchip\">✈️ SFO 11am Jul 2 · HARD STOP</span>\n  </div>\n</div>\n\n<div class=\"wrap\">\n\n  <div class=\"ts-banner\">\n    <div class=\"ts-title\">🛌 Sleeping Setup — This Entire Segment</div>\n    <div class=\"ts-text\">No hotels, no bookings, no reservations. Every overnight is a truck stop — Love's, Petro, Pilot Flying J, TA. Free overnight car parking at all of them. Showers are $15–20. Food is 24hr. Park in the car area (away from idling diesel trucks), shower, eat, sleep. That's it. The stops below are chosen to position you perfectly for the next day's first activity.</div>\n    <div class=\"ts-grid\">\n      <div class=\"ts-item\"><div class=\"ts-night\">Jun 28 · Night 1</div><div class=\"ts-loc\">Petro — Spokane, WA</div><div class=\"ts-stop\">10506 W Aero Rd · I-90 · 200 spaces · Iron Skillet restaurant</div></div>\n      <div class=\"ts-item\"><div class=\"ts-night\">Jun 29 · Night 2</div><div class=\"ts-loc\">Pilot Flying J — Fife, WA</div><div class=\"ts-stop\">I-5 near Tacoma · after Seattle · headed toward Portland</div></div>\n      <div class=\"ts-item\"><div class=\"ts-night\">Jun 30 · Night 3</div><div class=\"ts-loc\">Petro — Phoenix, OR</div><div class=\"ts-stop\">I-5 Exit 24 · south of Medford · ⚠️ No Love's in Grants Pass — Petro Phoenix is nearest verified chain stop</div></div>\n      <div class=\"ts-item\"><div class=\"ts-night\">Jul 1 · Night 4</div><div class=\"ts-loc\">Jensen's Truck Stop — Ukiah, CA</div><div class=\"ts-stop\">1460 N Lovers Ln · Call ahead: (707) 462-4833 · only truck stop on US-101 · 2h 11m to SFO</div></div>\n    </div>\n  </div>\n\n  <div class=\"overview-strip\">\n    <div class=\"ov-card d14\"><div class=\"ov-date\">Jun 28</div><div class=\"ov-label\">Day 14</div><div class=\"ov-note\">Yellowstone → Spokane gorge walk → Petro overnight · 500 mi</div></div>\n    <div class=\"ov-card d15\"><div class=\"ov-date\">Jun 29</div><div class=\"ov-label\">Day 15</div><div class=\"ov-note\">Spokane → Mt. Rainier Paradise → Seattle chowder → Pilot Fife overnight</div></div>\n    <div class=\"ov-card d16\"><div class=\"ov-date\">Jun 30</div><div class=\"ov-label\">Day 16</div><div class=\"ov-note\">Near Seattle → Multnomah Falls → Voodoo Portland → Crater Lake rim → Petro Phoenix OR overnight</div></div>\n    <div class=\"ov-card d17\"><div class=\"ov-date\">Jul 1</div><div class=\"ov-label\">Day 17</div><div class=\"ov-note\">Grants Pass → US-199 → Jedediah Smith → Avenue Giants → Love's Ukiah</div></div>\n    <div class=\"ov-card d18\"><div class=\"ov-date\">Jul 2 🏁</div><div class=\"ov-label\">Day 18</div><div class=\"ov-note\">Ukiah → US-101 South → SFO by 11am · 2h 11m · depart 8am</div></div>\n  </div>\n\n</div>\n\n<hr class=\"div\">\n\n<!-- ═══ DAY 14 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd d14\">\n        <div class=\"day-hd-label\">June 28 · Day 14 · 8h 7m · 500 mi</div>\n        <div class=\"day-hd-title\">Checkout Yellowstone → Spokane Gorge</div>\n        <div class=\"day-hd-sub\">Canyon Village 11am → I-90 West through Montana and Idaho → Petro Spokane overnight</div>\n      </div>\n      <div class=\"day-body\">\n        <div id=\"map-day14\" class=\"seg-map\"></div>\n        <p class=\"map-caption\">Day 14: Canyon Village → North Entrance (Gardiner) → I-90 West → Missoula (wheel swap) → Coeur d'Alene → Spokane</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/Canyon+Village+Yellowstone+National+Park+WY/Spokane+WA\" target=\"_blank\" class=\"mab route\">🗺️ Open Day 14 Route in Google Maps</a>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd wa\">Before You Leave — Final Yellowstone</div>\n          <ul class=\"tb-list\">\n            <li><strong>Artist Point</strong> — one last time. Morning light on the canyon walls is different every time. 5 minutes from the campsite. Do it.</li>\n            <li>Checkout Canyon Campground by 11am. Exit via <strong>North Entrance at Gardiner, MT.</strong></li>\n            <li>⚠️ Budget 15 minutes at the <strong>Gardner River High Bridge</strong> — active construction, single-lane 24/7 delays through October 2026. Factor this into departure time.</li>\n          </ul>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd wa\">The Drive — I-90 West Through Montana</div>\n          <ul class=\"tb-list\">\n            <li>I-90 follows the Clark Fork River through forested mountain valleys — genuinely beautiful through Butte and Missoula.</li>\n            <li><strong>Wheel swap at Missoula (~3 hrs in)</strong> — TA at I-90 Exit 96, full facilities, natural break point. This is what \"split the wheel\" means: Driver 1 takes Yellowstone → Missoula, Driver 2 takes Missoula → Spokane.</li>\n            <li>Coeur d'Alene, ID section of I-90 has lake views directly from the highway — worth slowing down for.</li>\n          </ul>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd wa\">Spokane Evening</div>\n          <ul class=\"tb-list\">\n            <li>After 500 miles you won't want much. But <strong>Riverfront Park</strong> (5 min from I-90, downtown) is worth a 30-minute walk — the Spokane River cut a dramatic 100-ft gorge right through the city center, there's a gondola over it, and the park is genuinely pleasant in the evening.</li>\n            <li>Spokane has solid downtown restaurants within walking distance of the park.</li>\n          </ul>\n          <div class=\"map-actions\" style=\"margin-top:8px\">\n            <a href=\"https://www.google.com/maps/search/Riverfront+Park+Spokane+WA\" target=\"_blank\" class=\"mab gmaps\">📍 Riverfront Park</a>\n          </div>\n          <div class=\"drive-stat\"><span class=\"drive-val\">8h 7m</span>&nbsp;·&nbsp;500 mi</div>\n        </div>\n\n        <div class=\"logistics-strip\">\n          <div class=\"ls-title\">🛌 Overnight + Showers · Day 14</div>\n          <div class=\"ls-grid\">\n            <div class=\"ls-card\">\n              <div class=\"ls-type sleep\">🛌 Overnight</div>\n              <div class=\"ls-name\">Petro — Spokane, WA ⭐</div>\n              <div class=\"ls-note\">10506 W Aero Rd · I-90 · 200 truck spaces · Iron Skillet restaurant · 24hr showers · laundry · free overnight parking</div>\n              <a href=\"https://maps.google.com/?q=47.5906,-117.5610\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type shower\">🚿 Showers</div>\n              <div class=\"ls-name\">Petro — Spokane, WA (showers only)</div>\n              <div class=\"ls-note\">10506 W Aero Rd · same location · Note: no Pilot Flying J at this Spokane exit — Petro is the only chain truck stop here</div>\n              <a href=\"https://maps.google.com/?q=47.5906,-117.5610\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type rest\">🔄 Wheel Swap Stop</div>\n              <div class=\"ls-name\">TA — Missoula, MT</div>\n              <div class=\"ls-note\">8018 US Hwy 93 N · I-90 / US-93 interchange · midpoint swap · 130 spaces · 4 service bays · food · fuel</div>\n              <a href=\"https://maps.google.com/?q=46.9486,-114.1298\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type rest\">⛽ Fuel Note</div>\n              <div class=\"ls-name\">Fill up in Missoula</div>\n              <div class=\"ls-note\">Wide service gap between Billings and Missoula on I-90. Fill the tank at Missoula before the Idaho/WA push.</div>\n            </div>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ MT. RAINIER PARK SECTION ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"park-section\">\n      <div class=\"park-hd rainier\">\n        <div class=\"park-hd-sup\">Field Notes · Day 15 Stop · 2–3 Hours</div>\n        <div class=\"park-hd-title\">Mount Rainier National Park</div>\n        <div class=\"park-hd-sub\">Paradise · 5,400 ft · 14,411-ft active volcano · No advance tickets · June 29, 2026</div>\n        <div class=\"park-chips\">\n          <span class=\"park-chip\">$35/vehicle 7-day pass</span>\n          <span class=\"park-chip\">No timed entry 2026</span>\n          <span class=\"park-chip\">Paradise Visitor Center 9am–5pm</span>\n          <span class=\"park-chip\">2026: record low snowpack → more trail access</span>\n        </div>\n      </div>\n      <div class=\"park-body\">\n        <div id=\"map-rainier\" class=\"park-map\"></div>\n        <p class=\"map-caption\">Mt. Rainier: Paradise area at 5,400 ft · SR-706 approach from Nisqually entrance · use SR-706 only (SR-123 east side has active construction delays)</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/Spokane+WA/Paradise+Visitor+Center+Mount+Rainier+National+Park+WA\" target=\"_blank\" class=\"mab route\">🗺️ Spokane → Paradise Route</a>\n          <a href=\"https://www.google.com/maps/search/Paradise+Visitor+Center+Mount+Rainier+National+Park\" target=\"_blank\" class=\"mab rain\">📍 Paradise Visitor Center</a>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd rain\">The Drive Up — SR-706 to Paradise</div>\n          <ul class=\"tb-list\">\n            <li>From Spokane, I-90 West → exit south toward Puyallup/Tacoma → SR-7 through Elbe → SR-706. This 18-mile climb through old-growth fir forest to treeline is the first payoff — the drive itself is spectacular.</li>\n            <li>Allow 45 minutes from Elbe to Paradise. Not 30. Two-lane road with RV traffic. Worth the pace.</li>\n            <li><strong>Check the webcam before committing:</strong> visitrainier.com — if the mountain is socked in, skip and add time in Seattle. On a clear day, Rainier fills the entire sky from Paradise and you'll know it was worth every mile.</li>\n          </ul>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd rain\">At Paradise — What to Do</div>\n\n          <div class=\"trail-card\">\n            <div class=\"tc-hd\">\n              <div class=\"tc-name\">Alta Vista Trail — Recommended</div>\n              <div class=\"tc-stats\">\n                <span class=\"tc-stat\">1.7 mi RT</span>\n                <span class=\"tc-stat mod\">Moderate</span>\n                <span class=\"tc-stat\">600 ft gain</span>\n                <span class=\"tc-stat\">1.5 hrs</span>\n                <span class=\"tc-stat\">Best in late June</span>\n              </div>\n            </div>\n            <div class=\"tc-body\">\n              <div class=\"tc-notes\">\n                <p>Climbs from the Paradise parking area up into open subalpine meadow with Rainier's glaciers filling the sky directly above and the Tatoosh Range below. In late June 2026 with record-low snowpack, the wildflowers are starting and more of the trail is clear than a typical year. This is the move if you have 2 hours.</p>\n                <p>The trail starts right from the Jackson Visitor Center parking lot. No shuttle needed, no gear beyond trail shoes and a layer.</p>\n              </div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/Alta+Vista+Trail+Mount+Rainier+Paradise\" target=\"_blank\" class=\"mab rain\">📍 Alta Vista Trailhead</a>\n              </div>\n              <div class=\"tc-tip\">Start early — cloud typically builds over the summit by early afternoon. The 9am–11am window gives the clearest views and lightest crowds. Be at the Paradise parking lot by 9:30am for the best experience.</div>\n            </div>\n          </div>\n\n          <div class=\"trail-card\">\n            <div class=\"tc-hd\">\n              <div class=\"tc-name\">Myrtle Falls + Visitor Center Loop — Easier Option</div>\n              <div class=\"tc-stats\">\n                <span class=\"tc-stat\">0.6 mi RT</span>\n                <span class=\"tc-stat easy\">Easy · Paved</span>\n                <span class=\"tc-stat\">30–40 min</span>\n                <span class=\"tc-stat\">All ages</span>\n              </div>\n            </div>\n            <div class=\"tc-body\">\n              <div class=\"tc-notes\">\n                <p>A paved path from the Visitor Center to Myrtle Falls — a beautiful small waterfall framing the volcano above it. The classic Rainier photo. Combine with a walk through the meadow boardwalk and you've seen the essence of Paradise in 40 minutes without significant elevation gain.</p>\n              </div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/Myrtle+Falls+Mount+Rainier+Paradise+Washington\" target=\"_blank\" class=\"mab rain\">📍 Myrtle Falls</a>\n              </div>\n            </div>\n          </div>\n\n          <ul class=\"tb-list\">\n            <li><strong>Paradise Inn</strong> (1917, National Historic Landmark, open June–September) — massive lodge built entirely from salvaged old-growth timber. The lobby has a 33-ft fireplace built from local stone. Get coffee here. 10 minutes inside, no charge. One of the finest park lodges in the NPS system.</li>\n          </ul>\n          <div class=\"map-actions\" style=\"margin-top:8px\">\n            <a href=\"https://www.google.com/maps/search/Paradise+Inn+Mount+Rainier+National+Park\" target=\"_blank\" class=\"mab rain\">📍 Paradise Inn</a>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- ═══ DAY 15 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd d15\">\n        <div class=\"day-hd-label\">June 29 · Day 15 · ~7h driving · 395 mi</div>\n        <div class=\"day-hd-title\">Mt. Rainier → Seattle Chowder → Pilot Fife</div>\n        <div class=\"day-hd-sub\">Spokane → Paradise (2–3 hrs) → drive north to Seattle (Pike Place) → Pilot Flying J Fife overnight</div>\n      </div>\n      <div class=\"day-body\">\n        <div id=\"map-day15\" class=\"seg-map\"></div>\n        <p class=\"map-caption\">Day 15: Spokane → I-90 West → SR-410/706 detour south to Mt. Rainier → SR-7 North → Tacoma → Seattle (Pike Place) → Pilot Flying J Fife overnight</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/Spokane+WA/Paradise+Mount+Rainier+National+Park+WA/Seattle+WA\" target=\"_blank\" class=\"mab route\">🗺️ Open Day 15 Route in Google Maps</a>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd wa\">Route Logic — Why Rainier Before Seattle</div>\n          <ul class=\"tb-list\">\n            <li>From Spokane, I-90 deposits you just east of Seattle. Rainier is 60 miles south near Tacoma. Going Seattle first means 3 hours of backtracking (Seattle → Rainier → Seattle again). Going Rainier first is zero backtracking: Spokane → Rainier → drive north to Seattle naturally.</li>\n          </ul>\n        </div>\n\n        <div class=\"stop-card\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name wa\">Pike Place Market + Chowder — Seattle</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">Pike Place Market, Seattle · 2 hrs</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p><strong>Pike Place Chowder</strong> (1530 Post Alley, in Pike Place Market) — 4.6⭐ / 8,022 reviews, multiple \"best chowder in America\" awards. New England clam chowder in a sourdough bread bowl. Opens 11am. Arrive right when they open to avoid the line.</p>\n              <p>After chowder: fish-throwing at the main market stalls, the original 1971 Starbucks (Pike Place), and the Market's lower levels (crafts, produce, odd shops). The market is genuinely alive — 30–60 minutes exploring feels right.</p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Pike+Place+Chowder+Seattle+WA\" target=\"_blank\" class=\"mab gmaps\">📍 Pike Place Chowder</a>\n              <a href=\"https://www.google.com/maps/search/Pike+Place+Market+Seattle+WA\" target=\"_blank\" class=\"mab gmaps\">📍 Pike Place Market</a>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"logistics-strip\">\n          <div class=\"ls-title\">🛌 Overnight + Showers · Day 15</div>\n          <div class=\"ls-grid\">\n            <div class=\"ls-card\">\n              <div class=\"ls-type sleep\">🛌 Overnight</div>\n              <div class=\"ls-name\">Pilot Flying J — Fife, WA ⭐</div>\n              <div class=\"ls-note\">I-5 near Tacoma · south of Seattle · positions for Portland run Day 16 · 24hr showers · free overnight parking</div>\n              <a href=\"https://www.google.com/maps/search/Pilot+Flying+J+Fife+WA\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type shower\">🚿 Showers</div>\n              <div class=\"ls-name\">Love's — Ellensburg, WA</div>\n              <div class=\"ls-note\">1512 US-97, Ellensburg · I-90 Cascade crossing · $15 · 24hr · good mid-morning stop before Rainier</div>\n              <a href=\"https://maps.google.com/?q=47.0076,-120.5859\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type rest\">🛌 Alternative Overnight</div>\n              <div class=\"ls-name\">TA — North Bend, WA</div>\n              <div class=\"ls-note\">46600 SE N Bend Way · I-90 Exit 34 · if stopping earlier after Rainier · 140 spaces · EV charging</div>\n              <a href=\"https://maps.google.com/?q=47.4683,-121.7169\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type food\">🍽️ Food</div>\n              <div class=\"ls-name\">Pike Place Chowder</div>\n              <div class=\"ls-note\">1530 Post Alley, Seattle · opens 11am · clam chowder in bread bowl · do not skip</div>\n              <a href=\"https://www.google.com/maps/search/Pike+Place+Chowder+Seattle\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"drive-stat\"><span class=\"drive-val\">~7h driving</span>&nbsp;·&nbsp;395 mi · Pilot Flying J Fife overnight</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ CRATER LAKE PARK SECTION ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"park-section\">\n      <div class=\"park-hd crater\">\n        <div class=\"park-hd-sup\">Field Notes · Day 16 Evening Stop · 2–3 Hours</div>\n        <div class=\"park-hd-title\">Crater Lake National Park</div>\n        <div class=\"park-hd-sub\">Rim Village · 7,000 ft · Deepest lake in the US (1,943 ft) · Most vivid blue water on Earth · June 30, 2026</div>\n        <div class=\"park-chips\">\n          <span class=\"park-chip\">$30/vehicle 7-day pass</span>\n          <span class=\"park-chip\">Rim Village VC: 9:30am–4:30pm</span>\n          <span class=\"park-chip\">⚠️ Cleetwood Cove Trail CLOSED 2026–2028</span>\n          <span class=\"park-chip\">Rim Drive: call 541-594-3000 for east section status</span>\n        </div>\n      </div>\n      <div class=\"park-body\">\n        <div id=\"map-crater\" class=\"park-map\"></div>\n        <p class=\"map-caption\">Crater Lake: Rim Village (west access) · Discovery Point Trail · accessible Rim Drive portions · exit south via OR-62 to Petro Phoenix OR overnight (I-5 Exit 24)</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/search/Crater+Lake+National+Park+Rim+Village+Oregon\" target=\"_blank\" class=\"mab crat\">📍 Rim Village</a>\n          <a href=\"https://www.google.com/maps/dir/Portland+OR/Crater+Lake+National+Park+OR\" target=\"_blank\" class=\"mab route\">🗺️ Portland → Crater Lake</a>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd crat\">What Crater Lake Actually Is</div>\n          <ul class=\"tb-list\">\n            <li>Mt. Mazama — a 12,000-ft volcano — collapsed inward after a massive eruption approximately 7,700 years ago. The caldera filled with rain and snowmelt over centuries. No rivers flow in or out. The result is the deepest lake in the United States (1,943 ft) with water so clear and so deep it absorbs all light except deep blue. The color is the real thing. It photographs poorly — you need to see it.</li>\n            <li><strong>Wizard Island</strong> is a cinder cone that formed after the eruption — a volcano inside the collapsed volcano, rising 763 ft from the lake surface. Visible from the rim at all times.</li>\n            <li>You're arriving evening. The lake changes color as the sun drops — vivid blue to deep indigo. This is intentionally the right time to be here.</li>\n          </ul>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd crat\">The Plan — Evening at the Rim</div>\n\n          <div class=\"trail-card crater-theme\">\n            <div class=\"tc-hd\">\n              <div class=\"tc-name\">Discovery Point Trail — Best Western Rim Viewpoint</div>\n              <div class=\"tc-stats\">\n                <span class=\"tc-stat\">1.6 mi RT from Rim Village</span>\n                <span class=\"tc-stat easy\">Easy</span>\n                <span class=\"tc-stat\">150 ft gain</span>\n                <span class=\"tc-stat\">45 min</span>\n              </div>\n            </div>\n            <div class=\"tc-body\">\n              <div class=\"tc-notes\">\n                <p>A rim trail heading west from Rim Village along the caldera edge. Discovery Point was the first place John Wesley Hillman sighted the lake in 1853. The view looks directly across to Wizard Island with the full lake expanse behind it. In evening light the contrast between the dark rim rock and the glowing blue water is extraordinary.</p>\n              </div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/Discovery+Point+Crater+Lake+National+Park\" target=\"_blank\" class=\"mab crat\">📍 Discovery Point</a>\n              </div>\n              <div class=\"tc-tip crater\">Walk Discovery Point, then drive the accessible portion of West Rim Drive toward Hillman Peak for a few miles. Pull off at any overlook. Watch the sun drop. Then drive south via OR-62 → I-5 South to Petro Phoenix OR (~1h from the south entrance). Note: no Love's at Grants Pass — Petro Phoenix is the closest verified chain stop.</div>\n            </div>\n          </div>\n\n          <div class=\"trail-card crater-theme\">\n            <div class=\"tc-hd\">\n              <div class=\"tc-name\">Rim Village Viewpoint + Sun Notch</div>\n              <div class=\"tc-stats\">\n                <span class=\"tc-stat\">Rim Village: immediate · paved</span>\n                <span class=\"tc-stat easy\">Easy</span>\n                <span class=\"tc-stat\">Sun Notch: 1.6 mi RT · 150 ft gain · 45 min</span>\n              </div>\n            </div>\n            <div class=\"tc-body\">\n              <div class=\"tc-notes\">\n                <p><strong>Rim Village viewpoint</strong> is right from the parking lot — paved, accessible, the lake in front of you immediately on arrival. The gift shop and Rim Village Café are here. The Sinnott Memorial Overlook (short paved walk from the village) has a wider angle on the lake including Wizard Island.</p>\n                <p><strong>Sun Notch Trail</strong> is the alternate trail if Discovery Point is crowded — 1.6 miles RT heading east from the Annie Spring entrance, with a viewpoint of the lake and Phantom Ship (a natural rock formation that looks like a 19th-century sailing ship). Equally vivid.</p>\n              </div>\n              <div class=\"map-actions\">\n                <a href=\"https://www.google.com/maps/search/Rim+Village+Crater+Lake+National+Park\" target=\"_blank\" class=\"mab crat\">📍 Rim Village</a>\n              </div>\n            </div>\n          </div>\n\n          <div class=\"alert-grid\">\n            <div class=\"ac red\">\n              <div class=\"ac-title\">Cleetwood Cove Closed 2026–2028</div>\n              <div class=\"ac-text\">The only trail to the water's edge is closed for geotechnical rehabilitation. All boat tours and Wizard Island access are suspended through 2028. Rim-only visit. The rim is still the main event.</div>\n            </div>\n            <div class=\"ac blu\">\n              <div class=\"ac-title\">East Rim Drive — Call First</div>\n              <div class=\"ac-text\">East Rim Drive opens late June / early July depending on snowpack. Call 541-594-3000 the morning of June 30 to confirm. West Rim Drive from Rim Village is reliably open.</div>\n            </div>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- ═══ DAY 16 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd d16\">\n        <div class=\"day-hd-label\">June 30 · Day 16 · 6h 38m + stops · 407 mi</div>\n        <div class=\"day-hd-title\">Portland Morning → Crater Lake Evening</div>\n        <div class=\"day-hd-sub\">Fife, WA → Multnomah Falls → Voodoo Doughnut Portland → Crater Lake rim → Love's Grants Pass overnight</div>\n      </div>\n      <div class=\"day-body\">\n        <div id=\"map-day16\" class=\"seg-map\"></div>\n        <p class=\"map-caption\">Day 16: Fife WA → I-5 South → Multnomah Falls (I-84) → Portland → I-5/OR-138 → Crater Lake → OR-62 South → Love's Grants Pass</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/Fife+WA/Multnomah+Falls+OR/Portland+OR/Crater+Lake+National+Park+OR/Grants+Pass+OR\" target=\"_blank\" class=\"mab route\">🗺️ Open Day 16 Route in Google Maps</a>\n        </div>\n\n        <div class=\"stop-card or-theme\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name or\">Multnomah Falls — Columbia River Gorge</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">I-84 Exit 31 · on the way to Portland</span>\n              <span class=\"sc-stat free\">Free viewing</span>\n              <span class=\"sc-stat\">620 ft · 30–45 min</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p>Most-visited natural site in Oregon. 620-ft two-tier waterfall visible from the parking area. The paved path to Benson Bridge (0.5 mi, 180-ft gain) puts you between the two tiers with the upper falls above and lower falls below. Quick stop on the I-84 corridor before Portland.</p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Multnomah+Falls+Oregon\" target=\"_blank\" class=\"mab gmaps\">📍 Multnomah Falls</a>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"stop-card or-theme\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name or\">Portland — Voodoo Doughnut + Powell's Books</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">Portland, OR · 1–1.5 hrs</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p><strong>Voodoo Doughnut</strong> (22 SW 3rd Ave) — 24hrs, 4.4⭐ / 19,492 reviews. Maple bacon bar. The single iconic Portland food experience. 5-minute walk from the Pearl District. <strong>Powell's Books</strong> (1005 W Burnside) — the largest independent bookstore in the world, size of a city block. Even 20 minutes here is worthwhile.</p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Voodoo+Doughnut+Portland+OR\" target=\"_blank\" class=\"mab gmaps\">📍 Voodoo Doughnut</a>\n              <a href=\"https://www.google.com/maps/search/Powell's+Books+Portland+OR\" target=\"_blank\" class=\"mab gmaps\">📍 Powell's Books</a>\n            </div>\n            <div class=\"sc-tip or\">After Portland: OR-138 through North Umpqua canyon to Crater Lake has zero cell service for ~60 miles. Download offline maps before leaving Roseburg. Budget 1.5 hrs for OR-138, not 1 hour.</div>\n          </div>\n        </div>\n\n        <div class=\"logistics-strip\">\n          <div class=\"ls-title\">🛌 Overnight + Showers · Day 16</div>\n          <div class=\"ls-grid\">\n            <div class=\"ls-card\">\n              <div class=\"ls-type sleep\">🛌 Overnight ⭐</div>\n              <div class=\"ls-name\">Petro — Phoenix, OR (Medford area)</div>\n              <div class=\"ls-note\">3730 Fern Valley Rd · I-5 Exit 24 · 24hr showers · laundry · ⚠️ No Love's in Grants Pass — Petro Phoenix is nearest verified chain stop (18 mi south)</div>\n              <a href=\"https://maps.google.com/?q=42.2740,-122.8193\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type sleep\">🛌 Alt — Grants Pass Hotels</div>\n              <div class=\"ls-name\">Hotel in Grants Pass, OR ⭐ (Preferred)</div>\n              <div class=\"ls-note\">No chain truck stop at I-5/US-199 junction · a hotel in Grants Pass keeps you at the US-199 departure point for tomorrow morning's Redwoods run</div>\n              <a href=\"https://www.google.com/maps/search/hotels+Grants+Pass+Oregon+I-5\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Hotels</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type rest\">🛌 Rest Stop</div>\n              <div class=\"ls-name\">TA — Aurora, OR</div>\n              <div class=\"ls-note\">21856 Bents Rd NE · I-5 Exit 278 · between Portland and Salem · 275 spaces · fitness room · good mid-day break</div>\n              <a href=\"https://maps.google.com/?q=45.2373,-122.8012\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type shower\">🚿 Showers</div>\n              <div class=\"ls-name\">Pilot Flying J — Salem, OR</div>\n              <div class=\"ls-note\">4220 Brooklake Rd NE · I-5 Exit ~271 · $15 · 24hr · EV charging · between Portland and the OR-138 turnoff</div>\n              <a href=\"https://maps.google.com/?q=45.0488,-122.9748\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"drive-stat\"><span class=\"drive-val\">~9h with stops</span>&nbsp;·&nbsp;407 mi · Petro Phoenix OR overnight (nearest verified stop to Grants Pass)</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ DAY 17 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd d17\">\n        <div class=\"day-hd-label\">July 1 · Day 17 · 8h 24m · 465 mi</div>\n        <div class=\"day-hd-title\">The Redwoods — Two Ancient Groves</div>\n        <div class=\"day-hd-sub\">Grants Pass → US-199 → Jedediah Smith Redwoods → Avenue of the Giants → Love's Ukiah overnight</div>\n      </div>\n      <div class=\"day-body\">\n        <div id=\"map-day17\" class=\"seg-map\"></div>\n        <p class=\"map-caption\">Day 17: Grants Pass → US-199 (Smith River canyon) → Crescent City → US-101 South → Humboldt Redwoods → US-101 South → Love's Ukiah, CA</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/Grants+Pass+OR/Crescent+City+CA/Avenue+of+the+Giants+CA/Ukiah+CA\" target=\"_blank\" class=\"mab route\">🗺️ Open Day 17 Route in Google Maps</a>\n        </div>\n\n        <div class=\"stop-card ca-theme\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name ca\">Jedediah Smith Redwoods — Howland Hill Road</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">9 miles east of Crescent City on US-199</span>\n              <span class=\"sc-stat\">Howland Hill Rd: 6 mi unpaved · no trailers</span>\n              <span class=\"sc-stat\">$8/vehicle picnic areas</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p>The densest old-growth coast redwood groves anywhere. The canopy is so thick the forest floor stays dim at midday. <strong>Howland Hill Road</strong> (6 miles unpaved, no trailers) is the most intimate old-growth redwood drive in the park system — you're inside the grove, trees pressing in from both sides, sunlight barely reaching the forest floor through 350-ft canopies.</p>\n              <p>The drive from Grants Pass via US-199 through the Smith River canyon is itself part of the experience — tight switchbacks through deep gorge with zero cell service for ~80 miles. Download offline maps in Grants Pass before turning west.</p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Jedediah+Smith+Redwoods+State+Park+California\" target=\"_blank\" class=\"mab gmaps\">📍 Jedediah Smith Redwoods</a>\n              <a href=\"https://www.google.com/maps/search/Howland+Hill+Road+Jedediah+Smith+Redwoods\" target=\"_blank\" class=\"mab gmaps\">📍 Howland Hill Road entrance</a>\n            </div>\n            <div class=\"sc-tip ca\">Howland Hill Road starts near the Hiouchi Visitor Center. Allow 1 hour for the 6-mile road — it's slow and you'll stop constantly. No trailers, no RVs. Standard vehicles are fine. The road reconnects to US-199 on the west end.</div>\n          </div>\n        </div>\n\n        <div class=\"stop-card ca-theme\">\n          <div class=\"sc-hd\">\n            <div class=\"sc-name ca\">Avenue of the Giants — Humboldt Redwoods SP</div>\n            <div class=\"sc-stats\">\n              <span class=\"sc-stat\">US-101 alternate · south of Eureka, CA</span>\n              <span class=\"sc-stat free\">No fee · on-route</span>\n              <span class=\"sc-stat\">31-mile scenic alternate</span>\n            </div>\n          </div>\n          <div class=\"sc-body\">\n            <div class=\"sc-notes\">\n              <p>The 31-mile Avenue of the Giants runs through Humboldt Redwoods State Park directly on your US-101 route south. Enter from the north end for the largest trees. <strong>Founders Grove</strong> and the <strong>Drury Scenic Parkway</strong> are the highlights — the trees here are so tall and close together that standing among them feels like being inside a cathedral built at geological scale.</p>\n              <p><strong>No gas stations on the Avenue</strong> — fuel in Fortuna before turning off US-101. Clear Eureka before 3pm to stay ahead of any traffic building south.</p>\n            </div>\n            <div class=\"map-actions\">\n              <a href=\"https://www.google.com/maps/search/Avenue+of+the+Giants+Humboldt+Redwoods+California\" target=\"_blank\" class=\"mab gmaps\">📍 Avenue of the Giants</a>\n              <a href=\"https://www.google.com/maps/search/Founders+Grove+Humboldt+Redwoods\" target=\"_blank\" class=\"mab gmaps\">📍 Founders Grove</a>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"logistics-strip\">\n          <div class=\"ls-title\">🛌 Overnight + Showers · Day 17 · US-101 Corridor</div>\n          <div class=\"ls-grid\">\n            <div class=\"ls-card\">\n              <div class=\"ls-type sleep\">🛌 Overnight ⭐</div>\n              <div class=\"ls-name\">Jensen's Truck Stop — Ukiah, CA</div>\n              <div class=\"ls-note\">1460 N Lovers Ln, Ukiah · US-101 · CALL AHEAD to confirm overnight car parking: (707) 462-4833 · ⚠️ Only truck stop option on US-101 between Grants Pass and SFO — no chain stops exist on this entire corridor · 2h 11m to SFO</div>\n              <a href=\"https://maps.google.com/?q=39.1696,-123.2119\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type rest\">⚠️ Corridor Note</div>\n              <div class=\"ls-name\">No chain truck stops on US-101 north of SFO</div>\n              <div class=\"ls-note\">Every Love's, Pilot Flying J, TA, and Petro in northern CA is on I-5 or I-80. Zero exist on US-101 from Ukiah to the Golden Gate. Jensen's is the only viable stop. Call before Day 17: (707) 462-4833.</div>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type shower\">🚿 Showers</div>\n              <div class=\"ls-name\">Pilot Flying J — Weed, CA</div>\n              <div class=\"ls-note\">395 E Vista Dr, Weed · I-5 entry to CA · $15 · 24hr · only if routing via I-5 instead of US-199/101</div>\n              <a href=\"https://maps.google.com/?q=41.4227,-122.3780\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n            <div class=\"ls-card\">\n              <div class=\"ls-type shower\">🚿 Showers</div>\n              <div class=\"ls-name\">TA — Redding, CA</div>\n              <div class=\"ls-note\">I-5 / Knighton Rd · 196 spaces · $15 showers · if on I-5 route</div>\n              <a href=\"https://maps.google.com/?q=40.5480,-122.3593\" target=\"_blank\" class=\"mab gmaps\" style=\"margin-top:6px;font-size:.72rem;padding:4px 10px\">📍 Map</a>\n            </div>\n          </div>\n        </div>\n\n        <div class=\"drive-stat\"><span class=\"drive-val\">5h 43m driving</span>&nbsp;·&nbsp;305 mi · Jensen's Truck Stop or Hotel — Ukiah, CA overnight · Google Maps verified</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<hr class=\"div\">\n\n<!-- ═══ DAY 18 ═══ -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"day-section\">\n      <div class=\"day-hd d18\">\n        <div class=\"day-hd-label\">July 2 · Day 18 · 2h 11m · 135 mi · FINAL DRIVE · Google Maps verified</div>\n        <div class=\"day-hd-title\">Ukiah → San Francisco International · 11am Hard Deadline</div>\n        <div class=\"day-hd-sub\">Depart 8:00am · US-101 South through Marin · SFO arrival 10:11am · 49-min buffer</div>\n      </div>\n      <div class=\"day-body\">\n        <div id=\"map-day18\" class=\"seg-map\"></div>\n        <p class=\"map-caption\">Day 18: Ukiah → US-101 South → Cloverdale → Healdsburg → Santa Rosa → Novato → San Rafael → SFO · 2h 11m · 135 mi (Google Maps verified)</p>\n        <div class=\"map-actions\">\n          <a href=\"https://www.google.com/maps/dir/Ukiah+CA/San+Francisco+International+Airport+CA\" target=\"_blank\" class=\"mab route\">🗺️ Open Final Drive in Google Maps</a>\n        </div>\n\n        <div class=\"hard-stop-banner\">\n          <div class=\"hs-title\">⚠️ 11am is Non-Negotiable</div>\n          <div class=\"hs-text\"><strong>Depart Ukiah by 8:00am.</strong> Google Maps verified 2h 11m to SFO · 8am departure = 10:11am arrival = 49-minute buffer. US-101 through Marin adds time in morning traffic. Worst pinch points: Corte Madera, San Rafael, and the 101/580 interchange. Use live Waze or Google Maps from the moment you leave Willits. 511.org for Bay Area conditions. A 10:30am terminal arrival gives a 30-minute buffer for the 11am requirement.</div>\n        </div>\n\n        <div class=\"time-block\">\n          <div class=\"tb-hd ca\">The Last Drive</div>\n          <ul class=\"tb-list\">\n            <li>US-101 south from Ukiah drops through Hopland, Cloverdale, Healdsburg, and Santa Rosa — the coastal hills opening into Marin County with bay glimpses starting near Novato.</li>\n const LABELS    = ["pre-california-routes", "segment-hv-to-kc", "segment-kc-to-glacier", "glacier-guide", "yellowstone-guide", "segment-ys-to-sf", "logistics-guide"];
const GRADIENTS = ["linear-gradient(135deg, #1a365d 0%, #2d6a4f 60%, #c05621 100%)", "linear-gradient(160deg,#1A202C 0%,#7B341E 40%,#C0392B 75%,#D69E2E 100%)", "linear-gradient(160deg,#1A202C 0%,#1B3D6E 30%,#C05621 65%,#D69E2E 100%)", "linear-gradient(160deg,#0A1E3C 0%,#1B3D6E 45%,#2A6496 78%,#4A8EC4 100%)", "linear-gradient(160deg,#3D1805 0%,#7A2E08 35%,#C05010 70%,#D69E2E 100%)", "linear-gradient(160deg,#1A202C 0%,#1B3D6E 25%,#0E4A56 50%,#276749 70%,#C05621 85%,#D69E2E 100%)", "linear-gradient(160deg,#1A202C 0%,#2B6CB0 35%,#276749 65%,#C05621 100%)"];
let current = 0;
const track       = document.getElementById('track');
const strip       = document.getElementById('strip');
const stripWrapper= document.getElementById('stripWrapper');
const btnPrev     = document.getElementById('btnPrev');
const btnNext     = document.getElementById('btnNext');
const curPageEl   = document.getElementById('curPage');
const totalPagesEl= document.getElementById('totalPages');
const pageTitleEl = document.getElementById('pageTitle');

// ── Build slides + thumbnails ────────────────────────────────
function init() {
  totalPagesEl.textContent = PAGES.length;
  PAGES.forEach((html, i) => {
    // Slide
    const slide = document.createElement('div');
    slide.className = 'slide';
    const loader = document.createElement('div');
    loader.className = 'slide-loader';
    loader.innerHTML = '<div class="spinner"></div><span>Loading…</span>';
    slide.appendChild(loader);
    const iframe = document.createElement('iframe');
    iframe.title = 'Slide ' + (i + 1);
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox');
    if (i === 0) {
      const hide0 = () => loader.classList.add('hidden');
      iframe.onload = hide0;
      setTimeout(hide0, 6000);
      iframe.srcdoc = html;
    }
    slide.appendChild(iframe);
    track.appendChild(slide);

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'thumb' + (i === 0 ? ' active' : '');
    thumb.setAttribute('role', 'button');
    thumb.setAttribute('tabindex', '0');
    thumb.setAttribute('aria-label', 'Go to slide ' + (i + 1) + ': ' + LABELS[i]);
    thumb.innerHTML = `<span class="thumb-num">${i + 1}</span>
      <div class="thumb-preview" style="background:${GRADIENTS[i]}"></div>
      <div class="thumb-label">${LABELS[i]}</div>`;
    thumb.addEventListener('click', () => goTo(i));
    thumb.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goTo(i); } });
    strip.appendChild(thumb);
  });
  goTo(0, false);
}

// ── Navigation ───────────────────────────────────────────────
function goTo(index, animate = true) {
  if (index < 0 || index >= PAGES.length) return;
  current = index;
  if (!animate) track.style.transition = 'none';
  track.style.transform = `translateX(-${current * 100}%)`;
  if (!animate) requestAnimationFrame(() => { track.style.transition = ''; });
  loadSlide(index); loadSlide(index + 1); loadSlide(index - 1);
  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === current));
  const at = strip.children[current];
  if (at) at.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === PAGES.length - 1;
  curPageEl.textContent  = current + 1;
  pageTitleEl.textContent = LABELS[current];
  // Re-apply active translation to this slide
  if (typeof currentLang !== 'undefined' && currentLang !== 'en') {
    var _tf = track.querySelectorAll('.slide iframe')[index];
    if (_tf) setTimeout(function() {
      try { _tf.contentWindow.postMessage({type:'translate',lang:currentLang},'*'); } catch(ex) {}
    }, 400);
  }
}

function loadSlide(index) {
  if (index < 0 || index >= PAGES.length) return;
  const slide  = track.querySelectorAll('.slide')[index];
  if (!slide) return;
  const iframe = slide.querySelector('iframe');
  const loader = slide.querySelector('.slide-loader');
  if (iframe && !iframe.srcdoc) {
    const hide = () => { if (loader) loader.classList.add('hidden'); };
    iframe.onload = hide;
    setTimeout(hide, 6000);
    iframe.srcdoc = PAGES[index];
  }
}

// Hide loader and re-apply active language when a page signals DOMContentLoaded
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'page-ready') return;
  document.querySelectorAll('.slide iframe').forEach(function(f) {
    try {
      if (f.contentWindow === e.source) {
        var loader = f.parentElement.querySelector('.slide-loader');
        if (loader) loader.classList.add('hidden');
        if (typeof currentLang !== 'undefined' && currentLang !== 'en') {
          var _pf = f;
          setTimeout(function() {
            try { _pf.contentWindow.postMessage({type:'translate',lang:currentLang},'*'); } catch(ex) {}
          }, 600);
        }
      }
    } catch(err) {}
  });
});

// ── Button handlers ──────────────────────────────────────────
btnPrev.addEventListener('click', () => goTo(current - 1));
btnNext.addEventListener('click', () => goTo(current + 1));

// ── Keyboard ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.activeElement && document.activeElement.tagName === 'IFRAME') return;
  switch (e.key) {
    case 'ArrowRight': case 'ArrowDown': case 'PageDown':
      e.preventDefault(); goTo(current + 1); break;
    case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
      e.preventDefault(); goTo(current - 1); break;
    case 'Home': e.preventDefault(); goTo(0); break;
    case 'End':  e.preventDefault(); goTo(PAGES.length - 1); break;
    case 'f': case 'F': toggleFullscreen(); break;
    case 'g': case 'G': toggleStrip(); break;
    case 't': case 'T': toggleTheme(); break;
  }
});

// ── Touch swipe ──────────────────────────────────────────────
let tX = 0, tY = 0, drag = false, dDelta = 0;
const vp = document.getElementById('viewport');
vp.addEventListener('touchstart', e => { tX = e.touches[0].clientX; tY = e.touches[0].clientY; drag = false; dDelta = 0; }, { passive: true });
vp.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - tX, dy = e.touches[0].clientY - tY;
  if (!drag && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) drag = true;
  if (drag) { dDelta = dx; track.style.transition = 'none'; track.style.transform = `translateX(calc(${-current * 100}% + ${(dDelta / vp.clientWidth) * 100}%))`; }
}, { passive: true });
vp.addEventListener('touchend', () => {
  if (!drag) return;
  track.style.transition = '';
  const th = vp.clientWidth * 0.2;
  if (dDelta < -th) goTo(current + 1); else if (dDelta > th) goTo(current - 1); else goTo(current);
  drag = false; dDelta = 0;
});

// ── Mouse drag ───────────────────────────────────────────────
let mX = 0, mDown = false, mDelta = 0;
vp.addEventListener('mousedown', e => { if (e.target.tagName === 'IFRAME') return; mDown = true; mX = e.clientX; mDelta = 0; vp.style.cursor = 'grabbing'; });
window.addEventListener('mousemove', e => {
  if (!mDown) return; mDelta = e.clientX - mX;
  if (Math.abs(mDelta) > 5) { track.style.transition = 'none'; track.style.transform = `translateX(calc(${-current * 100}% + ${(mDelta / vp.clientWidth) * 100}%))`; }
});
window.addEventListener('mouseup', () => {
  if (!mDown) return; mDown = false; vp.style.cursor = '';
  if (Math.abs(mDelta) < 5) return;
  track.style.transition = '';
  const th = vp.clientWidth * 0.15;
  if (mDelta < -th) goTo(current + 1); else if (mDelta > th) goTo(current - 1); else goTo(current);
  mDelta = 0;
});

// ── Strip toggle ─────────────────────────────────────────────
let stripOpen = false;
function toggleStrip() { stripOpen = !stripOpen; stripWrapper.classList.toggle('open', stripOpen); }
document.getElementById('btnStrip').addEventListener('click', toggleStrip);

// ── Theme toggle ─────────────────────────────────────────────
let theme = document.documentElement.getAttribute('data-theme') || 'dark';
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('btnTheme');
  btn.innerHTML = theme === 'dark'
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
}
document.getElementById('btnTheme').addEventListener('click', toggleTheme);

// ── Fullscreen ───────────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen().catch(() => {});
}
document.getElementById('btnFullscreen').addEventListener('click', toggleFullscreen);


// ── Google Translate ──────────────────────────────────────────
const LANGUAGES = [["English", "en"], ["Spanish", "es"], ["French", "fr"], ["German", "de"], ["Portuguese", "pt"], ["Italian", "it"], ["Japanese", "ja"], ["Korean", "ko"], ["Chinese", "zh-CN"], ["Arabic", "ar"], ["Hindi", "hi"], ["Russian", "ru"]];
let currentLang = 'en';

function applyTranslation(langCode) {
  document.querySelectorAll('.slide iframe').forEach(function(f) {
    try { f.contentWindow.postMessage({type:'translate', lang:langCode}, '*'); } catch(e) {}
  });
}

function setLanguage(code, label) {
  currentLang = code;
  document.getElementById('langLabel').textContent = label;
  document.querySelectorAll('.lang-option').forEach(el => {
    el.classList.toggle('active', el.dataset.lang === code);
  });
  applyTranslation(code);
  closeLangDropdown();
}

function closeLangDropdown() {
  document.getElementById('langDropdown').classList.remove('open');
  document.getElementById('btnTranslate').setAttribute('aria-expanded', 'false');
}

document.getElementById('btnTranslate').addEventListener('click', (e) => {
  e.stopPropagation();
  const dd = document.getElementById('langDropdown');
  const isOpen = dd.classList.toggle('open');
  document.getElementById('btnTranslate').setAttribute('aria-expanded', isOpen);
});

document.querySelectorAll('.lang-option').forEach(el => {
  el.addEventListener('click', () => {
    const code = el.dataset.lang;
    const label = el.textContent.trim();
    setLanguage(code, label);
  });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
  });
});

document.addEventListener('click', (e) => {
  if (!document.getElementById('translateWrap').contains(e.target)) {
    closeLangDropdown();
  }
});

// Keyboard shortcut L
document.addEventListener('keydown', e => {
  if ((e.key === 'l' || e.key === 'L') && !e.target.matches('input,textarea')) {
    const dd = document.getElementById('langDropdown');
    const isOpen = dd.classList.toggle('open');
    document.getElementById('btnTranslate').setAttribute('aria-expanded', isOpen);
  }
});


init();
